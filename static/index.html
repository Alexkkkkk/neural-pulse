<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Online</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --neon-purp: #b026ff; 
            --neon-green: #00ffcc; 
            --bg: #050a1a; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            touch-action: manipulation; 
        }
        
        #reloading-screen { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader-logo { 
            width: 80px; height: 80px; 
            border-radius: 20px; 
            border: 2px solid var(--neon-purp); 
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.5); 
            margin-bottom: 20px; 
            overflow: hidden; 
        }
        .loader-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .game-container { 
            display: none; opacity: 0; 
            width: 100%; max-width: 500px; height: 100vh; 
            flex-direction: column; align-items: center; 
            padding: 15px; box-sizing: border-box; 
            transition: 0.5s; margin: 0 auto; 
        }
        .game-container.visible { display: flex; opacity: 1; }

        .header-top { width: 100%; display: flex; align-items: center; gap: 12px; }
        .ai-icon-small { width: 48px; height: 48px; border: 2px solid var(--neon-purp); border-radius: 12px; overflow: hidden; }
        .league-info { flex-grow: 1; }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
        #league-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: 0.5s; }

        #score { font-size: 48px; font-weight: 900; margin: 30px 0 10px; text-shadow: 0 0 20px var(--neon-blue); }
        
        .game-main { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #tap-btn { 
            width: 280px; height: 280px; 
            background: url('/static/images/logo.png?v=3.1') center/cover; 
            border: 4px solid rgba(176, 38, 255, 0.3); 
            border-radius: 50%; 
            filter: drop-shadow(0 0 20px var(--neon-blue));
            transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        #tap-btn:active { transform: scale(0.92); }

        .energy-box { width: 100%; margin-bottom: 30px; }
        .energy-bar-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid var(--neon-blue); overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: 0.2s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .nav-link { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 11px; 
            font-weight: 700; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase; 
        }
        
        .floating-text { 
            position: absolute; 
            pointer-events: none; 
            font-weight: 900; 
            font-size: 32px; 
            color: white; 
            animation: floatUp 0.8s forwards; 
            z-index: 100; 
            text-shadow: 0 0 10px var(--neon-blue); 
        }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-120px) scale(1.2); } 
        }
    </style>
</head>
<body>

<div id="reloading-screen">
    <div class="loader-logo"><img src="/static/images/logo.png?v=3.1"></div>
    <div style="color: var(--neon-blue); font-weight: 900; letter-spacing: 3px; font-size: 12px;">SYNCHRONIZING...</div>
</div>

<div class="game-container" id="main-container">
    <div class="header-top">
        <div class="ai-icon-small"><img src="/static/images/logo.png?v=3.1" style="width:100%"></div>
        <div class="league-info">
            <div style="display:flex; justify-content: space-between; font-size: 10px; font-weight: 700;">
                <span id="league-name">IRON LEAGUE</span>
                <span id="display-level">LVL 1</span>
            </div>
            <div class="league-bar"><div id="league-fill"></div></div>
        </div>
    </div>

    <div id="score">0</div>
    <div id="pnl-display" style="color: var(--neon-green); font-size: 12px; margin-bottom: 20px; letter-spacing: 1px;">PROFIT: +0/hr</div>

    <div class="game-main">
        <button id="tap-btn"></button>
    </div>

    <div class="energy-box">
        <div style="display:flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 700;">
            <span style="color: var(--neon-blue);">⚡ ENERGY</span>
            <span id="energy-text">0/0</span>
        </div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" style="border-color: var(--neon-purp);">🚀 Boost</div>
        <div class="nav-link" style="border-color: var(--neon-blue);">⛏️ Mine</div>
        <div class="nav-link" style="border-color: var(--neon-green);">📊 Stats</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // Стейт игрока
    let state = {
        score: 0, 
        energy: 1000, 
        max_energy: 1000, 
        tap_power: 1, 
        pnl: 0, 
        level: 1,
        user_id: String(tg.initDataUnsafe?.user?.id || '476014374')
    };

    const leagues = [
        { name: "IRON LEAGUE", min: 0, color: "#00d4ff" },
        { name: "BRONZE LEAGUE", min: 10000, color: "#cd7f32" },
        { name: "SILVER LEAGUE", min: 50000, color: "#c0c0c0" },
        { name: "GOLD LEAGUE", min: 250000, color: "#ffcc00" },
        { name: "NEURAL GOD", min: 1000000, color: "#b026ff" }
    ];

    async function init() {
        try {
            const r = await fetch(`/api/balance/${state.user_id}`);
            const res = await r.json();
            if(res.status === 'ok') {
                state = {...state, ...res.data};
                render();
                document.getElementById('reloading-screen').style.display = 'none';
                document.getElementById('main-container').classList.add('visible');
            }
        } catch(e) { 
            console.error("Connection error:", e);
            // Резервный вход при ошибке сети
            document.getElementById('reloading-screen').style.display = 'none';
            document.getElementById('main-container').classList.add('visible');
        }
    }

    function render() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        
        // Расчет уровня (каждые 15к очков)
        state.level = Math.floor(state.score / 15000) + 1;
        document.getElementById('display-level').innerText = `LVL ${state.level}`;

        // Определение текущей лиги
        let currentLeague = leagues[0];
        for(let l of leagues) {
            if(state.score >= l.min) currentLeague = l;
        }
        
        const leagueNameEl = document.getElementById('league-name');
        leagueNameEl.innerText = currentLeague.name;
        leagueNameEl.style.color = currentLeague.color;

        // Полоска прогресса лиги
        let nextLeague = leagues[leagues.indexOf(currentLeague) + 1] || currentLeague;
        let progress = 100;
        if(nextLeague !== currentLeague) {
            progress = ((state.score - currentLeague.min) / (nextLeague.min - currentLeague.min)) * 100;
        }
        document.getElementById('league-fill').style.width = progress + '%';
        document.getElementById('league-fill').style.background = currentLeague.color;
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy < state.tap_power) return;
        
        state.score += state.tap_power;
        state.energy -= state.tap_power;
        
        const touch = e.touches[0];
        createFlyText(touch.clientX, touch.clientY, `+${state.tap_power}`);
        
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    // Сохранение данных (раз в 10 сек, только если вкладка активна)
    setInterval(async () => {
        if (document.hidden) return;
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(state)
            });
        } catch(e) {}
    }, 10000);

    // Пассивный доход и регенерация энергии
    setInterval(() => {
        let needsRender = false;
        if(state.energy < state.max_energy) {
            state.energy = Math.min(state.max_energy, state.energy + 1.5);
            needsRender = true;
        }
        if(state.pnl > 0) {
            state.score += (state.pnl / 3600);
            needsRender = true;
        }
        if(needsRender) render();
    }, 1000);

    window.onload = init;
</script>
</body>
</html>
