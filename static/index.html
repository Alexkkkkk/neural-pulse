<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.0.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        tc-root, #ton-connect-ui-wrapper, .tc-modal-overlay { z-index: 1000000 !important; position: relative; }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .l-circle-wrap { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .l-circle-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .l-circle-bg { fill: none; stroke: #111; stroke-width: 2; }
        .l-circle-progress { fill: none; stroke: var(--cyan); stroke-width: 2; stroke-dasharray: 565; stroke-dashoffset: 565; transition: stroke-dashoffset 0.1s; stroke-linecap: round; filter: drop-shadow(0 0 5px var(--cyan)); }
        .l-logo-mid { width: 70px; filter: drop-shadow(0 0 15px var(--purple)); }
        .l-pct { margin-top: 15px; font-size: 42px; font-weight: 900; color: var(--cyan); }

        /* MAIN UI */
        #app { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .header { width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; box-sizing: border-box; }
        .u-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 44px; height: 44px; border: 1px solid var(--cyan); border-radius: 12px; background: #111; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .lvl-pill { background: var(--cyan); color: #000; padding: 6px 14px; border-radius: 10px; font-weight: 900; font-size: 14px; }
        .balance { font-size: 60px; font-weight: 900; margin: 20px 0; letter-spacing: -2px; }
        
        .play-area { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-logo { width: 230px; filter: drop-shadow(0 0 40px var(--purple)); transition: transform 0.05s; cursor: pointer; -webkit-user-drag: none; }
        
        .side-menu { position: absolute; right: 0; display: flex; flex-direction: column; gap: 10px; }
        .side-btn { background: #0d0d0d; border: 1px solid #222; color: #fff; padding: 14px 0; border-radius: 15px; font-size: 11px; font-weight: 900; width: 105px; text-transform: uppercase; }

        .eng-wrap { width: 100%; margin-bottom: 30px; }
        .eng-meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; color: #555; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; }
        .bar-f { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); width: 100%; transition: width 0.2s; }

        .footer { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .f-btn { background: #080808; border: 1px solid #1a1a1a; padding: 18px 0; border-radius: 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; }

        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.3); opacity: 0; } }
        .float-text { position: fixed; pointer-events: none; z-index: 10000; font-weight: 900; animation: floatUp 0.7s ease-out forwards; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; flex-direction: column; padding: 40px 20px; }
        .m-title { font-size: 34px; font-weight: 900; margin-bottom: 30px; text-align: left; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-cls { background: #fff; color: #000; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; border: none; margin-top: auto; }
        .b-btn { background: var(--cyan); color: #000; padding: 12px; border-radius: 12px; font-weight: 900; border: none; min-width: 90px; }
        
        .top-card { background: #0d0d0d; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .t-left { display: flex; align-items: center; gap: 12px; }
        .t-avatar { width: 36px; height: 36px; border-radius: 10px; background: #111; overflow: hidden; }
        .t-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="loader">
    <div class="l-circle-wrap">
        <svg class="l-circle-svg" viewBox="0 0 200 200">
            <circle class="l-circle-bg" cx="100" cy="100" r="90"></circle>
            <circle id="l-circle-bar" class="l-circle-progress" cx="100" cy="100" r="90"></circle>
        </svg>
        <img src="./logo.png" class="l-logo-mid" onerror="this.src='https://i.ibb.co/LzY7X6p/ai-logo.png'">
    </div>
    <div class="l-pct" id="l-pct">0%</div>
</div>

<div id="app">
    <div class="header">
        <div class="u-info">
            <div class="avatar" id="u-avatar-box"><img src="./logo.png" onerror="this.src='https://i.ibb.co/LzY7X6p/ai-logo.png'"></div>
            <div style="text-align:left;"><span id="u-name" style="font-weight:900;">Agent</span><br><small style="color:var(--cyan); font-size:9px;">v3.0.1 Quantum</small></div>
        </div>
        <div class="lvl-pill" id="u-lvl">LVL 1</div>
    </div>
    <div class="balance" id="balance">0</div>
    <div class="play-area">
        <img src="./logo.png" class="main-logo" id="tap-img" onpointerdown="tap(event)" onerror="this.src='https://i.ibb.co/LzY7X6p/ai-logo.png'">
        <div class="side-menu">
            <div class="side-btn" onclick="openM('wallet')">👛 WALLET</div>
            <div class="side-btn" onclick="openFriends()">🤝 FRIENDS</div>
            <div class="side-btn" onclick="openM('bonus')">🎁 BONUS</div>
        </div>
    </div>
    <div class="eng-wrap">
        <div class="eng-meta"><span>ENERGY</span><span id="eng-val">...</span></div>
        <div class="bar-bg"><div class="bar-f" id="eng-fill"></div></div>
    </div>
    <div class="footer">
        <div class="f-btn" onclick="openM('boost')">🚀 BOOST</div>
        <div class="f-btn" onclick="openM('mine')">⛏️ MINE</div>
        <div class="f-btn" onclick="openM('tasks')">📋 TASKS</div>
        <div class="f-btn" onclick="loadTop()">🏆 TOP</div>
    </div>
</div>

<div id="m-boost" class="modal">
    <div class="m-title">🚀 UPGRADE</div>
    <div class="card"><div><b>⚡ Multitap</b><br><small>Level Up Power</small></div><button id="btn-mt" class="b-btn" onclick="buyB('mt')">0</button></div>
    <div class="card"><div><b>🔋 Capacity</b><br><small>+500 Energy</small></div><button id="btn-el" class="b-btn" onclick="buyB('el')">0</button></div>
    <div class="card"><div><b>🤖 Auto Bot</b><br><small>Earn Offline</small></div><button id="btn-bot" class="b-btn" onclick="buyB('bot')">5000</button></div>
    <button class="btn-cls" onclick="closeM()">BACK</button>
</div>

<div id="m-top" class="modal">
    <div class="m-title">🏆 TOP NODES</div>
    <div id="top-container" style="flex:1; overflow-y:auto;"></div>
    <button class="btn-cls" onclick="closeM()">BACK</button>
</div>

<div id="m-wallet" class="modal">
    <div class="m-title">👛 WALLET</div>
    <div class="card" style="flex-direction:column; gap:10px;">
        <span id="wallet-addr" style="font-size:12px; word-break:break-all; color:var(--cyan);">Not Connected</span>
    </div>
    <button style="background:var(--cyan); padding:18px; border-radius:15px; font-weight:900; border:none; width:100%;" onclick="handleWallet()">CONNECT WALLET</button>
    <button class="btn-cls" onclick="closeM()">BACK</button>
</div>

<div id="m-friends" class="modal"><div class="m-title">🤝 FRIENDS</div><div id="friends-list" style="flex:1; overflow-y:auto;"></div><button class="btn-cls" onclick="closeM()">BACK</button></div>
<div id="m-bonus" class="modal"><div class="m-title">🎁 BONUS</div><button class="btn-cls" onclick="closeM()">BACK</button></div>
<div id="m-mine" class="modal"><div class="m-title">⛏️ MINE</div><button class="btn-cls" onclick="closeM()">BACK</button></div>
<div id="m-tasks" class="modal"><div class="m-title">📋 TASKS</div><button class="btn-cls" onclick="closeM()">BACK</button></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });

    let s = { 
        id: tg.initDataUnsafe?.user?.id?.toString() || "0",
        name: tg.initDataUnsafe?.user?.first_name || "Agent",
        photo: tg.initDataUnsafe?.user?.photo_url || "",
        bal: 0, lvl: 1, eng: 1000, max: 1000, wallet: null, bot: false 
    };

    async function init() {
        let p = 0; const bar = document.getElementById('l-circle-bar');
        const interval = setInterval(() => {
            p += 2; if(p > 100) p = 100;
            document.getElementById('l-pct').innerText = p + '%';
            bar.style.strokeDashoffset = 565 - (565 * p / 100);
            if(p >= 100) { clearInterval(interval); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
        }, 20);

        await sync();
        tonUI.onStatusChange(w => { s.wallet = w ? w.account.address : null; save(); });
        setInterval(save, 5000);
        setInterval(() => { if(s.eng < s.max) { s.eng++; upd(); }}, 1000);
    }

    async function sync() {
        try {
            const r = await fetch(`/api/user/${s.id}?name=${encodeURIComponent(s.name)}&photo=${encodeURIComponent(s.photo)}`);
            const d = await r.json();
            s.bal = Number(d.balance); s.lvl = d.click_lvl; s.eng = d.energy; 
            s.max = d.max_energy; s.wallet = d.wallet_addr; s.bot = d.has_bot;
            upd();
        } catch(e) { console.error(e); }
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('u-lvl').innerText = `LVL ${s.lvl}`;
        document.getElementById('u-name').innerText = s.name;
        document.getElementById('eng-val').innerText = `${s.eng} / ${s.max}`;
        document.getElementById('eng-fill').style.width = `${(s.eng / s.max) * 100}%`;
        if(s.photo) document.getElementById('u-avatar-box').innerHTML = `<img src="${s.photo}">`;
        
        let mtCost = Math.floor(250 * Math.pow(1.618, s.lvl - 1));
        let elCost = Math.floor(400 * Math.pow(1.5, (s.max / 500) - 1));
        document.getElementById('btn-mt').innerText = mtCost.toLocaleString();
        document.getElementById('btn-el').innerText = elCost.toLocaleString();
        document.getElementById('btn-bot').innerText = s.bot ? "ACTIVE" : "5000";
        if(s.bot) document.getElementById('btn-bot').disabled = true;
        if(s.wallet) document.getElementById('wallet-addr').innerText = s.wallet.slice(0,8)+"..."+s.wallet.slice(-8);
    }

    function tap(e) {
        if(s.eng >= s.lvl) {
            let isCrit = Math.random() < 0.05;
            let pwr = isCrit ? s.lvl * 2 : s.lvl;
            s.bal += pwr; s.eng -= s.lvl;
            showFloat(e, isCrit ? `💥 +${pwr}` : `+${pwr}`, isCrit);
            tg.HapticFeedback.impactOccurred(isCrit ? 'heavy' : 'light');
            const img = document.getElementById('tap-img');
            img.style.transform = 'scale(0.95)';
            setTimeout(() => img.style.transform='scale(1)', 50);
            upd();
        }
    }

    function showFloat(e, t, c) {
        const f = document.createElement('div');
        f.className = 'float-text'; f.innerText = t;
        f.style.left = `${(e.clientX || e.touches[0].clientX)}px`;
        f.style.top = `${(e.clientY || e.touches[0].clientY)}px`;
        f.style.color = c ? 'var(--purple)' : 'var(--cyan)';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 700);
    }

    function buyB(type) {
        let cost = 0;
        if(type === 'mt') { cost = Math.floor(250 * Math.pow(1.618, s.lvl - 1)); if(s.bal >= cost) { s.bal -= cost; s.lvl++; } }
        else if(type === 'el') { cost = Math.floor(400 * Math.pow(1.5, (s.max / 500) - 1)); if(s.bal >= cost) { s.bal -= cost; s.max += 500; s.eng += 500; } }
        else if(type === 'bot') { if(s.bal >= 5000 && !s.bot) { s.bal -= 5000; s.bot = true; } }
        upd(); save();
    }

    async function loadTop() {
        openM('top');
        const cont = document.getElementById('top-container');
        cont.innerHTML = '<p>SYNCING...</p>';
        const r = await fetch('/api/top');
        const data = await r.json();
        cont.innerHTML = data.map((u, i) => `
            <div class="top-card" style="${u.user_id == s.id ? 'border-color:var(--cyan)' : ''}">
                <div class="t-left">
                    <div style="width:25px;">${i < 3 ? ['🏆','🥈','🥉'][i] : i+1}</div>
                    <div class="t-avatar"><img src="${u.avatar_url || './logo.png'}" onerror="this.src='./logo.png'"></div>
                    <div class="t-name">${u.username}</div>
                </div>
                <div class="t-value">${Math.floor(u.balance).toLocaleString()}</div>
            </div>
        `).join('');
    }

    function save() {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: s.id, balance: s.bal, energy: s.eng, max_energy: s.max, click_lvl: s.lvl, wallet: s.wallet, has_bot: s.bot })
        });
    }

    function openM(id) { document.getElementById('m-'+id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function handleWallet() { if(tonUI.connected) tonUI.disconnect(); else tonUI.openModal(); }

    init();
</script>
</body>
</html>
