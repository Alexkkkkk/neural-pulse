<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --neon-sec: #00ff96; --bg: #050a1a; }
        body { margin: 0; background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%); height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; user-select: none; }
        
        .game-container { display: flex; flex-direction: column; align-items: center; height: 100vh; padding: 20px; box-sizing: border-box; transition: opacity 0.5s; }
        .header { width: 100%; display: flex; justify-content: space-between; font-size: 12px; color: var(--neon); }
        
        #score { font-size: 44px; font-weight: bold; text-shadow: 0 0 20px var(--neon); margin-top: 20px; }
        .label { font-size: 10px; opacity: 0.6; letter-spacing: 2px; }

        .click-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #tap-btn { width: 260px; height: 260px; background: url('https://cdn-icons-png.flaticon.com/512/8637/8637110.png') center/contain no-repeat; border: none; outline: none; filter: drop-shadow(0 0 15px var(--neon)); transition: transform 0.05s; cursor: pointer; }
        #tap-btn:active { transform: scale(0.92); }

        .nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .nav-item { background: rgba(255,255,255,0.05); padding: 15px 5px; border-radius: 12px; text-align: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }

        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: #0a192f; border-top: 2px solid var(--neon); border-radius: 25px 25px 0 0; z-index: 1000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .btn-action { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold; color: #000; margin-top: 15px; }
        .plus { position: absolute; color: var(--neon); font-size: 28px; font-weight: bold; pointer-events: none; animation: fly 0.8s forwards; text-shadow: 0 0 10px var(--neon); }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }
    </style>
</head>
<body>
    <div class="game-container" id="game" style="opacity:0">
        <div class="header">
            <span id="rank">RANK: ...</span>
            <span id="lvl-display">LVL 1</span>
        </div>

        <div class="label" style="margin-top:20px">BALANCE</div>
        <div id="score">0</div>

        <div class="click-area">
            <button id="tap-btn"></button>
        </div>

        <div class="nav">
            <div class="nav-item" onclick="showModal('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="showModal('friends')">👥 FRIENDS</div>
            <div class="nav-item" onclick="showModal('mine')">⛏️ SHOP</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>

    <div id="m-boost" class="modal">
        <h2>Boost Up</h2>
        <p>Current power: <span id="pow" style="color:var(--neon-sec)">1</span> NP / Tap</p>
        <button id="up-btn" class="btn-action" onclick="doUpgrade()">UPGRADE (<span id="price">0</span> NP)</button>
    </div>

    <div id="m-friends" class="modal">
        <h2>Referrals</h2>
        <div style="background:rgba(0,212,255,0.1); padding:15px; border-radius:12px; margin-bottom:15px">
            <small>Get 50,000 NP for each friend!</small>
        </div>
        <button class="btn-action" style="background:#0088cc; color:#fff" onclick="invite()">INVITE FRIENDS</button>
        <div id="f-list" style="margin-top:20px; overflow-y:auto; max-height:150px"></div>
    </div>

    <div id="m-mine" class="modal">
        <h2>Coming Soon</h2>
        <p style="opacity:0.5">Shop with TON is under maintenance.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const uid = String(tg.initDataUnsafe?.user?.id || "999");
        let balance = 0, lvl = 1, pending = 0, CONF = {};

        function showModal(id) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('m-' + id).classList.add('active');
            if(id === 'friends') loadFriends();
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('overlay').classList.remove('active');
        }

        function updateUI() {
            document.getElementById('score').textContent = Math.floor(balance).toLocaleString();
            const c = CONF[lvl];
            if(c) {
                document.getElementById('rank').textContent = `RANK: ${c.name}`;
                document.getElementById('lvl-display').textContent = `LVL ${lvl}`;
                document.getElementById('pow').textContent = c.tap;
                const next = CONF[lvl + 1];
                if(next) {
                    document.getElementById('price').textContent = next.price.toLocaleString();
                } else {
                    document.getElementById('up-btn').style.display = 'none';
                }
            }
        }

        async function doUpgrade() {
            const r = await fetch('/api/buy_boost', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid })
            });
            const d = await r.json();
            if(d.status === 'ok') {
                balance = d.new_balance; lvl = d.new_lvl;
                updateUI(); tg.HapticFeedback.notificationOccurred('success');
            } else tg.showAlert(d.error);
        }

        async function loadFriends() {
            const r = await fetch(`/api/friends/${uid}`);
            const d = await r.json();
            document.getElementById('f-list').innerHTML = d.friends_list.map(f => 
                `<div style="padding:10px; border-bottom:1px solid #1a2a3a">👤 User ${f}</div>`
            ).join('') || "No friends yet";
        }

        function invite() {
            const link = `https://t.me/YourBotUser?start=${uid}`; // ЗАМЕНИТЕ YourBotUser
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me in Neural Pulse!`);
        }

        document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const power = CONF[lvl]?.tap || 1;
            for(let t of e.changedTouches) {
                balance += power; pending += power;
                const p = document.createElement('div');
                p.className = 'plus'; p.textContent = `+${power}`;
                p.style.left = t.pageX + 'px'; p.style.top = t.pageY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
            updateUI(); tg.HapticFeedback.impactOccurred('light');
        });

        setInterval(() => {
            if(pending > 0) {
                fetch('/api/clicks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: uid, clicks: pending })
                });
                pending = 0;
            }
        }, 2000);

        async function init() {
            const [c, b] = await Promise.all([
                fetch('/api/config').then(r => r.json()),
                fetch(`/api/balance/${uid}`).then(r => r.json())
            ]);
            CONF = c.levels; balance = b.balance; lvl = b.click_lvl;
            updateUI();
            document.getElementById('game').style.opacity = 1;
        }
        init();
    </script>
</body>
</html>
