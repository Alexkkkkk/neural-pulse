<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.3.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; touch-action: none; 
        }
        
        /* Оригинальный лоадер */
        #loader { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 10000; transition: 0.5s; 
        }
        .loader-circle { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 2px solid transparent; border-top: 2px solid var(--neon-cyan); 
            border-right: 2px solid var(--neon-purple); display: flex; 
            align-items: center; justify-content: center; animation: spin 2s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s; }
        .app.ready { opacity: 1; visibility: visible; }

        /* Шапка 1.3.0 */
        .header { 
            width: 90%; margin-top: 20px; background: rgba(255,255,255,0.05); 
            border-radius: 20px; padding: 12px; display: flex; 
            align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); 
            box-sizing: border-box;
        }
        .lvl-box { 
            width: 45px; height: 45px; border: 2px solid var(--neon-cyan); 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; font-size: 22px; font-weight: bold; 
            box-shadow: 0 0 10px var(--neon-cyan); 
        }
        
        .bal { font-size: 60px; font-weight: 900; margin-top: 15px; text-shadow: 0 0 20px rgba(0,242,255,0.3); letter-spacing: -2px; }
        .pnl { color: var(--neon-cyan); font-weight: bold; margin-top: -10px; font-size: 13px; text-transform: uppercase; }

        /* Игровое поле с боковыми кнопками */
        .stage { flex-grow: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .main-logo { 
            width: 230px; height: 230px; z-index: 1; border-radius: 50%; 
            filter: drop-shadow(0 0 30px rgba(188,19,254,0.3)); 
            cursor: pointer; transition: 0.1s; 
        }
        .main-logo:active { transform: scale(0.95); }

        .overlay-btns { position: absolute; right: 8%; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .btn-pill { 
            background: rgba(20,20,20,0.85); border: 1px solid #444; color: white; 
            padding: 12px 0; border-radius: 18px; width: 110px; text-align: center; 
            font-size: 10px; font-weight: bold; backdrop-filter: blur(8px); 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-pill:active { background: #333; }

        /* Энергия */
        .energy-box { width: 85%; margin-bottom: 25px; }
        .e-bar { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .e-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); transition: 0.3s; width: 100%; }

        /* Футер 1.3.6 (4 кнопки) */
        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 35px; }
        .f-item { background: #151515; border: 1px solid #252525; border-radius: 20px; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; }

        /* Модальные окна */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .plus { position: absolute; font-size: 40px; font-weight: 900; color: var(--neon-cyan); animation: float 0.7s forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 15px var(--neon-cyan); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-circle"><img src="logo.png" style="width: 75px;" onerror="this.src='images/logo.png'"></div>
        <div id="l-p" style="margin-top:20px; font-weight:bold; color:var(--neon-cyan)">0%</div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl-box" id="l-v">1</div>
            <div>
                <div style="font-size: 9px; color: #555;">NEURAL PULSE</div>
                <div id="r-b" style="font-size: 14px; font-weight: 900;">BRONZE NODE</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">PNL: +0/H</div>

        <div class="stage">
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
            <div class="overlay-btns">
                <div class="btn-pill" onclick="handleWallet()">WALLET</div>
                <div class="btn-pill" onclick="inviteFriends()">FRIENDS</div>
                <div class="btn-pill" style="border-color:var(--neon-purple)" onclick="tg.showAlert('Daily Bonus: +500 Pulse!')">BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px; color:#666;">
                <span>⚡ ENERGY CORE</span><span id="e-n">1000/1000</span>
            </div>
            <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="openModal('boost-ui')">🚀 BOOST</div>
            <div class="f-item" onclick="openModal('mine-ui')">⛏️ MINE</div>
            <div class="f-item" onclick="openModal('tasks-ui')">📋 TASKS</div>
            <div class="f-item" onclick="openStats()">📊 STATS</div>
        </div>
    </div>

    <div id="tasks-ui" class="modal">
        <h2 style="color:var(--neon-cyan)">MISSION CENTER</h2>
        <div class="card">
            <div><b>Subscribe Channel</b><br><small>+10,000 Pulse</small></div>
            <button class="btn-pill" style="width:70px; border-color:var(--neon-cyan)" onclick="doTask(10000)">GO</button>
        </div>
        <div class="card">
            <div><b>Invite 3 Friends</b><br><small>+25,000 Pulse</small></div>
            <button class="btn-pill" style="width:70px;" onclick="inviteFriends()">GO</button>
        </div>
        <button class="f-item" style="margin-top:auto; width:100%;" onclick="closeModal('tasks-ui')">CLOSE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Настройка TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ 
            manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json', 
            buttonRootId: null 
        });

        const params = new URLSearchParams(window.location.search);
        const refBy = params.get('ref');

        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0, r: 'Bronze Node' };

        // Загрузка данных
        async function load() {
            try {
                const r = await fetch(`/api/user/${s.uid}?ref=${refBy || ''}`);
                const d = await r.json();
                Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl), r: d.rank });
                upd();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ui').classList.add('ready');
            } catch(e) { console.error("Load Error:", e); }
        }

        function upd() {
            // Логика рангов
            if (s.bal > 100000) s.r = 'Gold Node';
            else if (s.bal > 10000) s.r = 'Silver Node';

            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${s.eng}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('r-b').innerText = s.r;
            document.getElementById('p-v').innerText = `PNL: +${Math.floor(s.pnl)}/H`;
        }

        // Функции кнопок v1.3.6
        function inviteFriends() {
            const link = `https://t.me/n_pulse_bot?start=${s.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=Connect to my neural node and get 5000 bonus coins!`);
        }

        function doTask(amt) {
            tg.openTelegramLink("https://t.me/your_channel");
            setTimeout(() => {
                s.bal += amt;
                upd();
                save();
                tg.showAlert(`Task complete! Reward: ${amt}`);
            }, 3000);
        }

        async function handleWallet() {
            if (tonConnectUI.connected) {
                await tonConnectUI.disconnect();
            } else {
                await tonConnectUI.openModal();
            }
        }

        // Модалки
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Клик
        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            
            const t = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            upd();
        });

        // Сохранение
        function save() {
            fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    userId: s.uid, balance: s.bal, energy: s.eng, 
                    click_lvl: s.lvl, pnl: s.pnl, rank: s.r
                }) 
            });
        }

        // Лоадер %
        let p = 0;
        const loadIv = setInterval(() => {
            p += 5; document.getElementById('l-p').innerText = p + '%';
            if(p >= 100) { clearInterval(loadIv); load(); }
        }, 30);

        setInterval(save, 5000);
        setInterval(() => { if(s.eng < 1000) { s.eng++; upd(); } }, 1000);
        setInterval(() => { if(s.pnl > 0) { s.bal += (s.pnl/3600); upd(); } }, 1000);
    </script>
</body>
</html>
