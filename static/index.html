<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.7</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.5; transform: scale(1); } }
        .modal-bg.active { display: flex; }
        .task-item, .top-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-btn { background: cyan; color: black; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .ref-box { background: #000; border: 1px dashed cyan; padding: 10px; border-radius: 8px; margin: 10px 0; word-break: break-all; font-family: monospace; font-size: 12px; }
        .top-avatar { width: 30px; height: 30px; border-radius: 50%; margin-right: 10px; border: 1px solid cyan; }
        .top-info { display: flex; align-items: center; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">INITIALIZING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, balance: 0, energy: 1000, max_energy: 1000, 
                tap: 1, profit: 0, tap_lvl: 1, mine_lvl: 1, 
                energy_lvl: 1, last_bonus: 0 
            },
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, first_name: 'Agent', photo_url: '' };
                
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://np.bothost.tech/tonconnect-manifest.json'
                    });
                } catch(e) {}

                // Загрузка данных с сервера
                try {
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(u.username || u.first_name)}&photo_url=${encodeURIComponent(u.photo_url || '')}`);
                    if (r.ok) {
                        const db = await r.json();
                        Object.assign(this.data, db);
                        if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                    }
                } catch(e) { this.data.id = u.id; }

                document.getElementById('my-name').innerText = (u.username || u.first_name).toUpperCase();
                
                this.isLoaded = true;
                this.loop();
                ui.render();
            },

            getCost(type) {
                const lvl = this.data[type + '_lvl'] || 1;
                if(type === 'tap') return Math.floor(450 * Math.pow(1.7, lvl - 1));
                if(type === 'energy') return Math.floor(600 * Math.pow(1.6, lvl - 1));
                if(type === 'mine') return Math.floor(1500 * Math.pow(1.65, lvl - 1));
                return 0;
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                this.data.balance += this.data.tap;
                this.data.energy -= 1;
                ui.pop(e, this.data.tap);
                ui.render();
                tg.HapticFeedback.impactOccurred('light');
            },

            async upgrade(type) {
                let cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') { this.data.tap_lvl++; this.data.tap += 1; }
                    if(type === 'energy') { this.data.energy_lvl++; this.data.max_energy += 500; this.data.energy = this.data.max_energy; }
                    if(type === 'mine') { this.data.mine_lvl++; this.data.profit += 150; }
                    this.save();
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("НЕДОСТАТОЧНО NP");
                }
            },

            async save() {
                if(!this.isLoaded || !this.data.id) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.data)
                });
            },

            loop() {
                setInterval(() => {
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 15000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 10;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 40);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit);
                
                const rank = d.balance < 50000 ? "NODE AGENT" : d.balance < 250000 ? "CYBER MANTIS" : "NEURAL LORD";
                document.getElementById('ui-rank').innerText = rank;
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(d.balance / 10000) + 1}`;
            },

            pop(e, p) {
                const t = (e.touches && e.touches[0]) || e;
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = t.clientX+'px'; div.style.top = t.clientY+'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = `<div class="loading">SYNCING...</div>`;
                
                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOSTERS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><span>Multitap (Lvl ${game.data.tap_lvl})</span><b>${game.getCost('tap')}</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><span>Energy Cap (Lvl ${game.data.energy_lvl})</span><b>${game.getCost('energy')}</b></div>`;
                }
                else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><span>Neural Processor (Lvl ${game.data.mine_lvl})</span><b>${game.getCost('mine')}</b></div>
                    <p style="font-size:10px; opacity:0.6; margin-top:10px;">Each level adds +150 NP/hour to your passive income.</p>`;
                }
                else if(type === 'tasks') {
                    b.innerHTML = `<h2>📋 MISSIONS</h2>`;
                    try {
                        const r = await fetch('/api/tasks');
                        const tasks = await r.json();
                        tasks.forEach(t => {
                            b.innerHTML += `<div class="task-item">
                                <span>${t.title}</span>
                                <button class="task-btn" onclick="tg.openLink('${t.url}')">+${t.reward}</button>
                            </div>`;
                        });
                        if(tasks.length === 0) b.innerHTML += `<p>No tasks available</p>`;
                    } catch(e) { b.innerHTML += `<p>Error loading tasks</p>`; }
                }
                else if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 FRIENDS</h2>
                    <p>Invite friends and get bonuses!</p>
                    <div class="ref-box" id="ref-url">${link}</div>
                    <button class="task-btn" style="width:100%" onclick="ui.copyRef()">COPY LINK</button>`;
                }
                else if(type === 'top') {
                    b.innerHTML = `<h2>🏆 TOP AGENTS</h2>`;
                    try {
                        const r = await fetch('/api/top');
                        const top = await r.json();
                        top.forEach((u, i) => {
                            b.innerHTML += `<div class="top-item">
                                <div class="top-info">
                                    <img src="${u.photo_url || 'images/logo.png'}" class="top-avatar">
                                    <span>${i+1}. ${u.username}</span>
                                </div>
                                <b>${Math.floor(u.balance).toLocaleString()}</b>
                            </div>`;
                        });
                    } catch(e) { b.innerHTML += `<p>Error loading leaderboard</p>`; }
                }
                else if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-btn" style="display:flex; justify-content:center; padding:20px;"></div>`;
                    if(tonConnectUI) tonConnectUI.renderButton({ container: document.getElementById('ton-btn') });
                }
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 DAILY BONUS</h2>
                    <div style="text-align:center; padding:20px;">
                        <h3>Daily Reward: 500 NP</h3>
                        <button class="task-btn" style="width:100%; margin-top:15px;" onclick="game.data.balance+=500; ui.render(); ui.closeM(); tg.showAlert('Reward Claimed!');">CLAIM</button>
                    </div>`;
                }
            },

            copyRef() {
                const text = document.getElementById('ref-url').innerText;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                tg.showAlert('Ref link copied!');
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
