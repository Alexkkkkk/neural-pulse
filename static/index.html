<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-wrapper">
            <div id="load-bar" class="load-bar-f"></div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="avatar"><img src="images/logo.png"></div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <small>EARN PER TAP</small>
                <b id="tap-val" class="accent-val">+1</b>
            </div>
            <div class="stat-card">
                <small>PROFIT PER HOUR</small>
                <b id="profit-val">0</b>
            </div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" 
                 ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt">
                <span>ENERGY</span>
                <span id="eng-val">0/0</span>
            </div>
            <div class="progress-bar-wrap">
                <div id="eng-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')"><span>🚀</span>BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')"><span>⛏️</span>MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')"><span>📋</span>TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')"><span>🏆</span>TOP</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-drag-line"></div>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script src="logic.js"></script>
    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: null 
        });

        const ui = {
            init() { 
                this.update(); 
                this.finishLoading(); 
            },
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                document.getElementById('u-lvl').innerText = `LVL ${logic.user.lvl}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr).toLocaleString();
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const header = document.getElementById('modal-header');
                const container = document.getElementById('modal-container');
                header.innerText = type.toUpperCase();
                let h = '';

                switch(type) {
                    case 'wallet':
                        h = `<div class="wallet-box" style="text-align:center; padding:10px;">
                                <img src="images/logo.png" style="width:60px; margin-bottom:15px; filter:drop-shadow(0 0 10px #00ffff);">
                                <div id="ton-connect-button" style="display:flex; justify-content:center;"></div>
                                <p style="font-size:12px; color:#888; margin-top:15px;">Connect TON for Airdrop eligibility.</p>
                             </div>`;
                        body.innerHTML = h;
                        setTimeout(() => { tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-button' }; }, 50);
                        break;
                    
                    case 'boost':
                        h = `<div class="up-card" onclick="logic.buyUpgrade('tap')">
                                <div class="up-info"><b>🚀 Multitap</b><small>Level ${logic.user.click_lvl}</small></div>
                                <div class="up-price">5,000</div>
                             </div>
                             <div class="up-card" onclick="logic.buyUpgrade('energy')">
                                <div class="up-info"><b>🔋 Capacity</b><small>${logic.user.max_energy} Max</small></div>
                                <div class="up-price">10,000</div>
                             </div>`;
                        body.innerHTML = h;
                        break;

                    case 'mine':
                        h = `<div class="up-card" onclick="logic.buyUpgrade('profit')">
                                <div class="up-info"><b>🖥️ Neural Node</b><small>+500 Pulse/hr</small></div>
                                <div class="up-price">25,000</div>
                             </div>`;
                        body.innerHTML = h;
                        break;

                    case 'squad':
                        h = `<div style="padding:10px; text-align:center;">
                                <p style="margin-bottom:15px;">Invite friends to earn 10% of their mining profit!</p>
                                <button class="nav-btn" style="width:100%;" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/share/url?url=https://t.me/YourBot?start=${logic.user.user_id}')">INVITE AGENT</button>
                                <div class="rank-item" style="margin-top:20px;"><span>Total Friends:</span><b>0</b></div>
                             </div>`;
                        body.innerHTML = h;
                        break;

                    case 'tasks':
                        h = `<div class="up-card">
                                <div class="up-info"><b>📢 Join Channel</b><small>+10,000 Pulse</small></div>
                                <button class="side-btn" onclick="logic.claimTask('tg_join', 10000, 'https://t.me/your_channel')">GO</button>
                             </div>
                             <div class="up-card">
                                <div class="up-info"><b>🐦 Follow X</b><small>+5,000 Pulse</small></div>
                                <button class="side-btn" onclick="logic.claimTask('x_follow', 5000, 'https://x.com/your_profile')">GO</button>
                             </div>`;
                        body.innerHTML = h;
                        break;

                    case 'bonus':
                        h = `<div style="text-align:center; padding:20px;">
                                <h3 style="color:#00ffff; margin-bottom:10px;">DAILY REWARD</h3>
                                <p>Come back every 24h to claim your Pulse reward.</p>
                                <button class="nav-btn" style="margin-top:15px;" onclick="logic.claimTask('daily', 20000)">CLAIM 20,000</button>
                             </div>`;
                        body.innerHTML = h;
                        break;

                    case 'top':
                        // Демо-данные лидеров
                        const leaders = [
                            { id: "1", name: "Satoshi_N", balance: 150000000, photo: "images/logo.png" },
                            { id: "2", name: "Matrix_Runner", balance: 85400000, photo: "images/logo.png" },
                            { id: "3", name: "Cyber_Punk", balance: 42100000, photo: "images/logo.png" }
                        ];
                        
                        // Добавляем тебя в список
                        const myPhoto = window.Telegram?.WebApp?.initDataUnsafe?.user?.photo_url || "images/logo.png";
                        leaders.push({ id: logic.user.user_id, name: logic.user.username, balance: logic.user.balance, photo: myPhoto });
                        
                        leaders.sort((a, b) => b.balance - a.balance);

                        h = `<div class="top-container">`;
                        leaders.forEach((p, i) => {
                            const place = i + 1;
                            const isMe = p.id === logic.user.user_id;
                            let trophy = `<span class="rank-num">${place}</span>`;
                            if (place === 1) trophy = `<span class="rank-trophy gold">🏆</span>`;
                            else if (place === 2) trophy = `<span class="rank-trophy silver">🥈</span>`;
                            else if (place === 3) trophy = `<span class="rank-trophy bronze">🥉</span>`;

                            h += `<div class="rank-item ${isMe ? 'active' : ''}">
                                    <div class="rank-left">
                                        ${trophy}
                                        <div class="rank-avatar">
                                            <img src="${p.photo}" onerror="this.src='images/logo.png'">
                                        </div>
                                        <span>${p.name} ${isMe ? '(You)' : ''}</span>
                                    </div>
                                    <b>${(p.balance/1000000).toFixed(1)}M</b>
                                  </div>`;
                        });
                        h += `</div>`;
                        body.innerHTML = h;
                        break;
                }
                container.classList.add('active');
            },
            closeM() { document.getElementById('modal-container').classList.remove('active'); },
            finishLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 5;
                    document.getElementById('load-pct').innerText = `${p}%`;
                    if(document.getElementById('load-bar')) document.getElementById('load-bar').style.width = `${p}%`;
                    if (p >= 100) {
                        clearInterval(iv);
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.opacity = '0';
                            document.getElementById('app').style.display = 'flex';
                            setTimeout(() => document.getElementById('loading-screen').remove(), 500);
                        }, 400);
                    }
                }, 40);
            }
        };
        window.onload = () => logic.init();
    </script>
</body>
</html>
