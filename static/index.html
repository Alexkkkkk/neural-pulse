<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v2.1.16</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Правило: Экран загрузки Access Granted */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .l-img { width: 140px; filter: drop-shadow(0 0 20px var(--cyan)); margin-bottom: 25px; }
        .l-txt { font-weight: 900; letter-spacing: 4px; font-size: 16px; margin-bottom: 10px; }
        .l-pct { font-size: 36px; font-weight: 900; color: var(--cyan); }
        .l-bar-bg { width: 200px; height: 4px; background: #111; margin-top: 25px; border-radius: 10px; overflow: hidden; }
        .l-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.1s; }

        /* Основной интерфейс */
        #app { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 30px; }
        .balance { font-size: 54px; font-weight: 900; text-shadow: 0 0 20px var(--cyan); margin-bottom: 5px; }
        
        /* Контейнер для боковых кнопок */
        .game-zone { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-btn { width: 240px; z-index: 5; filter: drop-shadow(0 0 40px var(--purple)); cursor: pointer; transition: transform 0.05s; }
        .logo-btn:active { transform: scale(0.96); }

        /* Боковое меню по твоим правилам */
        .side-menu { position: absolute; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: rgba(15,15,15,0.9); border: 1px solid #222; color: #fff; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 900; width: 85px; text-align: center; backdrop-filter: blur(4px); }

        /* Энергия */
        .energy-section { width: 85%; margin-bottom: 35px; }
        .energy-info { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 6px; font-weight: 900; letter-spacing: 1px; }
        .energy-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; border: 1px solid #1a1a1a; overflow: hidden; }
        .energy-fill { height: 100%; background: var(--cyan); width: 100%; transition: width 0.2s; }

        /* Нижняя навигация */
        .nav-grid { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .nav-card { background: #080808; border: 1px solid #1a1a1a; padding: 16px 0; border-radius: 14px; font-size: 10px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<div id="loader">
    <img src="logo.png" class="l-img">
    <div class="l-txt">ACCESS GRANTED</div>
    <div class="l-pct" id="l-pct">0%</div>
    <div class="l-bar-bg"><div class="l-bar-fill" id="l-fill"></div></div>
</div>

<div id="app">
    <div class="balance" id="balance">0</div>
    
    <div class="game-zone">
        <img src="logo.png" class="logo-btn" onclick="handleTap(event)">
        
        <div class="side-menu">
            <div class="menu-item">WALLET</div>
            <div class="menu-item">FRIENDS</div>
            <div class="menu-item">BONUS</div>
        </div>
    </div>

    <div class="energy-section">
        <div class="energy-info"><span>ENERGY</span><span id="energy-text">1000/1000</span></div>
        <div class="energy-bg"><div class="energy-fill" id="energy-fill"></div></div>
    </div>
    
    <div class="nav-grid">
        <div class="nav-card">BOOST</div>
        <div class="nav-card">MINE</div>
        <div class="nav-card">TASKS</div>
        <div class="nav-card">STATS</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let user = { id: tg.initDataUnsafe?.user?.id || "0", bal: 0, lvl: 1, eng: 1000, maxE: 1000 };

    async function startApp() {
        // Симуляция загрузки согласно дизайну
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 4) + 2;
            if(progress >= 100) {
                progress = 100;
                clearInterval(interval);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
            document.getElementById('l-pct').innerText = progress + '%';
            document.getElementById('l-fill').style.width = progress + '%';
        }, 40);

        await fetchData();
    }

    async function fetchData() {
        try {
            const res = await fetch(`/api/user/${user.id}?name=${encodeURIComponent(tg.initDataUnsafe?.user?.first_name || 'User')}`);
            const data = await res.json();
            user.bal = Number(data.balance);
            user.lvl = Number(data.click_lvl || 1);
            user.maxE = Number(data.max_energy || 1000);
            user.eng = Number(data.energy || 1000);
            updateView();
        } catch(e) {}
    }

    function handleTap(e) {
        if(user.eng >= user.lvl) {
            user.bal += user.lvl;
            user.eng -= user.lvl;
            tg.HapticFeedback.impactOccurred('medium');
            updateView();
            syncData();
        }
    }

    function updateView() {
        document.getElementById('balance').innerText = Math.floor(user.bal).toLocaleString();
        document.getElementById('energy-text').innerText = `${user.eng}/${user.maxE}`;
        document.getElementById('energy-fill').style.width = `${(user.eng / user.maxE) * 100}%`;
    }

    function syncData() {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                userId: user.id, 
                balance: user.bal, 
                click_lvl: user.lvl, 
                energy: user.eng, 
                max_energy: user.maxE 
            })
        });
    }

    // Регенерация системы
    setInterval(() => {
        if(user.eng < user.maxE) {
            user.eng = Math.min(user.maxE, user.eng + 1);
            updateView();
        }
    }, 1000);

    startApp();
</script>

</body>
</html>
