version: '3.9'
services:
  gateway:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./static:/usr/share/nginx/html
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
    depends_on: [api, socket]

  api:
    build: ./services/api
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]

  socket:
    build: ./services/socket
    ports: ["8080:8080"]
    depends_on: [redis]

  clicker:
    build: ./services/clicker
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
