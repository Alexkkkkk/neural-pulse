<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.4.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; --turbo-gold: #f2ff00; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .loader-circle { width: 140px; height: 140px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-purple); animation: spin 2s linear infinite; display: flex; align-items: center; justify-content: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin-top: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        .lvl-box { width: 45px; height: 45px; border: 2px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
        
        .bal { font-size: 60px; font-weight: 900; margin-top: 15px; letter-spacing: -2px; text-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .pnl { color: var(--neon-cyan); font-weight: bold; margin-top: -10px; font-size: 13px; }

        .stage { flex-grow: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .main-logo { width: 230px; border-radius: 50%; filter: drop-shadow(0 0 30px rgba(188,19,254,0.3)); transition: 0.1s; cursor: pointer; }
        .main-logo.turbo-active { filter: drop-shadow(0 0 40px var(--turbo-gold)); transform: scale(1.05); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        .overlay-btns { position: absolute; right: 8%; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .btn-pill { background: rgba(20,20,20,0.85); border: 1px solid #444; color: white; padding: 12px 0; border-radius: 18px; width: 110px; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; }

        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 35px; }
        .f-item { background: #151515; border: 1px solid #252525; border-radius: 20px; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; flex-direction: column; overflow-y: auto; }
        .card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .plus { position: absolute; font-size: 40px; font-weight: 900; color: var(--neon-cyan); animation: float 0.7s forwards; pointer-events: none; z-index: 100; }
        .plus.turbo { color: var(--turbo-gold); text-shadow: 0 0 10px var(--turbo-gold); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-circle"><img src="logo.png" style="width: 75px;" onerror="this.src='images/logo.png'"></div>
        <div id="l-p" style="margin-top:20px; font-weight:bold; color:var(--neon-cyan)">0%</div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl-box" id="l-v">1</div>
            <div><div style="font-size: 9px; color: #555;">NEURAL PULSE</div><div id="r-b" style="font-size: 14px; font-weight: 900;">BRONZE NODE</div></div>
        </div>
        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">PNL: +0/H</div>

        <div class="stage">
            <div id="turbo-timer" style="position:absolute; top:10%; color:var(--turbo-gold); font-weight:900; font-size:24px; display:none; z-index:100;">TURBO: 10s</div>
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
            <div class="overlay-btns">
                <div class="btn-pill" onclick="handleWallet()">WALLET</div>
                <div class="btn-pill" onclick="invite()">FRIENDS</div>
                <div class="btn-pill" style="border-color:var(--neon-purple)" onclick="tg.showAlert('Bonus!')">BONUS</div>
            </div>
        </div>

        <div style="width:85%; margin-bottom:25px;">
            <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px; color:#666;"><span>⚡ ENERGY</span><span id="e-n">1000/1000</span></div>
            <div style="width:100%; height:8px; background:#111; border-radius:10px; overflow:hidden;"><div id="e-f" style="height:100%; background:linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); width:100%;"></div></div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="openModal('boost-ui')">BOOST</div>
            <div class="f-item" onclick="openModal('mine-ui')">MINE</div>
            <div class="f-item" onclick="openModal('tasks-ui')">TASKS</div>
            <div class="f-item" onclick="openStats()">STATS</div>
        </div>
    </div>

    <div id="boost-ui" class="modal">
        <h2 style="color:var(--neon-cyan)">UPGRADES</h2>
        <div class="card" style="border-color: var(--neon-purple);">
            <div><b style="color:var(--neon-purple)">AUTO-TAP BOT</b><br><small>Works 24h for you</small></div>
            <button class="btn-pill" style="width:80px; border-color:var(--neon-purple)" id="bot-btn" onclick="buyBoost('bot')">20000</button>
        </div>
        <div class="card" style="border-color: var(--turbo-gold);">
            <div><b style="color:var(--turbo-gold)">TURBO MODE</b><br><small>5x Tap | 10s</small></div>
            <button class="btn-pill" style="width:80px; border-color:var(--turbo-gold)" onclick="activateTurbo()">FREE</button>
        </div>
        <div class="card">
            <div><b>Multitap</b><br><small>+1 per click</small></div>
            <button class="btn-pill" style="width:80px;" id="mt-btn" onclick="buyBoost('tap')">1000</button>
        </div>
        <div class="card">
            <div><b>Energy Limit</b><br><small>+500 cap</small></div>
            <button class="btn-pill" style="width:80px;" id="el-btn" onclick="buyBoost('energy')">2000</button>
        </div>
        <button class="f-item" style="margin-top:auto; width:100%;" onclick="closeModal('boost-ui')">CLOSE</button>
    </div>

    <div id="stats-ui" class="modal">
        <h2 style="color:var(--neon-cyan)">TOP PLAYERS</h2>
        <div id="stats-content"></div>
        <button class="f-item" style="margin-top:20px;" onclick="closeModal('stats-ui')">BACK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });

        let s = { bal: 0, eng: 1000, max: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0, r: 'Bronze Node', bot: false };
        let isTurbo = false;

        async function load() {
            try {
                const r = await fetch(`/api/user/${s.uid}`);
                const d = await r.json();
                Object.assign(s, { bal: Number(d.balance), eng: d.energy, max: d.max_energy || 1000, lvl: d.click_lvl, pnl: Number(d.pnl), r: d.rank, bot: d.auto_bot });
                upd();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ui').classList.add('ready');
            } catch(e) { console.error(e); }
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${Math.floor(s.eng)}/${s.max}`;
            document.getElementById('e-f').style.width = (s.eng / s.max * 100) + '%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('mt-btn').innerText = (s.lvl * 1000);
            document.getElementById('el-btn').innerText = (s.max * 2);
            
            const bBtn = document.getElementById('bot-btn');
            if(s.bot) { bBtn.innerText = "ACTIVE"; bBtn.style.opacity = "0.5"; bBtn.onclick = null; }
        }

        function activateTurbo() {
            if(isTurbo) return;
            closeModal('boost-ui'); isTurbo = true;
            let time = 10;
            const timer = document.getElementById('turbo-timer');
            timer.style.display = 'block';
            document.getElementById('t-a').classList.add('turbo-active');
            const iv = setInterval(() => {
                time--; timer.innerText = `TURBO: ${time}s`;
                if(time <= 0) { clearInterval(iv); isTurbo = false; timer.style.display = 'none'; document.getElementById('t-a').classList.remove('turbo-active'); }
            }, 1000);
        }

        function buyBoost(type) {
            let cost = 0;
            if(type === 'tap') cost = s.lvl * 1000;
            else if(type === 'energy') cost = s.max * 2;
            else if(type === 'bot') cost = 20000;

            if(s.bal >= cost) {
                s.bal -= cost;
                if(type === 'tap') s.lvl++;
                else if(type === 'energy') { s.max += 500; s.eng = s.max; }
                else if(type === 'bot') s.bot = true;
                tg.showAlert("Upgrade Success!");
                upd(); save();
            } else tg.showAlert("Low Balance!");
        }

        async function openStats() {
            openModal('stats-ui');
            const r = await fetch('/api/stats');
            const data = await r.json();
            document.getElementById('stats-content').innerHTML = data.map((u, i) => `
                <div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                    <span>#${i+1} ID:${u.user_id.slice(0,6)}</span>
                    <b>${Math.floor(u.balance).toLocaleString()}</b>
                </div>
            `).join('');
        }

        function invite() {
            const link = `https://t.me/n_pulse_bot?start=${s.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=Join Pulse!`);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!isTurbo && s.eng < s.lvl) return;
            let gain = isTurbo ? s.lvl * 5 : s.lvl;
            s.bal += gain; if(!isTurbo) s.eng -= s.lvl;
            const t = e.touches[0];
            const p = document.createElement('div');
            p.className = isTurbo ? 'plus turbo' : 'plus';
            p.innerText = `+${gain}`;
            p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(isTurbo ? 'heavy' : 'medium');
            upd();
        });

        function save() {
            fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, max_energy: s.max, click_lvl: s.lvl, pnl: s.pnl, rank: s.r, auto_bot: s.bot}) });
        }

        let p = 0;
        const loadIv = setInterval(() => { p += 5; document.getElementById('l-p').innerText = p + '%'; if(p >= 100) { clearInterval(loadIv); load(); } }, 30);
        setInterval(save, 5000);
        
        // Логика восстановления энергии и работы бота
        setInterval(() => {
            if(s.eng < s.max) {
                let rec = s.max / 500;
                s.eng += rec;
                if(s.eng > s.max) s.eng = s.max;
                
                // Если бот куплен, он тратит энергию на клики автоматически
                if(s.bot && s.eng >= s.lvl) {
                    s.bal += s.lvl;
                    s.eng -= s.lvl;
                }
                upd();
            }
        }, 1000);
    </script>
</body>
</html>
