<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00d4ff; --bg-dark: #050a1a; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background: url('/static/images/images.jpeg') no-repeat center center;
            background-size: cover;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif; color: white;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Главный контейнер-рамка (unnamed1.png) */
        .game-container {
            position: relative;
            width: 95vw;
            height: 90vh;
            max-width: 500px;
            background: url('/static/images/unnamed1.png') no-repeat center center;
            background-size: 100% 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Шапка с логотипом (unnamed4.png) */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 10px;
        }
        
        .logo-small {
            width: 35px;
            height: 35px;
            background: url('/static/images/unnamed4.png') no-repeat center center;
            background-size: contain;
            filter: drop-shadow(0 0 5px var(--neon));
        }

        /* Баланс */
        .balance-container {
            text-align: center;
            margin-top: 20px;
            z-index: 5;
        }
        #score {
            font-size: 42px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        /* Центральная область с монеткой (unnamed3.png) */
        .clicker-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #btn {
            width: 280px;
            height: 280px;
            background: url('/static/images/unnamed3.png') no-repeat center center;
            background-size: contain;
            border: none;
            outline: none;
            cursor: pointer;
            z-index: 10;
            background-color: transparent;
            filter: drop-shadow(0 0 25px var(--neon));
            transition: transform 0.05s;
        }
        #btn:active { transform: scale(0.92); }

        /* Боковое меню */
        .side-menu {
            position: absolute;
            right: 15px;
            top: 22%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 20;
        }

        .side-btn {
            width: 100px; height: 38px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--neon);
            border-radius: 8px;
            color: white; font-size: 9px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        /* Энергия */
        .energy-bar {
            width: 80%; height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px; margin-bottom: 20px;
            overflow: hidden; border: 1px solid rgba(0, 255, 150, 0.5);
        }
        .energy-fill {
            width: 87%; height: 100%;
            background: linear-gradient(90deg, #00ff96, #00d4ff);
        }

        /* Нижнее меню */
        .bottom-menu {
            width: 100%; display: grid;
            grid-template-columns: 1fr 1fr 1fr; gap: 10px;
            margin-bottom: 30px; z-index: 20;
        }

        .bottom-btn {
            height: 65px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 9px; backdrop-filter: blur(10px);
        }

        .plus-animation {
            position: absolute; color: white;
            font-size: 32px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
            text-shadow: 0 0 10px var(--neon);
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="game-container" id="mainContainer">
        <div class="header">
            <div class="logo-small" id="logoImg"></div>
            <span style="font-size: 12px; letter-spacing: 1px;">🏆 Level 18,550</span>
        </div>

        <div class="balance-container">
            <div style="color: #aaa; font-size: 10px; letter-spacing: 2px; margin-bottom: 5px;">TOTAL AI POWER</div>
            <div id="score">0</div>
        </div>

        <div class="side-menu">
            <button class="side-btn">💳 Wallet</button>
            <button class="side-btn">👥 Friends</button>
            <button class="side-btn">⚙️ Setup</button>
            <button class="side-btn">❓ Help</button>
        </div>

        <div class="clicker-area">
            <button id="btn"></button>
        </div>

        <div style="font-size: 10px; margin-bottom: 5px; opacity: 0.8;">ENERGY: 875 / 1000</div>
        <div class="energy-bar">
            <div class="energy-fill"></div>
        </div>

        <div class="bottom-menu">
            <div class="bottom-btn">🚀<br>UPGRADE</div>
            <div class="bottom-btn">💎<br>MINING</div>
            <div class="bottom-btn">🏆<br>TASKS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Форсированное обновление картинок через версию
        const v = Date.now();
        document.getElementById('mainContainer').style.backgroundImage = `url('/static/images/unnamed1.png?v=${v}')`;
        document.getElementById('logoImg').style.backgroundImage = `url('/static/images/unnamed4.png?v=${v}')`;
        document.getElementById('btn').style.backgroundImage = `url('/static/images/unnamed3.png?v=${v}')`;

        const userId = tg.initDataUnsafe?.user?.id || 999;
        let score = 0;
        let pendingClicks = 0;
        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('btn');

        async function loadData() {
            try {
                const r = await fetch(`/api/get_balance/${userId}?v=${v}`);
                const d = await r.json();
                score = d.balance || 0;
                scoreEl.textContent = score.toLocaleString();
            } catch (e) { console.error(e); }
        }

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            pendingClicks++;
            scoreEl.textContent = score.toLocaleString();

            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.textContent = '+1';
            p.style.left = `${touch.pageX - 15}px`;
            p.style.top = `${touch.pageY - 30}px`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        setInterval(async () => {
            if (pendingClicks > 0) {
                const s = pendingClicks;
                pendingClicks = 0;
                try {
                    await fetch('/api/save_clicks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: userId, clicks: s })
                    });
                } catch (e) { pendingClicks += s; }
            }
        }, 1500);

        loadData();
        tg.ready();
    </script>
</body>
</html>
