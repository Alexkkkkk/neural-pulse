<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.8.8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div id="l-circle" class="loader-circle"><img src="images/logo.png"></div>
        <div style="font-weight:900; letter-spacing:5px; margin-bottom:20px;">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-f" id="load-bar"></div></div>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar" id="u-ava"></div>
                <div style="text-align:left;"><b id="u-name">...</b><br><small>v3.8.8 Quantum</small></div>
            </div>
            <div id="u-lvl" class="lvl-badge">LVL 1</div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" onpointerdown="ui.handleTap(event)">
            <div class="side-menu">
                <button class="btn-ui" onclick="ui.openM('wallet')">👛 WALLET</button>
                <button class="btn-ui" onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button class="btn-ui" onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </div>

        <div class="energy-box">
            <div class="energy-info"><span>ENERGY</span><span id="eng-val">...</span></div>
            <div class="load-bar-bg"><div id="eng-fill" class="load-bar-f"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="btn-ui" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="btn-ui" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="btn-ui" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="btn-ui" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="m-wallet" class="modal"><h2>WALLET</h2><button onclick="ui.closeM()">BACK</button></div>
    <div id="m-top" class="modal"><h2>TOP</h2><div id="t-list"></div><button onclick="ui.closeM()">BACK</button></div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="loading.js"></script>
</body>
</html>
