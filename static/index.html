<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Твой дизайн и цветовая схема */
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; }
        
        .balance { font-size: 52px; margin-top: 40px; font-weight: 900; text-shadow: 0 0 15px var(--cyan); }
        
        .click-area { height: 60vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        /* Твоя картинка logo.png не меняется */
        .main-img { width: 220px; cursor: pointer; transition: transform 0.05s; filter: drop-shadow(0 0 20px var(--purple)); }
        .main-img:active { transform: scale(0.95); }
        
        /* Навигация согласно твоему расположению в v2.1.5 */
        .footer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; }
        .btn { background: #111; padding: 15px 5px; border-radius: 12px; font-size: 11px; width: 22%; font-weight: bold; border: 1px solid #222; }
    </style>
</head>
<body>
    <div class="balance" id="bal">0</div>
    
    <div class="click-area">
        <img src="logo.png" class="main-img" id="coin" onclick="handleTap(event)">
    </div>

    <div class="footer">
        <div class="btn">BOOST</div>
        <div class="btn">MINE</div>
        <div class="btn">TASKS</div>
        <div class="btn">STATS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            balance: 0,
            userId: tg.initDataUnsafe?.user?.id || "0",
            name: tg.initDataUnsafe?.user?.first_name || "User"
        };

        // Загрузка данных из БД
        async function loadData() {
            try {
                const response = await fetch(`/api/user/${state.userId}?name=${encodeURIComponent(state.name)}`);
                const data = await response.json();
                state.balance = Number(data.balance);
                updateUI();
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        // Логика клика (Notcoin style)
        function handleTap(e) {
            state.balance += 1;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
            saveData();
        }

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(state.balance).toLocaleString();
        }

        // Сохранение данных
        function saveData() {
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    userId: state.userId, 
                    balance: state.balance 
                })
            });
        }

        // Запуск при загрузке страницы
        loadData();
    </script>
</body>
</html>
