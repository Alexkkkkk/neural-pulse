<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.9.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #050505; --card: rgba(20, 20, 20, 0.8); --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .load-circle { width: 220px; height: 220px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--cyan); border-right: 2px solid var(--purple); display: flex; align-items: center; justify-content: center; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .header { width: 92%; margin-top: 20px; background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--cyan); }
        .lvl-badge { background: linear-gradient(135deg, var(--cyan), var(--purple)); padding: 6px 14px; border-radius: 10px; font-weight: 900; }
        .balance { font-size: 58px; font-weight: 900; margin-top: 25px; }
        .pnl-badge { font-size: 13px; color: #aaa; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 20px; margin-top: 8px; }
        .stage { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-ai { width: 240px; transition: 0.1s; z-index: 5; }
        .main-ai:active { transform: scale(0.92); }
        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .side-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); width: 90px; padding: 14px 0; border-radius: 18px; font-size: 10px; text-align: center; font-weight: 800; }
        .energy-box { width: 90%; margin-bottom: 25px; }
        .e-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.03); border-radius: 20px; overflow: hidden; }
        .e-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: 0.3s; }
        .bottom-nav { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 35px; }
        .nav-item { background: var(--card); border-radius: 18px; padding: 18px 0; text-align: center; font-size: 10px; font-weight: 800; color: #999; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 30px 25px; }
        .m-title { font-size: 32px; font-weight: 900; margin-bottom: 25px; }
        .list-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .m-close { margin-top: auto; background: var(--card); padding: 20px; border-radius: 20px; text-align: center; font-weight: 800; }
        /* Иконка в рейтинге */
        .rank-img { width: 35px; height: 35px; border-radius: 8px; margin-right: 12px; background: #222; }
    </style>
</head>
<body>

<div id="loader">
    <div class="load-circle"><img src="logo.png" style="width:110px"></div>
    <div id="p-txt" style="font-size:28px; font-weight:900; color:var(--cyan); margin-top:10px">0%</div>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px">
        <img src="images/logo.png" class="avatar">
        <div><div class="u-name" id="u-nm">Neural Player</div><div style="font-size:9px; color:var(--cyan)">NODE v1.9.2</div></div>
    </div>
    <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
</div>

<div class="balance" id="b-v">0</div>
<div class="pnl-badge">Profit: <span id="p-v" style="color:var(--purple)">0</span>/s</div>

<div class="stage">
    <img src="logo.png" class="main-ai" id="ai-btn" onclick="doTap()">
    <div class="side-menu">
        <div class="side-btn" onclick="openM('wal-m')">Wallet</div>
        <div class="side-btn" onclick="openM('fr-m')">Friends</div>
        <div class="side-btn" onclick="openM('bn-m')">Bonus</div>
    </div>
</div>

<div class="energy-box">
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:5px">ENERGY <span id="e-val">1000/1000</span></div>
    <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="openM('bs-m')">Boost</div>
    <div class="nav-item" onclick="openM('mi-m')">Mine</div>
    <div class="nav-item" onclick="openM('ta-m')">Tasks</div>
    <div class="nav-item" onclick="openM('tp-m')">Rating</div>
</div>

<div id="tp-m" class="modal"><div class="m-title">Global<br>Rating</div><div id="top-list"></div><div class="m-close" onclick="closeM('tp-m')">Close</div></div>
<div id="wal-m" class="modal"><div class="m-title">Wallet</div><div class="m-close" onclick="closeM('wal-m')">Close</div></div>
<div id="bs-m" class="modal"><div class="m-title">Boosters</div><div id="boost-list"></div><div class="m-close" onclick="closeM('bs-m')">Close</div></div>
<div id="mi-m" class="modal"><div class="m-title">Mining</div><div id="mine-list"></div><div class="m-close" onclick="closeM('mi-m')">Close</div></div>
<div id="fr-m" class="modal"><div class="m-title">Friends</div><div class="m-close" onclick="closeM('fr-m')">Close</div></div>
<div id="bn-m" class="modal"><div class="m-title">Bonus</div><div class="m-close" onclick="closeM('bn-m')">Close</div></div>
<div id="ta-m" class="modal"><div class="m-title">Tasks</div><div class="m-close" onclick="closeM('ta-m')">Close</div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let s = { 
        uid: tg.initDataUnsafe?.user?.id || '0', 
        name: tg.initDataUnsafe?.user?.first_name || 'Player', 
        bal: 0, lvl: 1, eng: 1000, maxE: 1000, pnl: 0 
    };

    let p = 0;
    const lIv = setInterval(() => {
        p += 5; document.getElementById('p-txt').innerText = p + '%';
        if(p >= 100) { clearInterval(lIv); document.getElementById('loader').style.display='none'; init(); }
    }, 30);

    async function init() {
        document.getElementById('u-nm').innerText = s.name;
        await load();
        setInterval(() => {
            if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 2);
            if(s.pnl > 0) s.bal += s.pnl;
            upd();
        }, 1000);
        setInterval(save, 5000);
    }

    async function load() {
        try {
            const r = await fetch(`/api/user/${s.uid}?name=${encodeURIComponent(s.name)}`);
            const d = await r.json();
            s.bal = Number(d.balance) || 0;
            s.pnl = Number(d.pnl) || 0;
            s.lvl = Number(d.click_lvl) || 1;
            s.eng = Number(d.energy) || 1000;
            s.maxE = Number(d.max_energy) || 1000;
            upd();
        } catch(e) { console.error("Load Error"); }
    }

    function doTap() {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('light');
            upd();
        }
    }

    function upd() {
        document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('p-v').innerText = Math.floor(s.pnl).toLocaleString();
        document.getElementById('u-lv').innerText = s.lvl;
        document.getElementById('e-val').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
        document.getElementById('e-f').style.width = (s.eng / s.maxE * 100) + '%';
    }

    function save() {
        fetch('/api/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ userId: s.uid, username: s.name, balance: s.bal, energy: s.eng, max_energy: s.maxE, click_lvl: s.lvl, pnl: s.pnl }) 
        });
    }

    function openM(id) { 
        if(id === 'tp-m') renderTop();
        document.getElementById(id).style.display = 'flex'; 
    }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    async function renderTop() {
        const r = await fetch('/api/top');
        const d = await r.json();
        // Рендерим топ с аватарками
        document.getElementById('top-list').innerHTML = d.map((u, i) => `
            <div class="list-item" style="${u.user_id == s.uid ? 'border: 1px solid var(--cyan)' : ''}">
                <div style="display:flex; align-items:center">
                    <div style="font-size:10px; color:#555; width:25px">#${i+1}</div>
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${u.user_id}" class="rank-img">
                    <div style="font-weight:bold">${u.username}</div>
                </div>
                <div style="color:var(--cyan); font-weight:900">${Math.floor(u.balance).toLocaleString()}</div>
            </div>`).join('');
    }
</script>
</body>
</html>
