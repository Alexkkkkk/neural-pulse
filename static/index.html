<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96;
            --bg: #050a1a; 
            --glass: rgba(10, 25, 47, 0.95);
        }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%);
            height: 100vh; 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }

        .game-container { 
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s;
        }

        .header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 10px;
        }
        
        .logo { 
            width: 50px; 
            height: 50px; 
            background: url('/static/images/unnamed4.png') no-repeat center;
            background-size: cover;
            border-radius: 12px;
            box-shadow: 0 0 15px var(--neon);
        }

        #lvl { font-size: 13px; text-shadow: 0 0 10px var(--neon); color: var(--neon); font-weight: bold; }

        .balance-container { text-align: center; margin-top: 20px; }
        .balance-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 2px; }
        #score { font-size: 44px; color: #fff; text-shadow: 0 0 20px var(--neon); font-weight: bold; margin-top: 5px; }

        .play-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn { 
            width: 75vw; 
            max-width: 300px;
            height: 75vw;
            max-height: 300px;
            background: url('/static/images/unnamed3.png') no-repeat center;
            background-size: contain;
            border-radius: 50%;
            border: 4px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
            cursor: pointer; 
            transition: transform 0.05s; 
            outline: none; 
            z-index: 2;
        }
        #btn:active { transform: scale(0.92); box-shadow: 0 0 60px var(--neon); }

        .side-menu {
            position: absolute;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 3;
        }
        .side-item {
            width: 85px;
            padding: 10px 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            font-size: 9px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 25px;
        }
        .nav-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-card:active { background: rgba(0, 212, 255, 0.15); }

        /* MODAL SYSTEM */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 999;
            backdrop-filter: blur(6px);
        }
        .overlay.active { display: block; }

        .modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 70%;
            background: var(--glass);
            border-top: 3px solid var(--neon);
            border-radius: 30px 30px 0 0;
            z-index: 1000;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            padding: 30px;
            box-sizing: border-box;
        }
        .modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 28px; cursor: pointer; color: var(--neon); }

        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; border: 1px solid rgba(0, 212, 255, 0.1); }
        .stat-val { color: var(--neon-secondary); font-size: 20px; font-weight: bold; margin-top: 5px; }

        .buy-btn { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 15px; font-size: 14px; }
        .buy-btn:disabled { background: #555; color: #888; cursor: not-allowed; }

        .plus-animation { 
            position: absolute; 
            color: var(--neon); 
            font-size: 32px; 
            font-weight: bold; 
            animation: float 0.7s ease-out forwards; 
            pointer-events: none; 
            text-shadow: 0 0 10px var(--neon); 
            z-index: 100; 
        }
        @keyframes float { 
            0% { opacity:1; transform: translateY(0) scale(1); } 
            100% { opacity:0; transform: translateY(-150px) scale(1.4); } 
        }
    </style>
</head>
<body>
    <div class="game-container" id="game" style="opacity:0">
        <div class="header">
            <div class="logo"></div>
            <span id="lvl">🏆 Загрузка...</span>
        </div>

        <div class="balance-container">
            <div class="balance-label">TOTAL NP POINTS</div>
            <div id="score">0</div>
        </div>

        <div class="play-area">
            <button id="btn"></button>
            <div class="side-menu">
                <div class="side-item" onclick="openModal('friends')">Friends</div>
                <div class="side-item" onclick="openModal('tasks')">Tasks</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-card" onclick="openModal('boost')">🚀 BOOST</div>
            <div class="nav-card" onclick="openModal('mine')">⛏️ MINE</div>
            <div class="nav-card" onclick="openModal('stats')">⚙️ STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div id="modal-boost" class="modal">
        <div class="modal-header"><h2>Boosters</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div>
        <div class="modal-content" style="text-align: center;">
            <p>Текущая сила клика: <strong style="color:var(--neon-secondary); font-size: 20px;">+<span id="boost-power-label">1</span></strong></p>
            <p style="font-size: 12px; opacity: 0.8; margin-top: 20px;">Следующий уровень увеличит добычу в разы!</p>
            <button id="buy-boost-btn" class="buy-btn" onclick="buyBoost()">
                UPGRADE (Цена: <span id="boost-cost">0</span>)
            </button>
        </div>
    </div>

    <div id="modal-stats" class="modal">
        <div class="modal-header"><h2>Stats</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div>
        <div class="modal-content">
            <div class="stat-box">Игроков: <div id="s-p" class="stat-val">...</div></div>
            <div class="stat-box">Всего NP: <div id="s-t" class="stat-val">...</div></div>
        </div>
    </div>

    <div id="modal-friends" class="modal"><div class="modal-header"><h2>Friends</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><div class="modal-content">Скоро...</div></div>
    <div id="modal-tasks" class="modal"><div class="modal-header"><h2>Tasks</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><div class="modal-content">Скоро...</div></div>
    <div id="modal-mine" class="modal"><div class="modal-header"><h2>Mine</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><div class="modal-content">Пассивный доход в разработке.</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = String(tg.initDataUnsafe?.user?.id || "999");
        let score = 0, pending = 0, clickPower = 1;

        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('btn');

        // КОНФИГУРАЦИЯ УРОВНЕЙ
        const PLAYER_LEVELS = {
            1: { name: "Новичок", price: 0, tap: 1 },
            2: { name: "Стажер", price: 1000, tap: 5 },
            3: { name: "Фрилансер", price: 5000, tap: 15 },
            4: { name: "Специалист", price: 15000, tap: 40 },
            5: { name: "Менеджер", price: 45000, tap: 100 }
        };

        function updateUI() {
            const currentLvlCfg = PLAYER_LEVELS[clickPower] || PLAYER_LEVELS[1];
            const nextLvlCfg = PLAYER_LEVELS[clickPower + 1];

            scoreEl.textContent = Math.floor(score).toLocaleString();
            document.getElementById('lvl').textContent = `🏆 ${currentLvlCfg.name} (Lvl ${clickPower})`;
            
            // Данные в модалке Boost
            document.getElementById('boost-power-label').textContent = currentLvlCfg.tap;
            
            if (nextLvlCfg) {
                document.getElementById('boost-cost').textContent = nextLvlCfg.price.toLocaleString();
                document.getElementById('buy-boost-btn').style.display = 'block';
            } else {
                document.getElementById('boost-cost').textContent = "MAX";
                document.getElementById('buy-boost-btn').style.display = 'none';
            }
        }

        async function openModal(id) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('modal-' + id).classList.add('active');
            
            if (id === 'stats') {
                try {
                    const r = await fetch('/api/all_stats');
                    const d = await r.json();
                    document.getElementById('s-p').textContent = d.total_players;
                    document.getElementById('s-t').textContent = d.total_balance.toLocaleString();
                } catch(e) {}
            }
            if (id === 'boost') updateUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function closeAllModals() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        async function buyBoost() {
            const nextLvl = clickPower + 1;
            if (!PLAYER_LEVELS[nextLvl]) return;

            if (score < PLAYER_LEVELS[nextLvl].price) {
                tg.showAlert("Недостаточно монет для уровня " + PLAYER_LEVELS[nextLvl].name);
                return;
            }

            const buyBtn = document.getElementById('buy-boost-btn');
            buyBtn.disabled = true;

            try {
                const r = await fetch('/api/buy_boost', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId })
                });
                const d = await r.json();
                if (d.status === 'ok') {
                    score = d.new_balance;
                    clickPower = d.new_lvl;
                    updateUI();
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert(d.error);
                }
            } catch (e) {
                tg.showAlert("Ошибка сервера");
            }
            buyBtn.disabled = false;
        }

        async function loadData() {
            try {
                const r = await fetch(`/api/balance/${userId}?t=${Date.now()}`);
                const d = await r.json();
                score = d.balance || 0;
                clickPower = d.click_lvl || 1;
                updateUI();
                document.getElementById('game').style.opacity = '1';
            } catch (e) {
                document.getElementById('game').style.opacity = '1';
                updateUI();
            }
        }

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (document.getElementById('overlay').classList.contains('active')) return;

            const currentTap = PLAYER_LEVELS[clickPower]?.tap || 1;

            for (let t of e.changedTouches) {
                score += currentTap;
                pending += currentTap;
                spawnPlus(t.pageX, t.pageY, currentTap);
            }
            scoreEl.textContent = Math.floor(score).toLocaleString();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        function spawnPlus(x, y, val) {
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.textContent = '+' + val;
            p.style.left = (x - 15) + 'px';
            p.style.top = (y - 40) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        // Авто-сохранение кликов
        setInterval(async () => {
            if (pending > 0) {
                const toSend = pending;
                pending = 0;
                try {
                    await fetch('/api/clicks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: userId, clicks: toSend })
                    });
                } catch (e) { pending += toSend; }
            }
        }, 2000);

        loadData();
    </script>
</body>
</html>
