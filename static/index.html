<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-circle-container">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" class="loader-track"></circle>
                <circle cx="50" cy="50" r="45" class="loader-fill" id="loader-svg-fill"></circle>
            </svg>
            <div class="loader-center-ai">AI</div>
        </div>
        <div class="access-granted">ACCESS GRANTED</div>
        <div class="load-pct" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-fill" id="load-bar"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div class="user-info">
                <div class="avatar-frame"><img src="images/logo.png" id="u-avatar"></div>
                <div class="user-text">
                    <b id="u-name">Kanderrr</b><br>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-item"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="main-balance" id="balance">0</div>

        <div class="game-core">
            <div class="ai-btn-container" ontouchstart="logic.tap(event)">
                <div class="ai-glow"></div>
                <div class="ai-logo-main">AI</div>
            </div>

            <div class="side-nav">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </div>

        <div class="energy-section">
            <div class="energy-labels"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="energy-progress"><div class="energy-fill" id="eng-fill"></div></div>
        </div>

        <div class="bottom-tabs">
            <div class="tab-btn" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="tab-btn" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="tab-btn" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="tab-btn" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-content">
            <div class="drag-handle"></div>
            <h2 id="modal-title" class="modal-title">TOP</h2>
            <div id="modal-body"></div>
            <button class="modal-close-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const connector = new TonConnectSDK.TonConnect({ manifestUrl: window.location.origin + '/static/tonconnect-manifest.json' });

        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                const u = tg.initDataUnsafe?.user || { id: "0", username: "Agent" };
                
                try {
                    const res = await fetch(`/api/user/${u.id}?username=${u.username}`);
                    const data = await res.json();
                    // Защита от NaN: принудительно Number()
                    this.user = {
                        user_id: u.id,
                        username: data.username || u.username,
                        balance: Number(data.balance) || 0,
                        energy: Number(data.energy) || 1000,
                        max_energy: Number(data.max_energy) || 1000,
                        click_lvl: Number(data.click_lvl) || 1,
                        profit_hr: Number(data.profit_hr) || 0
                    };
                } catch(e) { 
                    this.user = { user_id: u.id, balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, username: u.username };
                }
                ui.startLoading();
                this.startLoops();
            },

            tap(e) {
                if (Number(this.user.energy) < Number(this.user.click_lvl)) return;
                this.user.balance = Number(this.user.balance) + Number(this.user.click_lvl);
                this.user.energy = Number(this.user.energy) - Number(this.user.click_lvl);
                ui.update();
                ui.spawnPop(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            },

            async buy(type) {
                let cost = 0;
                if(type==='tap') cost = this.user.click_lvl * 2000;
                if(type==='energy') cost = (this.user.max_energy/500) * 3500;
                if(type==='profit') cost = (this.user.profit_hr/500 + 1) * 12000;

                if (Number(this.user.balance) >= cost) {
                    this.user.balance -= cost;
                    if(type==='tap') this.user.click_lvl++;
                    if(type==='energy') { this.user.max_energy += 500; this.user.energy = this.user.max_energy; }
                    if(type==='profit') this.user.profit_hr += 500;
                    ui.update();
                    this.save();
                    ui.openM(type==='profit' ? 'mine' : 'boost');
                }
            },

            startLoops() {
                setInterval(() => {
                    this.user.energy = Math.min(this.user.max_energy, Number(this.user.energy) + 1.5);
                    if(this.user.profit_hr > 0) this.user.balance += (Number(this.user.profit_hr) / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 10000);
            },

            async save() {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.user_id, 
                        balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy), 
                        max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl, 
                        profit_hr: this.user.profit_hr
                    })
                });
            }
        };

        const ui = {
            update() {
                if(!logic.user) return;
                const b = Math.floor(logic.user.balance);
                document.getElementById('balance').innerText = b.toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(b/200000)+1}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = logic.user.profit_hr;
            },

            async openM(type) {
                const body = document.getElementById('modal-body');
                const title = document.getElementById('modal-title');
                title.innerText = type.toUpperCase();
                
                if(type === 'top') {
                    body.innerHTML = '<div class="loading-mini">SCANNING...</div>';
                    const r = await fetch('/api/top');
                    const users = await r.json();
                    // Сортировка по балансу (Screenshot_2026-03-20-07-34-25-209)
                    body.innerHTML = users.sort((a,b)=>b.balance-a.balance).slice(0, 100).map((u, i) => `
                        <div class="list-item ${u.username === logic.user.username ? 'is-me' : ''}">
                            <div class="list-left">
                                <span class="rank-icon">${i === 0 ? '🏆' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</span>
                                <div class="list-avatar">AI</div>
                                <span class="list-name">${u.username} ${u.username === logic.user.username ? '(YOU)' : ''}</span>
                            </div>
                            <span class="list-val">${Math.floor(u.balance).toLocaleString()}</span>
                        </div>`).join('');
                } else if(type === 'wallet') {
                    body.innerHTML = `
                        <div class="wallet-modal">
                            <img src="https://ton.org/download/ton_symbol.png" width="80">
                            <h3>Connect TON</h3>
                            <p>Link your wallet for withdrawals.</p>
                            <button class="btn-primary" onclick="ui.connect()">CONNECT WALLET</button>
                        </div>`;
                } else if(type === 'boost') {
                    body.innerHTML = `
                        <div class="list-item" onclick="logic.buy('tap')">
                            <div class="list-left"><span>🚀</span><div><b>Multitap</b><br><small>Lvl ${logic.user.click_lvl}</small></div></div>
                            <b class="list-val">${(logic.user.click_lvl*2000).toLocaleString()}</b>
                        </div>
                        <div class="list-item" onclick="logic.buy('energy')">
                            <div class="list-left"><span>⚡</span><div><b>Energy</b><br><small>+500 Limit</small></div></div>
                            <b class="list-val">${((logic.user.max_energy/500)*3500).toLocaleString()}</b>
                        </div>`;
                } else if(type === 'mine') {
                    body.innerHTML = `
                        <div class="list-item" onclick="logic.buy('profit')">
                            <div class="list-left"><span>⛏️</span><div><b>Neural Core</b><br><small>+500/hr</small></div></div>
                            <b class="list-val">${((logic.user.profit_hr/500 + 1)*12000).toLocaleString()}</b>
                        </div>`;
                }
                document.getElementById('modal-container').classList.add('active');
            },

            async connect() {
                const walletConnectionSource = { universalLink: 'https://tonkeeper.app/ton-connect', bridgeUrl: 'https://bridge.tonapi.io/bridge' };
                connector.connect(walletConnectionSource);
            },

            closeM() { document.getElementById('modal-container').classList.remove('active'); },

            spawnPop(e) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                const el = document.createElement('div');
                el.className = 'tap-pop';
                el.innerText = `+${logic.user.click_lvl}`;
                el.style.left = x + 'px'; el.style.top = y + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 700);
            },

            startLoading() {
                let p = 0;
                const itv = setInterval(() => {
                    p += 2;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    document.getElementById('loader-svg-fill').style.strokeDashoffset = 283 - (283 * p / 100);
                    if(p >= 100) { clearInterval(itv); document.getElementById('loading-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; this.update(); }
                }, 30);
            }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
