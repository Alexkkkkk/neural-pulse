<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI v1.1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #000; --glass: rgba(255, 255, 255, 0.08); --ton: #0088cc; }
        body { margin: 0; padding: 0; background: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-logo { width: 100px; height: 100px; filter: drop-shadow(0 0 15px var(--neon-purple)); }
        .percent { font-size: 32px; font-weight: 900; color: var(--neon-cyan); margin: 10px 0; }
        
        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.8s; visibility: hidden; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin-top: 20px; background: var(--glass); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .lvl { width: 45px; height: 45px; border: 2px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--neon-cyan); }

        .bal { font-size: 60px; font-weight: 900; margin-top: 30px; text-shadow: 0 0 15px var(--neon-cyan); }

        .stage { position: relative; width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .logo { width: 230px; height: 230px; border-radius: 50%; transition: 0.05s; z-index: 1; cursor: pointer; }
        
        .side { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 15px; width: 85px; text-align: center; font-size: 10px; font-weight: bold; color: white; cursor: pointer; }

        .energy { width: 90%; margin-bottom: 25px; }
        .bar { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: 0.3s; }

        .footer { width: 92%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 35px; }
        .f-item { background: #111; padding: 18px 0; border-radius: 15px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #1a1a1a; cursor: pointer; }

        .plus { position: absolute; font-size: 35px; font-weight: 900; animation: p 0.7s forwards; pointer-events: none; color: var(--neon-cyan); }
        @keyframes p { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>
    <div id="loader">
        <img src="images/logo.png" class="loader-logo" onerror="this.src='https://via.placeholder.com/100/bc13fe/fff?text=AI'">
        <div class="percent" id="load-pct">0%</div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl" id="l-v">1</div>
            <div>
                <div style="font-size: 10px; color: #555;">NEURAL NETWORK</div>
                <div id="p-v" style="color: var(--neon-cyan); font-size: 12px;">PNL: +0/h</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>

        <div class="stage">
            <img src="images/logo.png" class="logo" id="t-a" onerror="this.src='https://via.placeholder.com/230/bc13fe/fff?text=AI'">
            <div class="side">
                <div class="btn" id="ton-btn" onclick="handleWallet()">WALLET</div>
                <div class="btn" onclick="invite()">INVITE</div>
                <div class="btn" onclick="showTop()">TOP 10</div>
            </div>
        </div>

        <div class="energy">
            <div style="display:flex; justify-content: space-between; font-size: 12px;"><span>⚡ ENERGY</span><span id="e-n">1000/1000</span></div>
            <div class="bar"><div class="fill" id="e-f"></div></div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="upgrade()">🚀 BOOST</div>
            <div class="f-item" onclick="buyBonus()">💎 1M COINS</div>
            <div class="f-item" onclick="checkPay()">📊 STATUS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const tonConnect = new TonConnectSDK.TonConnect({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0 };

        async function upgrade() {
            const cost = s.lvl * 5000;
            if(confirm(`Level ${s.lvl+1} cost: ${cost}?`)) {
                const r = await fetch('/api/upgrade/click', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid}) });
                const d = await r.json();
                if(d.success) { s.lvl++; s.bal -= cost; upd(); } else tg.showAlert("Insufficient balance!");
            }
        }

        async function showTop() {
            const r = await fetch('/api/leaderboard');
            const d = await r.json();
            tg.showAlert("LEADERBOARD:\n" + d.map((u, i) => `${i+1}. ${u.user_id}: ${Math.floor(u.balance)}`).join('\n'));
        }

        function invite() {
            const link = `https://t.me/NeuralPulseAI_bot?start=${s.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me in Neural Pulse!`);
        }

        async function buyBonus() {
            if (!tonConnect.connected) return tg.showAlert("Connect wallet!");
            const payload = `ID${s.uid}_${Date.now()}`;
            const tx = { validUntil: Math.floor(Date.now()/1000)+300, messages: [{ address: "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI", amount: "1000000000", payload: payload }] };
            try { await tonConnect.sendTransaction(tx); tg.showAlert("Sent!"); } catch(e) {}
        }

        async function checkPay() {
            const r = await fetch(`/api/check-payment/${s.uid}`);
            const d = await r.json();
            if(d.success) { s.bal += d.added; upd(); tg.showAlert("Added 1,000,000!"); } else tg.showAlert("No new payments.");
        }

        async function init() {
            let progress = 0;
            const iv = setInterval(() => {
                progress += 5;
                document.getElementById('load-pct').innerText = progress + '%';
                if(progress >= 100) {
                    clearInterval(iv);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('ui').classList.add('ready');
                }
            }, 50);

            const refBy = new URLSearchParams(window.location.search).get('tgWebAppStartParam');
            const r = await fetch(`/api/user/${s.uid}${refBy ? '?refBy='+refBy : ''}`);
            const d = await r.json();
            Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
            upd();
            setInterval(() => { if(s.eng < 1000) { s.eng++; upd(); } }, 1000);
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${s.eng}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('p-v').innerText = `PNL: +${s.pnl}/h`;
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = e.touches[0].clientX + 'px'; p.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            upd();
        });

        setInterval(() => fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl}) }), 3000);
        
        async function handleWallet() {
            if (tonConnect.connected) await tonConnect.disconnect();
            else tg.openLink(tonConnect.connect(await tonConnect.getWallets()));
        }

        init();
    </script>
</body>
</html>
