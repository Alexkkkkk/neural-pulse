<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Начальное состояние
    let state = {
        score: 0, 
        energy: 1000, 
        max_energy: 1000, 
        tap_power: 1, 
        pnl: 0, 
        level: 1, 
        exp: 0,
        user_id: tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : '476014374'
    };

    const LEAGUES = [
        { name: "IRON", min: 0, max: 50000, lvl: 1 },
        { name: "BRONZE", min: 50000, max: 250000, lvl: 2 },
        { name: "SILVER", min: 250000, max: 1000000, lvl: 3 },
        { name: "GOLD", min: 1000000, max: 5000000, lvl: 4 },
        { name: "ELITE", min: 5000000, max: Infinity, lvl: 5 }
    ];

    async function init() {
        try {
            const r = await fetch(`/api/balance/${state.user_id}?t=${Date.now()}`);
            const res = await r.json();
            if(res.status === 'ok') {
                // Приведение типов при загрузке
                state.score = Number(res.data.score) || 0;
                state.energy = Number(res.data.energy) || 0;
                state.max_energy = Number(res.data.max_energy) || 1000;
                state.tap_power = Number(res.data.click_lvl) || 1;
                state.pnl = Number(res.data.pnl) || 0;
                state.level = Number(res.data.level) || 1;
                state.exp = Number(res.data.exp) || 0;
                render();
            }
        } catch(e) { console.error("Ошибка загрузки профиля"); }
        document.getElementById('reloading-screen').style.display = 'none';
        updateJackpot();
    }

    function render() {
        let league = LEAGUES.find(l => state.score >= l.min && state.score < l.max) || LEAGUES[LEAGUES.length-1];
        state.level = league.lvl;
        
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        document.getElementById('display-level').innerText = `LVL ${state.level}`;
        document.getElementById('league-name').innerText = league.name + " LEAGUE";

        let pct = league.max === Infinity ? 100 : Math.floor(((state.score - league.min) / (league.max - league.min)) * 100);
        document.getElementById('league-fill').style.width = pct + '%';
        document.getElementById('league-pct').innerText = pct + '%';

        if(document.getElementById('modal-boost').classList.contains('active')) {
            const tapCost = state.tap_power * 1000;
            const energyCost = Math.floor(state.max_energy * 1.5);
            document.getElementById('tap-lvl').innerText = state.tap_power;
            document.getElementById('tap-cost').innerText = tapCost.toLocaleString();
            document.getElementById('energy-lvl').innerText = Math.floor((state.max_energy-1000)/500 + 1);
            document.getElementById('energy-cost').innerText = energyCost.toLocaleString();
            
            document.getElementById('btn-upgrade-tap').disabled = state.score < tapCost;
            document.getElementById('btn-upgrade-energy').disabled = state.score < energyCost;
        }
    }

    async function saveData() {
        // Формируем чистый JSON для исключения ошибки 422
        const payload = {
            user_id: String(state.user_id),
            score: Number(state.score),
            click_lvl: Number(state.tap_power),
            energy: Number(state.energy),
            max_energy: Number(state.max_energy),
            pnl: Number(state.pnl),
            level: Number(state.level),
            exp: Number(state.exp)
        };

        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const err = await response.json();
                console.error("Save failed:", err);
            }
        } catch(e) { console.error("Network error during save"); }
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy < state.tap_power) {
            tg.HapticFeedback?.notificationOccurred('error');
            return;
        }
        
        state.score += state.tap_power;
        state.energy -= state.tap_power;
        state.exp += 1;
        
        const touch = e.touches[0];
        createFlyText(touch.clientX, touch.clientY, `+${state.tap_power}`);
        tg.HapticFeedback?.impactOccurred('medium');
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = (x - 20) + 'px';
        el.style.top = (y - 40) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function openModal(id) {
        if(id === 'stats') loadLeaderboard();
        document.getElementById('modal-' + id).classList.add('active');
        document.getElementById('overlay').classList.add('active');
        render();
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        document.getElementById('overlay').classList.remove('active');
    }

    async function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        try {
            const r = await fetch('/api/leaderboard');
            const res = await r.json();
            list.innerHTML = res.data.map((u, i) => `
                <div class="leader-row">
                    <span>#${i+1} Operator ${String(u.id).slice(-5)}</span>
                    <span style="color:var(--neon-blue)">${Math.floor(u.balance).toLocaleString()} NP</span>
                </div>
            `).join('');
        } catch(e) { list.innerText = "Ошибка сети"; }
    }

    function buyUpgrade(type) {
        if(type === 'tap') {
            let cost = state.tap_power * 1000;
            if(state.score >= cost) {
                state.score -= cost;
                state.tap_power++;
                tg.HapticFeedback?.notificationOccurred('success');
                saveData();
            }
        } else {
            let cost = Math.floor(state.max_energy * 1.5);
            if(state.score >= cost) {
                state.score -= cost;
                state.max_energy += 500;
                state.energy = state.max_energy;
                tg.HapticFeedback?.notificationOccurred('success');
                saveData();
            }
        }
        render();
    }

    function buyMiner(cost, income) {
        if (state.score >= cost) {
            state.score -= cost;
            state.pnl += income;
            tg.HapticFeedback?.notificationOccurred('success');
            render();
            saveData();
        } else {
            tg.showAlert("Недостаточно NP!");
        }
    }

    async function updateJackpot() {
        try {
            const r = await fetch('/api/jackpot');
            const res = await r.json();
            document.getElementById('jackpot-amount').innerText = Number(res.value).toLocaleString();
        } catch(e) {}
    }

    function copyRefLink() {
        const link = `https://t.me/neural_pulse_bot?start=${state.user_id}`;
        tg.showAlert("Ваша ссылка для приглашения:\n" + link);
    }

    // Игровые циклы
    setInterval(() => {
        if(state.energy < state.max_energy) {
            state.energy = Math.min(state.max_energy, state.energy + 1.5);
        }
        if(state.pnl > 0) {
            state.score += (state.pnl / 3600);
        }
        render();
    }, 1000);

    setInterval(saveData, 15000); 
    setInterval(updateJackpot, 30000); 

    window.onload = init;
</script>
