<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.1.9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #app { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .header { width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .avatar { width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--cyan); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .balance { font-size: 58px; font-weight: 900; margin: 15px 0; letter-spacing: -2px; }
        .main-logo { width: 240px; filter: drop-shadow(0 0 40px var(--purple)); transition: transform 0.05s; cursor: pointer; }
        .eng-wrap { width: 100%; margin-bottom: 30px; }
        .bar-bg { width: 100%; height: 10px; background: #111; border-radius: 20px; overflow: hidden; }
        .bar-f { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }
        .footer { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .f-btn { background: #080808; border: 1px solid #1a1a1a; padding: 18px 0; border-radius: 16px; font-size: 10px; font-weight: 900; color: #888; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; flex-direction: column; padding: 40px 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .b-btn { background: var(--cyan); color: #000; padding: 12px 18px; border-radius: 12px; font-weight: 900; border: none; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        .float-text { position: fixed; pointer-events: none; font-weight: 900; animation: floatUp 0.8s forwards; color: var(--cyan); }
    </style>
</head>
<body>

<div id="loader"><h1 style="color:var(--cyan)">SYNCING...</h1></div>

<div id="app">
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="avatar" id="u-avatar"></div>
            <div style="text-align:left;"><b id="u-name">...</b><br><small style="color:var(--cyan)">v3.1.9</small></div>
        </div>
        <div style="background:var(--cyan); color:#000; padding:6px 12px; border-radius:10px; font-weight:900;" id="u-lvl">LVL 1</div>
    </div>
    <div class="balance" id="balance">0</div>
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <img src="./images/logo.png" class="main-logo" id="tap-img" onpointerdown="tap(event)" onerror="this.src='https://i.ibb.co/LzY7X6p/ai-logo.png'">
    </div>
    <div class="eng-wrap">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px;"><span>ENERGY</span><span id="eng-val">...</span></div>
        <div class="bar-bg"><div class="bar-f" id="eng-fill"></div></div>
    </div>
    <div class="footer">
        <div class="f-btn" onclick="openM('boost')">BOOST</div>
        <div class="f-btn" onclick="openM('mine')">MINE</div>
        <div class="f-btn" onclick="openM('tasks')">TASKS</div>
        <div class="f-btn" onclick="openM('top')">TOP</div>
    </div>
</div>

<div id="m-boost" class="modal">
    <h1>UPGRADES</h1>
    <div class="card"><div><b>Multitap</b><br><small id="mt-lvl">Lvl 1</small></div><button class="b-btn" onclick="buy('mt')" id="mt-cost">0</button></div>
    <div class="card"><div><b>Energy Limit</b><br><small>+500</small></div><button class="b-btn" onclick="buy('el')" id="el-cost">0</button></div>
    <button onclick="closeM()" style="margin-top:auto; padding:20px; border-radius:15px;">BACK</button>
</div>

<div id="m-top" class="modal"><h1>TOP NODES</h1><div id="top-list"></div><button onclick="closeM()" style="margin-top:auto; padding:20px; border-radius:15px;">BACK</button></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let s = { 
        id: tg.initDataUnsafe?.user?.id?.toString() || "0",
        name: tg.initDataUnsafe?.user?.first_name || "Agent",
        photo: tg.initDataUnsafe?.user?.photo_url || "",
        bal: 0, lvl: 1, eng: 1000, max: 1000, wallet: null, bot: false 
    };

    async function init() {
        await sync();
        document.getElementById('loader').style.display='none';
        document.getElementById('app').style.display='flex';
        setInterval(save, 5000);
        setInterval(() => { if(s.eng < s.max) { s.eng = Math.min(s.max, s.eng + 2); upd(); }}, 1000);
    }

    async function sync() {
        try {
            const r = await fetch(`/api/user/${s.id}?name=${encodeURIComponent(s.name)}&photo=${encodeURIComponent(s.photo)}`);
            const d = await r.json();
            s.bal = Number(d.balance); s.lvl = Number(d.click_lvl); 
            s.eng = Number(d.energy); s.max = Number(d.max_energy);
            upd();
        } catch(e) { console.log("Sync Error"); }
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('u-lvl').innerText = `LVL ${s.lvl}`;
        document.getElementById('u-name').innerText = s.name;
        document.getElementById('eng-val').innerText = `${s.eng}/${s.max}`;
        document.getElementById('eng-fill').style.width = `${(s.eng/s.max)*100}%`;
        
        const mtCost = Math.floor(250 * Math.pow(1.6, s.lvl - 1));
        const elCost = Math.floor(400 * Math.pow(1.5, (s.max/500) - 1));
        document.getElementById('mt-cost').innerText = mtCost;
        document.getElementById('el-cost').innerText = elCost;
        document.getElementById('mt-lvl').innerText = `Lvl ${s.lvl}`;
        if(s.photo) document.getElementById('u-avatar').innerHTML = `<img src="${s.photo}">`;
    }

    function tap(e) {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            showFloat(e, `+${s.lvl}`);
            tg.HapticFeedback.impactOccurred('light');
            upd();
        }
    }

    function showFloat(e, t) {
        const f = document.createElement('div');
        f.className = 'float-text'; f.innerText = t;
        f.style.left = `${e.clientX}px`; f.style.top = `${e.clientY}px`;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 800);
    }

    function buy(type) {
        if(type === 'mt') {
            let cost = Math.floor(250 * Math.pow(1.6, s.lvl - 1));
            if(s.bal >= cost) { s.bal -= cost; s.lvl++; }
        } else {
            let cost = Math.floor(400 * Math.pow(1.5, (s.max/500) - 1));
            if(s.bal >= cost) { s.bal -= cost; s.max += 500; s.eng += 500; }
        }
        upd(); save();
    }

    function save() {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: s.id, balance: s.bal, energy: s.eng,
                max_energy: s.max, click_lvl: s.lvl,
                wallet: s.wallet, has_bot: s.bot
            })
        });
    }

    function openM(id) { 
        document.getElementById('m-'+id).style.display = 'flex'; 
        if(id === 'top') loadTop();
    }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    async function loadTop() {
        const r = await fetch('/api/top');
        const d = await r.json();
        document.getElementById('top-list').innerHTML = d.map(u => `<div class="card"><span>${u.username}</span><b>${Math.floor(u.balance)}</b></div>`).join('');
    }

    init();
</script>
</body>
</html>
