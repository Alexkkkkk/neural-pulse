<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; }
        
        .balance { font-size: 52px; margin-top: 40px; font-weight: 900; text-shadow: 0 0 15px var(--cyan); }
        
        .click-area { height: 55vh; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .main-img { width: 230px; cursor: pointer; transition: transform 0.05s; filter: drop-shadow(0 0 30px var(--purple)); z-index: 10; }
        .main-img:active { transform: scale(0.95); }

        /* Энергия в стиле v2.1.5 */
        .eng-cont { width: 80%; margin: 20px auto; }
        .eng-bar { width: 100%; height: 6px; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #222; }
        .eng-fill { height: 100%; background: var(--cyan); width: 100%; transition: width 0.3s; }
        .eng-txt { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 5px; }
        
        .footer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; }
        .btn { background: #111; padding: 15px 5px; border-radius: 12px; font-size: 10px; width: 22%; font-weight: bold; border: 1px solid #222; color: #fff; }

        /* Модалка Boost */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 40px 20px; }
        .item { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .buy { background: var(--cyan); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="balance" id="bal">0</div>
    
    <div class="click-area">
        <img src="logo.png" class="main-img" onclick="tap(event)">
    </div>

    <div class="eng-cont">
        <div class="eng-txt" id="etxt">1000 / 1000</div>
        <div class="eng-bar"><div class="eng-fill" id="efill"></div></div>
    </div>

    <div class="footer">
        <div class="btn" onclick="openB()">BOOST</div>
        <div class="btn">MINE</div>
        <div class="btn">TASKS</div>
        <div class="btn">STATS</div>
    </div>

    <div id="boost" class="modal">
        <h1 style="color:var(--cyan)">BOOSTS</h1>
        <div id="blist"></div>
        <button onclick="closeB()" style="margin-top:auto; background:#fff; padding:15px; border-radius:10px; font-weight:900;">CLOSE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { uid: tg.initDataUnsafe?.user?.id || "0", bal: 0, lvl: 1, eLvl: 1, sLvl: 1, eng: 1000, maxE: 1000 };

        async function load() {
            const r = await fetch(`/api/user/${s.uid}?name=${tg.initDataUnsafe?.user?.first_name || 'User'}`);
            const d = await r.json();
            s = { ...s, bal: Number(d.balance), lvl: Number(d.click_lvl), eLvl: Number(d.energy_lvl), sLvl: Number(d.speed_lvl), maxE: Number(d.max_energy), eng: Number(d.energy) };
            upd();
        }

        function tap(e) {
            if(s.eng >= s.lvl) {
                s.bal += s.lvl; s.eng -= s.lvl;
                tg.HapticFeedback.impactOccurred('medium');
                upd();
                save();
            }
        }

        function upd() {
            document.getElementById('bal').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('etxt').innerText = `${s.eng} / ${s.maxE}`;
            document.getElementById('efill').style.width = `${(s.eng / s.maxE) * 100}%`;
        }

        function save() {
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: s.uid, balance: s.bal, click_lvl: s.lvl, energy_lvl: s.eLvl, speed_lvl: s.sLvl, max_energy: s.maxE, energy: s.eng })
            });
        }

        function openB() {
            const list = document.getElementById('blist');
            const cost = s.lvl * 1000;
            list.innerHTML = `<div class="item"><div><b>Multitap</b><br>Lvl ${s.lvl}</div><button class="buy" onclick="buy(${cost})">${cost}</button></div>`;
            document.getElementById('boost').style.display = 'flex';
        }

        function buy(c) {
            if(s.bal >= c) {
                s.bal -= c; s.lvl++;
                closeB(); upd(); save();
            }
        }

        function closeB() { document.getElementById('boost').style.display = 'none'; }

        setInterval(() => { if(s.eng < s.maxE) { s.eng = Math.min(s.maxE, s.eng + (1 + s.sLvl)); upd(); } }, 1000);
        
        load();
    </script>
</body>
</html>
