<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">CONNECTING TO BOTHOST DB...</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">ROOKIE</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels"><span>CORE STABILITY</span><span id="ui-energy">1000/1000</span></div>
            <div class="e-track"><div id="e-fill"></div></div>
            
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, balance: 0, energy: 1000, max_energy: 1000, 
                tap: 1, profit: 0, username: "AGENT", last_seen: "",
                last_bonus: 0
            },
            lvls: { regen: 1 },
            serverTasks: [], 
            serverTop: [],
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, username: 'KANDERRR' };
                this.data.id = u.id.toString();
                this.data.username = (u.username || "AGENT").toUpperCase();

                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://np.bothost.tech/tonconnect-manifest.json'
                    });

                    // Загрузка из твоей БД
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(this.data.username)}`);
                    if (r.ok) {
                        const sData = await r.json();
                        // Важно: берем только те поля, что есть в БД
                        this.data.balance = sData.balance || 0;
                        this.data.energy = sData.energy || 1000;
                        this.data.max_energy = sData.max_energy || 1000;
                        this.data.tap = sData.tap || 1;
                        this.data.profit = sData.profit || 0;
                    }

                    const [tRes, topRes] = await Promise.all([fetch('/api/tasks'), fetch('/api/top')]);
                    if (tRes.ok) this.serverTasks = await tRes.json();
                    if (topRes.ok) this.serverTop = await topRes.json();

                } catch(e) { console.error("DB Sync Error"); }

                this.isLoaded = true;
                this.loop();
                ui.render();
            },

            // --- ВСЕ ФУНКЦИИ КНОПОК ---

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                this.data.balance += this.data.tap;
                this.data.energy -= 1;
                ui.pop(e, this.data.tap);
                ui.render();
                tg.HapticFeedback.impactOccurred('medium');
            },

            getCost(type) {
                const base = { tap: 400, energy: 500, regen: 800, mine: 1200 };
                let lvl = 1;
                if(type === 'tap') lvl = this.data.tap;
                if(type === 'energy') lvl = Math.floor((this.data.max_energy-1000)/500)+1;
                if(type === 'mine') lvl = Math.floor(this.data.profit/200)+1;
                if(type === 'regen') lvl = this.lvls.regen;
                return Math.floor(base[type] * Math.pow(1.6, lvl - 1));
            },

            upgrade(type) {
                const cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap++;
                    if(type === 'energy') this.data.max_energy += 500;
                    if(type === 'mine') this.data.profit += 200;
                    if(type === 'regen') this.lvls.regen++;

                    tg.HapticFeedback.notificationOccurred('success');
                    this.save(); // Сохраняем сразу после покупки
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("НЕДОСТАТОЧНО NP");
                }
            },

            claimBonus() {
                const now = Date.now();
                if(now - this.data.last_bonus < 86400000) {
                    tg.showAlert("ДОСТУПНО РАЗ В СУТКИ");
                    return;
                }
                this.data.balance += 5000;
                this.data.last_bonus = now;
                tg.showAlert("ПОЛУЧЕНО 5,000 NP");
                this.save();
                ui.render();
                ui.closeM();
            },

            async save() {
                if(!this.isLoaded) return;
                this.data.last_seen = new Date().toISOString();
                // Отправляем ровно те поля, что в логах SQL
                const body = {
                    id: this.data.id,
                    balance: this.data.balance,
                    energy: this.data.energy,
                    max_energy: this.data.max_energy,
                    tap: this.data.tap,
                    profit: this.data.profit,
                    username: this.data.username
                };
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
            },

            loop() {
                setInterval(() => {
                    // Реген энергии
                    if(this.data.energy < this.data.max_energy) {
                        this.data.energy = Math.min(this.data.max_energy, this.data.energy + (this.lvls.regen || 1));
                    }
                    // Пассивный доход
                    if(this.data.profit > 0) {
                        this.data.balance += (this.data.profit / 3600);
                    }
                    ui.render();
                }, 1000);
                // Автосейв каждые 30 сек
                setInterval(() => this.save(), 30000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 5;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 30);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit).toLocaleString();
                document.getElementById('my-name').innerText = d.username;
                
                let rank = Math.floor(Math.log10(Math.max(10, d.balance/10))) + 1;
                document.getElementById('my-lvl').innerText = `LVL ${rank}`;
            },

            pop(e, p) {
                const t = (e.touches && e.touches[0]) || e;
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = t.clientX+'px'; div.style.top = t.clientY+'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                
                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOST</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><span>⚡ Multitap (Lvl ${game.data.tap})</span><b>${game.getCost('tap')}</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><span>🔋 Capacity</span><b>${game.getCost('energy')}</b></div>
                    <div class="top-item" onclick="game.upgrade('regen')"><span>🔄 Regen Speed</span><b>${game.getCost('regen')}</b></div>`;
                }
                else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINE</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><span>🧠 Processor</span><b>${game.getCost('mine')}</b></div>`;
                }
                else if(type === 'tasks') {
                    let h = `<h2>📋 MISSIONS</h2>`;
                    game.serverTasks.forEach(t => h += `<div class="top-item" onclick="window.open('${t.url}')"><span>${t.title}</span><b>+${t.reward}</b></div>`);
                    b.innerHTML = h || `<p>No missions</p>`;
                }
                else if(type === 'top') {
                    let h = `<h2>🏆 TOP AGENTS</h2>`;
                    game.serverTop.slice(0, 10).forEach((u, i) => h += `<div class="top-item"><span>${i+1}. ${u.username}</span><b>${Math.floor(u.balance)}</b></div>`);
                    b.innerHTML = h;
                }
                else if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-btn"></div>`;
                    setTimeout(() => { if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-btn' }; }, 100);
                }
                else if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 NODES</h2><div class="s-box">${link}</div>
                    <button class="m-close" style="background:white;color:black;width:100%;margin-top:10px" onclick="navigator.clipboard.writeText('${link}'); tg.showAlert('COPIED')">COPY LINK</button>`;
                }
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 SUPPLY</h2><button class="m-close" style="background:cyan;color:black;width:100%" onclick="game.claimBonus()">COLLECT DAILY</button>`;
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
