<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.4.6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }

        /* ЗАГРУЗКА ИЗ СКРИНШОТА (ПРАВИЛО: НЕ МЕНЯТЬ) */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .loader-ring { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .loader-ring svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        .loader-ring circle { fill: none; stroke-width: 4; stroke: url(#grad); stroke-dasharray: 565; stroke-dashoffset: 565; transition: 0.1s; stroke-linecap: round; }
        .loader-logo { width: 100px; filter: drop-shadow(0 0 15px var(--purple)); }
        .access-txt { font-size: 14px; letter-spacing: 5px; font-weight: bold; margin-bottom: 15px; }
        .percent-txt { font-size: 42px; font-weight: 900; color: var(--cyan); margin-bottom: 30px; }
        .load-bar { width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .load-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan), var(--purple)); }

        /* ИНТЕРФЕЙС ИЗ СКРИНШОТОВ */
        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.5s; visibility: hidden; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 92%; margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 10px; border: 2px solid var(--cyan); object-fit: cover; }
        .u-info { flex-grow: 1; }
        .u-name { font-size: 15px; font-weight: 900; }
        .u-rank { font-size: 10px; color: var(--cyan); font-weight: bold; }
        .lvl-badge { background: var(--cyan); color: black; padding: 3px 10px; border-radius: 8px; font-weight: 900; font-size: 12px; }

        .balance { font-size: 65px; font-weight: 900; margin-top: 25px; text-shadow: 0 0 20px rgba(0,242,255,0.2); }

        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .ai-main { width: 250px; cursor: pointer; transition: 0.05s; }
        .ai-main:active { transform: scale(0.95); }

        .energy-wrap { width: 90%; margin-bottom: 20px; }
        .energy-bar { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; }
        .energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: 0.3s; }

        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 30px; }
        .f-btn { background: #111; border: 1px solid #222; border-radius: 18px; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; }

        /* МОДАЛКИ ПО СКРИНШОТАМ */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 25px; }
        .m-title { color: var(--cyan); font-size: 26px; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; }
        .m-close { background: #111; border-radius: 20px; padding: 15px; text-align: center; margin-top: auto; color: #444; font-weight: bold; text-transform: uppercase; border: 1px solid #222; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-ring">
            <svg><defs><linearGradient id="grad"><stop offset="0%" stop-color="var(--cyan)"/><stop offset="100%" stop-color="var(--purple)"/></linearGradient></defs>
            <circle id="ring-arc" cx="100" cy="100" r="90"></circle></svg>
            <img src="logo.png" class="loader-logo" onerror="this.src='images/logo.png'">
        </div>
        <div class="access-txt">ACCESS GRANTED</div>
        <div class="percent-txt" id="p-val">0%</div>
        <div class="load-bar"><div class="load-fill" id="l-f"></div></div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <img id="u-av" class="avatar" src="logo.png" onerror="this.src='images/logo.png'">
            <div class="u-info">
                <div id="u-nm" class="u-name">Player</div>
                <div id="u-rk" class="u-rank">Bronze Node</div>
            </div>
            <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
        </div>

        <div class="balance" id="b-val">0</div>

        <div class="stage">
            <img src="logo.png" class="ai-main" id="tap" onerror="this.src='images/logo.png'">
        </div>

        <div class="energy-wrap">
            <div class="energy-bar"><div id="e-f" class="energy-fill"></div></div>
        </div>

        <div class="footer">
            <div class="f-btn" onclick="openM('up-ui')">BOOST</div>
            <div class="f-btn" onclick="openM('mi-ui')">MINE</div>
            <div class="f-btn" onclick="openM('ta-ui')">TASKS</div>
            <div class="f-btn" onclick="openM('st-ui')">STATS</div>
        </div>
    </div>

    <div id="st-ui" class="modal"><div class="m-title">Leaderboard</div><div id="st-list" style="overflow-y:auto; flex-grow:1;"></div><div class="m-close" onclick="closeM('st-ui')">BACK</div></div>
    <div id="up-ui" class="modal"><div class="m-title">Upgrades</div><div class="m-close" onclick="closeM('up-ui')">CLOSE</div></div>
    <div id="mi-ui" class="modal"><div class="m-title">Mine</div><div class="m-close" onclick="closeM('mi-ui')">CLOSE</div></div>
    <div id="ta-ui" class="modal"><div class="m-title">Tasks</div><div class="m-close" onclick="closeM('ta-ui')">CLOSE</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { uid: tg.initDataUnsafe?.user?.id || 0, bal: 0, eng: 1000, max: 1000, lvl: 1, r: 'Bronze Node' };

        // Анимация загрузки
        let p = 0;
        const iv = setInterval(() => {
            p++;
            document.getElementById('p-val').innerText = p + '%';
            document.getElementById('l-f').style.width = p + '%';
            document.getElementById('ring-arc').style.strokeDashoffset = 565 - (565 * p / 100);
            if(p >= 100) { clearInterval(iv); start(); }
        }, 30);

        async function start() {
            try {
                const r = await fetch(`/api/user/${s.uid}`);
                const d = await r.json();
                Object.assign(s, { bal: Number(d.balance), eng: d.energy, max: d.max_energy, lvl: d.click_lvl, r: d.rank });
                document.getElementById('u-nm').innerText = tg.initDataUnsafe?.user?.first_name || "User";
                if(tg.initDataUnsafe?.user?.photo_url) document.getElementById('u-av').src = tg.initDataUnsafe.user.photo_url;
            } catch(e) {}
            upd();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('ui').classList.add('ready');
        }

        function upd() {
            document.getElementById('b-val').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('u-lv').innerText = s.lvl;
            document.getElementById('u-rk').innerText = s.r;
            document.getElementById('e-f').style.width = (s.eng / s.max * 100) + '%';
        }

        function openM(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'st-ui') loadStats();
        }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        async function loadStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('st-list').innerHTML = data.map((u, i) => `
                <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #222; font-weight:bold;">
                    <span>#${i+1} ${u.username}</span><span>${Math.floor(u.balance)}</span>
                </div>
            `).join('');
        }

        document.getElementById('tap').onclick = () => {
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('medium');
            upd();
        };

        setInterval(() => {
            fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: s.uid, username: tg.initDataUnsafe?.user?.first_name, balance: s.bal, energy: s.eng, max_energy: s.max, click_lvl: s.lvl, rank: s.r }) 
            });
        }, 5000);
    </script>
</body>
</html>
