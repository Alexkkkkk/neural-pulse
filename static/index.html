<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #150a28 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOADER SCREEN --- */
        #loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-container { text-align: center; }
        .loader-logo-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 30px; }
        .loader-ring {
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid transparent; border-top: 2px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-purple); border-radius: 50%;
            animation: rotate-ring 1.5s linear infinite;
        }
        .loader-logo-img {
            width: 100%; height: 100%; border-radius: 50%; background: #111;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
        }
        .loader-text {
            color: #fff; font-size: 11px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 10px; min-height: 20px;
        }
        .loader-percent { color: var(--neon-cyan); font-size: 24px; font-weight: 900; margin-bottom: 20px; font-family: monospace; }
        .loader-bar-bg { width: 220px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 0 auto; overflow: hidden; }
        .loader-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); transition: width 0.3s ease; }
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- UI LAYERS --- */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .content-layer { 
            position: relative; z-index: 2; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            padding-top: env(safe-area-inset-top);
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease;
            transform: scale(0.95); opacity: 0;
        }
        .content-layer.active { transform: scale(1); opacity: 1; }
        
        .header-card {
            width: 85%; margin-top: 15px; display: flex; align-items: center; gap: 12px; 
            background: var(--glass); padding: 12px; border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .lvl-icon {
            width: 42px; height: 42px; background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon-cyan); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--neon-cyan); font-size: 18px;
        }

        .score-container {
            margin-top: 20px; text-align: center; background: rgba(188, 19, 254, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.2); padding: 10px 40px; border-radius: 20px;
        }
        .jackpot-label { color: var(--neon-cyan); font-size: 10px; font-weight: 800; letter-spacing: 1px; margin-bottom: 2px; }
        #balance { font-size: 42px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .main-wrapper { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        .click-area { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .main-logo { width: 260px; height: 260px; border-radius: 50%; box-shadow: 0 0 60px rgba(188, 19, 254, 0.3); transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; object-fit: cover; }
        
        .side-nav { position: absolute; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .side-btn { background: #121212; border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 9px; font-weight: 800; padding: 10px 12px; border-radius: 10px; width: 70px; text-align: center; }
        .side-btn.gold { color: #ffe600; border-color: rgba(255, 230, 0, 0.3); }

        .bottom-nav { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; margin-bottom: 30px; }
        .nav-btn { background: var(--glass); border: 1.5px solid #444; padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 800; color: #fff; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.95); border-color: var(--neon-cyan); }

        .tap-text { position: absolute; color: #fff; font-size: 36px; font-weight: 900; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100; text-shadow: 0 0 10px var(--neon-purple); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.2); } }

        .energy-section { width: 85%; margin-top: 20px; margin-bottom: 20px; }
        .energy-bar-wrap { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, #00ff66, #00f2ff); width: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-container">
            <div class="loader-logo-wrap">
                <div class="loader-ring"></div>
                <div class="loader-logo-img">
                    <img src="images/logo.png" style="width: 100%; height: 100%; border-radius: 50%;" onerror="this.src='https://via.placeholder.com/150/bc13fe/fff?text=AI'">
                </div>
            </div>
            <div class="loader-text">INITIALIZING...</div>
            <div id="loader-percent" class="loader-percent">0%</div>
            <div class="loader-bar-bg">
                <div id="loader-fill" class="loader-bar-fill"></div>
            </div>
        </div>
    </div>

    <canvas id="particles-js"></canvas>

    <div class="content-layer">
        <div class="header-card">
            <div class="lvl-icon">AI</div>
            <div style="flex-grow: 1;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; color: #aaa;">
                    <span id="league-name">BRONZE LEAGUE</span>
                    <span id="rank-id">ID: ----</span>
                </div>
                <div style="display: flex; align-items: center; gap: 5px; margin-top: 4px;">
                    <div style="width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 5px #0f0;"></div>
                    <span style="font-size: 10px; color: #888;">NEURAL LINK ACTIVE</span>
                </div>
            </div>
        </div>

        <div class="score-container">
            <div class="jackpot-label">NEURAL TOKENS</div>
            <div id="balance">0</div>
        </div>

        <div class="main-wrapper">
            <div class="click-area" id="tap-zone">
                <img src="images/logo.png" class="main-logo" id="main-logo" onerror="this.src='https://via.placeholder.com/250/bc13fe/fff?text=AI'">
            </div>
            <div class="side-nav">
                <div class="side-btn" onclick="showInvite()">INVITE</div>
                <div class="side-btn" onclick="tg.showAlert('Coming Soon...')">TASKS</div>
                <div class="side-btn gold" onclick="tg.showAlert('Daily Bonus available in next update!')">BONUS</div>
            </div>
        </div>

        <div class="energy-section">
            <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; margin-bottom: 6px; color: #aaa;">
                <span>⚡ ENERGY</span>
                <span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar-wrap">
                <div id="energy-fill"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="buyUpgrade('click')">🚀 BOOST</div>
            <div class="nav-btn" onclick="buyUpgrade('mine')">⛏️ MINE</div>
            <div class="nav-btn" onclick="tg.showAlert('Leaderboard is empty yet!')">📊 STATS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let state = { 
            balance: 0, energy: 1000, max_energy: 1000, 
            click_lvl: 1, pnl: 0, loaded: false,
            uid: new URLSearchParams(window.location.search).get('u') || tg.initDataUnsafe?.user?.id
        };

        function startLoadingAnimation() {
            let progress = 0;
            const percentEl = document.getElementById('loader-percent');
            const fillEl = document.getElementById('loader-fill');
            const statusEl = document.querySelector('.loader-text');
            const statuses = ["SCANNING IDENTITY...", "DECRYPTING LINK...", "ESTABLISHING SYNC...", "ACCESS GRANTED"];

            const interval = setInterval(() => {
                if (progress < 25) statusEl.innerText = statuses[0];
                else if (progress < 50) statusEl.innerText = statuses[1];
                else if (progress < 80) statusEl.innerText = statuses[2];
                else statusEl.innerText = statuses[3];

                if (state.loaded && progress >= 100) {
                    clearInterval(interval);
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => {
                        document.getElementById('loader-screen').style.opacity = '0';
                        document.querySelector('.content-layer').classList.add('active');
                        setTimeout(() => document.getElementById('loader-screen').style.display = 'none', 850);
                    }, 200);
                    return;
                }
                
                if (progress < 99) progress += Math.floor(Math.random() * 3) + 1;
                else if (state.loaded) progress = 100;
                
                percentEl.innerText = `${progress}%`;
                fillEl.style.width = `${progress}%`;
            }, 50);
        }

        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 15}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, size: Math.random() * 2
            }));
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(188, 19, 254, 0.2)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
            if(state.uid) document.getElementById('rank-id').innerText = `ID: ${String(state.uid).slice(-6)}`;
        }

        async function loadData() {
            if(!state.uid) { state.loaded = true; return; }
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            try {
                const r = await fetch(`/api/balance/${state.uid}`, { signal: controller.signal });
                const res = await r.json();
                if(res.status === 'ok') {
                    state.balance = parseFloat(res.data.balance || 0);
                    state.click_lvl = parseInt(res.data.click_lvl || 1);
                    state.pnl = parseFloat(res.data.pnl || 0);
                    state.energy = parseFloat(res.data.energy || 1000);
                    state.max_energy = parseInt(res.data.max_energy || 1000);
                }
            } catch(e) {
                console.warn("API load failed, using local state");
            } finally {
                clearTimeout(timeoutId);
                state.loaded = true;
                updateUI();
            }
        }

        // Автосинхронизация с сервером
        async function syncData() {
            if(!state.uid || !state.loaded) return;
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: state.uid,
                        score: state.balance,
                        energy: state.energy
                    })
                });
            } catch(e) { console.error("Sync error"); }
        }

        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!state.loaded || state.energy < state.click_lvl) return;

            for(let i=0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                state.balance += state.click_lvl;
                state.energy -= state.click_lvl;

                const num = document.createElement('div');
                num.className = 'tap-text';
                num.innerText = `+${state.click_lvl}`;
                num.style.left = `${touch.pageX - 20}px`; num.style.top = `${touch.pageY - 50}px`;
                document.body.appendChild(num);
                setTimeout(() => num.remove(), 750);
            }
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }, { passive: false });

        async function buyUpgrade(type) {
            if(!state.uid) return;
            tg.HapticFeedback.impactOccurred('light');
            try {
                const r = await fetch(type === 'click' ? '/api/upgrade/click' : '/api/upgrade/mine', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: state.uid })
                });
                const res = await r.json();
                if(res.status === 'ok') {
                    await loadData();
                } else {
                    tg.showAlert(res.message || "Not enough tokens!");
                }
            } catch(e) { tg.showAlert("Server Error"); }
        }

        function showInvite() {
            const link = `https://t.me/neural_pulse_bot?start=${state.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join Neural Pulse AI!`);
        }

        setInterval(() => {
            if (!state.loaded) return;
            state.balance += (state.pnl / 3600);
            state.energy = Math.min(state.max_energy, state.energy + 1.2);
            updateUI();
        }, 1000);

        setInterval(syncData, 10000); // Синхронизация каждые 10 секунд

        window.onload = () => {
            startLoadingAnimation();
            initParticles(); 
            drawParticles(); 
            loadData();
        };
    </script>
</body>
</html>
