version: '3.9'
services:
  # Единая точка входа (Nginx)
  gateway:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./static:/usr/share/nginx/html
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
    depends_on: [api, socket]

  # API сервис (FastAPI)
  api:
    build: ./services/api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=8257287930:AAFdsn-kKHnq1yJK6Pbg38iQdGet7S9lOUM
    depends_on: [redis]

  # Real-time движок (Socket.io)
  socket:
    build: ./services/socket
    depends_on: [redis]

  # Фоновый воркер (Обработка экономики)
  clicker:
    build: ./services/clicker
    depends_on: [redis]

  # Хранилище (Redis)
  redis:
    image: redis:7-alpine
