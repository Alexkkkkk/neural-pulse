<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pct { font-size: 60px; font-weight: 900; color: var(--cyan); }

        #game { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding-top: 40px; }
        .bal { font-size: 50px; font-weight: 900; color: var(--cyan); margin-bottom: 30px; }
        
        .coin-wrap { position: relative; }
        .coin { width: 260px; height: 260px; border-radius: 50%; border: 4px solid #111; transition: 0.1s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .coin:active { transform: scale(0.95); }

        .stats { width: 85%; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-top: auto; margin-bottom: 50px; }
        .nrg-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 6px; overflow: hidden; }
        #bar { height: 100%; background: linear-gradient(90deg, #0088ff, var(--cyan)); width: 100%; transition: 0.3s; }
        
        .tap-msg { position: absolute; color: #fff; font-size: 30px; font-weight: 900; pointer-events: none; animation: up 0.6s ease-out forwards; }
        @keyframes up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="pct" id="l-pct">0%</div>
    </div>

    <div id="game">
        <div class="bal" id="bal">0</div>
        <div class="coin-wrap">
            <img src="logo.png" id="coin" class="coin" onerror="this.src='https://via.placeholder.com/260/000/00f2ff?text=AI'">
        </div>
        <div class="stats">
            <div class="nrg-row">
                <span>⚡ ENERGY</span>
                <span id="nrg-txt">1000/1000</span>
            </div>
            <div class="bar-bg"><div id="bar"></div></div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        bal: 0, nrg: 1000, lvl: 1, 
        uid: new URLSearchParams(window.location.search).get('u') || tg.initDataUnsafe?.user?.id || "guest",
        ready: false
    };

    function update() {
        document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString();
        document.getElementById('nrg-txt').innerText = `${Math.floor(state.nrg)}/1000`;
        document.getElementById('bar').style.width = (state.nrg / 10) + '%';
    }

    async function load() {
        try {
            const res = await fetch('/api/user/' + state.uid);
            const d = await res.json();
            state.bal = d.balance; state.nrg = d.energy; state.lvl = d.click_lvl;
        } catch (e) { console.error(e); }
        state.ready = true;
        update();
    }

    // Обработка клика
    document.getElementById('coin').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.nrg < state.lvl) return;

        state.bal += state.lvl;
        state.nrg -= state.lvl;
        
        // Анимация +1
        const t = e.touches[0];
        const m = document.createElement('div');
        m.className = 'tap-msg';
        m.style.left = t.clientX + 'px'; m.style.top = t.clientY + 'px';
        m.innerText = `+${state.lvl}`;
        document.body.appendChild(m);
        setTimeout(() => m.remove(), 600);

        update();
        tg.HapticFeedback.impactOccurred('medium');
    });

    // Автосохранение
    setInterval(() => {
        if (state.ready && state.uid !== "guest") {
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: state.uid, balance: state.bal, energy: state.nrg, click_lvl: state.lvl })
            });
        }
    }, 5000);

    // Регенерация
    setInterval(() => {
        if (state.nrg < 1000) { state.nrg = Math.min(1000, state.nrg + 1.5); update(); }
    }, 1000);

    // Лоадер
    let p = 0;
    const lInt = setInterval(() => {
        p += 4; document.getElementById('l-pct').innerText = p + '%';
        if (p >= 100) {
            clearInterval(lInt);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
        }
    }, 50);

    window.onload = load;
</script>
</body>
</html>
