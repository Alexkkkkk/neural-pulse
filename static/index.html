<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">INITIALIZING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const ADMIN_WALLET = "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI";
        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, balance: 0, energy: 1000, max_energy: 1000, 
                tap_lvl: 1, mine_lvl: 1, energy_lvl: 1, regen_lvl: 1,
                profit: 0, last_bonus: 0, tasks: [] 
            },
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, first_name: 'Agent', photo_url: '' };
                const name = (u.username || u.first_name).toUpperCase();
                
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });
                } catch(e) { console.error("TON Error", e); }

                try {
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}&photo_url=${encodeURIComponent(u.photo_url || '')}`);
                    if (r.ok) Object.assign(this.data, await r.json());
                } catch(e) { this.data.id = u.id; }

                document.getElementById('my-name').innerText = name;
                if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                this.isLoaded = true;
                this.loop();
            },

            getTapPower() { return Math.floor(1 * Math.pow(1.2, this.data.tap_lvl - 1)); },
            
            getCost(type) {
                const d = this.data;
                if(type === 'tap') return Math.floor(450 * Math.pow(1.7, d.tap_lvl - 1));
                if(type === 'energy') return Math.floor(600 * Math.pow(1.6, d.energy_lvl - 1));
                if(type === 'regen') return Math.floor(1000 * Math.pow(2, d.regen_lvl - 1));
                if(type === 'mine') return Math.floor(1500 * Math.pow(1.65, d.mine_lvl - 1));
                return 0;
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                let power = this.getTapPower();
                this.data.balance += power;
                this.data.energy -= 1;
                ui.pop(e, power);
                ui.render();
            },

            upgrade(type) {
                let cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap_lvl++;
                    if(type === 'energy') { this.data.energy_lvl++; this.data.max_energy += 500; }
                    if(type === 'regen') this.data.regen_lvl++;
                    if(type === 'mine') { this.data.mine_lvl++; this.data.profit += 150; }
                    
                    tg.HapticFeedback.notificationOccurred('success');
                    this.save();
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("LACK OF NP");
                }
            },

            async save() {
                if(!this.isLoaded) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.data)
                }).catch(() => {});
            },

            loop() {
                setInterval(() => {
                    // Регенерация зависит от уровня regen_lvl
                    const regenAmount = 1 + (this.data.regen_lvl - 1);
                    if(this.data.energy < this.data.max_energy) {
                        this.data.energy = Math.min(this.data.max_energy, this.data.energy + regenAmount);
                    }
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 10;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 40);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${game.getTapPower()}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit);
                
                let lvl = Math.floor(Math.log10(d.balance + 1)) + 1;
                document.getElementById('my-lvl').innerText = `LVL ${lvl}`;
            },

            pop(e, p) {
                const t = e.touches[0];
                const d = document.createElement('div');
                d.className = 'pop'; d.innerText = `+${p}`;
                d.style.left = t.clientX+'px'; d.style.top = t.clientY+'px';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 600);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = 'LOADING...';

                if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-connect-btn" style="display:flex;justify-content:center;padding:20px;"></div>`;
                    setTimeout(() => {
                        if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-btn' };
                    }, 50);
                }

                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOSTERS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')">
                        <div class="t-user"><b>⚡</b><span>Multitap (Lvl ${game.data.tap_lvl})</span></div>
                        <b>${game.getCost('tap').toLocaleString()}</b>
                    </div>
                    <div class="top-item" onclick="game.upgrade('energy')">
                        <div class="t-user"><b>🔋</b><span>Energy Cap (Lvl ${game.data.energy_lvl})</span></div>
                        <b>${game.getCost('energy').toLocaleString()}</b>
                    </div>
                    <div class="top-item" onclick="game.upgrade('regen')">
                        <div class="t-user"><b>🌪️</b><span>Regen Speed (Lvl ${game.data.regen_lvl})</span></div>
                        <b>${game.getCost('regen').toLocaleString()}</b>
                    </div>`;
                }

                if(type === 'top') {
                    b.innerHTML = `<h2>🏆 TOP AGENTS</h2><div id="t-list"></div>`;
                    const r = await fetch('/api/top');
                    const list = await r.json();
                    let h = '';
                    list.sort((x,y) => y.balance - x.balance).slice(0, 10).forEach((u, i) => {
                        let icon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                        let ava = u.photo_url || 'https://cdn-icons-png.flaticon.com/512/2103/2103633.png';
                        h += `<div class="top-item">
                            <div class="t-user">
                                <span style="width:25px;font-weight:bold">${icon}</span>
                                <img src="${ava}" style="width:30px;height:30px;border-radius:50%;margin:0 10px;border:1px solid cyan">
                                <span>${u.username || 'Unknown'}</span>
                            </div>
                            <b>${Math.floor(u.balance).toLocaleString()}</b>
                        </div>`;
                    });
                    document.getElementById('t-list').innerHTML = h;
                }

                if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')">
                        <div class="t-user"><b>🧠</b><span>Neural Node (Lvl ${game.data.mine_lvl})</span></div>
                        <b>${game.getCost('mine').toLocaleString()}</b>
                    </div>`;
                }

                if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 FRIENDS</h2><button class="m-close" style="background:cyan;color:black;width:100%" onclick="tg.openTelegramLink('https://t.me/share/url?url=${encodeURIComponent(link)}')">INVITE AGENT</button>`;
                }
                
                if(type === 'tasks') {
                    b.innerHTML = `<h2>📋 MISSIONS</h2><p>Complete tasks to earn NP</p>`;
                }

                if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 DAILY BONUS</h2><button class="m-close" style="width:100%" onclick="game.claimBonus()">CLAIM 5,000 NP</button>`;
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
