<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #150a28 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* --- LOADER --- */
        #loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }
        .loader-container { text-align: center; }
        .loader-logo-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 30px; }
        .loader-ring {
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid transparent; border-top: 2px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-purple); border-radius: 50%;
            animation: rotate-ring 1.5s linear infinite;
        }
        .loader-text {
            color: #fff; font-size: 11px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 10px;
        }
        .loader-percent { color: var(--neon-cyan); font-size: 24px; font-weight: 900; margin-bottom: 20px; font-family: monospace; }
        .loader-bar-bg { width: 220px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 0 auto; overflow: hidden; }
        .loader-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); transition: width 0.3s; }
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- UI --- */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .content-layer { 
            position: relative; z-index: 2; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            padding-top: env(safe-area-inset-top);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s ease;
            transform: scale(0.95); opacity: 0;
        }
        .content-layer.active { transform: scale(1); opacity: 1; }
        
        .header-card {
            width: 85%; margin-top: 15px; display: flex; align-items: center; gap: 12px; 
            background: var(--glass); padding: 12px; border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .lvl-icon {
            width: 42px; height: 42px; background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon-cyan); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--neon-cyan); font-size: 18px;
        }

        .score-container {
            margin-top: 20px; text-align: center; background: rgba(188, 19, 254, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.2); padding: 10px 40px; border-radius: 20px;
        }
        .jackpot-label { color: var(--neon-cyan); font-size: 10px; font-weight: 800; letter-spacing: 1px; margin-bottom: 2px; }
        #balance { font-size: 42px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); font-variant-numeric: tabular-nums; }

        .main-wrapper { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        .click-area { 
            position: relative; width: 280px; height: 280px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer;
        }
        .main-logo { 
            width: 240px; height: 240px; border-radius: 50%; 
            box-shadow: 0 0 60px rgba(188, 19, 254, 0.3); 
            transition: transform 0.05s; z-index: 5; object-fit: cover;
            pointer-events: none;
        }
        
        .side-nav { position: absolute; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .side-btn { background: #121212; border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 9px; font-weight: 800; padding: 10px 12px; border-radius: 10px; width: 70px; text-align: center; cursor: pointer; }

        .bottom-nav { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; margin-bottom: 30px; }
        .nav-btn { background: var(--glass); border: 1.5px solid #444; padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 800; color: #fff; cursor: pointer; }

        .tap-text { position: absolute; color: #fff; font-size: 32px; font-weight: 900; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 100; text-shadow: 0 0 10px var(--neon-purple); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        .energy-section { width: 85%; margin-top: 20px; margin-bottom: 20px; }
        .energy-bar-wrap { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, #00ff66, #00f2ff); width: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-container">
            <div class="loader-logo-wrap">
                <div class="loader-ring"></div>
                <img src="images/logo.png" style="width: 150px; height: 150px; border-radius: 50%;" onerror="this.src='https://via.placeholder.com/150/bc13fe/fff?text=AI'">
            </div>
            <div class="loader-text">INITIALIZING...</div>
            <div id="loader-percent" class="loader-percent">0%</div>
            <div class="loader-bar-bg"><div id="loader-fill" class="loader-bar-fill"></div></div>
        </div>
    </div>

    <canvas id="particles-js"></canvas>

    <div class="content-layer">
        <div class="header-card">
            <div class="lvl-icon" id="lvl-display">1</div>
            <div style="flex-grow: 1;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; color: #aaa;">
                    <span id="league-name">BRONZE LEAGUE</span>
                    <span id="rank-id">ID: ----</span>
                </div>
                <div style="display: flex; align-items: center; gap: 5px; margin-top: 4px;">
                    <div style="width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 5px #0f0;"></div>
                    <span style="font-size: 10px; color: #888;">NEURAL LINK ACTIVE</span>
                </div>
            </div>
        </div>

        <div class="score-container">
            <div class="jackpot-label">NEURAL TOKENS</div>
            <div id="balance">0</div>
        </div>

        <div class="main-wrapper">
            <div class="click-area" id="tap-zone">
                <img src="images/logo.png" class="main-logo" id="main-logo" onerror="this.src='https://via.placeholder.com/250/bc13fe/fff?text=AI'">
            </div>
            <div class="side-nav">
                <div class="side-btn" onclick="showInvite()">INVITE</div>
                <div class="side-btn" onclick="tg.showAlert('Daily Tasks coming soon!')">TASKS</div>
                <div class="side-btn" style="color:#ffe600; border-color:rgba(255,230,0,0.3)" onclick="tg.showAlert('Daily Bonus in next update!')">BONUS</div>
            </div>
        </div>

        <div class="energy-section">
            <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; margin-bottom: 6px; color: #aaa;">
                <span>⚡ ENERGY</span>
                <span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar-wrap"><div id="energy-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="buyUpgrade('click')">🚀 BOOST</div>
            <div class="nav-btn" onclick="buyUpgrade('mine')">⛏️ MINE</div>
            <div class="nav-btn" onclick="showLeaderboard()">📊 STATS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let state = { 
            balance: 0, 
            energy: 1000, 
            max_energy: 1000, 
            click_lvl: 1, 
            pnl: 0, 
            league: 'BRONZE LEAGUE', 
            loaded: false,
            isDirty: false,
            uid: tg.initDataUnsafe?.user?.id || new URLSearchParams(window.location.search).get('u')
        };

        function startLoadingAnimation() {
            let progress = 0;
            const percentEl = document.getElementById('loader-percent');
            const fillEl = document.getElementById('loader-fill');
            const statusEl = document.querySelector('.loader-text');
            const statuses = ["SCANNING...", "DECRYPTING...", "SYNCING...", "GRANTED"];

            const interval = setInterval(() => {
                if (progress < 25) statusEl.innerText = statuses[0];
                else if (progress < 50) statusEl.innerText = statuses[1];
                else if (progress < 80) statusEl.innerText = statuses[2];
                else statusEl.innerText = statuses[3];

                if (state.loaded && progress >= 100) {
                    clearInterval(interval);
                    tg.HapticFeedback.notificationOccurred('success');
                    document.getElementById('loader-screen').style.opacity = '0';
                    document.querySelector('.content-layer').classList.add('active');
                    setTimeout(() => document.getElementById('loader-screen').style.display = 'none', 850);
                    return;
                }
                
                if (progress < 99) progress += Math.floor(Math.random() * 5) + 2;
                else if (state.loaded) progress = 100;
                
                percentEl.innerText = `${progress}%`;
                fillEl.style.width = `${progress}%`;
            }, 50);
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
            document.getElementById('league-name').innerText = state.league;
            document.getElementById('lvl-display').innerText = state.click_lvl;
            if(state.uid) document.getElementById('rank-id').innerText = `ID: ${String(state.uid).slice(-6)}`;
        }

        async function loadData() {
            if(!state.uid) { state.loaded = true; return; }
            try {
                const r = await fetch(`/api/balance/${state.uid}`);
                const res = await r.json();
                if(res.status === 'ok') {
                    Object.assign(state, res.data);
                }
            } catch(e) { console.warn("Offline mode"); }
            state.loaded = true;
            updateUI();
        }

        async function syncData() {
            if(!state.uid || !state.loaded || !state.isDirty) return;
            try {
                const r = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-tg-data': tg.initData },
                    body: JSON.stringify({
                        user_id: state.uid, 
                        score: state.balance,
                        energy: state.energy, 
                        click_lvl: state.click_lvl, 
                        pnl: state.pnl
                    })
                });
                if(r.ok) state.isDirty = false;
                const res = await r.json();
                if(res.league) state.league = res.league;
            } catch(e) { console.error("Sync failed"); }
        }

        async function buyUpgrade(type) {
            if(!state.uid) return;
            try {
                const r = await fetch(`/api/upgrade/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-tg-data': tg.initData },
                    body: JSON.stringify({ user_id: state.uid })
                });
                const res = await r.json();
                if(res.status === 'ok') {
                    state.balance = res.balance;
                    if(type === 'click') state.click_lvl = res.lvl;
                    if(type === 'mine') state.pnl = res.pnl;
                    updateUI();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert(res.error || "Low Credits");
                }
            } catch(e) { tg.showAlert("Connection lost"); }
        }

        // --- УЛУЧШЕННЫЙ ТАП ---
        const tapZone = document.getElementById('tap-zone');
        const mainLogo = document.getElementById('main-logo');

        tapZone.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Защита от системных жестов
            if (!state.loaded || state.energy < state.click_lvl) {
                if(state.energy < state.click_lvl) tg.HapticFeedback.notificationOccurred('warning');
                return;
            }

            state.isDirty = true;
            mainLogo.style.transform = 'scale(0.95)';

            for(let i=0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                state.balance += state.click_lvl;
                state.energy -= state.click_lvl;

                const num = document.createElement('div');
                num.className = 'tap-text';
                num.innerText = `+${state.click_lvl}`;
                num.style.left = `${touch.pageX - 15}px`; 
                num.style.top = `${touch.pageY - 40}px`;
                document.body.appendChild(num);
                setTimeout(() => num.remove(), 600);
            }
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }, { passive: false });

        tapZone.addEventListener('touchend', () => {
            mainLogo.style.transform = 'scale(1)';
        });

        async function showLeaderboard() {
            try {
                const r = await fetch('/api/leaderboard');
                const res = await r.json();
                if(res.status === 'ok') {
                    let list = res.leaderboard.map(p => `${p.rank}. ID: ${String(p.id).slice(-4)} — ${p.balance.toLocaleString()}`).join('\n');
                    tg.showAlert("🏆 TOP AGENTS:\n\n" + (list || "Empty..."));
                }
            } catch(e) { tg.showAlert("Access denied"); }
        }

        function showInvite() {
            const link = `https://t.me/neural_pulse_bot?start=${state.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me in Neural Pulse!`);
        }

        // --- PARTICLES ---
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 15}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, size: Math.random() * 2
            }));
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(188, 19, 254, 0.15)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        // Основной цикл
        setInterval(() => {
            if (!state.loaded) return;
            if (state.pnl > 0) {
                state.balance += (state.pnl / 3600);
                state.isDirty = true;
            }
            if (state.energy < state.max_energy) {
                // Плавная регенерация: +1.5 энергии в секунду
                state.energy = Math.min(state.max_energy, state.energy + 1.5);
            }
            updateUI();
        }, 1000);

        // Синхронизация каждые 10 секунд
        setInterval(syncData, 10000);

        window.onload = () => {
            startLoadingAnimation();
            initParticles(); 
            drawParticles(); 
            loadData();
        };

        // Сохранение при сворачивании
        window.addEventListener('blur', syncData);
    </script>
</body>
</html>
