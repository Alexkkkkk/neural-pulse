<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">INITIALIZING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, balance: 500, energy: 1000, max_energy: 1000, 
                tap_lvl: 1, mine_lvl: 1, energy_lvl: 1, regen_lvl: 1,
                profit: 0, last_bonus: 0, tasks: [] 
            },
            serverTasks: [], 
            serverTop: [],
            isLoaded: false,

            getHeaders() {
                return {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${tg.initData}` 
                };
            },

            async init() {
                ui.startLoader();
                
                const u = tg.initDataUnsafe.user || { id: 0, first_name: 'Agent', username: 'Agent', photo_url: '' };
                this.data.id = u.id;

                const name = (u.username || u.first_name).toUpperCase();
                
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });
                } catch(e) { console.error("TON Error", e); }

                try {
                    // Загрузка данных пользователя
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}`, {
                        headers: this.getHeaders()
                    });
                    if (r.ok) {
                        const serverData = await r.json();
                        Object.assign(this.data, serverData);
                    }

                    // Загрузка глобальных данных (Задания и Топ)
                    const [tasksRes, topRes] = await Promise.all([
                        fetch('/api/tasks', { headers: this.getHeaders() }),
                        fetch('/api/top', { headers: this.getHeaders() })
                    ]);
                    
                    if (tasksRes.ok) this.serverTasks = await tasksRes.json();
                    if (topRes.ok) this.serverTop = await topRes.json();

                } catch(e) { 
                    console.error("Load error:", e);
                }

                document.getElementById('my-name').innerText = name;
                if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                
                this.isLoaded = true;
                this.loop();
                ui.render();
            },

            getDailyBonusAmount() {
                let lvl = Math.floor(Math.log10(Math.max(1, this.data.balance))) + 1;
                return Math.floor(500 * Math.pow(1.2, lvl - 1));
            },

            async claimBonus() {
                const now = Date.now();
                const day = 24 * 60 * 60 * 1000;
                
                if (now - this.data.last_bonus < day) {
                    tg.showAlert("TERMINAL LOCKED: Come back tomorrow!");
                    return;
                }

                const amount = this.getDailyBonusAmount();
                this.data.balance += amount;
                this.data.last_bonus = now;
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`SUCCESS: +${amount} NP`);
                ui.render(); 
                ui.closeM();
                this.save();
            },

            getTapPower() { return Math.floor(1 * Math.pow(1.2, this.data.tap_lvl - 1)); },
            
            getCost(type) {
                const d = this.data;
                if(type === 'tap') return Math.floor(450 * Math.pow(1.7, d.tap_lvl - 1));
                if(type === 'energy') return Math.floor(600 * Math.pow(1.6, d.energy_lvl - 1));
                if(type === 'regen') return Math.floor(1000 * Math.pow(2, d.regen_lvl - 1));
                if(type === 'mine') return Math.floor(1500 * Math.pow(1.65, d.mine_lvl - 1));
                return 0;
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                let power = this.getTapPower();
                this.data.balance += power;
                this.data.energy -= 1;
                ui.pop(e, power); 
                ui.render();
            },

            upgrade(type) {
                let cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap_lvl++;
                    if(type === 'energy') { this.data.energy_lvl++; this.data.max_energy += 500; }
                    if(type === 'regen') this.data.regen_lvl++;
                    if(type === 'mine') { this.data.mine_lvl++; this.data.profit += 150; }
                    tg.HapticFeedback.notificationOccurred('success');
                    this.save(); ui.render(); ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else { tg.showAlert("LACK OF NP"); }
            },

            async completeTask(id, url) {
                window.open(url, '_blank');
                // Логика проверки на сервере
                fetch('/api/tasks/complete', {
                    method: 'POST',
                    headers: this.getHeaders(),
                    body: JSON.stringify({ taskId: id })
                }).then(r => {
                    if(r.ok) tg.showAlert("MISSION ACCOUNTED");
                });
            },

            async save() {
                if(!this.isLoaded || !this.data.id) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: this.getHeaders(),
                    body: JSON.stringify(this.data)
                }).catch((e) => console.error("Save error:", e));
            },

            loop() {
                setInterval(() => {
                    const regenAmount = 1 + (this.data.regen_lvl - 1);
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + regenAmount);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 20000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 5;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 30);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${game.getTapPower()}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit).toLocaleString();
                
                let lvl = Math.floor(Math.log10(Math.max(1, d.balance))) + 1;
                document.getElementById('my-lvl').innerText = `LVL ${lvl}`;
                
                const ranks = ["ROOKIE", "PULSE AGENT", "CYBER RUNNER", "NEURAL MASTER", "OVERLORD"];
                document.getElementById('ui-rank').innerText = ranks[Math.min(lvl - 1, 4)];
            },

            pop(e, p) {
                const t = (e.touches && e.touches[0]) || e;
                const d = document.createElement('div');
                d.className = 'pop'; d.innerText = `+${p}`;
                d.style.left = t.clientX+'px'; d.style.top = t.clientY+'px';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 600);
            },

            openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                
                if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-connect-btn"></div><p style="text-align:center;margin-top:10px;">Connect your TON wallet for future airdrops</p>`;
                    setTimeout(() => { if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-btn' }; }, 50);
                }
                
                if(type === 'bonus') {
                    const amount = game.getDailyBonusAmount();
                    b.innerHTML = `<h2>🎁 DAILY SUPPLY</h2><div class="s-box" style="text-align:center"><h1>${amount} NP</h1><p>Reset in 24h</p></div>
                    <button class="m-close" style="background:cyan;color:black;width:100%;margin-top:10px" onclick="game.claimBonus()">INITIALIZE CLAIM</button>`;
                }

                if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 NODES</h2>
                    <div class="s-box" style="word-break:break-all; font-size:12px; padding:10px">${link}</div>
                    <button class="m-close" style="background:white;color:black;width:100%;margin-top:10px" onclick="navigator.clipboard.writeText('${link}'); tg.showAlert('COPIED')">COPY INVITE LINK</button>
                    <p style="text-align:center; font-size:11px; margin-top:10px; color:#888">Get 5,000 NP for each active node connected</p>`;
                }

                if(type === 'tasks') {
                    let html = `<h2>📋 MISSIONS</h2>`;
                    if(game.serverTasks.length === 0) html += `<p style="text-align:center">Scanning for missions...</p>`;
                    game.serverTasks.forEach(t => {
                        html += `<div class="top-item" onclick="game.completeTask(${t.id}, '${t.url}')">
                            <span>${t.title}</span><b>+${t.reward}</b>
                        </div>`;
                    });
                    b.innerHTML = html;
                }

                if(type === 'top') {
                    let html = `<h2>🏆 GLOBAL RANKING</h2>`;
                    game.serverTop.slice(0, 10).forEach((u, i) => {
                        html += `<div class="top-item">
                            <span>${i+1}. ${u.username}</span><b>${Math.floor(u.balance).toLocaleString()}</b>
                        </div>`;
                    });
                    b.innerHTML = html;
                }

                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOSTERS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><span>⚡ Multitap (Lvl ${game.data.tap_lvl})</span><b>${game.getCost('tap')}</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><span>🔋 Capacity (Lvl ${game.data.energy_lvl})</span><b>${game.getCost('energy')}</b></div>
                    <div class="top-item" onclick="game.upgrade('regen')"><span>🔄 Regen (Lvl ${game.data.regen_lvl})</span><b>${game.getCost('regen')}</b></div>`;
                }

                if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ NEURAL MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><span>🧠 Neural Node (Lvl ${game.data.mine_lvl})</span><b>${game.getCost('mine')}</b></div>
                    <p style="text-align:center; font-size:11px; color:cyan; margin-top:10px">Mining generates NP even when terminal is offline</p>`;
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
