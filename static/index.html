<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --circle-bg: rgba(0, 255, 255, 0.03); 
            --circle-border: rgba(0, 255, 255, 0.2);
        }

        /* Прозрачные кружочки (карточки) */
        .up-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--circle-bg);
            border: 1px solid var(--circle-border); 
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 50px; 
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1), inset 0 0 10px rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
            backdrop-filter: blur(3px);
            cursor: pointer;
        }

        .up-card:active {
            transform: scale(0.95);
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--neon-cyan);
        }

        .price {
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .mini-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid var(--neon-cyan); object-fit: cover;
        }

        /* Специальный оверлей для кошелька поверх всего */
        #wallet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 10000; backdrop-filter: blur(15px);
            padding: 20px;
        }
        #wallet-overlay.active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">NEURAL NET LOADING...</div>
        <div id="load-pct">0%</div>
        <div class="load-bar-wrapper"><div id="load-bar" class="load-bar-f"></div></div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="avatar"><img src="images/logo.png" id="u-avatar"></div>
                <div class="u-info"><b id="u-name">Agent</b><small>v4.0.0 Neural Mining</small></div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>TAP</small><b id="tap-val" class="accent-val">+1</b></div>
            <div class="stat-card"><small>PROFIT</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" ontouchstart="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.toggleWalletMenu(true)">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="progress-bar-wrap"><div id="eng-fill" class="progress-bar-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-drag-line"></div>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <div id="wallet-overlay" onclick="if(event.target === this) ui.toggleWalletMenu(false)">
        <div class="modal-content" style="max-width: 400px; border: 1px solid var(--neon-cyan); border-radius: 30px;">
            <div class="modal-header">CONNECT WALLET</div>
            <div id="ton-connect-button" style="display:flex; justify-content:center; margin-bottom: 20px;"></div>
            
            <div class="up-card" onclick="ui.connectTon()">
                <b>TON CONNECT</b>
                <span class="price">AUTO</span>
            </div>

            <p id="wallet-addr" style="color:var(--neon-cyan); font-size:10px; text-align:center; word-break:break-all;"></p>
            
            <button id="dis-btn" class="back-btn" style="display:none; color:red; border-color:red;" onclick="logic.disconnectWallet()">DISCONNECT</button>
            <button class="back-btn" onclick="ui.toggleWalletMenu(false)">BACK</button>
        </div>
    </div>

    <script>
        const logic = {
            user: null,
            async init(id, name, photo) {
                try {
                    const res = await fetch(`/api/user/${id || 12345}?username=${encodeURIComponent(name || 'Agent')}&photo_url=${encodeURIComponent(photo || '')}`);
                    this.user = await res.json();
                } catch (e) {
                    this.user = { balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, lvl: 1 };
                }
                ui.init();
                this.startLoops();
            },
            tap(e) {
                if (!this.user || this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                this.anim(e);
            },
            anim(e) {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                const p = document.createElement('div');
                p.className = 'tap-pop'; p.innerText = `+${this.user.click_lvl}`;
                p.style.left = x+'px'; p.style.top = y+'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            },
            async disconnectWallet() {
                await tonConnectUI.disconnect();
                this.user.wallet = null;
                ui.toggleWalletMenu(false);
            },
            startLoops() {
                setInterval(() => {
                    if (!this.user) return;
                    if (this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.5);
                    ui.update();
                }, 1000);
            }
        };

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        const ui = {
            init() { this.update(); this.finishLoading(); },
            finishLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 5; document.getElementById('load-pct').innerText = p+'%';
                    document.getElementById('load-bar').style.width = p+'%';
                    if(p>=100){ clearInterval(iv); document.getElementById('loading-screen').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 30);
            },
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                document.getElementById('u-name').innerText = logic.user.username || 'Agent';
                document.getElementById('u-lvl').innerText = 'LVL ' + (logic.user.lvl || 1);
                
                const addr = logic.user.wallet;
                document.getElementById('wallet-addr').innerText = addr ? addr : "";
                document.getElementById('dis-btn').style.display = addr ? "block" : "none";
            },
            toggleWalletMenu(show) {
                const el = document.getElementById('wallet-overlay');
                show ? el.classList.add('active') : el.classList.remove('active');
            },
            async connectTon() {
                await tonConnectUI.openModal();
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const header = document.getElementById('modal-header');
                header.innerText = type.toUpperCase();
                
                if (type === 'boost') {
                    body.innerHTML = `
                        <div class="up-card" onclick="logic.buyUpgrade('tap')"><b>Multi-Tap</b><span class="price">💰 5k</span></div>
                        <div class="up-card" onclick="logic.buyUpgrade('energy')"><b>Energy Cap</b><span class="price">💰 10k</span></div>`;
                } else if (type === 'top') {
                    body.innerHTML = '<p style="text-align:center">Loading Leaders...</p>';
                } else {
                    body.innerHTML = '<p style="text-align:center; opacity:0.5">Access Denied</p>';
                }
                document.getElementById('modal-container').classList.add('active');
            },
            closeM() { document.getElementById('modal-container').classList.remove('active'); }
        };

        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.expand();
            const u = tg.initDataUnsafe?.user || {};
            logic.init(u.id, u.username || u.first_name, u.photo_url);
        };
    </script>
</body>
</html>
