<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.0 "Quantum Surge"</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">INITIALIZING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>QUANTUM TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>NEURAL PROFIT</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 NODES</button>
                <button onclick="ui.openM('bonus')">🎁 UPLINK</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 UPGRADE</button>
                <button onclick="ui.openM('mine')">⛏️ EXTRACT</button>
                <button onclick="ui.openM('tasks')">📋 MISSIONS</button>
                <button onclick="ui.openM('top')">🏆 RANK</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">TERMINATE SESSION</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const ADMIN_WALLET = "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI";
        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, balance: 0, energy: 1000, max_energy: 1000, 
                tap_lvl: 1, mine_lvl: 1, profit: 0, last_bonus: 0, 
                auto_click_until: 0, total_taps: 0 
            },
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, first_name: 'Agent' };
                const name = (u.username || u.first_name).toUpperCase();
                
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });
                } catch(err) { console.error(err); }

                try {
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}&photo_url=${encodeURIComponent(u.photo_url || '')}`);
                    if (r.ok) {
                        const d = await r.json();
                        Object.assign(this.data, d);
                    }
                } catch(e) { this.data.id = u.id; } finally {
                    document.getElementById('my-name').innerText = name;
                    if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                    this.isLoaded = true;
                    this.loop();
                }
            },

            // --- МАТЕМАТИЧЕСКИЙ ДВИЖОК ---
            getTapPower() {
                return Math.floor((1 * Math.pow(1.18, this.data.tap_lvl - 1)) + (this.data.mine_lvl * 0.8));
            },

            getUpgradeCost(type) {
                if (type === 'tap') return Math.floor(450 * Math.pow(1.75, this.data.tap_lvl - 1));
                if (type === 'mine') return Math.floor(1600 * Math.pow(1.65, this.data.mine_lvl - 1));
                return 0;
            },

            async payTon(amount, title) {
                if (!tonConnectUI?.connected) return tg.showAlert("Подключите кошелек!");
                try {
                    await tonConnectUI.sendTransaction({
                        validUntil: Math.floor(Date.now()/1000)+300,
                        messages: [{ address: ADMIN_WALLET, amount: (amount * 1e9).toString() }]
                    });
                    this.data.profit += 5000;
                    tg.showAlert("Elite Satellite Online: +5,000 NP/h");
                    ui.render();
                    this.save();
                } catch(e) { tg.showAlert("Transaction Cancelled"); }
            },

            tap(e) {
                let power = this.getTapPower();
                if(!this.isLoaded || this.data.energy < power) return;

                // КВАНТОВЫЙ СКАЧОК (Крит 5%)
                const isCrit = Math.random() < 0.05;
                if (isCrit) {
                    power *= 10;
                    tg.HapticFeedback.notificationOccurred('warning');
                } else {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                this.data.balance += power;
                this.data.energy -= this.getTapPower(); // Энергия тратится как за 1 обычный тап
                this.data.total_taps++;
                ui.render();
                ui.pop(e, power, isCrit);
            },

            upgrade(type) {
                let cost = (type === 'tap' || type === 'mine') ? this.getUpgradeCost(type) : 
                           (type === 'energy' ? 8000 : 50000);

                if (this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if (type === 'tap') this.data.tap_lvl++;
                    else if (type === 'mine') {
                        this.data.mine_lvl++;
                        this.data.profit = Math.floor(300 * Math.pow(1.48, this.data.mine_lvl - 1));
                    }
                    else if (type === 'energy') {
                        this.data.max_energy += 1000;
                        this.data.energy = this.data.max_energy;
                    }
                    else if (type === 'autoclick') {
                        this.data.auto_click_until = Date.now() + 86400000;
                    }

                    tg.HapticFeedback.notificationOccurred('success');
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                    this.save();
                } else {
                    tg.showAlert("LACK OF NP CURRENCY");
                }
            },

            claimBonus() {
                const now = Date.now();
                if (now - this.data.last_bonus > 86400000) {
                    this.data.balance += 5000;
                    this.data.last_bonus = now;
                    tg.showAlert("Uplink successful: +5,000 NP");
                    ui.render(); ui.closeM();
                    this.save();
                } else tg.showAlert("Uplink unavailable. Retry in 24h.");
            },

            loop() {
                setInterval(() => {
                    // Процентная регенерация (0.6% от макса)
                    const regen = Math.max(6, Math.floor(this.data.max_energy * 0.006));
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + regen);
                    
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    
                    // Улучшенный автокликер
                    if (this.data.auto_click_until > Date.now()) {
                        const p = this.getTapPower();
                        if (this.data.energy >= p) {
                            this.data.balance += p;
                            this.data.energy -= p;
                        }
                    }
                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 15000);
            },

            async save() {
                if(!this.isLoaded) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: this.data.id, ...this.data })
                }).catch(() => {});
            }
        };

        const ui = {
            shortAddr(addr) { return addr ? addr.slice(0, 4) + '...' + addr.slice(-4) : ''; },
            
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 5;
                    document.getElementById('pct').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                    if(p >= 100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; this.render(); }
                }, 30);
            },

            render() {
                const d = game.data;
                const pwr = game.getTapPower();
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${pwr.toLocaleString()}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit).toLocaleString();
                
                // Ранговая система на логарифмах
                const lvl = Math.floor(Math.log2(d.balance / 500 + 1)) + 1;
                document.getElementById('my-lvl').innerText = `NODE ${lvl}`;
                const ranks = ["GHOST", "NEOPHYTE", "OPERATOR", "CYPHER", "ARCHITECT", "OVERLORD", "ENTITY"];
                document.getElementById('ui-rank').innerText = ranks[Math.min(ranks.length-1, Math.floor(lvl/5))];
            },

            pop(e, pwr, isCrit) {
                const t = e.touches ? e.touches[0] : e;
                const p = document.createElement('div');
                p.className = 'pop' + (isCrit ? ' crit' : '');
                p.innerText = (isCrit ? '⚡ SURGE ' : '+') + Math.floor(pwr);
                p.style.left = t.clientX+'px'; p.style.top = t.clientY+'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = '';
                
                if(type === 'wallet') {
                    const isConn = tonConnectUI && tonConnectUI.connected;
                    b.innerHTML = `<h2>👛 CRYPTO HUB</h2><div id="ton-connect-btn" style="display:flex;justify-content:center;margin:20px 0;"></div>
                        ${isConn ? `<button onclick="tonConnectUI.disconnect()" class="m-close" style="background:#ff4444;position:static;width:100%;border:none;">DISCONNECT</button>` : ''}`;
                    if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-btn' };
                } 
                else if(type === 'boost') {
                    const autoActive = game.data.auto_click_until > Date.now();
                    b.innerHTML = `<h2>🚀 ENHANCEMENTS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')">
                        <div class="t-user"><b>⚡</b><span>Quantum Tap (Lvl ${game.data.tap_lvl})</span></div>
                        <b>${game.getUpgradeCost('tap').toLocaleString()} NP</b>
                    </div>
                    <div class="top-item" onclick="game.upgrade('energy')">
                        <div class="t-user"><b>🔋</b><span>Expand Core (+1000 E)</span></div>
                        <b>8,000 NP</b>
                    </div>
                    <div class="top-item" onclick="game.upgrade('autoclick')">
                        <div class="t-user"><b>🤖</b><span>Neural Bot (24h) ${autoActive ? '✅' : ''}</span></div>
                        <b>50,000 NP</b>
                    </div>`;
                } 
                else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ EXTRACTION</h2>
                    <div class="top-item" onclick="game.upgrade('mine')">
                        <div class="t-user"><b>🧠</b><span>Neural Node (Lvl ${game.data.mine_lvl})</span></div>
                        <b>${game.getUpgradeCost('mine').toLocaleString()} NP</b>
                    </div>
                    <div class="top-item" onclick="game.payTon(0.5, 'Elite Satellite')">
                        <div class="t-user"><b>🛰️</b><span>Elite Satellite (+5k/h)</span></div>
                        <b>0.5 TON</b>
                    </div>`;
                }
                else if(type === 'top') {
                    b.innerHTML = `<h2>🏆 GLOBAL NODES</h2><div id="top-list" style="max-height:400px; overflow-y:auto;">Loading Ranking...</div>`;
                    fetch('/api/top').then(r=>r.json()).then(list => {
                        let h = '';
                        // Сортировка по Балансу + часовому доходу (умный рейтинг)
                        list.sort((x, y) => (y.balance + y.profit*10) - (x.balance + x.profit*10));
                        list.slice(0, 50).forEach((u, i) => {
                            const isMe = u.id == game.data.id ? 'style="background:rgba(0,255,255,0.1); border:1px solid #00FFFF;"' : '';
                            h += `<div class="top-item" ${isMe}>
                                <div class="t-user"><b>#${i+1}</b><img src="${u.photo_url || 'images/logo.png'}" style="width:24px;height:24px;border-radius:50%;margin:0 8px;"><span>${u.username}</span></div>
                                <div style="text-align:right"><b>${Math.floor(u.balance).toLocaleString()}</b><br><small style="color:#00FFFF">+${u.profit}/h</small></div>
                            </div>`;
                        });
                        document.getElementById('top-list').innerHTML = h;
                    });
                }
                else if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 NODES</h2><button onclick="tg.openTelegramLink('https://t.me/share/url?url=${link}')" style="width:100%;padding:15px;background:#00FFFF;color:#000;border-radius:12px;font-weight:bold;">INVITE NEW NODE</button>`;
                }
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 UPLINK DATA</h2><button onclick="game.claimBonus()" style="width:100%;padding:15px;background:#00FFFF;color:#000;border-radius:12px;font-weight:900;">DOWNLOAD 5,000 NP</button>`;
                }
                else if(type === 'tasks') {
                    b.innerHTML = `<h2>📋 MISSIONS</h2>
                    <div class="top-item" onclick="tg.openLink('https://t.me/your_channel')"><div class="t-user"><b>📢</b><span>Subscribe News</span></div><b>+5k NP</b></div>`;
                }
            },
            closeM() { document.getElementById('modal').classList.remove('active'); }
        };
        window.onload = () => game.init();
    </script>
    
    <style>
        .pop.crit { 
            color: #FFD700 !important; 
            text-shadow: 0 0 15px #FFD700; 
            font-weight: 900; 
            scale: 1.5;
            z-index: 1000;
        }
    </style>
</body>
</html>
