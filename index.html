<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00d4ff; --bg-dark: #050a1a; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background: url('/static/images/images.jpeg') no-repeat center center;
            background-size: cover;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif; color: white;
            overflow: hidden;
        }

        /* Главный контейнер-рамка (unnamed1.jpg) */
        .game-container {
            position: relative;
            width: 95vw;
            height: 90vh;
            max-width: 500px;
            background: url('/static/images/unnamed1.jpg') no-repeat center center;
            background-size: 100% 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Шапка с названием и уровнем */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 10px;
        }

        /* Баланс */
        .balance-container {
            text-align: center;
            margin-top: 20px;
            z-index: 5;
        }
        #score {
            font-size: 42px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        /* Центральная область с роботом */
        .clicker-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #btn {
            width: 240px;
            height: 240px;
            background: url('/static/images/unnamed3.jpg') no-repeat center center;
            background-size: contain;
            border: none;
            outline: none;
            cursor: pointer;
            z-index: 10;
            background-color: transparent;
            filter: drop-shadow(0 0 20px var(--neon));
            transition: transform 0.05s;
        }
        #btn:active { transform: scale(0.95); }

        /* Боковые кнопки (Connect, Referrals и т.д.) */
        .side-menu {
            position: absolute;
            right: 10px;
            top: 25%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
        }

        .side-btn {
            width: 110px;
            height: 40px;
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid var(--neon);
            border-radius: 8px;
            color: white;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Нижнее меню (Upgrade, Events) */
        .bottom-menu {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
            z-index: 20;
        }

        .bottom-btn {
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 9px;
            backdrop-filter: blur(10px);
        }

        /* Энергия */
        .energy-bar {
            width: 80%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 150, 0.5);
        }
        .energy-fill {
            width: 87%;
            height: 100%;
            background: linear-gradient(90deg, #00ff96, #00d4ff);
        }

        .plus-animation {
            position: absolute;
            color: var(--neon);
            font-size: 30px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <span>🛡️ PRO / AUSS</span>
            <span>🏆 Level 10</span>
        </div>

        <div class="balance-container">
            <div style="color: #aaa; font-size: 12px; letter-spacing: 2px;">NEURAL PULSE AI</div>
            <div id="score">0</div>
        </div>

        <div class="side-menu">
            <button class="side-btn">💳 Connect</button>
            <button class="side-btn">👥 Referrals</button>
            <button class="side-btn">⚙️ Settings</button>
            <button class="side-btn">❓ Support</button>
        </div>

        <div class="clicker-area">
            <button id="btn"></button>
        </div>

        <div style="font-size: 10px; margin-bottom: 5px;">ENERGY: 875 / 1000</div>
        <div class="energy-bar">
            <div class="energy-fill"></div>
        </div>

        <div class="bottom-menu">
            <div class="bottom-btn">🚀<br>UPGRADE</div>
            <div class="bottom-btn">💎<br>EVENTS</div>
            <div class="bottom-btn">🏆<br>TASKS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || 999;
        let score = 0;
        let pendingClicks = 0;
        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('btn');

        async function loadData() {
            try {
                const r = await fetch(`/api/get_balance/${userId}`);
                const d = await r.json();
                score = d.balance || 0;
                scoreEl.textContent = score.toLocaleString();
            } catch (e) { console.error(e); }
        }

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            pendingClicks++;
            scoreEl.textContent = score.toLocaleString();

            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.textContent = '+1';
            p.style.left = `${touch.pageX}px`;
            p.style.top = `${touch.pageY}px`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        setInterval(async () => {
            if (pendingClicks > 0) {
                const s = pendingClicks;
                pendingClicks = 0;
                await fetch('/api/save_clicks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId, clicks: s })
                });
            }
        }, 2000);

        loadData();
        tg.ready();
    </script>
</body>
</html>
