<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Online</title>
    <link rel="icon" href="data:,">
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; --neon-purp: #b026ff; --neon-green: #00ffcc; 
            --bg: #050a1a; --dark-white: #e0e0e0;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Orbitron', sans-serif; 
            color: white; overflow: hidden; touch-action: manipulation; 
        }
        
        /* Лоадер */
        #reloading-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s;
        }
        .loader-node { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 3px solid transparent; border-top-color: var(--neon-purp);
            border-bottom-color: var(--neon-blue); animation: spin 1.5s linear infinite;
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .game-container { 
            display: none; opacity: 0; width: 100%; max-width: 500px; height: 100vh; 
            flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; 
            transition: 0.5s; margin: 0 auto; 
        }
        .game-container.visible { display: flex; opacity: 1; }

        /* Элементы интерфейса */
        .header-top { width: 100%; display: flex; align-items: center; gap: 12px; }
        .ai-icon-small { 
            width: 48px; height: 48px; border: 2px solid var(--neon-purp); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            background: rgba(176, 38, 255, 0.1); font-size: 20px;
        }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
        #league-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: 0.5s; }

        #score { font-size: 40px; font-weight: 900; margin: 15px 0 5px; text-shadow: 0 0 20px var(--neon-blue); white-space: nowrap; }
        #ton-connect-wrapper { margin-bottom: 10px; transform: scale(0.85); }

        /* Кнопка тапа */
        .game-main { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #tap-btn { 
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, #1e1e3f 0%, #050a1a 100%);
            border: 4px solid var(--dark-white); display: flex; align-items: center; justify-content: center;
            font-size: 80px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent; cursor: pointer; outline: none;
        }
        #tap-btn::after { content: '🧠'; }
        #tap-btn:active { transform: scale(0.92); border-color: var(--neon-blue); }

        .energy-bar-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid var(--neon-blue); overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: 0.1s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-bottom: 15px; }
        .nav-link { 
            background: rgba(255,255,255,0.05); padding: 10px 2px; border-radius: 12px; 
            text-align: center; font-size: 9px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase; cursor: pointer; color: white;
        }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(5, 10, 26, 0.98);
            z-index: 1000; padding: 20px; flex-direction: column; align-items: center;
        }
        .modal.active { display: flex; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--neon-purp); cursor: pointer; }

        .floating-text { 
            position: absolute; pointer-events: none; font-weight: 900; font-size: 32px; 
            color: white; animation: floatUp 0.8s forwards; z-index: 100; text-shadow: 0 0 10px var(--neon-blue); 
        }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-120px) scale(1.2); } 
        }
    </style>
</head>
<body>

<div id="reloading-screen">
    <div class="loader-node">
        <div style="width: 40px; height: 40px; background: var(--dark-white); border-radius: 10px;"></div>
    </div>
    <div id="boot-text" style="color: var(--dark-white); font-weight: 900; letter-spacing: 3px; font-size: 10px;">INITIALIZING CORE...</div>
</div>

<div id="mine-modal" class="modal"><div class="close-modal" id="close-mine">✖</div><h2 style="color: var(--neon-blue); margin-top: 40px;">MINING</h2><div id="card-container" style="width:100%"></div></div>
<div id="friends-modal" class="modal">
    <div class="close-modal" id="close-friends">✖</div>
    <h2 style="color: var(--neon-blue); margin-top: 40px;">FRIENDS</h2>
    <div id="ref-link" style="font-size: 10px; color: var(--neon-green); margin: 20px 0; word-break: break-all; border: 1px solid; padding: 10px;"></div>
    <button class="nav-link" id="copy-ref" style="width: 100%; color: white;">COPY LINK</button>
</div>

<div class="game-container" id="main-container">
    <div class="header-top">
        <div class="ai-icon-small">🧠</div>
        <div style="flex-grow:1">
            <div style="display:flex; justify-content: space-between; font-size: 10px;">
                <span id="league-name">NEURAL AGENT</span>
                <span id="display-level">LVL 1</span>
            </div>
            <div class="league-bar"><div id="league-fill"></div></div>
        </div>
    </div>

    <div id="score">0.00</div>
    <div id="ton-connect-wrapper"></div>
    <div id="pnl-display" style="color: var(--neon-green); font-size: 11px; margin-bottom: 10px;">PROFIT: +0/hr</div>

    <div class="game-main">
        <button id="tap-btn"></button>
    </div>

    <div class="energy-box" style="width:100%; margin-bottom: 15px;">
        <div style="display:flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px;">
            <span>⚡ ENERGY</span>
            <span id="energy-text">0/0</span>
        </div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" id="btn-mine">⛏️ Mine</div>
        <div class="nav-link" id="btn-tasks">📝 Tasks</div>
        <div class="nav-link" id="btn-friends">👥 Friends</div>
        <div class="nav-link" id="btn-boost">🚀 Boost</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // Защита: если за 10 сек ничего не произошло, пробуем обновить
    const duckCheck = setTimeout(() => {
        if (!document.getElementById('main-container').classList.contains('visible')) {
            console.log("Slow connection, retrying...");
        }
    }, 10000);

    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://np.bothost.ru/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-wrapper'
    });

    let state = {
        score: 0, energy: 1000, max_energy: 1000, 
        tap_power: 1, pnl: 0, user_id: String(tg.initDataUnsafe?.user?.id || '476014374')
    };

    async function init() {
        const bootText = document.getElementById('boot-text');
        try {
            // ШАГ 1: Проверяем физическую готовность сервера (main.py)
            bootText.innerText = "WAITING FOR SERVER...";
            const health = await fetch(`/api/health?t=${Date.now()}`);
            
            if (health.status !== 200) {
                // Сервер ответил 503 или загружается, ждем и пробуем снова
                setTimeout(init, 2000);
                return;
            }

            // ШАГ 2: Только если сервер готов, грузим данные
            bootText.innerText = "SYNCING NEURAL DATA...";
            const r = await fetch(`/api/balance/${state.user_id}?t=${Date.now()}`);
            const res = await r.json();
            
            if(res.status === 'ok') {
                state = {...state, ...res.data};
                render();
                hideLoader();
                clearTimeout(duckCheck);
            }
        } catch(e) {
            bootText.innerText = "NETWORK ERROR. RETRYING...";
            setTimeout(init, 2500); 
        }
    }

    function hideLoader() {
        const loader = document.getElementById('reloading-screen');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
            document.getElementById('main-container').classList.add('visible');
        }, 500);
    }

    function render() {
        document.getElementById('score').innerText = state.score.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        
        const progress = (state.score % 50000) / 50000 * 100;
        document.getElementById('league-fill').style.width = progress + '%';
    }

    async function saveData() {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(state)
            });
        } catch(e) {}
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy < state.tap_power) return;
        
        state.score += state.tap_power; 
        state.energy -= state.tap_power;
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        const touch = e.changedTouches[0];
        createFlyText(touch.clientX, touch.clientY, `+${state.tap_power}`);
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    document.getElementById('btn-friends').onclick = () => {
        document.getElementById('ref-link').innerText = `https://t.me/UltraMind_AI_bot?start=${state.user_id}`;
        document.getElementById('friends-modal').classList.add('active');
    };

    document.getElementById('copy-ref').onclick = () => {
        const link = document.getElementById('ref-link').innerText;
        navigator.clipboard.writeText(link).then(() => tg.showAlert("Link copied!"));
    };

    document.querySelectorAll('.close-modal').forEach(btn => {
        btn.onclick = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    });

    // Плавный цикл обновления (100 FPS)
    setInterval(() => {
        state.energy = Math.min(state.max_energy, state.energy + 0.015);
        if(state.pnl > 0) {
            state.score += (state.pnl / 360000);
        }
        render();
    }, 10); 

    setInterval(saveData, 15000);
    window.onload = init;
</script>
</body>
</html>
