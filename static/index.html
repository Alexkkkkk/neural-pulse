<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.8.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        #app { display: none; height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; }

        /* HEADER & STATS */
        .u-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .lvl-tag { background: var(--cyan); color: #000; padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 14px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 10px; }
        .stat-label { font-size: 10px; color: #555; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        .stat-val { font-size: 16px; font-weight: 900; color: var(--cyan); }

        .balance { font-size: 72px; font-weight: 900; margin: 20px 0; letter-spacing: -2px; }

        /* PLAY AREA */
        .play-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-ai { width: 240px; filter: drop-shadow(0 0 40px var(--purple)); transition: transform 0.05s; cursor: pointer; }
        
        .side-menu { position: absolute; right: 0; display: flex; flex-direction: column; gap: 12px; }
        .side-btn { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 15px; width: 100px; font-size: 11px; font-weight: 900; color: #fff; text-align: left; display: flex; align-items: center; gap: 8px; }

        /* ENERGY */
        .eng-box { width: 100%; margin-top: auto; padding-bottom: 20px; }
        .eng-meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; color: #555; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); width: 100%; transition: width 0.3s; }

        /* FOOTER */
        .footer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-bottom: 10px; }
        .f-btn { background: var(--card); border: 1px solid var(--border); padding: 18px 0; border-radius: 15px; font-size: 10px; font-weight: 900; color: #fff; text-transform: uppercase; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; padding: 30px 20px; }
        .m-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; font-size: 32px; font-weight: 900; text-align: left; }
        .m-content { flex: 1; overflow-y: auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .b-btn { background: var(--cyan); color: #000; padding: 12px 18px; border-radius: 12px; font-weight: 900; border: none; font-size: 13px; }
        .btn-back { background: #fff; color: #000; padding: 20px; border-radius: 18px; font-weight: 900; border: none; margin-top: auto; width: 100%; }
        
        /* Floating Text */
        .float { position: fixed; pointer-events: none; color: var(--cyan); font-weight: 900; font-size: 28px; animation: floatUp 0.7s forwards; z-index: 2000; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<div id="app">
    <div class="u-card">
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="u-ava" style="width:44px; height:44px; border-radius:12px; background:#111; border:1px solid var(--cyan); overflow:hidden;"></div>
            <div style="text-align:left;"><b id="u-name">Agent</b><br><small style="color:var(--cyan); font-size:9px;">v3.8.0 Neural Mining</small></div>
        </div>
        <div class="lvl-tag" id="u-lvl">LVL 1</div>
    </div>

    <div class="stat-grid">
        <div class="stat-item">
            <div class="stat-label">Earn per tap</div>
            <div class="stat-val" id="stat-tap">+1</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Profit per hour</div>
            <div class="stat-val" id="stat-profit">0</div>
        </div>
    </div>

    <div class="balance" id="balance">0</div>

    <div class="play-area">
        <img src="./logo.png" class="main-ai" id="tap-target" onpointerdown="tap(event)">
        <div class="side-menu">
            <div class="side-btn" onclick="openM('wallet')">👛 WALLET</div>
            <div class="side-btn" onclick="openM('friends')">🤝 FRIENDS</div>
            <div class="side-btn" onclick="openM('bonus')">🎁 BONUS</div>
        </div>
    </div>

    <div class="eng-box">
        <div class="eng-meta"><span>ENERGY</span><span id="eng-txt">1000/1000</span></div>
        <div class="bar-bg"><div class="bar-fill" id="eng-bar"></div></div>
    </div>

    <div class="footer">
        <div class="f-btn" onclick="openM('boost')">🚀 BOOST</div>
        <div class="f-btn" onclick="openM('mine')">⛏️ MINE</div>
        <div class="f-btn" onclick="openM('tasks')">📋 TASKS</div>
        <div class="f-btn" onclick="openM('top')">🏆 TOP</div>
    </div>
</div>

<div id="m-mine" class="modal">
    <div class="m-header">⛏️ MINE</div>
    <div class="m-content">
        <div class="card">
            <div style="text-align:left;"><b>Neural Node</b><br><small>Profit: +50/hr</small></div>
            <button class="b-btn" onclick="buy('node', 0.1)">0.1 TON</button>
        </div>
        <div class="card">
            <div style="text-align:left;"><b>Quantum GPU</b><br><small>Profit: +250/hr</small></div>
            <button class="b-btn" onclick="buy('gpu', 0.5)">0.5 TON</button>
        </div>
    </div>
    <button class="btn-back" onclick="closeM()">BACK</button>
</div>

<div id="m-boost" class="modal">
    <div class="m-header">🚀 BOOST</div>
    <div class="m-content">
        <div class="card">
            <div style="text-align:left;"><b>Multitap</b><br><small>+1 per click</small></div>
            <button class="b-btn" onclick="buy('tap', 0.05)">0.05 TON</button>
        </div>
        <div class="card">
            <div style="text-align:left;"><b>Energy Cap</b><br><small>+500 limit</small></div>
            <button class="b-btn" onclick="buy('cap', 0.05)">0.05 TON</button>
        </div>
    </div>
    <button class="btn-back" onclick="closeM()">BACK</button>
</div>

<div id="m-wallet" class="modal">
    <div class="m-header">👛 WALLET</div>
    <div id="ton-connect" style="margin-top:20px;"></div>
    <button class="btn-back" onclick="closeM()">BACK</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_WALLET = "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI";
    const tonUI = new TON_CONNECT_UI.TonConnectUI({ 
        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    let s = { 
        id: tg.initDataUnsafe?.user?.id || "0",
        bal: 0, lvl: 1, eng: 1000, max: 1000, profit: 0,
        name: tg.initDataUnsafe?.user?.first_name || "Agent",
        ava: tg.initDataUnsafe?.user?.photo_url || ""
    };

    async function load() {
        const r = await fetch(`/api/user/${s.id}?name=${s.name}&photo=${s.ava}`);
        const d = await r.json();
        s.bal = Number(d.balance); s.lvl = d.click_lvl; s.profit = Number(d.profit_hr);
        s.eng = d.energy; s.max = d.max_energy;
        upd();
        document.getElementById('app').style.display = 'flex';
    }

    async function buy(type, price) {
        if(!tonUI.connected) return tg.showAlert("Connect wallet!");
        
        try {
            await tonUI.sendTransaction({
                validUntil: Math.floor(Date.now()/1000)+600,
                messages: [{ address: MY_WALLET, amount: (price * 1e9).toString() }]
            });
            
            if(type === 'node') s.profit += 50;
            if(type === 'gpu') s.profit += 250;
            if(type === 'tap') s.lvl++;
            if(type === 'cap') { s.max += 500; s.eng = s.max; }
            
            tg.showAlert("Upgrade Active!");
            upd(); save();
        } catch(e) { tg.showAlert("Transaction failed"); }
    }

    function tap(e) {
        if(s.eng < s.lvl) return;
        s.bal += s.lvl; s.eng -= s.lvl;
        createFloat(e, `+${s.lvl}`);
        tg.HapticFeedback.impactOccurred('light');
        upd();
    }

    function createFloat(e, txt) {
        const f = document.createElement('div');
        f.className = 'float';
        f.innerText = txt;
        f.style.left = `${e.clientX || e.touches[0].clientX}px`;
        f.style.top = `${e.clientY || e.touches[0].clientY}px`;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 700);
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('stat-tap').innerText = `+${s.lvl}`;
        document.getElementById('stat-profit').innerText = Math.floor(s.profit).toLocaleString();
        document.getElementById('u-lvl').innerText = `LVL ${Math.floor(s.bal/5000) + 1}`;
        document.getElementById('eng-txt').innerText = `${s.eng}/${s.max}`;
        document.getElementById('eng-bar').style.width = `${(s.eng/s.max)*100}%`;
        if(s.ava) document.getElementById('u-ava').innerHTML = `<img src="${s.ava}" style="width:100%">`;
    }

    function save() {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: s.id, balance: s.bal, energy: s.eng, max_energy: s.max, click_lvl: s.lvl, profit_hr: s.profit })
        });
    }

    function openM(id) { document.getElementById('m-'+id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // Пассивный доход и реген энергии
    setInterval(() => {
        s.bal += s.profit / 3600;
        if(s.eng < s.max) s.eng = Math.min(s.max, s.eng + 1);
        upd();
    }, 1000);

    setInterval(save, 10000);
    load();
</script>
</body>
</html>
