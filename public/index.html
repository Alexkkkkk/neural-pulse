<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.8.9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --card: #111; --btn: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }

        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .load-circle { width: 220px; height: 220px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--cyan); border-right: 2px solid var(--purple); display: flex; align-items: center; justify-content: center; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .load-logo { width: 100px; }

        .header { width: 90%; margin-top: 20px; background: #080808; border: 1px solid #1a1a1a; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--cyan); overflow: hidden; }
        .u-det { display: flex; flex-direction: column; }
        .u-name { font-weight: bold; font-size: 14px; }
        .u-ver { font-size: 10px; color: var(--cyan); }
        .lvl-badge { background: var(--cyan); color: black; font-weight: 900; padding: 5px 12px; border-radius: 8px; font-size: 14px; }

        .balance { font-size: 54px; font-weight: 800; margin-top: 20px; text-align: center; line-height: 1; }
        .pnl-badge { font-size: 14px; color: var(--purple); font-weight: bold; margin-top: 5px; }
        
        .stage { flex-grow: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        .main-ai { width: 200px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 20px rgba(188, 19, 254, 0.3)); z-index: 5; }
        .main-ai:active { transform: scale(0.95); }

        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .side-btn { background: var(--btn); border: 1px solid #222; color: white; width: 100px; padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: bold; text-align: center; text-transform: uppercase; cursor: pointer; }

        .energy-box { width: 90%; margin-bottom: 20px; }
        .e-info { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        .e-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        .e-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }

        .bottom-nav { width: 90%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 30px; }
        .nav-item { background: var(--btn); border: 1px solid #222; border-radius: 12px; padding: 15px 0; text-align: center; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 25px; }
        /* Исправление для Wallet: позволяем модальному окну не блокировать попапы библиотеки */
        #wal-m { z-index: 4999; } 
        
        .m-title { font-size: 28px; font-weight: 800; color: var(--cyan); margin-bottom: 20px; text-transform: uppercase; }
        .m-close { margin-top: auto; background: #111; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; border: 1px solid #222; cursor: pointer; }
        
        .list-item { background: var(--btn); border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--cyan); color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        .buy-btn:disabled { background: #333; color: #666; }

        /* Специальный контейнер для кнопки подключения */
        #ton-connect-wrapper { display: flex; justify-content: center; margin: 30px 0; min-height: 40px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="load-circle"><img src="logo.png" class="load-logo"></div>
    <div style="margin-top:25px; font-weight:bold; letter-spacing:2px">SYNCHRONIZING</div>
    <div id="p-txt" style="font-size:24px; color:var(--cyan); margin-top:10px">0%</div>
</div>

<div class="header">
    <div class="user-info">
        <div class="avatar"><img src="images/logo.png" style="width:100%"></div>
        <div class="u-det">
            <span class="u-name" id="u-nm">Neural Player</span>
            <span class="u-ver">v1.8.9 Node</span>
        </div>
    </div>
    <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
</div>

<div class="balance" id="b-v">0</div>
<div class="pnl-badge" style="text-align:center">+<span id="p-v">0</span> / sec</div>

<div class="stage">
    <img src="logo.png" class="main-ai" onclick="doTap()">
    <div class="side-menu">
        <div class="side-btn" onclick="openM('wal-m')">Wallet</div>
        <div class="side-btn" onclick="openM('fr-m')">Friends</div>
        <div class="side-btn" onclick="openM('bn-m')">Bonus</div>
    </div>
</div>

<div class="energy-box">
    <div class="e-info"><span>Energy</span><span id="e-val">1000/1000</span></div>
    <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="openBoost()">Boost</div>
    <div class="nav-item" onclick="openMine()">Mine</div>
    <div class="nav-item" onclick="openTasks()">Tasks</div>
    <div class="nav-item" onclick="openTop()">Top</div>
</div>

<div id="wal-m" class="modal">
    <div class="m-title">Wallet</div>
    <div id="ton-connect-wrapper">
        <div id="ton-connect"></div>
    </div>
    <div class="list-item" style="flex-direction:column; align-items:flex-start">
        <span style="font-size:10px; color:#555; text-transform:uppercase">Address:</span>
        <div id="w-addr" style="font-size:11px; color:var(--cyan); word-break:all; margin-top:5px">Not connected</div>
    </div>
    <div class="m-close" onclick="closeM('wal-m')">Back</div>
</div>

<div id="bs-m" class="modal"><div class="m-title">Boost</div><div id="boost-list"></div><div class="m-close" onclick="closeM('bs-m')">Back</div></div>
<div id="mi-m" class="modal"><div class="m-title">Mine</div><div id="mine-list"></div><div class="m-close" onclick="closeM('mi-m')">Back</div></div>
<div id="tp-m" class="modal"><div class="m-title">Top Players</div><div id="top-list"></div><div class="m-close" onclick="closeM('tp-m')">Back</div></div>
<div id="fr-m" class="modal"><div class="m-title">Friends</div><div class="m-close" onclick="closeM('fr-m')">Back</div></div>
<div id="bn-m" class="modal"><div class="m-title">Bonus</div><div class="m-close" onclick="closeM('bn-m')">Back</div></div>
<div id="ta-m" class="modal"><div class="m-title">Tasks</div><div class="m-close" onclick="closeM('ta-m')">Back</div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let tonConnectUI;
    let s = { 
        uid: tg.initDataUnsafe?.user?.id || '0', 
        name: tg.initDataUnsafe?.user?.first_name || 'Neural Player',
        bal: 0, lvl: 1, eng: 1000, maxE: 1000, pnl: 0, wal: null 
    };

    let p = 0;
    const lIv = setInterval(() => {
        p += 5; document.getElementById('p-txt').innerText = p + '%';
        if(p >= 100) { clearInterval(lIv); document.getElementById('loader').style.display='none'; init(); }
    }, 30);

    async function init() {
        document.getElementById('u-nm').innerText = s.name;
        
        // Инициализация TON Connect
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                s.wal = wallet.account.address;
                document.getElementById('w-addr').innerText = s.wal;
                save();
            } else {
                s.wal = null;
                document.getElementById('w-addr').innerText = "Not connected";
                save();
            }
        });

        await load();
    }

    async function load() {
        try {
            const r = await fetch(`/api/user/${s.uid}?name=${encodeURIComponent(s.name)}`);
            const d = await r.json();
            s.bal = Number(d.balance); s.lvl = Number(d.click_lvl);
            s.eng = Number(d.energy); s.maxE = Number(d.max_energy);
            s.pnl = Number(d.pnl); s.wal = d.wallet_address;
            upd();
            setInterval(tick, 1000);
            setInterval(save, 5000);
        } catch(e) { console.error("Sync Error"); }
    }

    function doTap() {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('light');
            upd();
        }
    }

    function tick() {
        if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 3);
        if(s.pnl > 0) s.bal += (s.pnl / 1); 
        upd();
    }

    function upd() {
        document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('p-v').innerText = s.pnl.toLocaleString();
        document.getElementById('u-lv').innerText = s.lvl;
        document.getElementById('e-val').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
        document.getElementById('e-f').style.width = (s.eng / s.maxE * 100) + '%';
        if(s.wal) document.getElementById('w-addr').innerText = s.wal;
    }

    function save() {
        fetch('/api/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ userId: s.uid, username: s.name, balance: s.bal, energy: s.eng, max_energy: s.maxE, click_lvl: s.lvl, pnl: s.pnl, wallet: s.wal }) 
        });
    }

    // Функции окон
    function openBoost() {
        const cost = s.lvl * 1500;
        document.getElementById('boost-list').innerHTML = `
            <div class="list-item">
                <div><b>Multitap (Lvl ${s.lvl+1})</b><br><small>${cost} Pulse</small></div>
                <button class="buy-btn" onclick="buyB(${cost})" ${s.bal < cost ? 'disabled':''}>Buy</button>
            </div>`;
        openM('bs-m');
    }
    function buyB(c) { if(s.bal >= c) { s.bal -= c; s.lvl++; upd(); openBoost(); save(); } }

    function openMine() {
        const cost = (s.pnl + 5) * 200;
        document.getElementById('mine-list').innerHTML = `
            <div class="list-item">
                <div><b>AI Module (+5/s)</b><br><small>${cost} Pulse</small></div>
                <button class="buy-btn" onclick="buyM(${cost})" ${s.bal < cost ? 'disabled':''}>Buy</button>
            </div>`;
        openM('mi-m');
    }
    function buyM(c) { if(s.bal >= c) { s.bal -= c; s.pnl += 5; upd(); openMine(); save(); } }

    async function openTop() {
        openM('tp-m');
        const r = await fetch('/api/top');
        const d = await r.json();
        document.getElementById('top-list').innerHTML = d.map((u,i) => `
            <div class="list-item">
                <div>#${i+1} ${u.username}</div>
                <b>${Number(u.balance).toLocaleString()}</b>
            </div>`).join('');
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
