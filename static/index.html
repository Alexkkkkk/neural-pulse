<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="l-circle-wrap">
            <div class="l-orbit"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
        </div>
        <div class="l-status">ACCESS GRANTED</div>
        <div class="l-percent" id="l-pct">0%</div>
        <div class="l-bar-container">
            <div id="l-bar" class="l-bar-fill"></div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div class="u-card">
            <div class="u-avatar">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
            </div>
            <div class="u-info">
                <b id="u-name">AGENT</b>
                <small>v4.0.0 Neural Mining</small>
            </div>
            <div class="u-lvl" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="s-box">
                <small>EARN PER TAP</small>
                <b id="s-tap">+1</b>
            </div>
            <div class="s-box">
                <small>PROFIT PER HOUR</small>
                <b id="s-profit">0</b>
            </div>
        </div>

        <div class="balance-wrap">
            <h1 id="balance">0</h1>
        </div>

        <div class="game-container">
            <div class="glow-effect"></div>
            <div class="main-clicker" ontouchstart="logic.tap(event)">
                <img src="images/logo.png" class="ai-brain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
            </div>
            
            <div class="side-nav">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="e-labels">
                <span>ENERGY</span>
                <span id="e-val">1000/1000</span>
            </div>
            <div class="e-bar-bg">
                <div id="e-fill" class="e-bar-fill"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="n-btn" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="n-btn" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="n-btn" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="n-btn" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="m-handle"></div>
            <div id="m-body" class="m-content"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const logic = {
            user: { balance: 0, energy: 1000, max_energy: 1000, tap: 1, profit: 0, username: "Player" },
            async init() {
                const u = tg.initDataUnsafe?.user || { id: 0, username: "Player" };
                document.getElementById('u-name').innerText = u.username.toUpperCase();
                
                try {
                    const r = await fetch(`/api/user/${u.id}?username=${u.username}`);
                    const d = await r.json();
                    Object.assign(this.user, d);
                } catch(e) { console.log("Local mode active"); }
                
                ui.startLoad();
                this.loops();
            },
            tap(e) {
                if (this.user.energy < this.user.tap) return;
                this.user.balance += this.user.tap;
                this.user.energy -= this.user.tap;
                ui.update();
                ui.pop(e);
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            },
            loops() {
                setInterval(() => {
                    if(this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.2);
                    if(this.user.profit > 0) this.user.balance += (this.user.profit / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 15000);
            },
            async save() {
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: tg.initDataUnsafe?.user?.id, balance: Math.floor(this.user.balance), energy: Math.floor(this.user.energy) })
                });
            }
        };

        const ui = {
            startLoad() {
                let p = 0;
                const i = setInterval(() => {
                    p += 2;
                    document.getElementById('l-pct').innerText = p + '%';
                    document.getElementById('l-bar').style.width = p + '%';
                    if(p >= 100) { 
                        clearInterval(i); 
                        document.getElementById('loading-screen').style.display = 'none'; 
                        document.getElementById('app').style.display = 'flex'; 
                        this.update(); 
                    }
                }, 30);
            },
            update() {
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('e-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('e-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('s-tap').innerText = `+${logic.user.tap}`;
                document.getElementById('s-profit').innerText = logic.user.profit;
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(logic.user.balance/50000)+1}`;
            },
            openM(type) {
                const b = document.getElementById('m-body');
                b.innerHTML = `<h2>${type.toUpperCase()}</h2>`;
                if(type === 'top') {
                    b.innerHTML += `<div class="top-list">Loading data...</div>`;
                } else {
                    b.innerHTML += `<div class="info-card">Module is being synchronized...</div>`;
                }
                document.getElementById('modal').classList.add('active');
            },
            closeM() { document.getElementById('modal').classList.remove('active'); },
            pop(e) {
                const t = e.touches[0];
                const d = document.createElement('div'); d.className = 'pop'; d.innerText = `+${logic.user.tap}`;
                d.style.left = t.clientX+'px'; d.style.top = t.clientY+'px';
                document.body.appendChild(d); setTimeout(() => d.remove(), 700);
            }
        };
        window.onload = () => logic.init();
    </script>
</body>
</html>
