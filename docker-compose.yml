version: '3.8'

services:
  bot:
    build: .
    container_name: tg_bot
    restart: always
    ports:
      - "3000:3000"
    # Переменные окружения лучше брать из конфига хостинга, 
    # но оставляем для локальных тестов
    env_file: .env
    volumes:
      # Сохраняем базу данных, чтобы прогресс не удалялся при обновлении
      - ./game.db:/app/game.db
      # КОРРЕКТНЫЙ ПУТЬ: пробрасываем картинки из твоей папки static
      - ./static/images:/app/static/images
    networks:
      - bot_net

networks:
  bot_net:
