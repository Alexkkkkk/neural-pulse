<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.3.6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.5s; visibility: hidden; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin: 20px 0; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .bal { font-size: 50px; font-weight: 900; letter-spacing: -2px; }
        
        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        .main-logo { width: 220px; transition: 0.1s; filter: drop-shadow(0 0 20px var(--neon-cyan)); }
        
        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 30px; }
        .f-item { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 15px; padding: 12px 0; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .task-btn { background: var(--neon-cyan); color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div id="loader" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:10000; color:var(--neon-cyan); font-weight:900;">INITIALIZING...</div>

    <div class="app" id="ui">
        <div class="header">
            <div id="l-v" style="width:45px; height:45px; border:2px solid var(--neon-cyan); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">1</div>
            <div>
                <div style="font-size:12px; opacity:0.5;">CORE v1.3.6</div>
                <div id="r-b" style="font-size:14px; font-weight:900; color:var(--neon-cyan);">BRONZE NODE</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>
        
        <div class="stage">
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
        </div>

        <div class="footer">
            <div class="f-item" onclick="openModal('boost-ui')">BOOST</div>
            <div class="f-item" onclick="openModal('mine-ui')">MINE</div>
            <div class="f-item" onclick="openModal('tasks-ui')">TASKS</div>
            <div class="f-item" onclick="invite()">FRIENDS</div>
        </div>
    </div>

    <div id="tasks-ui" class="modal">
        <h2 style="color:var(--neon-cyan)">REWARDS</h2>
        <div class="card">
            <div><b>Subscribe Channel</b><br><small>+10,000 Pulse</small></div>
            <button class="task-btn" onclick="doTask(10000)">GO</button>
        </div>
        <div class="card">
            <div><b>Invite 5 Friends</b><br><small>+50,000 Pulse</small></div>
            <button class="task-btn" onclick="tg.showAlert('Пригласи друзей через кнопку в меню!')">INFO</button>
        </div>
        <button class="f-item" style="margin-top:auto; width:100%;" onclick="closeModal('tasks-ui')">CLOSE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const params = new URLSearchParams(window.location.search);
        const refBy = params.get('ref');

        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0, r: 'Bronze Node' };

        async function load() {
            const r = await fetch(`/api/user/${s.uid}?ref=${refBy || ''}`);
            const d = await r.json();
            Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl), r: d.rank });
            upd();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('ui').classList.add('ready');
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('r-b').innerText = s.r;
        }

        function doTask(amt) {
            tg.openTelegramLink("https://t.me/your_channel"); // Замени на свой
            setTimeout(() => {
                s.bal += amt;
                upd();
                tg.showAlert(`Reward ${amt} claimed!`);
                save();
            }, 2000);
        }

        function invite() {
            const link = `https://t.me/n_pulse_bot?start=${s.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=Присоединяйся к моей нейросети!`);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            s.bal += s.lvl;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            upd();
        });

        function save() {
            fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl, rank: s.r}) 
            });
        }

        setInterval(save, 5000);
        load();
    </script>
</body>
</html>
