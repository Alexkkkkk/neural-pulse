<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #050505; }
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .content-layer { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .tap-text { position: absolute; color: #fff; font-size: 34px; font-weight: 900; pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 100; text-shadow: 0 0 15px var(--neon-cyan); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.2); } }
    </style>
</head>
<body>
    <canvas id="particles-js"></canvas>
    <div class="content-layer">
        <div class="header" style="width: 85%; margin-top: 15px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.07); padding: 12px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);">
            <div id="lvl-badge" style="width: 40px; height: 40px; background: var(--neon-purple); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900;">1</div>
            <div style="flex-grow: 1;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; color: #aaa;">
                    <span>NEURAL RANK</span><span id="league-name">SILICON NOVICE</span>
                </div>
                <div class="energy-bar-wrap" style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 4px;">
                    <div id="exp-bar" style="width: 20%; background: #fff; height: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="score-container" style="margin-top: 25px; text-align: center;">
            <div id="balance" style="font-size: 56px; font-weight: 900; text-shadow: 0 0 25px var(--neon-cyan);">0</div>
            <div id="pnl-info" style="color: var(--neon-cyan); font-size: 12px; font-weight: bold;">PROFIT: +0/HR</div>
        </div>

        <div class="click-area" id="tap-zone" style="position: relative; margin-top: 30px; cursor: pointer;">
            <img src="/static/assets/logo.png" class="main-logo" id="main-logo" style="width: 250px; height: 250px; border-radius: 50%; object-fit: cover;">
        </div>

        <div class="energy-section" style="width: 85%; margin-top: auto; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #888;">
                <span>ENERGY CORE</span><span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar-wrap" style="width: 100%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; margin-top: 6px;">
                <div id="energy-fill" style="height: 100%; background: linear-gradient(90deg, #00f2ff, #bc13fe); width: 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const socket = io(); 
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('u') || (tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "guest");
        let state = { score: 0, energy: 1000, max_energy: 1000, tap_power: 1, pnl: 0, level: 1, multiplier: 1 };

        async function init() {
            try {
                const r = await fetch(`/api/balance/${uid}`);
                const res = await r.json();
                if(res.status === 'ok') state = { ...state, ...res.data };
            } catch(e) { console.warn("Offline mode"); }
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
            document.getElementById('pnl-info').innerText = `PROFIT: +${state.pnl.toLocaleString()}/HR`;
            document.getElementById('lvl-badge').innerText = state.level;
        }

        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const power = state.tap_power * state.multiplier;
            if (state.energy < power) return tg.HapticFeedback.notificationOccurred('error');

            for(let i=0; i < e.touches.length; i++) {
                state.score += power;
                state.energy -= power;
                socket.emit('tap', { user_id: uid }); // High-speed notification

                const num = document.createElement('div');
                num.className = 'tap-text';
                num.innerText = `+${power}`;
                num.style.left = `${e.touches[i].pageX - 20}px`;
                num.style.top = `${e.touches[i].pageY - 50}px`;
                document.body.appendChild(num);
                setTimeout(() => num.remove(), 700);
            }
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        });

        setInterval(() => {
            state.score += (state.pnl / 3600);
            if (state.energy < state.max_energy) state.energy = Math.min(state.max_energy, state.energy + 1.2);
            updateUI();
        }, 1000);

        setInterval(() => {
            if (uid === "guest") return;
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid, ...state })
            });
        }, 4000);

        init();
    </script>
</body>
</html>
