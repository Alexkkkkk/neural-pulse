<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.9.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        /* LOADER */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .l-circle-wrap { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .l-circle-progress { fill: none; stroke: var(--cyan); stroke-width: 2; stroke-dasharray: 565; stroke-dashoffset: 565; transition: stroke-dashoffset 0.1s; }
        .l-logo-mid { width: 70px; filter: drop-shadow(0 0 15px var(--purple)); }

        /* UI */
        #app { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .header { width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .avatar { width: 44px; height: 44px; border: 1px solid var(--cyan); border-radius: 12px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .balance { font-size: 54px; font-weight: 900; margin: 10px 0; letter-spacing: -2px; }
        .play-area { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-logo { width: 230px; filter: drop-shadow(0 0 40px var(--purple)); transition: transform 0.05s; }
        
        .mine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .mine-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 20px; text-align: left; }
        .m-buy { background: #111; padding: 10px; border-radius: 12px; text-align: center; margin-top: 10px; font-weight: 900; }

        .footer { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-bottom: 15px; }
        .f-btn { background: #080808; border: 1px solid #1a1a1a; padding: 15px 0; border-radius: 15px; font-size: 10px; font-weight: 900; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; flex-direction: column; padding: 30px 20px; overflow-y: auto; }
        .float-text { position: fixed; pointer-events: none; z-index: 10000; font-weight: 900; animation: floatUp 0.7s forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="l-circle-wrap">
        <svg style="position:absolute; width:100%; height:100%; transform:rotate(-90deg);"><circle id="l-circle-bar" class="l-circle-progress" cx="100" cy="100" r="90"></circle></svg>
        <img src="./logo.png" class="l-logo-mid" onerror="this.src='https://i.ibb.co/LzY7X6p/ai-logo.png'">
    </div>
    <div id="l-pct" style="margin-top:20px; font-size:24px; color:var(--cyan);">0%</div>
</div>

<div id="app">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="avatar" id="u-avatar-box"><img src="./logo.png"></div>
            <div style="text-align:left;"><b id="u-name">Agent</b><br><small id="stat-pph" style="color:var(--cyan)">PPH: 0</small></div>
        </div>
        <div style="background:var(--cyan); color:#000; padding:5px 10px; border-radius:10px; font-weight:900;" id="u-lvl">LVL 1</div>
    </div>

    <div class="balance" id="balance">0</div>

    <div class="play-area">
        <img src="./logo.png" id="tap-img" class="main-logo" onpointerdown="tap(event)">
    </div>

    <div class="footer">
        <div class="f-btn" onclick="openM('boost')">BOOST</div>
        <div class="f-btn" onclick="openM('mine')">MINE</div>
        <div class="f-btn" onclick="openM('wallet')">WALLET</div>
        <div class="f-btn" onclick="loadTop()">TOP</div>
    </div>
</div>

<div id="m-mine" class="modal">
    <h2 style="text-align:left;">MINE</h2>
    <div class="mine-grid" id="mine-list"></div>
    <button style="margin-top:20px; padding:15px; border-radius:10px;" onclick="closeM()">BACK</button>
</div>

<div id="m-wallet" class="modal">
    <h2>WALLET</h2>
    <p style="font-size:10px; word-break:break-all;">Admin: UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI</p>
    <button id="w-btn" style="background:var(--cyan); color:#000; padding:15px; border-radius:10px; border:none; font-weight:900;" onclick="connect()">CONNECT</button>
    <button style="margin-top:20px; padding:15px; border-radius:10px;" onclick="closeM()">BACK</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
    const ADMIN_WALLET = "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI";

    let s = { id: tg.initDataUnsafe?.user?.id || "0", bal: 0, lvl: 1, pph: 0, mine_lvls: {cpu:0, gpu:0, asic:0} };
    const mineData = { cpu: {n:"CPU", p:250, r:30}, gpu: {n:"GPU", p:2000, r:250}, asic: {n:"ASIC", p:15000, r:1800} };

    async function init() {
        let p = 0;
        const i = setInterval(() => {
            p += 5; if(p>100) { p=100; clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
            document.getElementById('l-pct').innerText = p + '%';
            document.getElementById('l-circle-bar').style.strokeDashoffset = 565 - (565 * p / 100);
        }, 30);
        await load();
        renderMine();
    }

    async function load() {
        const r = await fetch(`/api/user/${s.id}?name=${s.id}`);
        const d = await r.json();
        s.bal = Number(d.balance); s.lvl = d.click_lvl; s.pph = Number(d.pph); s.mine_lvls = d.mine_lvls;
        upd();
    }

    function renderMine() {
        const cont = document.getElementById('mine-list');
        cont.innerHTML = '';
        Object.keys(mineData).forEach(k => {
            const m = mineData[k];
            const lvl = s.mine_lvls[k] || 0;
            const price = Math.floor(m.p * Math.pow(1.5, lvl));
            cont.innerHTML += `<div class="mine-card"><b>${m.n}</b><br><small>Lvl ${lvl}</small><br><small>+${m.r}/h</small><div class="m-buy" onclick="buyM('${k}',${price})">💰 ${price}</div></div>`;
        });
    }

    function buyM(k, p) {
        if(s.bal >= p) {
            s.bal -= p; s.mine_lvls[k]++; s.pph += mineData[k].r;
            upd(); renderMine(); save();
        }
    }

    function tap(e) {
        s.bal += s.lvl;
        const f = document.createElement('div'); f.className='float-text'; f.innerText=`+${s.lvl}`;
        f.style.left=`${e.clientX}px`; f.style.top=`${e.clientY}px`;
        document.body.appendChild(f); setTimeout(()=>f.remove(), 700);
        upd(); save();
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('stat-pph').innerText = `PPH: ${Math.floor(s.pph)}`;
        document.getElementById('u-lvl').innerText = `LVL ${s.lvl}`;
    }

    function save() { 
        fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:s.id, balance:s.bal, click_lvl:s.lvl, pph:s.pph, mine_lvls:s.mine_lvls}) }); 
    }

    function openM(id) { document.getElementById('m-'+id).style.display='flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    
    setInterval(() => { if(s.pph > 0) { s.bal += (s.pph/3600); upd(); } }, 1000);
    init();
</script>
</body>
</html>
