<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Online</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --neon-purp: #b026ff; 
            --neon-green: #00ffcc; 
            --bg: #050a1a; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            touch-action: manipulation; 
        }
        
        #reloading-screen { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader-logo { 
            width: 80px; height: 80px; 
            border-radius: 20px; 
            border: 2px solid var(--neon-purp); 
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.5); 
            margin-bottom: 20px; 
            overflow: hidden; 
        }
        .loader-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .game-container { 
            display: none; opacity: 0; 
            width: 100%; max-width: 500px; height: 100vh; 
            flex-direction: column; align-items: center; 
            padding: 15px; box-sizing: border-box; 
            transition: 0.5s; margin: 0 auto; 
        }
        .game-container.visible { display: flex; opacity: 1; }

        .header-top { width: 100%; display: flex; align-items: center; gap: 12px; }
        .ai-icon-small { width: 48px; height: 48px; border: 2px solid var(--neon-purp); border-radius: 12px; overflow: hidden; }
        .league-info { flex-grow: 1; }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
        #league-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: 0.5s; }

        #score { font-size: 48px; font-weight: 900; margin: 15px 0 5px; text-shadow: 0 0 20px var(--neon-blue); cursor: pointer; }
        
        #ton-connect-wrapper { margin-bottom: 10px; transform: scale(0.85); }

        .game-main { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #tap-btn { 
            width: 260px; height: 260px; 
            background: url('/static/images/logo.png?v=3.1') center/cover; 
            border: 4px solid rgba(176, 38, 255, 0.3); 
            border-radius: 50%; 
            filter: drop-shadow(0 0 20px var(--neon-blue));
            transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            outline: none;
        }
        #tap-btn:active { transform: scale(0.92); }

        .energy-box { width: 100%; margin-bottom: 15px; }
        .energy-bar-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid var(--neon-blue); overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: 0.2s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-bottom: 15px; }
        .nav-link { 
            background: rgba(255,255,255,0.05); 
            padding: 10px 2px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 9px; 
            font-weight: 700; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(5, 10, 26, 0.98);
            z-index: 1000; padding: 20px; flex-direction: column; align-items: center;
        }
        .modal.active { display: flex; }
        .card-list { width: 100%; overflow-y: auto; margin-top: 20px; padding-bottom: 50px; }
        .mine-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            border-radius: 15px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .buy-btn {
            background: var(--neon-green); color: black; border: none;
            padding: 8px 15px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron';
            cursor: pointer;
        }
        .buy-btn:disabled { background: #555; cursor: not-allowed; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--neon-purp); cursor: pointer; }

        .floating-text { 
            position: absolute; 
            pointer-events: none; 
            font-weight: 900; 
            font-size: 32px; 
            color: white; 
            animation: floatUp 0.8s forwards; 
            z-index: 100; 
            text-shadow: 0 0 10px var(--neon-blue); 
        }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-120px) scale(1.2); } 
        }
    </style>
</head>
<body>

<div id="reloading-screen">
    <div class="loader-logo"><img src="/static/images/logo.png?v=3.1"></div>
    <div id="boot-text" style="color: var(--neon-blue); font-weight: 900; letter-spacing: 3px; font-size: 12px;">SYSTEM BOOTING...</div>
</div>

<div id="mine-modal" class="modal"><div class="close-modal" id="close-mine">✖</div><h2 style="color: var(--neon-blue); margin-top: 40px; font-size: 18px;">MINING RIGS</h2><div class="card-list" id="card-container"></div></div>
<div id="leaderboard-modal" class="modal"><div class="close-modal" id="close-leaderboard">✖</div><h2 style="color: var(--neon-purp); margin-top: 40px; font-size: 18px;">TOP NEURAL AGENTS</h2><div class="card-list" id="leader-container"></div></div>
<div id="tasks-modal" class="modal"><div class="close-modal" id="close-tasks">✖</div><h2 style="color: var(--neon-green); margin-top: 40px; font-size: 18px;">EARN CREDITS</h2><div class="card-list" id="tasks-container"></div></div>
<div id="friends-modal" class="modal">
    <div class="close-modal" id="close-friends">✖</div>
    <h2 style="color: var(--neon-blue); margin-top: 40px; font-size: 18px;">INVITE FRIENDS</h2>
    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; width: 100%; box-sizing: border-box; border: 1px solid var(--neon-purp);">
        <div style="font-size: 11px; margin-bottom: 10px; color: #aaa;">Your referral link:</div>
        <div id="ref-link" style="font-size: 10px; color: var(--neon-green); word-break: break-all; margin-bottom: 15px;">loading...</div>
        <button class="buy-btn" id="copy-ref" style="width: 100%;">COPY LINK</button>
    </div>
    <h3 style="font-size: 14px; margin-top: 20px;">Your Referrals:</h3>
    <div class="card-list" id="friends-list-container"></div>
</div>

<div class="game-container" id="main-container">
    <div class="header-top">
        <div class="ai-icon-small"><img src="/static/images/logo.png?v=3.1" style="width:100%"></div>
        <div class="league-info">
            <div style="display:flex; justify-content: space-between; font-size: 10px; font-weight: 700;">
                <span id="league-name">IRON LEAGUE</span>
                <span id="display-level">LVL 1</span>
            </div>
            <div class="league-bar"><div id="league-fill"></div></div>
        </div>
    </div>

    <div id="score">0</div>
    <div id="ton-connect-wrapper"></div>
    <div id="pnl-display" style="color: var(--neon-green); font-size: 11px; margin-bottom: 10px; letter-spacing: 1px;">PROFIT: +0/hr</div>

    <div class="game-main">
        <button id="tap-btn"></button>
    </div>

    <div class="energy-box">
        <div style="display:flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: 700;">
            <span style="color: var(--neon-blue);">⚡ ENERGY</span>
            <span id="energy-text">0/0</span>
        </div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" id="btn-mine" style="border-color: var(--neon-green);">⛏️ Mine</div>
        <div class="nav-link" id="btn-tasks" style="border-color: var(--neon-green);">📝 Tasks</div>
        <div class="nav-link" id="btn-friends" style="border-color: var(--neon-blue);">👥 Friends</div>
        <div class="nav-link" id="btn-boost" style="border-color: var(--neon-purp);">🚀 Boost</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://np.bothost.ru/static/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-wrapper'
    });

    // Состояние игры (подгрузится из БД)
    let state = {
        score: 0, 
        energy: 1000, 
        max_energy: 1000, 
        tap_power: 1, 
        pnl: 0, 
        level: 1,
        user_id: String(tg.initDataUnsafe?.user?.id || '476014374')
    };

    const MINING_CARDS = [
        {id: 'cpu_1', name: 'Nano Core', cost: 1000, pnl: 50, icon: '🛰️'},
        {id: 'gpu_1', name: 'Neural GPU', cost: 5000, pnl: 280, icon: '📟'},
        {id: 'node_1', name: 'Pulse Node', cost: 25000, pnl: 1400, icon: '🖥️'}
    ];

    // --- [ИНИЦИАЛИЗАЦИЯ] ---
    async function init() {
        try {
            const ref = new URLSearchParams(window.location.search).get('tgWebAppStartParam') || "";
            const r = await fetch(`/api/balance/${state.user_id}?ref=${ref}`);
            const res = await r.json();
            if(res.status === 'ok') {
                state = {...state, ...res.data};
                render();
                setTimeout(() => {
                    document.getElementById('reloading-screen').style.display = 'none';
                    document.getElementById('main-container').classList.add('visible');
                }, 1000);
            }
        } catch(e) { 
            console.error("Init Error", e);
            document.getElementById('reloading-screen').style.display = 'none';
            document.getElementById('main-container').classList.add('visible');
        }
    }

    // --- [ОТРИСОВКА] ---
    function render() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        
        // Система уровней
        const currentLvl = Math.floor(state.score / 50000) + 1;
        document.getElementById('display-level').innerText = `LVL ${currentLvl}`;
        state.level = currentLvl;
        
        // Прогресс бар лиги
        const progress = (state.score % 50000) / 50000 * 100;
        document.getElementById('league-fill').style.width = progress + '%';
    }

    // --- [ЛОГИКА ДРУЗЕЙ] ---
    document.getElementById('btn-friends').onclick = async () => {
        const botUsername = 'UltraMind_AI_bot'; 
        const refLink = `https://t.me/${botUsername}?start=${state.user_id}`;
        document.getElementById('ref-link').innerText = refLink;
        document.getElementById('friends-modal').classList.add('active');
        
        const container = document.getElementById('friends-list-container');
        container.innerHTML = 'SCANNING NETWORK...';
        
        try {
            const r = await fetch(`/api/friends/${state.user_id}`);
            const res = await r.json();
            container.innerHTML = '';
            
            if (!res.friends || res.friends.length === 0) {
                container.innerHTML = '<div style="opacity:0.5; text-align:center; font-size:10px; padding:20px;">No nodes connected yet. Invite friends to earn +5,000 credits!</div>';
            } else {
                res.friends.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'mine-card';
                    div.innerHTML = `<span>ID: ${f.user_id.slice(0,8)}...</span> <b style="color:var(--neon-green)">+5,000</b>`;
                    container.appendChild(div);
                });
            }
        } catch(e) { container.innerHTML = 'Error loading list.'; }
    };

    document.getElementById('copy-ref').onclick = () => {
        const link = document.getElementById('ref-link').innerText;
        navigator.clipboard.writeText(link).then(() => {
            tg.showAlert("Link copied to clipboard!");
        });
    };

    // --- [ЛОГИКА BOOST (ПРОКАЧКА)] ---
    document.getElementById('btn-boost').onclick = () => {
        const boostCost = 5000 * state.tap_power;
        tg.showConfirm(`Upgrade Tap Power to ${state.tap_power + 1} for ${boostCost.toLocaleString()}?`, (ok) => {
            if(ok) {
                if(state.score >= boostCost) {
                    state.score -= boostCost;
                    state.tap_power += 1;
                    render();
                    saveData();
                    tg.showAlert("System Upgraded!");
                } else {
                    tg.showAlert("Insufficient Credits!");
                }
            }
        });
    };

    // --- [ЛОГИКА ЗАДАНИЙ] ---
    document.getElementById('btn-tasks').onclick = async () => {
        const container = document.getElementById('tasks-container');
        container.innerHTML = 'SCANNING...';
        document.getElementById('tasks-modal').classList.add('active');
        try {
            const r = await fetch(`/api/tasks/${state.user_id}`);
            const res = await r.json();
            container.innerHTML = '';
            res.tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'mine-card';
                div.innerHTML = `
                    <div><b>${task.name}</b><br><small>+${task.reward} NC</small></div>
                    <button class="buy-btn" ${task.completed ? 'disabled' : ''} onclick="doTask('${task.id}', '${task.link}')">
                        ${task.completed ? 'DONE' : 'GO'}
                    </button>`;
                container.appendChild(div);
            });
        } catch(e) { container.innerHTML = 'Tasks unavailable.'; }
    };

    window.doTask = (id, link) => {
        if(link !== "#") tg.openLink(link);
        tg.showConfirm("Task completed?", async (ok) => {
            if(ok) {
                const r = await fetch('/api/claim-task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: state.user_id, task_id: id })
                });
                const res = await r.json();
                if(res.status === 'ok') {
                    state.score = res.new_balance; 
                    render();
                    document.getElementById('btn-tasks').click(); // Обновляем список
                } else {
                    tg.showAlert(res.message);
                }
            }
        });
    };

    // --- [ЛОГИКА ЛИДЕРБОРДА] ---
    document.getElementById('score').onclick = async () => {
        const container = document.getElementById('leader-container');
        container.innerHTML = 'LOADING...';
        document.getElementById('leaderboard-modal').classList.add('active');
        try {
            const r = await fetch('/api/leaderboard');
            const res = await r.json();
            container.innerHTML = '';
            res.leaders.forEach(u => {
                const div = document.createElement('div');
                div.className = 'mine-card';
                div.style.borderLeft = (u.user_id === state.user_id) ? '4px solid var(--neon-purp)' : '';
                div.innerHTML = `<span>#${u.rank} ID:${u.user_id.slice(0,6)}</span> <b>${Math.floor(u.score).toLocaleString()}</b>`;
                container.appendChild(div);
            });
        } catch(e) { container.innerHTML = 'Leaderboard unavailable.'; }
    };

    // --- [ЛОГИКА МАЙНИНГА] ---
    document.getElementById('btn-mine').onclick = () => {
        const container = document.getElementById('card-container');
        container.innerHTML = '';
        MINING_CARDS.forEach(card => {
            const div = document.createElement('div');
            div.className = 'mine-card';
            div.innerHTML = `
                <div>${card.icon} ${card.name}<br><small>+${card.pnl}/hr</small></div>
                <button class="buy-btn" onclick="buyCard('${card.id}', ${card.cost}, ${card.pnl})">${card.cost.toLocaleString()}</button>`;
            container.appendChild(div);
        });
        document.getElementById('mine-modal').classList.add('active');
    };

    window.buyCard = (id, cost, pnl) => {
        if(state.score < cost) return tg.showAlert("Insufficient credits!");
        state.score -= cost; 
        state.pnl += pnl; 
        render(); 
        saveData();
    };

    // --- [ВЗАИМОДЕЙСТВИЕ И СОХРАНЕНИЕ] ---
    async function saveData() {
        await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(state)
        });
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy < state.tap_power) return;
        state.score += state.tap_power; 
        state.energy -= state.tap_power;
        
        const touch = e.changedTouches[0];
        createFlyText(touch.clientX, touch.clientY, `+${state.tap_power}`);
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    // Игровой цикл: начисление пассивного дохода и восстановление энергии
    setInterval(() => {
        state.energy = Math.min(state.max_energy, state.energy + 1.2); // Энергия растет
        state.score += (state.pnl / 3600); // PNL в час -> в секунду
        render();
    }, 1000);

    // Автосохранение раз в 15 секунд
    setInterval(saveData, 15000);

    // Запуск
    window.onload = init;

    // Закрытие модалок
    document.getElementById('close-mine').onclick = () => document.getElementById('mine-modal').classList.remove('active');
    document.getElementById('close-leaderboard').onclick = () => document.getElementById('leaderboard-modal').classList.remove('active');
    document.getElementById('close-tasks').onclick = () => document.getElementById('tasks-modal').classList.remove('active');
    document.getElementById('close-friends').onclick = () => document.getElementById('friends-modal').classList.remove('active');
</script>
</body>
</html>
