<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">SENTINEL ACCESS</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, balance: 0, energy: 1000, max_energy: 1000, 
                tap: 1, profit: 0, username: "AGENT"
            },
            serverTasks: [],
            serverTop: [],
            isLoaded: false,

            // Заголовки для безопасности
            getHeaders() {
                return {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${tg.initData}` 
                };
            },

            async init() {
                ui.startLoader();
                
                const u = tg.initDataUnsafe.user || { id: 476014374, username: 'Kanderrr' };
                this.data.id = u.id.toString();
                this.data.username = (u.username || u.first_name).toUpperCase();

                try {
                    // Инициализация кошелька
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });

                    // 1. ЗАГРУЗКА ИЗ БАЗЫ (Твой роут /api/user)
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(this.data.username)}`, {
                        headers: this.getHeaders()
                    });
                    
                    if (r.ok) {
                        const s = await r.json();
                        // Синхронизируем строго по названиям колонок твоей БД
                        this.data.balance = Number(s.balance) || 0;
                        this.data.energy = Number(s.energy) || 1000;
                        this.data.max_energy = Number(s.max_energy) || 1000;
                        this.data.tap = Number(s.tap) || 1;
                        this.data.profit = Number(s.profit) || 0;
                    }

                    // 2. ЗАГРУЗКА ДОП. ДАННЫХ
                    const [tRes, topRes] = await Promise.all([
                        fetch('/api/tasks'), 
                        fetch('/api/top')
                    ]);
                    if (tRes.ok) this.serverTasks = await tRes.json();
                    if (topRes.ok) this.serverTop = await topRes.json();

                } catch(e) { console.error("Sync error:", e); }

                document.getElementById('my-name').innerText = this.data.username;
                if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                
                this.isLoaded = true;
                this.loop();
                ui.render();
            },

            // МАТЕМАТИКА ЦЕН
            getCost(type) {
                if(type === 'tap') return Math.floor(450 * Math.pow(1.6, this.data.tap - 1));
                if(type === 'energy') return Math.floor(600 * Math.pow(1.5, (this.data.max_energy - 1000) / 500));
                if(type === 'mine') return Math.floor(1500 * Math.pow(1.7, this.data.profit / 150));
                return 0;
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                this.data.balance += this.data.tap;
                this.data.energy -= 1;
                ui.pop(e, this.data.tap);
                ui.render();
                tg.HapticFeedback.impactOccurred('light');
            },

            upgrade(type) {
                const cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap += 1;
                    if(type === 'energy') this.data.max_energy += 500;
                    if(type === 'mine') this.data.profit += 150;
                    
                    tg.HapticFeedback.notificationOccurred('success');
                    this.save(); 
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("LACK OF NP");
                }
            },

            // 3. СОХРАНЕНИЕ В БАЗУ (Твой роут /api/save)
            async save() {
                if(!this.isLoaded) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: this.getHeaders(),
                    body: JSON.stringify({
                        id: this.data.id,
                        balance: this.data.balance,
                        energy: this.data.energy,
                        max_energy: this.data.max_energy,
                        tap: this.data.tap,
                        profit: this.data.profit,
                        username: this.data.username
                    })
                }).catch(e => console.error("Auto-save failed"));
            },

            loop() {
                setInterval(() => {
                    // Реген энергии
                    if(this.data.energy < this.data.max_energy) {
                        this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1);
                    }
                    // Пассивный доход
                    if(this.data.profit > 0) {
                        this.data.balance += (this.data.profit / 3600);
                    }
                    ui.render();
                }, 1000);
                
                // Автосейв каждые 20 секунд
                setInterval(() => this.save(), 20000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 5;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { 
                        clearInterval(i); 
                        document.getElementById('loader').style.display='none'; 
                        document.getElementById('app').style.display='flex'; 
                    }
                }, 30);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit);
                
                let lvl = Math.floor(Math.log10(Math.max(10, d.balance/10))) + 1;
                document.getElementById('my-lvl').innerText = `LVL ${lvl}`;
            },

            pop(e, p) {
                const t = (e.touches && e.touches[0]) || e;
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = t.clientX+'px'; div.style.top = t.clientY+'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                
                if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-btn" style="display:flex; justify-content:center; padding:10px;"></div>`;
                    setTimeout(() => { if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-btn' }; }, 50);
                }
                else if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOSTERS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><span>⚡ Multitap (Lvl ${game.data.tap})</span><b>${game.getCost('tap')}</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><span>🔋 Capacity (+500)</span><b>${game.getCost('energy')}</b></div>`;
                }
                else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><span>🧠 GPU Node (+150/h)</span><b>${game.getCost('mine')}</b></div>`;
                }
                else if(type === 'tasks') {
                    let h = `<h2>📋 MISSIONS</h2>`;
                    game.serverTasks.forEach(t => h += `<div class="top-item" onclick="window.open('${t.url}')"><span>${t.title}</span><b>+${t.reward}</b></div>`);
                    b.innerHTML = h || `<p>No active missions</p>`;
                }
                else if(type === 'top') {
                    let h = `<h2>🏆 ELITE AGENTS</h2>`;
                    game.serverTop.slice(0, 10).forEach((u, i) => h += `<div class="top-item"><span>${i+1}. ${u.username}</span><b>${Math.floor(u.balance).toLocaleString()}</b></div>`);
                    b.innerHTML = h;
                }
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 DAILY BONUS</h2><button class="m-close" style="background:cyan;color:black;width:100%" onclick="game.data.balance+=1000; game.save(); ui.render(); ui.closeM(); tg.showAlert('1,000 NP CLAIMED')">GET 1,000 NP</button>`;
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
