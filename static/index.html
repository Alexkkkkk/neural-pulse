<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
        </div>
        <div class="access-text">ACCESS GRANTED</div>
        <div class="load-pct" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-fill" id="load-bar"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar-box"><img src="images/logo.png" id="u-avatar"></div>
                <div><b id="u-name">Agent</b><br><small style="color:#444; font-size:9px;">v4.0.0 Neural Mining</small></div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo-btn" id="tap-target" ontouchstart="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="energy-info"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="eng-progress"><div class="eng-fill" id="eng-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="nav-item" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="nav-item" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-content">
            <div class="modal-drag-line"></div>
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-body"></div>
            <button class="close-btn" onclick="ui.closeM()">Close Terminal</button>
        </div>
    </div>

    <script>
        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                tg.expand();
                const u = tg.initDataUnsafe?.user || { id: "0", username: "Guest" };
                
                try {
                    const res = await fetch(`/api/user/${u.id}?username=${u.username}`);
                    const data = await res.json();
                    // ПРИНУДИТЕЛЬНОЕ ПРЕВРАЩЕНИЕ В ЧИСЛА (ЗАЩИТА ОТ NaN)
                    this.user = {
                        ...data,
                        balance: Number(data.balance) || 0,
                        energy: Number(data.energy) || 1000,
                        max_energy: Number(data.max_energy) || 1000,
                        click_lvl: Number(data.click_lvl) || 1,
                        profit_hr: Number(data.profit_hr) || 0,
                        username: data.username || u.username
                    };
                } catch(e) { 
                    this.user = { balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, username: u.username };
                }
                ui.startLoading();
                this.loop();
            },

            tap(e) {
                if (this.user.energy < this.user.click_lvl) return;
                this.user.balance = Number(this.user.balance) + Number(this.user.click_lvl);
                this.user.energy = Number(this.user.energy) - Number(this.user.click_lvl);
                ui.update();
                this.createPop(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            },

            createPop(e) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                const p = document.createElement('div');
                p.className = 'tap-pop';
                p.innerText = `+${this.user.click_lvl}`;
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            },

            async buyUpgrade(type) {
                let price = 0;
                if(type === 'tap') price = this.user.click_lvl * 2500;
                if(type === 'energy') price = (this.user.max_energy / 500) * 4000;
                if(type === 'profit') price = (this.user.profit_hr / 500 + 1) * 15000;

                if (this.user.balance >= price) {
                    this.user.balance -= price;
                    if (type === 'tap') this.user.click_lvl++;
                    if (type === 'energy') { this.user.max_energy += 500; this.user.energy = this.user.max_energy; }
                    if (type === 'profit') this.user.profit_hr += 500;
                    ui.update();
                    this.save();
                    ui.openM(type === 'profit' ? 'mine' : 'boost');
                }
            },

            loop() {
                setInterval(() => {
                    this.user.energy = Math.min(this.user.max_energy, Number(this.user.energy) + 1.5);
                    if(this.user.profit_hr > 0) this.user.balance += (Number(this.user.profit_hr) / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 10000);
            },

            async save() {
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.user_id || this.user.id, 
                        balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy), 
                        max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl, 
                        profit_hr: this.user.profit_hr
                    })
                });
            }
        };

        const ui = {
            update() {
                if(!logic.user) return;
                const b = Math.floor(logic.user.balance) || 0;
                document.getElementById('balance').innerText = b.toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(b/100000)+1}`;
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = logic.user.profit_hr;
            },

            openM(type) {
                const body = document.getElementById('modal-body');
                const title = document.getElementById('modal-title');
                title.innerText = type.toUpperCase();
                let h = '';

                if(type === 'top') {
                    body.innerHTML = '<div style="text-align:center; padding:20px; color:cyan;">SCANNING TOP 100...</div>';
                    fetch('/api/top').then(r=>r.json()).then(data => {
                        body.innerHTML = data.slice(0, 100).map((u, i) => `
                            <div class="top-item ${u.username === logic.user.username ? 'me' : ''}">
                                <div class="top-user">
                                    <span style="width:25px; font-weight:900; color:${i<3?'cyan':'#333'}">#${i+1}</span>
                                    <div class="top-avatar">${u.username[0].toUpperCase()}</div>
                                    <span class="top-name">${u.username}</span>
                                </div>
                                <span class="top-val">${Math.floor(u.balance).toLocaleString()}</span>
                            </div>`).join('');
                    });
                    return;
                } else if(type === 'wallet') {
                    h = `<div style="text-align:center; padding:20px;">
                            <img src="https://ton.org/download/ton_symbol.png" width="60" style="margin-bottom:15px">
                            <h3 style="margin-bottom:10px">TON Connect</h3>
                            <p style="color:#555; font-size:14px; margin-bottom:20px;">Connect your wallet to enable withdrawals and Airdrop participation.</p>
                            <button class="close-btn" style="background:linear-gradient(90deg, #0088cc, #00ffff); color:#000; border:none;" onclick="alert('TON Connect integration soon!')">Connect TON Wallet</button>
                        </div>`;
                } else if(type === 'boost') {
                    h = `<div class="top-item" onclick="logic.buyUpgrade('tap')">
                            <div class="top-user"><span>🚀</span><div><b>Multi-Tap</b><br><small>Lvl ${logic.user.click_lvl}</small></div></div>
                            <b class="top-val">${(logic.user.click_lvl * 2500).toLocaleString()}</b>
                        </div>
                        <div class="top-item" onclick="logic.buyUpgrade('energy')">
                            <div class="top-user"><span>⚡</span><div><b>Energy Cap</b><br><small>+500 Max</small></div></div>
                            <b class="top-val">${((logic.user.max_energy / 500) * 4000).toLocaleString()}</b>
                        </div>`;
                } else if(type === 'mine') {
                    h = `<div class="top-item" onclick="logic.buyUpgrade('profit')">
                            <div class="top-user"><span>⛏️</span><div><b>Neural Core</b><br><small>+500/hr</small></div></div>
                            <b class="top-val">${((logic.user.profit_hr / 500 + 1) * 15000).toLocaleString()}</b>
                        </div>`;
                } else {
                    h = `<div style="text-align:center; padding:20px; color:#333;">DATABASE LINK NOT FOUND</div>`;
                }
                body.innerHTML = h;
                document.getElementById('modal-container').classList.add('active');
            },

            closeM() { document.getElementById('modal-container').classList.remove('active'); },
            
            startLoading() {
                let p = 0;
                const itv = setInterval(() => {
                    p += 2;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if(p >= 100) { clearInterval(itv); document.getElementById('loading-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; this.update(); }
                }, 30);
            }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
