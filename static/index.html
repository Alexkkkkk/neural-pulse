<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-circle-container">
            <svg class="progress-ring" width="180" height="180">
                <circle id="ring-circle" stroke="url(#ringGrad)" stroke-width="4" fill="transparent" r="80" cx="90" cy="90" 
                    stroke-dasharray="502.6" stroke-dashoffset="502.6" stroke-linecap="round"/>
                <defs>
                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00ffff" /><stop offset="100%" stop-color="#ae00ff" />
                    </linearGradient>
                </defs>
            </svg>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-wrapper"><div id="load-bar" class="load-bar-f"></div></div>
    </div>

    <div id="app">
        <div class="header-container">
            <div class="header-user">
                <div class="avatar-neomorph"><img src="images/logo.png"></div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge-neon" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row-neon">
            <div class="stat-card-neon"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-card-neon"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance-nebula" id="balance">0</div>

        <div class="play-area">
            <div class="logo-glow"></div>
            <img src="images/logo.png" class="main-logo-pulse" id="tap-target" 
                 ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            
            <div class="side-menu-cyber">
                <div class="side-btn-cyber" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn-cyber" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn-cyber" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-container-cyber">
            <div class="en-txt-cyber"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="progress-bar-wrap"><div id="eng-fill" class="progress-bar-fill"></div></div>
        </div>

        <div class="bottom-nav-cyber">
            <div class="nav-btn-capsule" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="nav-btn-capsule" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="nav-btn-capsule" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="nav-btn-capsule" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <button class="nav-btn-capsule" style="width:100%; margin-top:20px; color:#fff;" onclick="ui.closeM()">BACK</button>
        </div>
    </div>

    <script src="logic.js"></script>
    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json'
        });

        const ui = {
            init() {
                this.update();
                this.finishLoading();
            },
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                document.getElementById('u-lvl').innerText = `LVL ${logic.user.lvl}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr).toLocaleString();
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const container = document.getElementById('modal-container');
                let h = `<h2>${type.toUpperCase()}</h2>`;
                
                if (type === 'wallet') {
                    h += `<div id="ton-btn" style="margin:20px 0;"></div><p>Connect your TON wallet for withdrawals</p>`;
                    setTimeout(() => tonConnectUI.uiOptions = { buttonRootId: 'ton-btn' }, 50);
                } 
                else if (type === 'boost') {
                    h += `
                        <div class="stat-card-neon" onclick="logic.buyUpgrade('tap')" style="margin-bottom:10px;">
                            <b>🚀 Multitap</b><br><small>Level: ${logic.user.click_lvl} | Cost: 5,000</small>
                        </div>
                        <div class="stat-card-neon" onclick="logic.buyUpgrade('energy')">
                            <b>🔋 Limit</b><br><small>Max: ${logic.user.max_energy} | Cost: 10,000</small>
                        </div>`;
                }
                else if (type === 'mine') {
                    h += `<div class="stat-card-neon" onclick="logic.buyUpgrade('profit')">
                            <b>🖥️ GPU Node</b><br><small>+500/hr | Cost: 25,000</small>
                          </div>`;
                }
                else if (type === 'top') {
                    h += `<div style="text-align:left; padding:10px;">
                            <p>1. User_992 - 50.2M</p>
                            <p>2. Crypto_King - 44.1M</p>
                            <p>3. You - ${(logic.user.balance/1000000).toFixed(1)}M</p>
                          </div>`;
                }
                else {
                    h += `<p style="opacity:0.5;">Section ${type} is coming soon...</p>`;
                }

                body.innerHTML = h;
                container.classList.add('active');
            },
            closeM() { document.getElementById('modal-container').classList.remove('active'); },
            finishLoading() {
                let p = 0;
                const ring = document.getElementById('ring-circle');
                const iv = setInterval(() => {
                    p += 10;
                    document.getElementById('load-pct').innerText = `${p}%`;
                    document.getElementById('load-bar').style.width = `${p}%`;
                    ring.style.strokeDashoffset = 502.6 - (p / 100) * 502.6;
                    if (p >= 100) {
                        clearInterval(iv);
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.opacity = '0';
                            document.getElementById('app').style.display = 'flex';
                            setTimeout(() => document.getElementById('loading-screen').remove(), 500);
                        }, 400);
                    }
                }, 50);
            }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
