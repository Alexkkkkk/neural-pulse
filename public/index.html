<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v2.0.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #050505; --card: rgba(20, 20, 20, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 92%; margin-top: 20px; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
        /* ПУТЬ: public/images/logo.png */
        .avatar { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--cyan); }
        .lvl-badge { background: linear-gradient(135deg, var(--cyan), var(--purple)); padding: 6px 14px; border-radius: 10px; font-weight: 900; }

        .balance { font-size: 58px; font-weight: 900; margin-top: 25px; }
        .stage { flex-grow: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        /* ПУТЬ: public/logo.png */
        .main-ai { width: 240px; cursor: pointer; filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.4)); }

        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .side-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; width: 90px; padding: 14px 0; border-radius: 18px; font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; }

        .energy-box { width: 90%; margin-bottom: 25px; }
        .e-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.03); border-radius: 20px; overflow: hidden; margin-top: 8px; }
        .e-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }

        .bottom-nav { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 35px; }
        .nav-item { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 18px 0; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #999; }
        
        .modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; padding: 30px 25px; }
        .buy-btn { background: var(--cyan); color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; }
        .list-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px">
        <img src="images/logo.png" class="avatar">
        <div><div style="font-weight:800;" id="u-nm">...</div><div style="font-size:9px; color:var(--cyan)">NODE v2.0.0</div></div>
    </div>
    <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
</div>

<div class="balance" id="b-v">0</div>

<div class="stage">
    <img src="logo.png" class="main-ai" onclick="doTap()">
    <div class="side-menu">
        <div class="side-btn" onclick="openM('wal-m')">Wallet</div>
        <div class="side-btn" onclick="openM('fr-m')">Friends</div>
        <div class="side-btn" onclick="openM('bn-m')">Bonus</div>
    </div>
</div>

<div class="energy-box">
    <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:#555">
        <span>ENERGY</span><span id="e-val">1000/1000</span>
    </div>
    <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="openM('bs-m')">Boost</div>
    <div class="nav-item" onclick="openM('mi-m')">Mine</div>
    <div class="nav-item" onclick="openM('ta-m')">Tasks</div>
    <div class="nav-item" onclick="openM('tp-m')">Stats</div>
</div>

<div id="wal-m" class="modal">
    <h2 style="margin-bottom:20px">WALLET</h2>
    <div id="w-addr" style="font-size:12px; color:var(--cyan); margin-bottom:20px; word-break: break-all;">Not connected</div>
    <button onclick="handleWalletAction()" style="padding:20px; border-radius:15px; border:none; background:var(--cyan); font-weight:900;">CONNECT / DISCONNECT</button>
    <button onclick="closeM('wal-m')" style="margin-top:auto; padding:15px; background:none; color:#555; border:none;">CLOSE</button>
</div>

<div id="bs-m" class="modal"><h2>BOOST</h2><div id="boost-list"></div><button onclick="closeM('bs-m')">CLOSE</button></div>
<div id="mi-m" class="modal"><h2>MINING</h2><div id="mine-list"></div><button onclick="closeM('mi-m')">CLOSE</button></div>
<div id="tp-m" class="modal"><h2>TOP 10</h2><div id="top-list"></div><button onclick="closeM('tp-m')">CLOSE</button></div>
<div id="fr-m" class="modal"><h2>FRIENDS</h2><button onclick="closeM('fr-m')">CLOSE</button></div>
<div id="bn-m" class="modal"><h2>BONUS</h2><button onclick="closeM('bn-m')">CLOSE</button></div>
<div id="ta-m" class="modal"><h2>TASKS</h2><button onclick="closeM('ta-m')">CLOSE</button></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let tonConnectUI;
    let s = { uid: tg.initDataUnsafe?.user?.id || '0', name: tg.initDataUnsafe?.user?.first_name || 'Player', bal: 0, lvl: 1, eng: 1000, maxE: 1000, pnl: 0, wal: null };

    async function init() {
        document.getElementById('u-nm').innerText = s.name;
        // Путь манифеста теперь из /public
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
        
        tonConnectUI.onStatusChange(wallet => {
            s.wal = wallet ? wallet.account.address : null;
            document.getElementById('w-addr').innerText = s.wal || "Not connected";
            save();
        });

        await load();
        setInterval(() => {
            if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 2);
            if(s.pnl > 0) s.bal += (s.pnl / 10);
            upd();
        }, 1000);
        setInterval(save, 5000);
    }

    async function load() {
        const r = await fetch(`/api/user/${s.uid}?name=${encodeURIComponent(s.name)}`);
        const d = await r.json();
        s.bal = Number(d.balance); s.lvl = Number(d.click_lvl);
        s.eng = Number(d.energy); s.maxE = Number(d.max_energy);
        s.pnl = Number(d.pnl); s.wal = d.wallet_address;
        upd();
    }

    function doTap() {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('light');
            upd();
        }
    }

    function upd() {
        document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('u-lv').innerText = s.lvl;
        document.getElementById('e-val').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
        document.getElementById('e-f').style.width = (s.eng / s.maxE * 100) + '%';
    }

    function save() {
        fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: s.uid, username: s.name, balance: s.bal, energy: s.eng, max_energy: s.maxE, click_lvl: s.lvl, pnl: s.pnl, wallet: s.wal }) });
    }

    async function handleWalletAction() {
        if (tonConnectUI.connected) await tonConnectUI.disconnect();
        else await tonConnectUI.openModal();
    }

    function openM(id) { 
        if(id === 'tp-m') renderTop();
        if(id === 'bs-m') renderBoost();
        if(id === 'mi-m') renderMine();
        document.getElementById(id).style.display = 'flex'; 
    }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    function renderBoost() {
        const cost = s.lvl * 2000;
        document.getElementById('boost-list').innerHTML = `<div class="list-item"><span>Next Level: ${s.lvl+1}</span><button class="buy-btn" onclick="buyB(${cost})">${cost}</button></div>`;
    }
    function buyB(c) { if(s.bal >= c) { s.bal -= c; s.lvl++; upd(); renderBoost(); save(); } }

    function renderMine() {
        const cost = (s.pnl + 10) * 250;
        document.getElementById('mine-list').innerHTML = `<div class="list-item"><span>+10 pnl</span><button class="buy-btn" onclick="buyM(${cost})">${cost}</button></div>`;
    }
    function buyM(c) { if(s.bal >= c) { s.bal -= c; s.pnl += 10; upd(); renderMine(); save(); } }

    async function renderTop() {
        const r = await fetch('/api/top');
        const d = await r.json();
        document.getElementById('top-list').innerHTML = d.map((u,i) => `<div class="list-item"><span>#${i+1} ${u.username}</span><b>${Math.floor(u.balance)}</b></div>`).join('');
    }

    init();
</script>
</body>
</html>
