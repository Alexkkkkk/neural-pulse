<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NP Light</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --bg: #050505; }
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: sans-serif; overflow: hidden; display: flex;
            flex-direction: column; align-items: center; height: 100vh; user-select: none;
        }
        /* Упрощенный интерфейс без тяжелых градиентов */
        .header { width: 90%; margin-top: 10px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; }
        .score-container { text-align: center; margin: 20px 0; }
        #balance { font-size: 48px; font-weight: 900; color: var(--cyan); }
        
        /* Главная кнопка - теперь просто круг, загружается мгновенно */
        .click-area {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, #00f2ff44 0%, #000 70%);
            border: 4px solid var(--cyan); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--cyan); cursor: pointer;
        }
        .main-logo { width: 150px; filter: drop-shadow(0 0 10px var(--cyan)); }

        .energy-section { width: 85%; margin-top: auto; margin-bottom: 20px; }
        .bar-wrap { width: 100%; height: 10px; background: #222; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; background: var(--cyan); width: 100%; }
        
        .bottom-nav { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .nav-btn { background: #111; border: 1px solid #333; padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 10px; color: #fff; }
        
        .tap-text { position: absolute; color: #fff; font-weight: 900; animation: up 0.5s ease-out forwards; pointer-events: none; }
        @keyframes up { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="lvl-badge" style="background:var(--cyan); color:#000; padding:5px 10px; border-radius:8px; font-weight:bold;">1</div>
        <div style="flex:1; font-size:12px;">RANK: <span id="league-name">FAST_MODE</span></div>
    </div>

    <div class="score-container">
        <div id="balance">0</div>
        <div id="pnl-info" style="font-size:12px; opacity:0.7;">PROFIT: +0/HR</div>
    </div>

    <div class="click-area" id="tap-zone">
        <div style="font-size:40px; font-weight:bold;">PULSE</div>
    </div>

    <div class="energy-section">
        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:4px;">
            <span>ENERGY</span> <span id="energy-text">1000/1000</span>
        </div>
        <div class="bar-wrap"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="buy('click')">BOOST</div>
        <div class="nav-btn" onclick="buy('mine')">MINE</div>
        <div class="nav-btn" onclick="tg.openTelegramLink('https://t.me/share/url?url=...')">FRIENDS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let state = { score: 0, energy: 1000, max_energy: 1000, tap: 1, pnl: 0 };

        // Мгновенное обновление UI
        function update() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = (state.energy/state.max_energy*100) + '%';
        }

        // Клик без задержек
        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            if (state.energy < state.tap) return;
            state.score += state.tap;
            state.energy -= state.tap;
            
            const t = e.touches[0];
            const n = document.createElement('div');
            n.className = 'tap-text'; n.innerText = `+${state.tap}`;
            n.style.left = t.pageX + 'px'; n.style.top = t.pageY + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 500);
            
            update();
            tg.HapticFeedback.impactOccurred('light');
        });

        // Фоновый доход (раз в секунду)
        setInterval(() => {
            state.score += (state.pnl / 3600);
            state.energy = Math.min(state.max_energy, state.energy + 1);
            update();
        }, 1000);

        // Упрощенная загрузка данных (без лишних проверок)
        async function load() {
            try {
                const r = await fetch(`/api/balance/${tg.initDataUnsafe?.user?.id || 'guest'}`);
                const d = await r.json();
                if(d.status === 'ok') {
                    state = {...state, ...d.data};
                    update();
                }
            } catch(e) { console.log("Offline mode"); }
        }
        load();
    </script>
</body>
</html>
