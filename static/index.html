<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" alt="AI" class="loader-logo">
        </div>
        <div class="loading-text">ACCESSING NEURAL NET</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-wrapper">
            <div id="load-bar" class="load-bar-f"></div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-left">
                <div class="avatar"><img src="images/logo.png" alt="Avatar"></div>
                <div class="u-info"><b id="u-name">Agent</b><small>v4.0.0 Neural Mining</small></div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b class="accent-val" id="tap-val">+1</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b class="accent-val" id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" onclick="logic.tap(event)">
            
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 SQUAD</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">1000/1000</span></div>
            <div class="load-bar-wrapper" style="width: 100%; height: 8px; border: none;">
                <div id="eng-fill" class="load-bar-f" style="width: 100%;"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')"><span>🚀</span>BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')"><span>⛏️</span>MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')"><span>📋</span>TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')"><span>🏆</span>TOP</button>
        </div>
    </div>

    <div id="m-boost" class="modal">
        <div class="modal-content">
            <div class="modal-header">UPGRADES</div>
            <div class="upgrade-list" id="boost-list">
                </div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE</button>
        </div>
    </div>

    <div id="m-top" class="modal">
        <div class="modal-content">
            <div class="modal-header">LEADERBOARD</div>
            <div id="top-list">
                </div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE</button>
        </div>
    </div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="loading.js"></script>
</body>
</html>
