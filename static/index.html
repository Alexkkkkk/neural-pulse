<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.9 | Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --neon: #00ffff;
            --bg: #050a0a;
            --panel: rgba(0, 255, 255, 0.05);
            --border: rgba(0, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: white;
            overflow: hidden; /* Отключаем лишний скролл */
            height: 100vh;
        }

        /* --- Animations --- */
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.5; transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes moveUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.2); opacity: 0; } }

        /* --- Loader --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ring { width: 80px; height: 80px; border: 3px solid transparent; border-top-color: var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .l-logo { position: absolute; width: 40px; }
        .l-status { margin-top: 20px; font-family: monospace; color: var(--neon); font-size: 10px; letter-spacing: 2px; }
        .l-bar { width: 200px; height: 2px; background: #111; margin-top: 10px; }
        #bar { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.1s; }

        /* --- Header --- */
        header { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .u-avatar img { width: 45px; height: 45px; border-radius: 10px; border: 1px solid var(--neon); }
        .u-info b { font-size: 14px; color: var(--neon); }
        .u-info small { font-size: 10px; color: #888; }
        .u-lvl { margin-left: auto; background: var(--neon); color: black; padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 12px; }

        /* --- Stats --- */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .s-box { background: var(--panel); border: 1px solid var(--border); padding: 10px; border-radius: 12px; text-align: center; }
        .s-box small { font-size: 9px; color: #888; display: block; margin-bottom: 4px; }
        .s-box b { font-size: 14px; color: var(--neon); }

        /* --- Balance --- */
        .balance-area { text-align: center; padding: 20px 0; }
        #ui-balance { font-size: 42px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 20px rgba(0,255,255,0.3); }

        /* --- Main Target (The Brain) --- */
        .game-core { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        .brain-target {
            width: 250px; height: 250px; position: relative; z-index: 5;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        .brain-target img { width: 100%; filter: drop-shadow(0 0 15px var(--neon)); }
        .brain-target:active { transform: scale(0.92); }
        .glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,255,0.1) 0%, transparent 70%); pointer-events: none; }

        .side-menu { position: absolute; right: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .side-menu button { 
            background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: white; 
            padding: 8px; border-radius: 8px; font-size: 10px; backdrop-filter: blur(5px);
        }

        /* --- Energy & Tabs --- */
        .energy-section { padding: 15px; background: rgba(0,0,0,0.5); border-top: 1px solid var(--border); }
        .e-labels { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; font-weight: bold; }
        .e-track { height: 8px; background: #111; border-radius: 4px; overflow: hidden; border: 1px solid #222; }
        #e-fill { height: 100%; background: linear-gradient(90deg, #008888, var(--neon)); width: 100%; transition: 0.3s; }
        .energy-error { animation: shake 0.2s ease-in-out 2; border: 1px solid red; }

        .bottom-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        .bottom-tabs button { 
            background: var(--panel); border: 1px solid var(--border); color: white; 
            padding: 10px 5px; border-radius: 10px; font-size: 10px; font-weight: bold;
        }

        /* --- Modals --- */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-bg.active { display: flex; }
        .modal-box { 
            width: 100%; background: #0a0f0f; border-top: 2px solid var(--neon); 
            border-radius: 25px 25px 0 0; padding: 25px; max-height: 80vh; overflow-y: auto;
        }
        .handle { width: 40px; height: 4px; background: #333; border-radius: 2px; margin: -10px auto 20px; }
        .m-close { width: 100%; margin-top: 20px; padding: 15px; background: #111; border: 1px solid #333; color: #555; border-radius: 12px; font-family: monospace; }
        
        .task-item, .top-item { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-btn { background: var(--neon); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .task-btn:disabled { background: #222; color: #555; }

        .ai-terminal { background: #000; border: 1px solid var(--neon); padding: 15px; border-radius: 10px; font-family: monospace; color: var(--neon); margin: 10px 0; min-height: 100px; white-space: pre-wrap; font-size: 12px; }
        .pop { position: absolute; color: var(--neon); font-weight: bold; font-size: 28px; pointer-events: none; animation: moveUp 0.6s ease-out forwards; z-index: 999; text-shadow: 0 0 10px rgba(0,255,255,0.8); }
        .ref-box { background: #000; border: 1px dashed var(--neon); padding: 12px; border-radius: 10px; margin: 10px 0; word-break: break-all; font-family: monospace; font-size: 12px; color: var(--neon); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">INITIALIZING NEURAL LINK...</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none; flex-direction: column; height: 100vh;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png" onerror="this.src='images/logo.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">SCANNING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>POWER</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>MINING / HR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" id="main-target">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('ai')">🤖 AI</button>
                <button id="wallet-btn-label" onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 REF</button>
                <button onclick="ui.openM('bonus')">🎁 DAILY</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>SYSTEM STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">TERMINATE SESSION</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let tonConnectUI = null;

        const game = {
            data: { 
                id: "0", balance: 0, energy: 1000, max_energy: 1000, 
                tap: 1, profit: 0, tap_lvl: 1, mine_lvl: 1, 
                energy_lvl: 1, last_bonus: 0, wallet: null, completed_tasks: []
            },
            isLoaded: false,
            isSaving: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 12345, first_name: 'Tester', username: 'tester' };
                this.data.id = String(u.id);

                // TON Connect
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://np.bothost.tech/tonconnect-manifest.json',
                        buttonRootId: null
                    });
                    tonConnectUI.onStatusChange(w => {
                        this.data.wallet = w ? w.account.address : null;
                        document.getElementById('wallet-btn-label').innerText = w ? "👛 " + w.account.address.slice(0,4) + ".." : "👛 WALLET";
                        this.save();
                    });
                } catch(e) {}

                // Load Data
                try {
                    const r = await fetch(`/api/user/${this.data.id}?username=${u.username || u.first_name}`);
                    if (r.ok) {
                        const db = await r.json();
                        this.data = { ...this.data, ...db };
                    }
                } catch(e) {}

                document.getElementById('my-name').innerText = (u.username || u.first_name).toUpperCase();
                if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;

                this.isLoaded = true;
                this.startLoops();
                ui.render();

                // Click event
                document.getElementById('main-target').addEventListener('touchstart', (e) => this.tap(e));
            },

            getCost(type) {
                const lvl = this.data[type + '_lvl'] || 1;
                const costs = { tap: 500 * Math.pow(1.8, lvl-1), energy: 400 * Math.pow(1.5, lvl-1), mine: 1200 * Math.pow(1.7, lvl-1) };
                return Math.floor(costs[type]);
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) {
                    if(this.data.energy < 1) {
                        tg.HapticFeedback.notificationOccurred('error');
                        document.querySelector('.e-track').classList.add('energy-error');
                        setTimeout(() => document.querySelector('.e-track').classList.remove('energy-error'), 400);
                    }
                    return;
                }
                const touches = e.changedTouches.length;
                for(let i=0; i<touches; i++) {
                    if(this.data.energy >= 1) {
                        this.data.balance += this.data.tap;
                        this.data.energy -= 1;
                        ui.pop(e.changedTouches[i], this.data.tap);
                    }
                }
                tg.HapticFeedback.impactOccurred('medium');
                ui.render();
            },

            async upgrade(type) {
                const cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') { this.data.tap_lvl++; this.data.tap++; }
                    if(type === 'energy') { this.data.energy_lvl++; this.data.max_energy += 500; this.data.energy = this.data.max_energy; }
                    if(type === 'mine') { this.data.mine_lvl++; this.data.profit += 150; }
                    ui.render();
                    tg.HapticFeedback.notificationOccurred('success');
                    await this.save();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("НЕДОСТАТОЧНО NP");
                }
            },

            async save() {
                if(!this.isLoaded || this.isSaving) return;
                this.isSaving = true;
                try {
                    await fetch('/api/save', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.data)
                    });
                } catch(e) {} finally { this.isSaving = false; }
            },

            startLoops() {
                setInterval(() => {
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1.2);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 15000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 4;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 50);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit).toLocaleString();
                document.getElementById('ui-rank').innerText = d.balance < 50000 ? "NODE AGENT" : "CYBER MANTIS";
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(d.balance / 30000) + 1}`;
            },

            pop(t, p) {
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = t.clientX + 'px'; div.style.top = t.clientY + 'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = `<p style="text-align:center; color:cyan;">CONNECTING...</p>`;
                
                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 UPGRADES</h2>
                    <div class="task-item" onclick="game.upgrade('tap')"><div><b>Multitap</b><br><small>Level ${game.data.tap_lvl}</small></div><b>${game.getCost('tap')} NP</b></div>
                    <div class="task-item" onclick="game.upgrade('energy')"><div><b>Energy Cap</b><br><small>Level ${game.data.energy_lvl}</small></div><b>${game.getCost('energy')} NP</b></div>`;
                } else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="task-item" onclick="game.upgrade('mine')"><div><b>Neural Node</b><br><small>Level ${game.data.mine_lvl}</small></div><b>${game.getCost('mine')} NP</b></div>`;
                } else if(type === 'ai') {
                    b.innerHTML = `<h2>🤖 AI ADVISOR</h2><div class="ai-terminal" id="ai-res">Standby...</div><button class="task-btn" style="width:100%" onclick="ui.askAI()">ANALYZE</button>`;
                } else if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 REFERRALS</h2><div class="ref-box">${link}</div><button class="task-btn" style="width:100%" onclick="ui.copyRef('${link}')">COPY LINK</button>`;
                } else if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-btn" style="display:flex; justify-content:center; padding:20px;"></div>`;
                    setTimeout(() => tonConnectUI.renderButton({ container: document.getElementById('ton-btn') }), 100);
                } else if(type === 'tasks') {
                    b.innerHTML = `<h2>📋 MISSIONS</h2>
                    <div class="task-item"><span>Join Telegram</span><button class="task-btn" onclick="tg.openTelegramLink('https://t.me/neural_pulse')">+10k</button></div>`;
                } else if(type === 'top') {
                    b.innerHTML = `<h2>🏆 TOP AGENTS</h2><p style="color:gray; text-align:center;">Coming soon...</p>`;
                } else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 DAILY</h2><button class="task-btn" style="width:100%; height:60px;" onclick="ui.claimDaily()">CLAIM 5,000 NP</button>`;
                }
            },

            async askAI() {
                const res = document.getElementById('ai-res');
                res.innerText = "Processing...";
                try {
                    const r = await fetch('/api/ai-advice', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(game.data) });
                    const j = await r.json();
                    res.innerText = j.text || "Pulse stable. Keep mining.";
                } catch(e) { res.innerText = "Offline."; }
            },

            copyRef(url) { navigator.clipboard.writeText(url).then(() => tg.showAlert('Copied!')); },

            claimDaily() {
                game.data.balance += 5000;
                ui.render(); ui.closeM();
                tg.showAlert("Reward Claimed!");
                game.save();
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
