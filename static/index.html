<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="avatar"><img src="images/logo.png"></div>
            <div>
                <b id="u-name">...</b><br>
                <small style="color:var(--accent); font-size:9px;">v3.8.8 Quantum Full</small>
            </div>
            <div id="u-lvl" class="lvl-badge">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+2</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" onpointerdown="ui.handleTap(event)">
            
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">...</span></div>
            <div class="load-bar-bg"><div id="eng-fill" class="load-bar-f"></div></div>
        </div>

        <div class="bottom-nav">
            <button onclick="ui.openM('boost')">🚀 BOOST</button>
            <button onclick="ui.openM('mine')">⛏️ MINE</button>
            <button onclick="ui.openM('tasks')">📋 TASKS</button>
            <button onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="m-mine" class="modal">
        <h1 style="display:flex; align-items:center; gap:15px;">⛏️ MINE</h1>
        <div class="stat-card" style="margin-bottom:10px; text-align:left;">
            <b>Neural Node</b><br><small>+50/hr | Цена: 5,000</small>
        </div>
        <button class="lvl-badge" style="border:none; width:100%; margin-top:auto;" onclick="ui.closeM()">BACK</button>
    </div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script>
        // Простая инициализация без loading.js для теста
        ui.render();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
