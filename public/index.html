<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI | Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { 
            --neon-cyan: #00f2ff; 
            --neon-purple: #bc13fe; 
            --bg-dark: #050505; 
            --glass: rgba(255, 255, 255, 0.07); 
        }
        
        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; height: 100vh; 
            touch-action: none; user-select: none; 
        }

        #particle-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 100; }

        /* --- ОБНОВЛЕННЫЙ ЛОАДЕР --- */
        #loader-screen { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10000; transition: opacity 0.5s; 
        }

        .loader-ring-visual {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.03);
            border-top: 3px solid var(--neon-cyan);
            border-bottom: 3px solid var(--neon-purple);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            animation: spin-ai 1.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .loader-logo-static {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            animation: spin-reverse 1.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin-ai { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }

        #loader-percent { 
            font-size: 28px; font-weight: 900; color: var(--neon-cyan); 
            font-family: monospace; text-shadow: 0 0 10px var(--neon-cyan); 
        }

        .loader-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 15px auto 0; }
        #loader-fill { width: 0%; height: 100%; background: var(--neon-cyan); transition: width 0.2s; }
        /* -------------------------- */

        .header-card { width: 85%; margin-top: 15px; display: flex; align-items: center; gap: 12px; background: var(--glass); padding: 12px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.15); backdrop-filter: blur(10px); z-index: 10; }
        #balance { font-size: 48px; font-weight: 900; margin-top: 25px; text-shadow: 0 0 30px rgba(0, 242, 255, 0.4); z-index: 10; font-variant-numeric: tabular-nums; }
        
        .click-area { width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; margin-top: 30px; position: relative; z-index: 5; }
        .main-logo { width: 230px; height: 230px; border-radius: 50%; transition: transform 0.05s; border: 4px solid rgba(255,255,255,0.05); object-fit: cover; }
        
        .main-logo.active { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px var(--neon-cyan)); }
            50% { filter: drop-shadow(0 0 25px var(--neon-cyan)); }
            100% { filter: drop-shadow(0 0 5px var(--neon-cyan)); }
        }

        #shop-modal, #stats-modal, #admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .shop-card, .leaderboard, .admin-card { background: var(--glass); width: 85%; padding: 20px; border-radius: 24px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; }
        
        .admin-input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ff4d4d; background: #111; color: #fff; text-align: center; }
        .admin-btn { background: #ff4d4d !important; color: white !important; margin-top: 8px; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; }

        .leaderboard { max-height: 60vh; overflow-y: auto; padding: 10px; }
        .leader-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .leader-rank { width: 35px; font-weight: 900; color: var(--neon-cyan); font-size: 18px; }
        .leader-info { flex-grow: 1; text-align: left; padding-left: 10px; }
        .leader-name { font-weight: 800; font-size: 14px; }
        .leader-balance { font-size: 12px; color: #888; }

        .buy-btn { background: var(--neon-cyan); color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 900; margin-top: 10px; }

        .side-nav { position: absolute; right: -10px; display: flex; flex-direction: column; gap: 10px; }
        .side-btn { background: rgba(20,20,20,0.8); border: 1px solid rgba(255,255,255,0.1); padding: 12px 5px; border-radius: 16px; width: 70px; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; }
        
        .energy-section { width: 85%; margin-top: 25px; z-index: 10; }
        .energy-bar-wrap { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #energy-fill { height: 100%; background: linear-gradient(90deg, #00ff66, var(--neon-cyan)); width: 100%; transition: width 0.3s; }

        .bottom-nav { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: auto; margin-bottom: 35px; z-index: 10; }
        .nav-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 16px 5px; border-radius: 18px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; }
        
        .tap-text { position: absolute; color: #fff; font-size: 36px; font-weight: 900; pointer-events: none; animation: floatUp 0.6s ease-out forwards; text-shadow: 0 0 15px var(--neon-purple); z-index: 1000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.3); } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="loader-screen">
        <div style="text-align: center;">
            <div class="loader-ring-visual">
                <img src="logo.png" class="loader-logo-static" onerror="this.src='https://via.placeholder.com/100/150a28/fff?text=AI'">
            </div>
            <div id="loader-percent">0%</div>
            <div class="loader-bar"><div id="loader-fill"></div></div>
            <div style="margin-top: 10px; font-size: 9px; color: #444; letter-spacing: 2px;">NEURAL LINKING...</div>
        </div>
    </div>

    <div class="header-card">
        <div id="lvl-badge" style="width: 44px; height: 44px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--neon-cyan); font-size: 18px; cursor: pointer;">1</div>
        <div style="flex-grow: 1;">
            <div style="font-size: 10px; color: #888; letter-spacing: 1px;" id="league-name">NEURAL BRONZE</div>
            <div id="pnl-display" style="color: var(--neon-cyan); font-weight: bold; font-size: 12px; margin-top: 2px;">PASSIVE: +0/h</div>
        </div>
    </div>

    <div id="balance">0</div>

    <div class="click-area" id="tap-zone">
        <img src="logo.png" class="main-logo" id="main-logo" onerror="this.src='https://via.placeholder.com/230/bc13fe/fff?text=AI'">
        <div class="side-nav">
            <div class="side-btn" id="ton-btn-root" style="border-color: #0088cc; overflow: hidden; position: relative;">
                <span id="addr-text">WALLET</span>
                <div id="ton-connect-mount" style="position: absolute; inset: 0; opacity: 0.01;"></div>
            </div>
            <div class="side-btn" onclick="showInvite()">INVITE</div>
            <div class="side-btn" onclick="tg.showAlert('Check back in 24h for a new bonus!')">BONUS</div>
        </div>
    </div>

    <div class="energy-section">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: #aaa;">
            <span>⚡ ENERGY</span>
            <span id="energy-text">1000/1000</span>
        </div>
        <div class="energy-bar-wrap"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="toggleShop()">🚀 BOOST</div>
        <div class="nav-btn" onclick="toggleShop()">⛏️ MINE</div>
        <div class="nav-btn" onclick="showStats()">📊 STATS</div>
    </div>

    <div id="shop-modal">
        <h2 style="margin-bottom: 25px; color: #fff; letter-spacing: 2px;">NEURAL SHOP</h2>
        <div class="shop-card">
            <h3 style="margin: 0; color: var(--neon-cyan);">⚡ MULTI-TAP</h3>
            <p id="click-cost" style="color: #888; margin: 10px 0;">Cost: 500 NP</p>
            <button class="buy-btn" onclick="buy('click')">UPGRADE</button>
        </div>
        <div class="shop-card" style="margin-top:15px">
            <h3 style="margin: 0; color: var(--neon-cyan);">⛏️ AUTO-MINING</h3>
            <p id="pnl-cost" style="color: #888; margin: 10px 0;">Cost: 1200 NP</p>
            <button class="buy-btn" onclick="buy('pnl')">UPGRADE</button>
        </div>
        <button onclick="toggleShop()" style="background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 12px 40px; border-radius: 12px; margin-top: 20px; cursor: pointer;">BACK</button>
    </div>

    <div id="stats-modal">
        <h2 style="margin-bottom: 20px; color: var(--neon-cyan); letter-spacing: 2px;">TOP 10 MINERS</h2>
        <div class="leaderboard" id="leaderboard-list"></div>
        <button onclick="document.getElementById('stats-modal').style.display='none'" style="background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 12px 40px; border-radius: 12px; margin-top: 20px; cursor: pointer;">CLOSE</button>
    </div>

    <div id="admin-modal">
        <div class="admin-card">
            <h2 style="color: #ff4d4d; margin-top: 0;">TERMINAL ACCESS</h2>
            <input type="password" id="admin-pass" class="admin-input" placeholder="Enter Secret Key">
            <button class="admin-btn" onclick="adminAction('reset-db', true)">🔥 WIPE ALL DATA</button>
            <button class="admin-btn" style="background: #ffa500 !important;" onclick="adminAction('restart')">♻️ RESTART SERVER</button>
            <button class="admin-btn" style="background: #555 !important;" onclick="adminAction('reset-cache')">🧹 CLEAR SESSIONS</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'" style="background: none; border: 1px solid #444; color: #888; width: 100%; padding: 12px; border-radius: 12px; margin-top: 15px; cursor: pointer;">EXIT</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Canvas Particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        // TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-mount'
        });

        const params = new URLSearchParams(window.location.search);
        let state = { 
            uid: params.get('u') || tg.initDataUnsafe?.user?.id || 'demo',
            balance: 0, energy: 1000, click_lvl: 1, pnl: 0, loaded: false, unsavedClicks: 0
        };

        const getClickCost = (lvl) => Math.floor(500 * Math.pow(1.45, lvl - 1));
        const getPnlCost = (pnl) => Math.floor(1200 * Math.pow(1.28, Math.floor(pnl/250) || 0));

        async function init() {
            try {
                const r = await fetch(`/api/user/${state.uid}`);
                const data = await r.json();
                Object.assign(state, data);
                state.loaded = true;
                if(state.pnl > 0) document.getElementById('main-logo').classList.add('active');
                updateUI();
            } catch(e) { console.error("Retry loading..."); setTimeout(init, 2000); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/1000`;
            document.getElementById('energy-fill').style.width = (state.energy/10)+'%';
            document.getElementById('lvl-badge').innerText = state.click_lvl;
            document.getElementById('pnl-display').innerText = `PASSIVE: +${Math.floor(state.pnl)}/h`;
            document.getElementById('click-cost').innerText = `Cost: ${getClickCost(state.click_lvl).toLocaleString()} NP`;
            document.getElementById('pnl-cost').innerText = `Cost: ${getPnlCost(state.pnl).toLocaleString()} NP`;
            const league = state.balance > 1000000 ? "NEURAL DIAMOND" : state.balance > 100000 ? "NEURAL GOLD" : "NEURAL BRONZE";
            document.getElementById('league-name').innerText = league;
            if(tonConnectUI.account) {
                const a = tonConnectUI.account.address;
                document.getElementById('addr-text').innerText = a.slice(0,4) + '..' + a.slice(-4);
                document.getElementById('addr-text').style.color = '#00ff66';
            }
        }

        function spawnParticles(x, y) {
            for(let i=0; i<6; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 1.0, size: Math.random()*3 + 1,
                    color: Math.random() > 0.5 ? '#00f2ff' : '#bc13fe'
                });
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!state.loaded || state.energy < state.click_lvl) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            const t = e.touches[0];
            state.balance += state.click_lvl;
            state.energy -= state.click_lvl;
            state.unsavedClicks += 1;
            spawnParticles(t.clientX, t.clientY);
            const n = document.createElement('div');
            n.className = 'tap-text'; n.innerText = `+${state.click_lvl}`;
            n.style.left = (t.clientX - 20) + 'px'; n.style.top = (t.clientY - 40) + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 600);
            document.getElementById('main-logo').style.transform = 'scale(0.94) rotate(1deg)';
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        document.getElementById('tap-zone').addEventListener('touchend', () => {
            document.getElementById('main-logo').style.transform = 'scale(1) rotate(0deg)';
        });

        async function buy(type) {
            const r = await fetch('/api/upgrade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: state.uid, type })
            });
            const res = await r.json();
            if(res.success) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                init();
            } else tg.showAlert("Insufficient NP Balance!");
        }

        async function sync() {
            if(!state.loaded || state.unsavedClicks === 0) return;
            const clicksToSend = state.unsavedClicks;
            state.unsavedClicks = 0;
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        userId: state.uid, clicks: clicksToSend, energy: state.energy, 
                        username: tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || 'User' 
                    })
                });
            } catch(e) { state.unsavedClicks += clicksToSend; }
        }

        function toggleShop() {
            const m = document.getElementById('shop-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function showStats() {
            const modal = document.getElementById('stats-modal');
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '<div style="padding: 20px">Scanning network...</div>';
            modal.style.display = 'flex';
            try {
                const r = await fetch('/api/top');
                const top = await r.json();
                list.innerHTML = '';
                top.forEach((u, i) => {
                    const div = document.createElement('div');
                    div.className = 'leader-item';
                    div.innerHTML = `<div class="leader-rank">${i+1}</div><div class="leader-info"><div class="leader-name">${u.username || 'Anonymous'}</div><div class="leader-balance">${Math.floor(u.balance).toLocaleString()} NP</div></div>`;
                    list.appendChild(div);
                });
            } catch(e) { list.innerHTML = 'Error loading top'; }
        }

        function showInvite() {
            const link = `https://t.me/neural_pulse_bot?start=${state.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join my Neural Network! 🧠`);
        }

        let adminClicks = 0;
        let adminTimer;
        document.getElementById('lvl-badge').onclick = () => {
            adminClicks++;
            clearTimeout(adminTimer);
            if(adminClicks >= 5) {
                document.getElementById('admin-modal').style.display = 'flex';
                adminClicks = 0;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            }
            adminTimer = setTimeout(() => adminClicks = 0, 2000);
        };

        async function adminAction(action, confirmReq = false) {
            if(confirmReq && !confirm("Danger! Wipe data?")) return;
            const pass = document.getElementById('admin-pass').value;
            try {
                const r = await fetch(`/api/admin/${action}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'admin-secret': pass}
                });
                if(r.ok) { tg.showAlert("Command Sent!"); location.reload(); }
                else tg.showAlert("Access Denied");
            } catch(e) { tg.showAlert("Error"); }
        }

        setInterval(sync, 3500);
        setInterval(() => { 
            if(state.loaded) {
                if(state.energy < 1000) state.energy = Math.min(1000, state.energy + 1.5);
                updateUI();
            }
        }, 1000);

        window.onload = () => {
            init();
            let progress = 0;
            const loader = setInterval(() => {
                // Если данные загружены, ускоряем заполнение
                progress += state.loaded ? 8 : 1; 
                
                if(progress >= 100) { 
                    progress = 100;
                    clearInterval(loader); 
                    document.getElementById('loader-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader-screen').style.display='none', 500);
                }
                document.getElementById('loader-fill').style.width = progress + '%';
                document.getElementById('loader-percent').innerText = progress + '%';
            }, 50);
        };
    </script>
</body>
</html>
