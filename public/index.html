<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #loader { font-size: 40px; color: #00f2ff; font-weight: 900; }
        #game { display: none; flex-direction: column; align-items: center; width: 100%; }
        .bal { font-size: 48px; font-weight: 900; margin-bottom: 20px; color: #00f2ff; }
        .coin { width: 250px; height: 250px; border-radius: 50%; border: 4px solid #111; box-shadow: 0 0 20px rgba(0,242,255,0.2); transition: 0.1s; cursor: pointer; }
        .coin:active { transform: scale(0.95); }
        .energy-box { width: 80%; background: #111; height: 10px; border-radius: 5px; margin-top: 40px; overflow: hidden; }
        #bar { height: 100%; background: #00f2ff; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="loader">0%</div>
    <div id="game">
        <div class="bal" id="bal">0</div>
        <img src="logo.png" class="coin" id="coin" onerror="this.src='https://via.placeholder.com/250/000/00f2ff?text=AI'">
        <div class="energy-box"><div id="bar"></div></div>
        <p id="nrg-txt">1000/1000</p>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    let state = { bal: 0, nrg: 1000, lvl: 1, uid: new URLSearchParams(window.location.search).get('u') || tg.initDataUnsafe?.user?.id };

    // Имитация загрузки
    let p = 0;
    const lIdx = setInterval(() => {
        p += 5;
        document.getElementById('loader').innerText = p + '%';
        if (p >= 100) {
            clearInterval(lIdx);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
        }
    }, 50);

    async function load() {
        if (!state.uid) return;
        const res = await fetch('/api/user/' + state.uid);
        const d = await res.json();
        state.bal = Number(d.balance) || 0;
        state.nrg = Number(d.energy) || 1000;
        update();
    }

    function update() {
        document.getElementById('bal').innerText = Math.floor(state.bal);
        document.getElementById('bar').style.width = (state.nrg / 10) + '%';
        document.getElementById('nrg-txt').innerText = Math.floor(state.energy) + '/1000';
    }

    document.getElementById('coin').onclick = () => {
        if (state.nrg < state.lvl) return;
        state.bal += state.lvl; state.nrg -= state.lvl;
        update();
        tg.HapticFeedback.impactOccurred('light');
    };

    setInterval(() => {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: state.uid, balance: state.bal, energy: state.nrg, click_lvl: state.lvl })
        });
    }, 5000);

    window.onload = load;
</script>
</body>
</html>
