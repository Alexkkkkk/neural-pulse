<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v4.0.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">ACCESS GRANTED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small>v4.0.0 Neural Mining</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>ENERGY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const ADMIN_WALLET = "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI";
        let tonConnectUI = null;

        const game = {
            // Добавлено поле auto_click_until для хранения времени истечения буста
            data: { id: 0, balance: 0, energy: 1000, max_energy: 1000, tap: 1, profit: 0, last_bonus: 0, auto_click_until: 0 },
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, first_name: 'Agent' };
                const name = (u.username || u.first_name).toUpperCase();
                
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });
                    
                    tonConnectUI.onStatusChange(wallet => {
                        if (document.getElementById('modal').classList.contains('active')) {
                            const currentType = document.querySelector('#m-body h2')?.innerText;
                            if (currentType && currentType.includes('CRYPTO HUB')) ui.openM('wallet');
                        }
                    });

                } catch(err) { console.error(err); }

                try {
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}&photo_url=${encodeURIComponent(u.photo_url || '')}`);
                    if (r.ok) {
                        const d = await r.json();
                        Object.assign(this.data, d);
                    }
                } catch(e) { this.data.id = u.id; } finally {
                    document.getElementById('my-name').innerText = name;
                    if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                    this.isLoaded = true;
                    this.loop();
                }
            },

            async payTon(amount, title) {
                if (!tonConnectUI?.connected) return tg.showAlert("Подключите кошелек!");
                try {
                    await tonConnectUI.sendTransaction({
                        validUntil: Math.floor(Date.now()/1000)+300,
                        messages: [{ address: ADMIN_WALLET, amount: (amount * 1e9).toString() }]
                    });
                    tg.showAlert(`Транзакция "${title}" отправлена.`);
                } catch(e) { tg.showAlert("Оплата отменена"); }
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < this.data.tap) return;
                this.data.balance += this.data.tap;
                this.data.energy -= this.data.tap;
                ui.render();
                ui.pop(e);
                tg.HapticFeedback.impactOccurred('medium');
            },

            // Переработанная функция апгрейдов: всё за NP
            upgrade(type) {
                let cost = 0;
                if (type === 'tap') cost = this.data.tap * 800;
                else if (type === 'energy') cost = 5000;
                else if (type === 'autoclick') cost = 50000;
                else if (type === 'mine') cost = (this.data.profit + 150) * 12;

                if (this.data.balance >= cost) {
                    this.data.balance -= cost;
                    
                    if (type === 'tap') {
                        this.data.tap++;
                    } else if (type === 'energy') {
                        this.data.energy = this.data.max_energy;
                        tg.showAlert("Энергия восстановлена!");
                    } else if (type === 'autoclick') {
                        const day = 24 * 60 * 60 * 1000;
                        this.data.auto_click_until = Date.now() + day;
                        tg.showAlert("Автокликер активирован на 24 часа!");
                    } else if (type === 'mine') {
                        this.data.profit += 150;
                    }

                    tg.HapticFeedback.notificationOccurred('success');
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("Недостаточно NP!");
                }
            },

            claimBonus() {
                const now = Date.now();
                if (now - this.data.last_bonus > 86400000) {
                    this.data.balance += 3000;
                    this.data.last_bonus = now;
                    tg.showAlert("Бонус +3,000 NP получен!");
                    ui.render(); ui.closeM();
                } else tg.showAlert("Заходите завтра!");
            },

            loop() {
                setInterval(() => {
                    // Регенерация энергии
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 3);
                    
                    // Логика пассивного дохода (Mining)
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    
                    // ЛОГИКА АВТОКЛИКЕРА: срабатывает каждую секунду, если активен буст
                    if (this.data.auto_click_until > Date.now()) {
                        if (this.data.energy >= this.data.tap) {
                            this.data.balance += this.data.tap;
                            this.data.energy -= this.data.tap;
                        }
                    }

                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 15000);
            },

            async save() {
                if(!this.isLoaded) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: this.data.id, ...this.data })
                }).catch(() => {});
            }
        };

        const ui = {
            shortAddr(addr) { return addr ? addr.slice(0, 4) + '...' + addr.slice(-4) : ''; },
            
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 4;
                    document.getElementById('pct').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                    if(p >= 100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; this.render(); }
                }, 30);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = d.profit;
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(d.balance/10000)+1}`;
            },

            pop(e) {
                const t = e.touches[0];
                const p = document.createElement('div');
                p.className = 'pop'; p.innerText = `+${game.data.tap}`;
                p.style.left = t.clientX+'px'; p.style.top = t.clientY+'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = '';
                
                if(type === 'wallet') {
                    const isConn = tonConnectUI && tonConnectUI.connected;
                    b.innerHTML = `
                        <h2>👛 CRYPTO HUB</h2>
                        <div id="ton-connect-btn" style="display:flex;justify-content:center;margin:20px 0;"></div>
                        ${isConn ? `
                            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; text-align:center; margin-bottom:15px;">
                                <small style="color:#888;">STATUS: CONNECTED</small><br>
                                <b style="color:#00FFFF; font-family:monospace;">${this.shortAddr(tonConnectUI.account.address)}</b>
                            </div>
                            <button onclick="tonConnectUI.disconnect()" style="width:100%; padding:15px; background:#ff4444; color:#fff; border-radius:12px; font-weight:bold; border:none;">DISCONNECT</button>
                        ` : `
                            <p style="text-align:center; color:#888; font-size:0.9em; padding:10px;">Connect your TON wallet for secure payments and mining bonuses.</p>
                        `}
                    `;
                    if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-btn' };
                } 
                else if(type === 'boost') {
                    const autoActive = game.data.auto_click_until > Date.now();
                    const timeLeft = autoActive ? Math.round((game.data.auto_click_until - Date.now()) / 3600000) : 0;
                    
                    b.innerHTML = `<h2>🚀 UPGRADES</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><div class="t-user"><b>⚡</b><span>Multitap (Lvl ${game.data.tap})</span></div><b>${game.data.tap*800} NP</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><div class="t-user"><b>🔋</b><span>Full Energy Restore</span></div><b>5,000 NP</b></div>
                    <div class="top-item" onclick="game.upgrade('autoclick')">
                        <div class="t-user"><b>🤖</b><span>Auto-Clicker (24h) ${autoActive ? `<br><small style="color:#00ff00;">Active: ${timeLeft}h left</small>` : ''}</span></div>
                        <b>50,000 NP</b>
                    </div>`;
                } 
                else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ NEURAL MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><div class="t-user"><b>🧠</b><span>CPU Node (+150/h)</span></div><b>${(game.data.profit+150)*12} NP</b></div>
                    <div class="top-item" onclick="game.payTon(0.5, 'Elite Server')"><div class="t-user"><b>🛰️</b><span>Elite Server (+5k/h)</span></div><b>0.5 TON</b></div>`;
                } 
                // ... (остальные разделы: friends, bonus, tasks, top — без изменений)
                else if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 REFERRALS</h2><div class="top-item"><div class="t-user"><b>🔗</b><span>Your Link:</span></div></div>
                    <button onclick="tg.openTelegramLink('https://t.me/share/url?url=${link}')" style="width:100%;padding:15px;background:#00FFFF;color:#000;border-radius:12px;font-weight:bold;margin-top:10px;">SHARE WITH FRIENDS</button>`;
                } 
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 DAILY REWARD</h2><div style="text-align:center;padding:20px;"><b>+3,000 NP AVAILABLE</b><br><br><button onclick="game.claimBonus()" style="width:100%;padding:15px;background:#00FFFF;color:#000;border-radius:12px;font-weight:900;">COLLECT GIFT</button></div>`;
                } 
                else if(type === 'tasks') {
                    b.innerHTML = `<h2>📋 MISSIONS</h2>
                    <div class="top-item" onclick="tg.openLink('https://t.me/your_channel')"><div class="t-user"><b>📢</b><span>Subscribe News</span></div><b>+5k NP</b></div>
                    <div class="top-item" onclick="tg.openLink('https://twitter.com/')"><div class="t-user"><b>🐦</b><span>Follow X</span></div><b>+3k NP</b></div>`;
                } 
                else if(type === 'top') {
                    b.innerHTML = `<h2>🏆 HALL OF FAME</h2><div id="top-list" style="max-height: 380px; overflow-y: auto; padding-right: 5px;">Loading ranking...</div>`;
                    fetch('/api/top').then(r=>r.json()).then(list=>{
                        let h = ''; 
                        list.slice(0, 100).forEach((u, i) => {
                            let trophy = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '💎';
                            const isMe = u.id == game.data.id ? 'style="border: 1px solid #00FFFF; background: rgba(0,255,255,0.1);"' : '';
                            h += `<div class="top-item" ${isMe}><div class="t-user"><b style="min-width: 25px; display: inline-block; text-align: center;">${trophy}</b><img src="${u.photo_url || 'images/logo.png'}" style="width:24px;height:24px;border-radius:50%;margin:0 10px; border: 1px solid #333;"><span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;">${u.username}</span></div><b style="color: #00FFFF;">${Math.floor(u.balance).toLocaleString()}</b></div>`;
                        });
                        document.getElementById('top-list').innerHTML = h;
                    }).catch(() => document.getElementById('top-list').innerHTML = "No data from server");
                }
            },
            closeM() { document.getElementById('modal').classList.remove('active'); }
        };
        window.onload = () => game.init();
    </script>
</body>
</html>
