<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.2.9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --gold: #ffd700; --bg: #000; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-circle { width: 120px; height: 120px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-purple); animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.5s; visibility: hidden; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin-top: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        .lvl-box { width: 45px; height: 45px; border: 2px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }

        .bal { font-size: 60px; font-weight: 900; margin-top: 15px; text-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .pnl { color: var(--neon-cyan); font-weight: bold; margin-top: -10px; font-size: 13px; }

        .stage { flex-grow: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .main-logo { width: 230px; height: 230px; z-index: 1; border-radius: 50%; transition: 0.1s; border: 3px solid transparent; }
        .is-leader { border-color: var(--gold); box-shadow: 0 0 40px rgba(255,215,0,0.4); }

        .overlay-btns { position: absolute; right: 8%; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .btn-pill { background: rgba(20,20,20,0.85); border: 1px solid #444; color: white; padding: 12px 0; border-radius: 18px; width: 110px; text-align: center; font-size: 10px; font-weight: bold; backdrop-filter: blur(8px); cursor: pointer; }
        
        .footer { width: 92%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 35px; }
        .f-item { background: #151515; border: 1px solid #252525; border-radius: 20px; padding: 18px 0; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .leader-row { display: flex; justify-content: space-between; padding: 15px; background: #111; border-radius: 15px; margin-bottom: 8px; border: 1px solid #222; }
        .rank-1 { border-color: var(--gold); color: var(--gold); background: linear-gradient(90deg, #111, #1a1600); }

        .plus { position: absolute; font-size: 35px; font-weight: 900; color: var(--neon-cyan); animation: float 0.7s forwards; pointer-events: none; z-index: 100; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-130px); } }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-circle"></div></div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl-box" id="l-v">1</div>
            <div><div style="font-size: 9px; color: #555;">NODE ALPHA</div><div style="font-size: 14px; font-weight: 900;">NEURAL PULSE v1.2.9</div></div>
        </div>
        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">PNL: +0/H</div>

        <div class="stage">
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
            <div class="overlay-btns">
                <div class="btn-pill" id="w-btn" onclick="handleWallet()">WALLET</div>
                <div class="btn-pill" onclick="invite()">FRIENDS</div>
                <div class="btn-pill" style="border-color:var(--neon-purple)" onclick="getBonus()">BONUS</div>
            </div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="openM('boost-ui')">🚀 BOOST</div>
            <div class="f-item" onclick="openM('mine-ui')">⛏️ MINE</div>
            <div class="f-item" onclick="openM('stats-ui')">📊 TOP</div>
        </div>
    </div>

    <div id="stats-ui" class="modal">
        <h2 style="color:var(--neon-purple)">LEADERBOARD</h2>
        <div id="leaderboard-list" style="overflow-y:auto; flex-grow:1"></div>
        <button class="f-item" style="width:100%; margin-top:20px" onclick="closeM('stats-ui')">CLOSE</button>
    </div>

    <div id="mine-ui" class="modal">
        <h2>MATH SHOP</h2>
        <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>Addition (+)</span>
            <button class="btn-pill" onclick="buyCard(10000, 350)">10K</button>
        </div>
        <button class="f-item" style="width:100%; margin-top:auto" onclick="closeM('mine-ui')">BACK</button>
    </div>

    <div id="boost-ui" class="modal">
        <h2>UPGRADES</h2>
        <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>Tap Power</span>
            <button class="btn-pill" onclick="upgradeTap()">5K</button>
        </div>
        <button class="f-item" style="width:100%; margin-top:auto" onclick="closeM('boost-ui')">BACK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });

        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0, isLeader: false };

        async function load() {
            const r = await fetch(`/api/user/${s.uid}`);
            const d = await r.json();
            Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
            
            const topR = await fetch('/api/leaderboard');
            const top = await topR.json();
            s.isLeader = (top[0]?.user_id == s.uid);
            
            upd();
