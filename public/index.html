<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.9.3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --card: rgba(15, 15, 15, 0.9); --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }

        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .load-logo { width: 120px; filter: drop-shadow(0 0 15px var(--cyan)); }

        .header { width: 92%; margin-top: 15px; background: var(--card); border: 1px solid #222; border-radius: 16px; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        .u-info { display: flex; align-items: center; gap: 12px; }
        .u-avatar { width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--cyan); object-fit: cover; background: #111; }
        .u-name { font-weight: 800; font-size: 14px; display: block; }
        .u-ver { font-size: 10px; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.5px; }
        .lvl-badge { background: var(--cyan); color: black; font-weight: 900; padding: 6px 12px; border-radius: 8px; font-size: 12px; }

        .balance { font-size: 64px; font-weight: 900; margin-top: 30px; letter-spacing: -2px; }
        .pnl-badge { font-size: 14px; color: #888; margin-top: 5px; }
        .pnl-badge span { color: var(--purple); font-weight: 800; }

        .stage { flex-grow: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        .main-ai { width: 220px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 25px rgba(188, 19, 254, 0.4)); }
        .main-ai:active { transform: scale(0.94); }

        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 12px; }
        .side-btn { background: rgba(255,255,255,0.05); border: 1px solid #222; color: white; width: 100px; padding: 14px 0; border-radius: 14px; font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; }

        .energy-box { width: 90%; margin-bottom: 25px; }
        .e-bar { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; margin-top: 6px; }
        .e-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; box-shadow: 0 0 10px var(--cyan); }

        .bottom-nav { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .nav-item { background: #111; border: 1px solid #222; border-radius: 15px; padding: 16px 0; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #666; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 25px; }
        .m-title { font-size: 32px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        .m-close { margin-top: auto; background: #111; padding: 20px; border-radius: 18px; text-align: center; font-weight: 800; text-transform: uppercase; color: #888; border: 1px solid #222; }

        /* КРУТОЙ ТОП */
        .top-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .top-item { background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; padding: 12px 15px; border-radius: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .top-rank { font-size: 18px; font-weight: 900; width: 30px; color: #444; }
        .top-user { display: flex; align-items: center; gap: 12px; flex-grow: 1; }
        .top-img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #222; border: 1px solid #333; }
        .top-name { font-weight: 700; font-size: 14px; }
        .top-bal { color: var(--cyan); font-weight: 800; font-size: 14px; }

        /* Стили для лидеров */
        .rank-1 { background: rgba(255, 215, 0, 0.07) !important; border-color: var(--gold) !important; }
        .rank-1 .top-rank { color: var(--gold); }
        .rank-2 { background: rgba(192, 192, 192, 0.07) !important; border-color: var(--silver) !important; }
        .rank-2 .top-rank { color: var(--silver); }
        .rank-3 { background: rgba(205, 127, 50, 0.07) !important; border-color: var(--bronze) !important; }
        .rank-3 .top-rank { color: var(--bronze); }
        .my-score { border: 1px solid var(--cyan) !important; box-shadow: 0 0 10px rgba(0,242,255,0.1); }
    </style>
</head>
<body>

<div id="loader">
    <img src="logo.png" class="load-logo">
    <div id="p-txt" style="font-size:32px; font-weight:900; color:var(--cyan); margin-top:20px">0%</div>
</div>

<div class="header">
    <div class="u-info">
        <img id="u-av" class="u-avatar" src="images/logo.png">
        <div>
            <span class="u-name" id="u-nm">Neural Player</span>
            <span class="u-ver">v1.9.3 Node</span>
        </div>
    </div>
    <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
</div>

<div class="balance" id="b-v">0</div>
<div class="pnl-badge">Neural Profit: <span id="p-v">0</span>/s</div>

<div class="stage">
    <img src="logo.png" class="main-ai" onclick="doTap()">
    <div class="side-menu">
        <div class="side-btn" onclick="openM('wal-m')">Wallet</div>
        <div class="side-btn" onclick="openM('fr-m')">Friends</div>
        <div class="side-btn" onclick="openM('bn-m')">Bonus</div>
    </div>
</div>

<div class="energy-box">
    <div style="display:flex; justify-content:space-between; font-size:10px; color:#555; font-weight:800; text-transform:uppercase">
        <span>Energy core</span>
        <span id="e-val">1000/1000</span>
    </div>
    <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="openM('bs-m')">Boost</div>
    <div class="nav-item" onclick="openM('mi-m')">Mine</div>
    <div class="nav-item" onclick="openM('ta-m')">Tasks</div>
    <div class="nav-item" onclick="openM('tp-m')">Rating</div>
</div>

<div id="tp-m" class="modal">
    <div class="m-title">Global<br><span style="color:var(--cyan)">Rating</span></div>
    <div class="top-container" id="top-list">
        </div>
    <div class="m-close" onclick="closeM('tp-m')">Close</div>
</div>

<div id="wal-m" class="modal">
    <div class="m-title">Wallet</div>
    <div style="background:#111; padding:25px; border-radius:20px; border:1px solid #222; text-align:center">
        <div style="font-size:10px; color:#555; margin-bottom:10px">CONNECTED ADDRESS</div>
        <div id="w-addr" style="font-size:12px; color:var(--cyan); word-break:all">Not connected</div>
    </div>
    <button id="connect-trigger" style="width:100%; padding:20px; border-radius:18px; border:none; background:var(--cyan); font-weight:900; margin-top:20px" onclick="handleWalletAction()">Connect Wallet</button>
    <div class="m-close" onclick="closeM('wal-m')">Back</div>
</div>

<div id="bs-m" class="modal"><div class="m-title">Boost</div><div class="m-close" onclick="closeM('bs-m')">Back</div></div>
<div id="mi-m" class="modal"><div class="m-title">Mine</div><div class="m-close" onclick="closeM('mi-m')">Back</div></div>
<div id="ta-m" class="modal"><div class="m-title">Tasks</div><div class="m-close" onclick="closeM('ta-m')">Back</div></div>
<div id="fr-m" class="modal"><div class="m-title">Friends</div><div class="m-close" onclick="closeM('fr-m')">Back</div></div>
<div id="bn-m" class="modal"><div class="m-title">Bonus</div><div class="m-close" onclick="closeM('bn-m')">Back</div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let tonConnectUI;
    let s = { 
        uid: tg.initDataUnsafe?.user?.id || '0', 
        name: tg.initDataUnsafe?.user?.first_name || 'Neural Player',
        photo: tg.initDataUnsafe?.user?.photo_url || null,
        bal: 0, lvl: 1, eng: 1000, maxE: 1000, pnl: 0, wal: null 
    };

    let p = 0;
    const lIv = setInterval(() => {
        p += 5; document.getElementById('p-txt').innerText = p + '%';
        if(p >= 100) { clearInterval(lIv); document.getElementById('loader').style.opacity='0'; setTimeout(()=>document.getElementById('loader').remove(),500); init(); }
    }, 30);

    async function init() {
        document.getElementById('u-nm').innerText = s.name;
        if(s.photo) document.getElementById('u-av').src = s.photo;
        
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
        });

        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('connect-trigger');
            if (wallet) {
                s.wal = wallet.account.address;
                document.getElementById('w-addr').innerText = s.wal.slice(0,10)+"..."+s.wal.slice(-10);
                btn.innerText = "Disconnect"; btn.style.background = "#333"; btn.style.color = "white";
            } else {
                s.wal = null;
                document.getElementById('w-addr').innerText = "Not connected";
                btn.innerText = "Connect Wallet"; btn.style.background = "var(--cyan)"; btn.style.color = "black";
            }
            save();
        });
        await load();
    }

    async function handleWalletAction() {
        if (tonConnectUI.connected) await tonConnectUI.disconnect();
        else await tonConnectUI.openModal();
    }

    async function load() {
        try {
            const r = await fetch(`/api/user/${s.uid}?name=${encodeURIComponent(s.name)}&photo=${encodeURIComponent(s.photo||'')}`);
            const d = await r.json();
            s.bal = Number(d.balance); s.lvl = Number(d.click_lvl);
            s.eng = Number(d.energy); s.maxE = Number(d.max_energy);
            s.pnl = Number(d.pnl); s.wal = d.wallet_address;
            upd();
            setInterval(() => {
                if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 3);
                if(s.pnl > 0) s.bal += s.pnl; 
                upd();
            }, 1000);
            setInterval(save, 5000);
        } catch(e) { console.error("Sync Error"); }
    }

    function doTap() {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('medium');
            upd();
        }
    }

    function upd() {
        document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('p-v').innerText = s.pnl.toLocaleString();
        document.getElementById('u-lv').innerText = s.lvl;
        document.getElementById('e-val').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
        document.getElementById('e-f').style.width = (s.eng / s.maxE * 100) + '%';
    }

    function save() {
        fetch('/api/save', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ userId: s.uid, balance: s.bal, energy: s.eng, max_energy: s.maxE, click_lvl: s.lvl, pnl: s.pnl, wallet: s.wal }) 
        });
    }

    function openM(id) { 
        if(id === 'tp-m') renderTop();
        document.getElementById(id).style.display = 'flex'; 
    }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    async function renderTop() {
        const r = await fetch('/api/top');
        const d = await r.json();
        const list = document.getElementById('top-list');
        list.innerHTML = d.map((u, i) => {
            let cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
            if(u.username === s.name) cls += ' my-score';
            const photo = u.photo_url && u.photo_url !== 'null' ? u.photo_url : 'images/logo.png';
            return `
                <div class="top-item ${cls}">
                    <div class="top-rank">#${i+1}</div>
                    <div class="top-user">
                        <img src="${photo}" class="top-img">
                        <div class="top-name">${u.username}</div>
                    </div>
                    <div class="top-bal">${Number(u.balance).toLocaleString()}</div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
