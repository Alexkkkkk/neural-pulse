<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Neural Pulse Online</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00d4ff; --neon-purp: #b026ff; --neon-green: #00ffcc; --bg: #050a1a; --glass: rgba(10, 25, 47, 0.95); }
        body { margin: 0; background: var(--bg); height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; touch-action: manipulation; }
        
        /* ЛОАДЕР (Виден сразу) */
        #reloading-screen { position: fixed; inset: 0; background: #050a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        
        /* ЭКРАН ОЖИДАНИЯ (Замена стандартной ошибки Telegram) */
        #error-screen { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #050a1a; 
            z-index: 10000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .wait-text {
            color: var(--neon-blue);
            font-size: 16px;
            letter-spacing: 5px;
            font-weight: 900;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .loader-logo { width: 80px; height: 80px; border-radius: 20px; border: 2px solid var(--neon-purp); box-shadow: 0 0 20px rgba(176, 38, 255, 0.5); margin-bottom: 20px; overflow: hidden; background: #000; }
        .loader-logo img { width: 100%; height: 100%; object-fit: cover; }
        .loader-text { color: var(--neon-blue); font-size: 18px; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 15px var(--neon-blue); animation: pulse 1.5s infinite; }
        
        .progress-container { width: 200px; height: 4px; background: rgba(0, 212, 255, 0.1); border-radius: 10px; margin-top: 15px; position: relative; overflow: hidden; border: 1px solid rgba(0, 212, 255, 0.2); }
        #loader-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); box-shadow: 0 0 10px var(--neon-blue); transition: width 0.3s ease; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ИГРОВОЙ КОНТЕЙНЕР (Скрыт через display: none) */
        .game-container { 
            display: none; /* Важно: скрыто до полной загрузки данных */
            opacity: 0; 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px 15px; 
            box-sizing: border-box; 
            transition: opacity 0.4s ease; 
        }
        .game-container.visible { display: flex; opacity: 1; }

        /* Остальные стили дизайна без изменений */
        .header-top { width: 100%; display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .ai-icon-small { width: 48px; height: 48px; background: #000; border: 2px solid var(--neon-purp); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(176, 38, 255, 0.4); overflow: hidden; cursor: pointer; }
        .ai-icon-small img { width: 100%; height: 100%; object-fit: cover; }
        .league-info { flex-grow: 1; position: relative; }
        .league-header { display: flex; justify-content: space-between; font-size: 10px; font-weight: 900; margin-bottom: 4px; letter-spacing: 1px; }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #league-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: width 0.5s; }
        .level-label { position: absolute; right: 0; top: 12px; font-size: 10px; color: var(--neon-blue); font-weight: 900; text-shadow: 0 0 5px var(--neon-blue); }
        .jackpot-box { width: 100%; background: rgba(176, 38, 255, 0.05); border: 1px solid rgba(176, 38, 255, 0.2); border-radius: 18px; padding: 10px; text-align: center; margin-top: 15px; box-shadow: inset 0 0 15px rgba(176, 38, 255, 0.1); }
        .jackpot-title { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }
        .jackpot-value { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        #score { font-size: 44px; font-weight: 900; margin: 20px 0 5px 0; text-shadow: 0 0 30px rgba(0, 212, 255, 0.4); }
        #pnl-display { font-size: 13px; color: var(--neon-green); margin-bottom: 10px; font-weight: 700; }
        .game-main { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        
        #tap-btn { width: 260px; height: 260px; background: url('/static/images/logo.png?v=3.1') center/cover no-repeat, radial-gradient(circle, var(--neon-purp) 0%, transparent 75%); border: 4px solid rgba(176, 38, 255, 0.3); border-radius: 50%; cursor: pointer; z-index: 2; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; filter: drop-shadow(0 0 20px var(--neon-blue)); box-shadow: inset 0 0 40px rgba(0, 212, 255, 0.2); }
        #tap-btn:active { transform: scale(0.92); }
        #tap-btn:disabled { opacity: 0.5; filter: grayscale(1); }
        
        .right-buttons { position: absolute; right: -5px; display: flex; flex-direction: column; gap: 10px; z-index: 3; }
        .btn-side { width: 100px; height: 42px; background: rgba(10, 25, 47, 0.8); border: 1px solid var(--neon-blue); border-radius: 14px; color: white; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; cursor: pointer; backdrop-filter: blur(5px); }
        .energy-box { width: 100%; margin-bottom: 25px; }
        .energy-bar-bg { width: 100%; height: 16px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--neon-blue); overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: width 0.2s; }
        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; padding-bottom: 25px; }
        .nav-link { height: 55px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: var(--glass); border-top: 3px solid var(--neon-blue); border-radius: 35px 35px 0 0; z-index: 1000; transition: 0.4s; padding: 30px 25px; box-sizing: border-box; overflow-y: auto; backdrop-filter: blur(20px); }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .upgrade-card { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; border: 1px solid rgba(0, 212, 255, 0.2); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { padding: 12px 18px; background: var(--neon-blue); border: none; border-radius: 12px; color: #000; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }
        .floating-text { position: absolute; pointer-events: none; font-weight: 900; font-size: 32px; color: white; animation: floatUp 0.8s forwards; text-shadow: 0 0 15px var(--neon-blue); z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.2); } }
    </style>
</head>
<body>

<div id="reloading-screen">
    <div class="loader-logo">
        <img src="/static/images/logo.png?v=3.1" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
    </div>
    <div class="loader-text" id="loader-status">CONNECTING</div>
    <div class="progress-container">
        <div id="loader-progress"></div>
    </div>
    <div style="margin-top: 15px; font-size: 10px; color: rgba(0, 212, 255, 0.5); letter-spacing: 1px; font-family: 'Orbitron'; text-align: center;">
        NEURAL NETWORK STATUS: <span id="node-percent">0%</span>
    </div>
</div>

<div id="error-screen">
    <div class="loader-logo">
        <img src="/static/images/logo.png?v=3.1" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
    </div>
    <div class="wait-text">NETWORK ERROR</div>
    <p style="font-size: 10px; color: #555; margin-top: 10px;">PLEASE RESTART APP</p>
</div>

<div class="game-container" id="main-container">
    <div class="header-top">
        <div class="ai-icon-small" onclick="activateDebug()"><img src="/static/images/logo.png?v=3.1" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'"></div>
        <div class="league-info">
            <div class="league-header">
                <span id="league-name">---</span>
                <span id="league-pct">0%</span>
            </div>
            <div class="league-bar"><div id="league-fill"></div></div>
            <div class="level-label" id="display-level">LVL -</div>
        </div>
    </div>

    <div class="jackpot-box">
        <div class="jackpot-title">GLOBAL JACKPOT</div>
        <div class="jackpot-value" id="jackpot-amount">LOADING...</div>
    </div>

    <div id="score">...</div>
    <div id="pnl-display">PROFIT: +0/hr</div>

    <div class="game-main">
        <button id="tap-btn" disabled></button>
        <div class="right-buttons">
            <button class="btn-side" onclick="copyRefLink()">INVITE</button>
            <button class="btn-side" onclick="openModal('tasks')">TASKS</button>
            <button class="btn-side" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="tg.showAlert('Система вывода в разработке!')">WALLET</button>
        </div>
    </div>

    <div class="energy-box">
        <div style="display:flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; color: var(--neon-blue); font-weight: 700;">
            <span>⚡ ENERGY</span>
            <span id="energy-text">---/---</span>
        </div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" onclick="openModal('boost')">🚀 BOOST</div>
        <div class="nav-link" onclick="openModal('mine')">⛏️ MINE</div>
        <div class="nav-link" onclick="openModal('stats')">📊 STATS</div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div id="modal-boost" class="modal">...</div>
<div id="modal-mine" class="modal">...</div>
<div id="modal-stats" class="modal">...</div>
<div id="modal-tasks" class="modal">...</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const Logger = {
        log: (msg, data = "") => console.log(`[LOG] ${msg}`, data),
        error: (msg, err = "") => console.error(`[ERR] ${msg}`, err)
    };

    let state = {
        score: null, 
        energy: 1000, 
        max_energy: 1000, 
        tap_power: 1, 
        pnl: 0, 
        level: 1, 
        user_id: tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : '476014374'
    };

    const LEAGUES = [
        { name: "IRON", min: 0, max: 50000, lvl: 1 },
        { name: "BRONZE", min: 50000, max: 250000, lvl: 2 },
        { name: "SILVER", min: 250000, max: 1000000, lvl: 3 },
        { name: "GOLD", min: 1000000, max: 5000000, lvl: 4 },
        { name: "ELITE", min: 5000000, max: Infinity, lvl: 5 }
    ];

    async function init() {
        const loader = document.getElementById('reloading-screen');
        const errorScreen = document.getElementById('error-screen');
        const mainContainer = document.getElementById('main-container');
        const progressFill = document.getElementById('loader-progress');
        const percentText = document.getElementById('node-percent');
        
        let fakeProgress = 0;
        const progressInterval = setInterval(() => {
            if (fakeProgress < 90) {
                fakeProgress += Math.random() * 3;
                progressFill.style.width = fakeProgress + '%';
                percentText.innerText = Math.floor(fakeProgress) + '%';
            }
        }, 200);

        // КРИТИЧЕСКИЙ ТАЙМЕР (15 секунд на загрузку)
        const emergencyTimeout = setTimeout(() => {
            if (state.score === null) {
                clearInterval(progressInterval);
                loader.style.display = 'none';
                errorScreen.style.display = 'flex'; // Показываем свой экран ошибки
                Logger.error("Load Timeout reached");
            }
        }, 15000);

        try {
            const r = await fetch(`/api/balance/${state.user_id}?t=${Date.now()}`);
            if (!r.ok) throw new Error("Server down");

            const res = await r.json();
            
            if(res.status === 'ok' && res.data) {
                clearTimeout(emergencyTimeout);
                clearInterval(progressInterval);
                
                // Заполняем данные
                state.score = Number(res.data.score);
                state.energy = Number(res.data.energy);
                state.max_energy = Number(res.data.max_energy);
                state.tap_power = Number(res.data.click_lvl);
                state.pnl = Number(res.data.pnl);
                
                render();
                
                // Сначала делаем контейнер видимым, потом убираем лоадер
                mainContainer.classList.add('visible');
                document.getElementById('tap-btn').disabled = false;
                
                progressFill.style.width = '100%';
                percentText.innerText = '100%';
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }, 300);
            } else {
                throw new Error("Invalid Data");
            }
        } catch(e) {
            clearTimeout(emergencyTimeout);
            clearInterval(progressInterval);
            loader.style.display = 'none';
            errorScreen.style.display = 'flex';
            Logger.error("Init Error", e);
        }
        updateJackpot();
    }

    // --- Остальные функции (render, saveData, tap) остаются без изменений ---
    function render() {
        if(state.score === null) return;
        let league = LEAGUES.find(l => state.score >= l.min && state.score < l.max) || LEAGUES[LEAGUES.length-1];
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        document.getElementById('display-level').innerText = `LVL ${league.lvl}`;
        document.getElementById('league-name').innerText = league.name + " LEAGUE";
        let pct = league.max === Infinity ? 100 : Math.floor(((state.score - league.min) / (league.max - league.min)) * 100);
        document.getElementById('league-fill').style.width = pct + '%';
        document.getElementById('league-pct').innerText = pct + '%';
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.score === null || state.energy < state.tap_power) return;
        state.score += state.tap_power;
        state.energy -= state.tap_power;
        const touch = e.touches[0];
        createFlyText(touch.clientX, touch.clientY, `+${state.tap_power}`);
        tg.HapticFeedback?.impactOccurred('medium');
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = (x - 20) + 'px';
        el.style.top = (y - 40) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    async function updateJackpot() {
        try {
            const r = await fetch('/api/jackpot');
            const res = await r.json();
            document.getElementById('jackpot-amount').innerText = Number(res.value).toLocaleString() + " NP";
        } catch(e) {}
    }

    setInterval(() => {
        if(state.score === null) return;
        if(state.energy < state.max_energy) state.energy = Math.min(state.max_energy, state.energy + 1.5);
        if(state.pnl > 0) state.score += (state.pnl / 3600);
        render();
    }, 1000);

    setInterval(async () => {
        if(state.score !== null) {
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: state.user_id,
                        score: Math.floor(state.score),
                        click_lvl: state.tap_power,
                        energy: Math.floor(state.energy),
                        max_energy: state.max_energy,
                        pnl: state.pnl
                    })
                });
            } catch(e) {}
        }
    }, 15000);

    window.onload = init;
</script>
</body>
</html>
