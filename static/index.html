<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-wrapper">
            <div id="load-bar" class="load-bar-f"></div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-left">
                <div class="avatar"><img src="images/logo.png"></div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <small>EARN PER TAP</small>
                <b id="tap-val" class="accent-val">+1</b>
            </div>
            <div class="stat-card">
                <small>PROFIT PER HOUR</small>
                <b id="profit-val">0</b>
            </div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" 
                 ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt">
                <span>ENERGY</span>
                <span id="eng-val">0/0</span>
            </div>
            <div class="progress-bar-wrap">
                <div id="eng-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')"><span>🚀</span>BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')"><span>⛏️</span>MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')"><span>📋</span>TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')"><span>🏆</span>TOP</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-drag-line"></div>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script src="logic.js"></script>
    <script>
        // Инициализация TON Connect с ручным управлением кнопкой
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: null 
        });

        const ui = {
            init() { 
                this.update(); 
                this.finishLoading(); 
            },
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                document.getElementById('u-lvl').innerText = `LVL ${logic.user.lvl}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr).toLocaleString();
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const header = document.getElementById('modal-header');
                const container = document.getElementById('modal-container');
                let h = '';

                if (type === 'wallet') {
                    header.innerText = 'WALLET';
                    h = `<div class="wallet-box" style="text-align:center; padding:20px;">
                            <img src="images/logo.png" style="width:80px; margin-bottom:20px; filter:drop-shadow(0 0 10px var(--accent));">
                            <div id="ton-connect-button" style="display:flex; justify-content:center;"></div>
                            <p style="font-size:12px; color:#666; margin-top:15px;">Connect TON for future drops and mining bonuses</p>
                         </div>`;
                    body.innerHTML = h;
                    
                    // Небольшая задержка, чтобы DOM успел обновиться перед вставкой кнопки
                    setTimeout(() => {
                        tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-button' };
                    }, 50);
                } 
                else if (type === 'boost') {
                    header.innerText = 'UPGRADES';
                    h = `
                        <div class="up-card" onclick="logic.buyUpgrade('tap')">
                            <div class="up-info"><b>🚀 Multitap</b><small>Level ${logic.user.click_lvl}</small></div>
                            <div class="up-price">5,000</div>
                        </div>
                        <div class="up-card" onclick="logic.buyUpgrade('energy')">
                            <div class="up-info"><b>🔋 Capacity</b><small>${logic.user.max_energy} Energy</small></div>
                            <div class="up-price">10,000</div>
                        </div>`;
                    body.innerHTML = h;
                }
                else if (type === 'mine') {
                    header.innerText = 'NEURAL MINING';
                    h = `
                        <div class="up-card" onclick="logic.buyUpgrade('profit')">
                            <div class="up-info"><b>🖥️ Neural Node</b><small>+500 Pulse/hr</small></div>
                            <div class="up-price">25,000</div>
                        </div>`;
                    body.innerHTML = h;
                }
                else if (type === 'top') {
                    header.innerText = 'TOP 100 AGENTS';
                    h = `
                        <div class="rank-item"><span>1. Matrix_Runner</span><b>85.4M</b></div>
                        <div class="rank-item"><span>2. Cyber_Punk</span><b>72.1M</b></div>
                        <div class="rank-item active"><span>3. You (${logic.user.username})</span><b>${(logic.user.balance/1000).toFixed(1)}K</b></div>
                    `;
                    body.innerHTML = h;
                }
                else { 
                    header.innerText = type.toUpperCase();
                    body.innerHTML = `<p style="text-align:center; color:#444; padding:20px;">Accessing data protocols...</p>`; 
                }

                container.classList.add('active');
            },
            closeM() { 
                document.getElementById('modal-container').classList.remove('active'); 
            },
            finishLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 5;
                    document.getElementById('load-pct').innerText = `${p}%`;
                    const bar = document.getElementById('load-bar');
                    if(bar) bar.style.width = `${p}%`;
                    if (p >= 100) {
                        clearInterval(iv);
                        setTimeout(() => {
                            const ls = document.getElementById('loading-screen');
                            if(ls) ls.style.opacity = '0';
                            document.getElementById('app').style.display = 'flex';
                            setTimeout(() => { if(ls) ls.remove(); }, 500);
                        }, 400);
                    }
                }, 40);
            }
        };
        window.onload = () => logic.init();
    </script>
</body>
</html>
