<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96; 
            --gold: #ffd700;
            --bg: #050a1a; 
            --glass: rgba(10, 25, 47, 0.95);
        }

        body { 
            margin: 0; background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%); 
            height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; 
            user-select: none; touch-action: none;
        }

        .game-container { 
            position: relative; width: 100%; max-width: 500px; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; box-sizing: border-box; 
        }
        
        /* Header & Leagues */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .league-box { flex-grow: 1; margin: 0 12px; }
        .league-info { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; font-weight: bold; }
        .bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #league-fill { height: 100%; width: 0%; background: var(--neon); transition: width 0.5s; }

        /* Jackpot */
        .jackpot-card {
            width: 100%; border: 2px solid var(--gold); border-radius: 15px; padding: 10px; 
            background: rgba(255,215,0,0.05); text-align: center; margin-bottom: 10px;
        }
        #jackpot-val { font-size: 26px; font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        #jp-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.4s; }

        #score { font-size: 44px; font-weight: 900; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }

        /* Play Area */
        .play-area { position: relative; width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #btn { 
            width: 65vw; height: 65vw; max-width: 260px; max-height: 260px;
            background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
            border-radius: 50%; border: 2px solid rgba(0, 212, 255, 0.2); outline: none;
            filter: drop-shadow(0 0 30px var(--neon)); transition: transform 0.05s; z-index: 2;
        }
        #btn:active { transform: scale(0.92); }

        .side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .side-btn { width: 75px; padding: 10px 5px; background: var(--glass); border: 1px solid var(--neon); border-radius: 12px; font-size: 10px; color: white; text-align: center; }

        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding-bottom: 15px; }
        .nav-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }

        /* Animations */
        .plus-animation { position: absolute; pointer-events: none; font-weight: 900; animation: float 0.7s ease-out forwards; z-index: 100; color: var(--neon); font-size: 24px; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        /* Modals */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: var(--glass); border-top: 3px solid var(--neon); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
        .buy-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--neon); color: #000; font-weight: 900; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="league-box">
                <div class="league-info">
                    <span id="league-name">BRONZE LEAGUE</span>
                    <span id="league-percent">0%</span>
                </div>
                <div class="bar-bg"><div id="league-fill"></div></div>
            </div>
            <div style="font-size: 8px; opacity: 0.5;" id="user-id">ID: 0000</div>
        </div>

        <div class="jackpot-card">
            <div style="font-size: 9px; color: var(--gold); letter-spacing: 2px;">GLOBAL JACKPOT</div>
            <div id="jackpot-val">0</div>
            <div class="bar-bg" style="border-color: var(--gold);"><div id="jp-fill"></div></div>
        </div>

        <div id="score">0</div>

        <div class="play-area">
            <div class="side-menu">
                <div class="side-btn" onclick="openModal('boost')">BOOST</div>
                <div class="side-btn" onclick="tg.showAlert('Daily Tasks coming soon!')">TASKS</div>
            </div>
            <button id="btn"></button>

            <div style="width: 80%; margin-top: 20px;">
                <div style="display:flex; justify-content: space-between; font-size: 12px; color: var(--neon); margin-bottom: 5px;">
                    <span>⚡ ENERGY</span>
                    <span id="energy-stat">1000/1000</span>
                </div>
                <div class="bar-bg" style="border-color: var(--neon); height: 12px;">
                    <div id="energy-fill" style="background: var(--neon); height: 100%; width: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="openModal('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="tg.showAlert('Mining stats soon!')">⛏️ MINE</div>
            <div class="nav-item" onclick="tg.showAlert('Leaderboard locked')">📊 STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>
    
    <div id="modal-boost" class="modal">
        <h2 style="color:var(--neon)">UPGRADES</h2>
        <button class="buy-btn" id="buy-click">MULTI-TAP (LVL <span id="tap-lvl">1</span>)</button>
        <button class="buy-btn" style="background:var(--neon-secondary)" id="buy-bot">AUTO-BOT (LVL <span id="auto-lvl">0</span>)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Состояние игры
        let score = 0, clickLvl = 1, botLvl = 0, leagueId = 1;
        let energy = 1000, maxEnergy = 1000, currentJp = 0;
        const userId = tg.initDataUnsafe?.user?.id || 12345;
        document.getElementById('user-id').textContent = "ID: " + userId;

        const LEAGUE_NAMES = ["BRONZE", "SILVER", "GOLD", "PLATINUM", "DIAMOND"];
        const LEAGUE_TARGETS = [10000, 50000, 250000, 1000000, 5000000];

        // Загрузка данных
        async function load() {
            try {
                const r = await fetch(`/api/balance/${userId}`);
                const res = await r.json();
                if(res.status === 'ok') {
                    score = res.data.balance;
                    clickLvl = res.data.click_lvl;
                    botLvl = res.data.bot_lvl;
                    leagueId = res.data.league_id;
                    if(res.data.offline_profit > 0) tg.showAlert(`Auto-Bot earned: ${res.data.offline_profit} 💎`);
                    update();
                }
            } catch(e) { console.error("Load failed", e); }
        }

        function update() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('tap-lvl').innerText = clickLvl;
            document.getElementById('auto-lvl').innerText = botLvl;
            document.getElementById('league-name').innerText = (LEAGUE_NAMES[leagueId-1] || "MAX") + " LEAGUE";

            // Лиги
            let prev = leagueId === 1 ? 0 : LEAGUE_TARGETS[leagueId-2];
            let next = LEAGUE_TARGETS[leagueId-1] || score;
            let prog = ((score - prev) / (next - prev)) * 100;
            document.getElementById('league-fill').style.width = Math.min(100, prog) + "%";
            document.getElementById('league-percent').innerText = Math.floor(Math.min(100, prog)) + "%";

            // Энергия
            document.getElementById('energy-stat').innerText = `${Math.floor(energy)}/${maxEnergy}`;
            document.getElementById('energy-fill').style.width = (energy/maxEnergy*100) + "%";
        }

        async function save() {
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId, score: Math.floor(score), 
                        league_id: leagueId, click_lvl: clickLvl, bot_lvl: botLvl
                    })
                });
            } catch(e) { console.log("Save error"); }
        }

        // Клик
        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (energy >= clickLvl) {
                energy -= clickLvl;
                score += clickLvl;
                
                // Проверка лиги
                if (score >= LEAGUE_TARGETS[leagueId-1] && leagueId < LEAGUE_TARGETS.length) {
                    leagueId++;
                    tg.showConfirm(`League Up to ${LEAGUE_NAMES[leagueId-1]}!`);
                }

                spawnParticle(e.changedTouches[0].pageX, e.changedTouches[0].pageY);
                tg.HapticFeedback.impactOccurred('light');
                update();
            }
        });

        function spawnParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.innerText = `+${clickLvl}`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        // Магазин
        document.getElementById('buy-click').onclick = () => {
            let cost = clickLvl * 500;
            if(score >= cost) {
                score -= cost; clickLvl++; save(); update();
            } else tg.showAlert("Not enough gems!");
        };

        document.getElementById('buy-bot').onclick = () => {
            let cost = (botLvl + 1) * 2000;
            if(score >= cost) {
                score -= cost; botLvl++; save(); update();
            } else tg.showAlert("Not enough gems!");
        };

        // Модалки
        window.openModal = (id) => {
            document.getElementById('modal-' + id).classList.add('active');
            document.getElementById('overlay').classList.add('active');
        };
        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('overlay').classList.remove('active');
        };

        // Таймеры
        setInterval(() => {
            if (energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.5);
            if (botLvl > 0) score += (botLvl * 0.3);
            update();
        }, 1000);

        setInterval(save, 15000); // Сохранение раз в 15 сек
        load();
    </script>
</body>
</html>
