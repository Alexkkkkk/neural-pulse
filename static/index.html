<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Mining v3.8.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .l-pct { font-size: 48px; font-weight: 900; color: var(--cyan); margin-top: 20px; }

        /* App Layout */
        #app { display: none; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .header { background: var(--card); border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 12px; background: linear-gradient(135deg, var(--purple), var(--cyan)); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .lvl-badge { margin-left: auto; background: var(--cyan); color: #000; padding: 5px 15px; border-radius: 10px; font-weight: 900; }

        .balance { font-size: 64px; font-weight: 900; text-align: center; margin: 30px 0; letter-spacing: -2px; }

        .tap-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-logo { width: 220px; filter: drop-shadow(0 0 30px var(--purple)); transition: transform 0.05s; }
        
        .side-menu { position: absolute; right: 0; display: flex; flex-direction: column; gap: 10px; }
        .side-btn { background: rgba(255,255,255,0.05); border: 1px solid #222; color: #fff; padding: 12px; border-radius: 15px; font-size: 10px; font-weight: 900; width: 100px; }

        .energy-bar { width: 100%; margin: 20px 0; }
        .bar-bg { height: 10px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); width: 100%; transition: width 0.2s; }

        .footer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-bottom: 20px; }
        .f-btn { background: var(--card); border: 1px solid #1a1a1a; padding: 15px 0; border-radius: 15px; font-size: 10px; font-weight: 900; text-align: center; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 30px; }
        .modal-active { display: flex; }
        .back-btn { margin-top: auto; background: #fff; color: #000; padding: 20px; border-radius: 15px; font-weight: 900; text-align: center; }
        
        .float-num { position: fixed; color: var(--cyan); font-weight: 900; font-size: 24px; animation: floatUp 0.8s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="l-pct" id="load-pct">0%</div>
    <div style="color: var(--cyan); letter-spacing: 5px; font-size: 10px;">NEURAL SYNCING</div>
</div>

<div id="app">
    <div class="header">
        <div class="avatar"><img id="u-img" src="images/logo.png"></div>
        <div>
            <div id="u-name" style="font-weight: 900;">Agent</div>
            <div style="font-size: 9px; color: var(--cyan);">v3.8.2 Quantum Engine</div>
        </div>
        <div class="lvl-badge" id="u-lvl">LVL 1</div>
    </div>

    <div class="balance" id="u-bal">0</div>

    <div class="tap-area">
        <img src="images/logo.png" class="main-logo" id="tap-target" onpointerdown="handleTap(event)">
        <div class="side-menu">
            <div class="side-btn" onclick="openM('wallet')">👛 WALLET</div>
            <div class="side-btn" onclick="openM('friends')">🤝 FRIENDS</div>
            <div class="side-btn">🎁 BONUS</div>
        </div>
    </div>

    <div class="energy-bar">
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: 900;">
            <span>ENERGY</span><span id="u-eng-text">1000/1000</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="u-eng-fill"></div></div>
    </div>

    <div class="footer">
        <div class="f-btn">🚀 BOOST</div>
        <div class="f-btn" onclick="openM('mine')">⛏️ MINE</div>
        <div class="f-btn">📋 TASKS</div>
        <div class="f-btn" onclick="openM('top')">🏆 TOP</div>
    </div>
</div>

<div id="m-wallet" class="modal">
    <h1 style="font-size: 42px;">WALLET</h1>
    <div id="ton-btn"></div>
    <div class="back-btn" onclick="closeM()">BACK</div>
</div>

<div id="m-mine" class="modal">
    <h1 style="font-size: 42px;">MINE</h1>
    <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222;">
        <b>Neural Node</b><br><small>Profit: +50/hr</small>
    </div>
    <div class="back-btn" onclick="closeM()">BACK</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        id: tg.initDataUnsafe?.user?.id || "696",
        name: tg.initDataUnsafe?.user?.first_name || "Agent",
        bal: 0, eng: 1000, max: 1000, lvl: 1, wallet: null
    };

    // Загрузка
    async function init() {
        let p = 0;
        const iv = setInterval(async () => {
            p += 5;
            document.getElementById('load-pct').innerText = p + '%';
            if(p >= 100) {
                clearInterval(iv);
                await loadUser();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        }, 50);
    }

    async function loadUser() {
        const r = await fetch(`/api/user/${state.id}?name=${state.name}`);
        const d = await r.json();
        state.bal = Number(d.balance);
        state.lvl = d.click_lvl;
        state.eng = d.energy;
        state.max = d.max_energy;
        updateUI();
    }

    function updateUI() {
        document.getElementById('u-bal').innerText = Math.floor(state.bal).toLocaleString();
        document.getElementById('u-lvl').innerText = `LVL ${state.lvl}`;
        document.getElementById('u-eng-text').innerText = `${state.eng}/${state.max}`;
        document.getElementById('u-eng-fill').style.width = `${(state.eng / state.max) * 100}%`;
    }

    function handleTap(e) {
        if(state.eng >= state.lvl) {
            state.bal += state.lvl;
            state.eng -= state.lvl;
            
            // Анимация
            const f = document.createElement('div');
            f.className = 'float-num';
            f.innerText = `+${state.lvl}`;
            f.style.left = `${e.clientX}px`;
            f.style.top = `${e.clientY}px`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);

            const img = document.getElementById('tap-target');
            img.style.transform = 'scale(0.95)';
            setTimeout(() => img.style.transform = 'scale(1)', 50);
            
            updateUI();
            save();
        }
    }

    function save() {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: state.id, balance: state.bal, energy: state.eng, 
                max_energy: state.max, click_lvl: state.lvl, wallet: state.wallet
            })
        });
    }

    function openM(id) { document.getElementById('m-'+id).classList.add('modal-active'); }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('modal-active')); }

    const tonUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json',
        buttonRootId: 'ton-btn'
    });

    setInterval(() => {
        if(state.eng < state.max) {
            state.eng = Math.min(state.max, state.eng + 1);
            updateUI();
        }
    }, 1000);

    init();
</script>
</body>
</html>
