<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96;
            --bg: #050a1a; 
            --glass: rgba(10, 25, 47, 0.95);
            --card-bg: rgba(255, 255, 255, 0.03);
        }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%);
            height: 100vh; 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }

        .game-container { 
            position: relative; width: 100%; max-width: 500px; height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            box-sizing: border-box; transition: opacity 0.5s;
        }

        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .logo { width: 50px; height: 50px; background: #111; border-radius: 12px; box-shadow: 0 0 15px var(--neon); border: 1px solid var(--neon); }
        #lvl { font-size: 14px; text-shadow: 0 0 10px var(--neon); color: var(--neon); font-weight: bold; }

        .balance-container { text-align: center; margin-top: 20px; }
        .balance-label { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
        #score { font-size: 42px; color: #fff; text-shadow: 0 0 20px var(--neon); font-weight: bold; margin-top: 5px; }

        .play-area { position: relative; flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
        #btn { 
            width: 75vw; max-width: 300px; height: 75vw; max-height: 300px;
            background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
            background-color: rgba(0, 212, 255, 0.1);
            border-radius: 50%; border: 4px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2); cursor: pointer; 
            transition: transform 0.05s; outline: none; z-index: 2;
        }
        #btn:active { transform: scale(0.92); box-shadow: 0 0 60px var(--neon); }

        .side-menu { position: absolute; right: 0; display: flex; flex-direction: column; gap: 12px; z-index: 3; }
        .side-item { width: 90px; padding: 10px 5px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; backdrop-filter: blur(5px); font-size: 9px; text-transform: uppercase; text-align: center; cursor: pointer; }

        .energy-container { width: 100%; text-align: center; margin-bottom: 20px; }
        .energy-bar { width: 80%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 10px auto; overflow: hidden; }
        .energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--neon-secondary), var(--neon)); box-shadow: 0 0 10px var(--neon-secondary); transition: width 0.3s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .nav-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        .nav-card:active { background: rgba(0, 212, 255, 0.1); border-color: var(--neon); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(8px); }
        .overlay.active { display: block; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%; background: var(--glass); border-top: 2px solid var(--neon); border-radius: 30px 30px 0 0; z-index: 1000; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 28px; cursor: pointer; color: var(--neon); }

        .mine-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 18px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-info h3 { margin: 0; font-size: 14px; color: var(--neon); }
        .buy-ton-btn { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; }

        .plus-animation { position: absolute; color: var(--neon); font-size: 28px; font-weight: bold; animation: float 0.7s ease-out forwards; pointer-events: none; text-shadow: 0 0 10px var(--neon); z-index: 100; }
        @keyframes float { 0% { opacity:1; transform: translateY(0) scale(1); } 100% { opacity:0; transform: translateY(-120px) scale(1.4); } }
    </style>
</head>
<body>
    <div class="game-container" id="game" style="opacity:0">
        <div class="header">
            <div class="logo"></div>
            <span id="lvl">🏆 Loading...</span>
        </div>

        <div class="balance-container">
            <div class="balance-label">TOTAL NP POINTS</div>
            <div id="score">0</div>
            <div id="bot-indicator" style="font-size: 10px; color: var(--neon-secondary); margin-top: 5px; height: 12px;"></div>
        </div>

        <div class="play-area">
            <button id="btn"></button>
            <div class="side-menu">
                <div class="side-item" style="background: #2196F3; border:none; color:white;" onclick="openModal('wallet')">Wallet</div>
                <div class="side-item" onclick="openModal('friends')">Friends</div>
                <div class="side-item" onclick="openModal('tasks')">Tasks</div>
            </div>
        </div>

        <div class="energy-container">
            <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width: 100%;"></div></div>
            <div style="font-size: 10px; opacity: 0.7;">⚡ ENERGY RECHARGING</div>
        </div>

        <div class="bottom-nav">
            <div class="nav-card" onclick="openModal('boost')">🚀 UPGRADE</div>
            <div class="nav-card" onclick="openModal('mine')">🤖 BOTS</div>
            <div class="nav-card" onclick="openModal('stats')">⚙️ STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div id="modal-boost" class="modal">
        <div class="modal-header"><h2>🚀 Upgrade Status</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div>
        <div style="text-align: center;">
            <p id="next-lvl-name" style="color: var(--neon); font-size: 18px;"></p>
            <p>Сила клика будет: <strong id="next-tap-val" style="color:var(--neon-secondary);">+0</strong></p>
            <button id="buy-upgrade-btn" style="width:100%; padding:18px; background:var(--neon); border:none; border-radius:15px; color:#000; font-weight:bold; font-family:'Orbitron'; margin-top: 20px;" onclick="handleUpgrade()">UPGRADE</button>
            <p id="upgrade-cost-label" style="margin-top: 15px; font-size: 12px; opacity: 0.6;"></p>
        </div>
    </div>

    <div id="modal-mine" class="modal">
        <div class="modal-header"><h2>🤖 TON AUTO-BOTS</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div>
        <div id="bot-list-container"></div>
    </div>

    <div id="modal-wallet" class="modal"><div class="modal-header"><h2>Wallet</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><p>TON Wallet (Soon...)</p></div>
    <div id="modal-friends" class="modal"><div class="modal-header"><h2>Friends</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><p id="ref-link">Приглашайте друзей!</p></div>
    <div id="modal-tasks" class="modal"><div class="modal-header"><h2>Tasks</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><p>Задания в разработке...</p></div>
    <div id="modal-stats" class="modal"><div class="modal-header"><h2>Stats</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div><div id="stats-content"></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = String(tg.initDataUnsafe?.user?.id || "dev_user");
        let score = 0;
        let pending = 0;
        let playerLevel = 1;
        let botLvl = 0;

        const PLAYER_LEVELS = {
            1: { name: "Новичок", price: 0, tap: 1 },
            2: { name: "Стажер", price: 1000, tap: 5 },
            3: { name: "Фрилансер", price: 5000, tap: 15 },
            4: { name: "Специалист", price: 15000, tap: 40 },
            5: { name: "Менеджер", price: 45000, tap: 100 },
            6: { name: "Тимлид", price: 120000, tap: 250 },
            7: { name: "Инвестор", price: 350000, tap: 600 },
            8: { name: "Миллионер", price: 1000000, tap: 1500 },
            9: { name: "Владелец ТГ", price: 2500000, tap: 4000 },
            10: { name: "CEO", price: 6000000, tap: 10000 },
            11: { name: "Магнат", price: 15000000, tap: 25000 },
            12: { name: "Крипто-Кит", price: 40000000, tap: 60000 },
            13: { name: "Мировой Игрок", price: 100000000, tap: 150000 },
            14: { name: "Теневой Лидер", price: 250000000, tap: 400000 },
            15: { name: "Хозяин Биржи", price: 700000000, tap: 1000000 },
            16: { name: "Олигарх", price: 2000000000, tap: 2500000 },
            17: { name: "Пророк ИИ", price: 5000000000, tap: 6000000 },
            18: { name: "Колонизатор", price: 12000000000, tap: 15000000 },
            19: { name: "Архитектор", price: 35000000000, tap: 40000000 },
            20: { name: "GOD MODE", price: 100000000000, tap: 100000000 }
        };

        const BOT_CONFIG = {
            1: { name: "Basic Core", price_ton: 1, mult: 1.0 },
            10: { name: "Advanced AI", price_ton: 22, mult: 8.5 },
            20: { name: "Quantum Mind", price_ton: 100, mult: 30.0 }
        };

        async function loadData() {
            try {
                const r = await fetch(`/api/balance/${userId}?t=${Date.now()}`);
                const d = await r.json();
                score = d.balance;
                playerLevel = d.click_lvl;
                botLvl = d.bot_lvl;
                
                if(d.offline_profit > 0) {
                    tg.showAlert(`🤖 Бот принес вам ${d.offline_profit.toLocaleString()} NP за время вашего отсутствия!`);
                }
                
                updateUI();
                document.getElementById('game').style.opacity = '1';
                document.getElementById('ref-link').innerHTML = `Приглашайте друзей!<br><small>https://t.me/neural_pulse_bot?start=${userId}</small>`;
            } catch (e) { console.error("Load error", e); }
        }

        function updateUI() {
            const current = PLAYER_LEVELS[playerLevel] || PLAYER_LEVELS[1];
            const next = PLAYER_LEVELS[playerLevel + 1];

            document.getElementById('score').textContent = Math.floor(score).toLocaleString();
            document.getElementById('lvl').textContent = `🏆 ${current.name} (Lvl ${playerLevel})`;
            
            if (next) {
                document.getElementById('next-lvl-name').textContent = `СЛЕДУЮЩИЙ: ${next.name}`;
                document.getElementById('next-tap-val').textContent = `+${next.tap.toLocaleString()}`;
                document.getElementById('upgrade-cost-label').textContent = `Стоимость: ${next.price.toLocaleString()} NP`;
                document.getElementById('buy-upgrade-btn').disabled = score < next.price;
            } else {
                document.getElementById('next-lvl-name').textContent = "МАКСИМАЛЬНЫЙ УРОВЕНЬ";
                document.getElementById('buy-upgrade-btn').style.display = "none";
            }

            const ind = document.getElementById('bot-indicator');
            if (botLvl > 0) {
                const income = current.tap * (BOT_CONFIG[botLvl]?.mult || 0);
                ind.textContent = `🤖 АВТО-ДОХОД: ${income.toLocaleString()} /сек`;
            }
        }

        async function handleUpgrade() {
            try {
                const r = await fetch('/api/buy_boost', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId })
                });
                const d = await r.json();
                if (d.status === 'ok') {
                    score = d.new_balance;
                    playerLevel = d.new_lvl;
                    updateUI();
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert(d.error || "Ошибка апгрейда");
                }
            } catch(e) { tg.showAlert("Ошибка связи с сервером"); }
        }

        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const tapPower = PLAYER_LEVELS[playerLevel].tap;
            for (let t of e.changedTouches) {
                score += tapPower;
                pending += tapPower;
                spawnPlus(t.pageX, t.pageY, tapPower);
            }
            updateUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        function spawnPlus(x, y, val) {
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.textContent = '+' + val;
            p.style.left = (x - 15) + 'px';
            p.style.top = (y - 40) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        // Пассивный доход (визуальный)
        setInterval(() => {
            if (botLvl > 0) {
                const pps = PLAYER_LEVELS[playerLevel].tap * BOT_CONFIG[botLvl].mult;
                score += pps;
                updateUI();
            }
        }, 1000);

        async function syncData() {
            if (pending > 0) {
                const s = pending; pending = 0;
                try {
                    await fetch('/api/clicks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: userId, clicks: s })
                    });
                } catch (e) { pending += s; }
            }
        }
        setInterval(syncData, 3000);

        function openModal(id) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('modal-' + id).classList.add('active');
            if (id === 'mine') renderBotShop();
        }

        function closeAllModals() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function renderBotShop() {
            const container = document.getElementById('bot-list-container');
            container.innerHTML = '';
            Object.entries(BOT_CONFIG).forEach(([lvl, data]) => {
                const card = document.createElement('div');
                card.className = 'mine-card';
                card.innerHTML = `
                    <div class="item-info"><h3>${data.name}</h3><p>Доход: x${data.mult} силы тапа</p></div>
                    <button class="buy-ton-btn" onclick="buyBot(${lvl})">${data.price_ton} TON</button>
                `;
                container.appendChild(card);
            });
        }

        async function buyBot(lvl) {
            // В вашем Python-коде это просто обновляет БД без оплаты (для теста)
            const r = await fetch('/api/buy_bot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, target_lvl: lvl })
            });
            const d = await r.json();
            if (d.status === 'ok') {
                botLvl = d.new_bot_lvl;
                updateUI();
                tg.showAlert("Бот успешно активирован!");
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
