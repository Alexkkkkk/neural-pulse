<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Online</title>
    <link rel="icon" href="data:,">
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; --neon-purp: #b026ff; --neon-green: #00ffcc; 
            --bg: #050a1a; --dark-white: #e0e0e0;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Orbitron', sans-serif; 
            color: white; overflow: hidden; touch-action: none; 
            user-select: none; -webkit-user-select: none;
        }
        
        /* Лоадер */
        #reloading-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s;
        }
        .loader-node { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 3px solid transparent; border-top-color: var(--neon-purp);
            border-bottom-color: var(--neon-blue); animation: spin 1.5s linear infinite;
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .game-container { 
            display: none; opacity: 0; width: 100%; max-width: 500px; height: 100vh; 
            flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; 
            transition: 0.5s; margin: 0 auto; 
        }
        .game-container.visible { display: flex; opacity: 1; }

        /* Элементы интерфейса */
        .header-top { width: 100%; display: flex; align-items: center; gap: 12px; margin-top: 10px;}
        .ai-icon-small { 
            width: 48px; height: 48px; border: 2px solid var(--neon-purp); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            background: rgba(176, 38, 255, 0.1); font-size: 20px;
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.3);
        }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
        #league-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: 0.5s; }

        #score { font-size: 42px; font-weight: 900; margin: 20px 0 5px; text-shadow: 0 0 20px var(--neon-blue); white-space: nowrap; }
        #ton-connect-wrapper { margin-bottom: 10px; transform: scale(0.9); }

        /* Кнопка тапа */
        .game-main { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #tap-btn { 
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle, #1e1e3f 0%, #050a1a 100%);
            border: 4px solid var(--dark-white); display: flex; align-items: center; justify-content: center;
            font-size: 90px; box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent; cursor: pointer; outline: none;
            position: relative; z-index: 5;
        }
        #tap-btn::after { content: '🧠'; }
        #tap-btn:active { transform: scale(0.95); border-color: var(--neon-blue); }

        .energy-bar-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid var(--neon-blue); overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: 0.1s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-bottom: 20px; }
        .nav-link { 
            background: rgba(255,255,255,0.05); padding: 12px 2px; border-radius: 12px; 
            text-align: center; font-size: 10px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase; cursor: pointer; color: white; transition: 0.3s;
        }
        .nav-link:active { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(5, 10, 26, 0.98);
            z-index: 1000; padding: 20px; flex-direction: column; align-items: center;
        }
        .modal.active { display: flex; }
        .close-modal { position: absolute; top: 25px; right: 25px; font-size: 28px; color: var(--neon-purp); cursor: pointer; }

        .floating-text { 
            position: absolute; pointer-events: none; font-weight: 900; font-size: 34px; 
            color: white; animation: floatUp 0.7s ease-out forwards; z-index: 100; text-shadow: 0 0 10px var(--neon-blue); 
        }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-140px) scale(1.3); } 
        }
    </style>
</head>
<body>

<div id="reloading-screen">
    <div class="loader-node">
        <div style="width: 35px; height: 35px; background: var(--neon-blue); border-radius: 8px; box-shadow: 0 0 15px var(--neon-blue);"></div>
    </div>
    <div id="boot-text" style="color: var(--dark-white); font-weight: 900; letter-spacing: 3px; font-size: 11px; text-transform: uppercase;">CONNECTING TO NODE...</div>
</div>

<div id="mine-modal" class="modal"><div class="close-modal">✖</div><h2 style="color: var(--neon-blue); margin-top: 40px;">MINING</h2><div id="card-container" style="width:100%"></div></div>
<div id="friends-modal" class="modal">
    <div class="close-modal">✖</div>
    <h2 style="color: var(--neon-blue); margin-top: 40px;">FRIENDS</h2>
    <p style="font-size: 12px; opacity: 0.7;">Invite agents to earn +10,000 Pulse</p>
    <div id="ref-link" style="font-size: 10px; color: var(--neon-green); margin: 20px 0; word-break: break-all; border: 1px solid; padding: 15px; background: rgba(0,255,204,0.05);"></div>
    <button class="nav-link" id="copy-ref" style="width: 100%; color: white; background: var(--neon-purp);">COPY INVITE LINK</button>
</div>

<div class="game-container" id="main-container">
    <div class="header-top">
        <div class="ai-icon-small">🧠</div>
        <div style="flex-grow:1">
            <div style="display:flex; justify-content: space-between; font-size: 10px; letter-spacing: 1px;">
                <span id="league-name">NEURAL AGENT</span>
                <span id="display-level">LEVEL 1</span>
            </div>
            <div class="league-bar"><div id="league-fill"></div></div>
        </div>
    </div>

    <div id="score">0.00</div>
    <div id="ton-connect-wrapper"></div>
    <div id="pnl-display" style="color: var(--neon-green); font-size: 12px; margin-bottom: 15px; font-weight: bold;">PROFIT: +0/hr</div>

    <div class="game-main">
        <button id="tap-btn"></button>
    </div>

    <div class="energy-box" style="width:100%; margin-bottom: 20px;">
        <div style="display:flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; font-weight: bold;">
            <span>⚡ NEURAL ENERGY</span>
            <span id="energy-text">0/0</span>
        </div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" onclick="openModal('mine-modal')">⛏️ Mine</div>
        <div class="nav-link" id="btn-tasks">📝 Tasks</div>
        <div class="nav-link" onclick="openModal('friends-modal')">👥 Friends</div>
        <div class="nav-link" id="btn-boost">🚀 Boost</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();

    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://np.bothost.ru/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-wrapper'
    });

    let state = {
        score: 0, energy: 1000, max_energy: 1000, 
        tap_power: 1, pnl: 0, level: 1,
        user_id: String(tg.initDataUnsafe?.user?.id || '476014374')
    };

    async function init() {
        const bootText = document.getElementById('boot-text');
        try {
            bootText.innerText = "SYNCHRONIZING CORE...";
            const health = await fetch(`/api/health?t=${Date.now()}`);
            
            if (health.status !== 200) {
                setTimeout(init, 2000);
                return;
            }

            bootText.innerText = "LOADING NEURAL PROFILE...";
            const r = await fetch(`/api/balance/${state.user_id}?t=${Date.now()}`);
            const res = await r.json();
            
            if(res.status === 'ok') {
                state = {...state, ...res.data};
                render();
                hideLoader();
            } else {
                throw new Error("Data error");
            }
        } catch(e) {
            bootText.innerText = "CORE OFFLINE. RETRYING...";
            setTimeout(init, 3000); 
        }
    }

    function hideLoader() {
        const loader = document.getElementById('reloading-screen');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
            document.getElementById('main-container').classList.add('visible');
        }, 500);
    }

    function render() {
        document.getElementById('score').innerText = state.score.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        document.getElementById('display-level').innerText = `LEVEL ${state.level}`;
        
        // Лига: каждые 100к очков новый визуальный этап
        const progress = (state.score % 100000) / 100000 * 100;
        document.getElementById('league-fill').style.width = progress + '%';
    }

    async function saveData() {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(state)
            });
            console.log("💾 Cloud Sync Success");
        } catch(e) {
            console.error("❌ Cloud Sync Failed");
        }
    }

    // Обработка тапа
    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        // Поддержка мульти-тапа (до 5 пальцев)
        const touches = e.changedTouches;
        for(let i=0; i<touches.length; i++) {
            if(state.energy < state.tap_power) break;

            state.score += state.tap_power; 
            state.energy -= state.tap_power;
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            createFlyText(touches[i].clientX, touches[i].clientY, `+${state.tap_power}`);
        }
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = (x - 20) + 'px'; 
        el.style.top = (y - 40) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }

    // Модальные окна
    window.openModal = (id) => {
        if(id === 'friends-modal') {
            document.getElementById('ref-link').innerText = `https://t.me/neural_pulse_bot?start=${state.user_id}`;
        }
        document.getElementById(id).classList.add('active');
    };

    document.querySelectorAll('.close-modal').forEach(btn => {
        btn.onclick = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    });

    document.getElementById('copy-ref').onclick = () => {
        const link = document.getElementById('ref-link').innerText;
        navigator.clipboard.writeText(link).then(() => {
            if(tg.showAlert) tg.showAlert("Invite Link Copied!");
        });
    };

    // Игровой цикл: 100 обновлений в секунду
    setInterval(() => {
        // Регенерация энергии: +1.5 в секунду
        state.energy = Math.min(state.max_energy, state.energy + 0.015);
        
        // Начисление пассивного дохода
        if(state.pnl > 0) {
            state.score += (state.pnl / 360000);
        }
        render();
    }, 10); 

    // Автосохранение каждые 15 секунд
    setInterval(saveData, 15000);

    window.onload = init;
</script>
</body>
</html>
