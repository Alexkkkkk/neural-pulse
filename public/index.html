<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.1.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .load-fill { width: 0%; height: 4px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); transition: 0.1s; border-radius: 2px; }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin-top: 20px; background: #111; border: 1px solid #222; border-radius: 25px; padding: 15px; display: flex; align-items: center; gap: 15px; position: relative; box-sizing: border-box; }
        .lvl-box { width: 50px; height: 50px; border: 2px solid var(--neon-cyan); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: var(--neon-cyan); }

        .bal { font-size: 70px; font-weight: 900; margin-top: 20px; text-shadow: 0 0 20px rgba(0,242,255,0.4); }

        .stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .main-logo { width: 210px; height: 210px; border-radius: 50%; cursor: pointer; filter: drop-shadow(0 0 25px var(--neon-purple)); }
        
        .pill-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 0; border-radius: 20px; font-size: 12px; font-weight: bold; width: 160px; text-align: center; margin: 5px; cursor: pointer; }

        .energy-section { width: 85%; margin-bottom: 25px; }
        .energy-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .energy-fill { height: 100%; background: var(--neon-cyan); transition: 0.3s; width: 100%; }

        .footer { width: 92%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 35px; }
        .f-item { background: #111; border: 1px solid #222; border-radius: 20px; padding: 16px 0; text-align: center; font-size: 11px; font-weight: bold; }

        .plus { position: absolute; font-size: 30px; font-weight: 900; color: var(--neon-cyan); animation: float 0.7s forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div id="loader">
        <img src="images/logo.png" style="width: 80px;" onerror="this.src='https://via.placeholder.com/80'">
        <div style="width: 200px; background: #222; height: 4px; margin-top: 20px;"><div class="load-fill" id="l-f"></div></div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div style="position:absolute; top:8px; right:20px; font-size:8px; color:#444;">VER 1.1.2</div>
            <div class="lvl-box" id="l-v">1</div>
            <div>
                <div style="font-size: 10px; color: #666; font-weight: bold;">NEURAL PULSE</div>
                <div style="font-size: 12px; font-weight: bold;">PUBLIC NODE</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>
        <div style="color: var(--neon-cyan); margin-top: -10px; font-weight: bold;" id="p-v">+0/H</div>

        <div class="stage">
            <img src="images/logo.png" class="main-logo" id="t-a" onerror="this.src='https://via.placeholder.com/210'">
            <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center;">
                <div class="pill-btn" onclick="handleWallet()" id="ton-btn">WALLET</div>
                <div class="pill-btn" onclick="invite()">FRIENDS</div>
            </div>
        </div>

        <div class="energy-section">
            <div style="display:flex; justify-content: space-between; font-size: 10px; color: #888;"><span>⚡ ENERGY CORE</span><span id="e-n">1000/1000</span></div>
            <div class="energy-bar"><div class="energy-fill" id="e-f"></div></div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="upgrade()">🚀 BOOST</div>
            <div class="f-item" onclick="tg.showAlert('Mining soon')">⛏️ MINE</div>
            <div class="f-item" onclick="checkPay()">📊 CHECK</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const tonConnect = new TonConnectSDK.TonConnect({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0 };

        async function init() {
            let p = 0;
            const iv = setInterval(() => {
                p += 10; document.getElementById('l-f').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(iv);
                    loadUser();
                }
            }, 50);
            setInterval(() => { if(s.eng < 1000) { s.eng++; upd(); } }, 1000);
        }

        async function loadUser() {
            const r = await fetch(`/api/user/${s.uid}`);
            const d = await r.json();
            Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
            upd();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('ui').classList.add('ready');
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${s.eng}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('p-v').innerText = `+${s.pnl}/H`;
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = e.touches[0].clientX + 'px'; p.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            upd();
        });

        async function upgrade() {
            const cost = s.lvl * 5000;
            if(confirm(`Upgrade to Level ${s.lvl+1} for ${cost}?`)) {
                const r = await fetch('/api/upgrade/click', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid}) });
                if((await r.json()).success) { s.lvl++; s.bal -= cost; upd(); }
            }
        }

        async function checkPay() {
            tg.showAlert("Checking transactions...");
        }

        function invite() {
            tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/n_pulse_bot?start=${s.uid}`);
        }

        setInterval(() => fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl}) }), 3000);
        
        async function handleWallet() {
            if (tonConnect.connected) await tonConnect.disconnect();
            else tg.openLink(tonConnect.connect(await tonConnect.getWallets()));
        }

        init();
    </script>
</body>
</html>
