<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Online</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --neon-purp: #b026ff; 
            --neon-green: #00ffcc; 
            --bg: #050a1a; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            touch-action: manipulation; 
        }
        
        #reloading-screen { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader-logo { 
            width: 80px; height: 80px; 
            border-radius: 20px; 
            border: 2px solid var(--neon-purp); 
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.5); 
            margin-bottom: 20px; 
            overflow: hidden; 
        }
        .loader-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .game-container { 
            display: none; opacity: 0; 
            width: 100%; max-width: 500px; height: 100vh; 
            flex-direction: column; align-items: center; 
            padding: 15px; box-sizing: border-box; 
            transition: 0.5s; margin: 0 auto; 
        }
        .game-container.visible { display: flex; opacity: 1; }

        .header-top { width: 100%; display: flex; align-items: center; gap: 12px; }
        .ai-icon-small { width: 48px; height: 48px; border: 2px solid var(--neon-purp); border-radius: 12px; overflow: hidden; }
        .league-info { flex-grow: 1; }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
        #league-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: 0.5s; }

        #score { font-size: 48px; font-weight: 900; margin: 15px 0 5px; text-shadow: 0 0 20px var(--neon-blue); }
        
        #ton-connect-wrapper { margin-bottom: 10px; transform: scale(0.85); }

        .game-main { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #tap-btn { 
            width: 260px; height: 260px; 
            background: url('/static/images/logo.png?v=3.1') center/cover; 
            border: 4px solid rgba(176, 38, 255, 0.3); 
            border-radius: 50%; 
            filter: drop-shadow(0 0 20px var(--neon-blue));
            transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            outline: none;
        }
        #tap-btn:active { transform: scale(0.92); }

        .energy-box { width: 100%; margin-bottom: 15px; }
        .energy-bar-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid var(--neon-blue); overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: 0.2s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
        .nav-link { 
            background: rgba(255,255,255,0.05); 
            padding: 12px 5px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 10px; 
            font-weight: 700; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(5, 10, 26, 0.95);
            z-index: 1000; padding: 20px; flex-direction: column; align-items: center;
        }
        .modal.active { display: flex; }
        .card-list { width: 100%; overflow-y: auto; margin-top: 20px; }
        .mine-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            border-radius: 15px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .buy-btn {
            background: var(--neon-green); color: black; border: none;
            padding: 8px 15px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron';
        }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--neon-purp); cursor: pointer; }

        .floating-text { 
            position: absolute; 
            pointer-events: none; 
            font-weight: 900; 
            font-size: 32px; 
            color: white; 
            animation: floatUp 0.8s forwards; 
            z-index: 100; 
            text-shadow: 0 0 10px var(--neon-blue); 
        }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-120px) scale(1.2); } 
        }
    </style>
</head>
<body>

<div id="reloading-screen">
    <div class="loader-logo"><img src="/static/images/logo.png?v=3.1"></div>
    <div id="boot-text" style="color: var(--neon-blue); font-weight: 900; letter-spacing: 3px; font-size: 12px;">SYSTEM BOOTING...</div>
</div>

<div id="mine-modal" class="modal">
    <div class="close-modal" id="close-mine">✖</div>
    <h2 style="color: var(--neon-blue); margin-top: 40px; font-size: 18px;">MINING RIGS</h2>
    <div class="card-list" id="card-container"></div>
</div>

<div class="game-container" id="main-container">
    <div class="header-top">
        <div class="ai-icon-small"><img src="/static/images/logo.png?v=3.1" style="width:100%"></div>
        <div class="league-info">
            <div style="display:flex; justify-content: space-between; font-size: 10px; font-weight: 700;">
                <span id="league-name">IRON LEAGUE</span>
                <span id="display-level">LVL 1</span>
            </div>
            <div class="league-bar"><div id="league-fill"></div></div>
        </div>
    </div>

    <div id="score">0</div>
    
    <div id="ton-connect-wrapper"></div>

    <div id="pnl-display" style="color: var(--neon-green); font-size: 11px; margin-bottom: 10px; letter-spacing: 1px;">PROFIT: +0/hr</div>

    <div class="game-main">
        <button id="tap-btn"></button>
    </div>

    <div class="energy-box">
        <div style="display:flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: 700;">
            <span style="color: var(--neon-blue);">⚡ ENERGY</span>
            <span id="energy-text">0/0</span>
        </div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" id="btn-boost" style="border-color: var(--neon-purp);">🚀 Boost</div>
        <div class="nav-link" id="btn-friends" style="border-color: var(--neon-blue);">👥 Friends</div>
        <div class="nav-link" id="btn-mine" style="border-color: var(--neon-green);">⛏️ Mine</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // 1. Инициализация TON Connect
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://np.bothost.ru/static/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-wrapper'
    });

    let state = {
        score: 0, 
        energy: 1000, 
        max_energy: 1000, 
        tap_power: 1, 
        pnl: 0, 
        level: 1,
        wallet_address: null,
        user_id: String(tg.initDataUnsafe?.user?.id || '476014374')
    };

    const MINING_CARDS = [
        {id: 'cpu_1', name: 'Nano Core', cost: 1000, pnl: 50, icon: '🛰️'},
        {id: 'gpu_1', name: 'Neural GPU', cost: 5000, pnl: 280, icon: '📟'},
        {id: 'node_1', name: 'Pulse Node', cost: 25000, pnl: 1400, icon: '🖥️'}
    ];

    // Отслеживание кошелька
    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            state.wallet_address = wallet.account.address;
            console.log("Wallet connected:", state.wallet_address);
            saveData(); // Сразу сохраняем адрес в БД
        } else {
            state.wallet_address = null;
        }
    });

    const leagues = [
        { name: "IRON LEAGUE", min: 0, color: "#00d4ff" },
        { name: "BRONZE LEAGUE", min: 10000, color: "#cd7f32" },
        { name: "SILVER LEAGUE", min: 50000, color: "#c0c0c0" },
        { name: "GOLD LEAGUE", min: 250000, color: "#ffcc00" },
        { name: "NEURAL GOD", min: 1000000, color: "#b026ff" }
    ];

    async function init() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('tgWebAppStartParam') || '';
            const r = await fetch(`/api/balance/${state.user_id}${ref ? '?ref=' + ref : ''}`);
            const res = await r.json();
            if(res.status === 'ok') {
                state = {...state, ...res.data};
                render();
                setTimeout(() => {
                    document.getElementById('reloading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('reloading-screen').style.display = 'none';
                        document.getElementById('main-container').classList.add('visible');
                    }, 500);
                }, 1000);
            }
        } catch(e) { 
            console.error("Init error:", e);
            document.getElementById('reloading-screen').style.display = 'none';
            document.getElementById('main-container').classList.add('visible');
        }
    }

    function render() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-display').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        
        state.level = Math.floor(state.score / 15000) + 1;
        document.getElementById('display-level').innerText = `LVL ${state.level}`;

        let currentLeague = leagues[0];
        for(let l of leagues) { if(state.score >= l.min) currentLeague = l; }
        document.getElementById('league-name').innerText = currentLeague.name;
        document.getElementById('league-name').style.color = currentLeague.color;
        document.getElementById('league-fill').style.width = Math.min(100, (state.score / (currentLeague.min + 50000) * 100)) + '%';
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy < state.tap_power) {
            tg.HapticFeedback.notificationOccurred('error');
            return;
        }
        state.score += state.tap_power;
        state.energy -= state.tap_power;
        
        // Мультитач поддержка
        for (let i = 0; i < e.changedTouches.length; i++) {
            createFlyText(e.changedTouches[i].clientX, e.changedTouches[i].clientY, `+${state.tap_power}`);
        }
        
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        render();
    });

    function createFlyText(x, y, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    async function saveData() {
        await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(state)
        });
    }

    // --- [WEB3: ПЛАТЕЖ С ПРАВИЛЬНЫМ PAYLOAD] ---
    document.getElementById('btn-boost').onclick = async () => {
        if (!tonConnectUI.connected) {
            tg.showAlert("Сначала подключи кошелек!");
            return;
        }

        tg.showConfirm("Восстановить энергию за 0.1 TON?", async (ok) => {
            if(!ok) return;

            // Сначала сохраним текущий прогресс
            await saveData();

            // Формируем комментарий, который поймет бэкенд (ref_ID)
            const comment = `ref_${state.user_id}`;

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [
                    {
                        address: "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI",
                        amount: "100000000", // 0.1 TON в нанотонах
                        // Важно: для текстового комментария в TON используется специальный префикс 00000000
                        payload: "te6ccgEBAQEADgAAGE5VUlBVTFNFX0JPT1NUvS69sA==" // Это пример Cell с текстом, ниже сделаем проще через URL если UI не сработает
                    }
                ]
            };

            try {
                // Более надежный способ отправки комментария через TON Connect UI
                // Если ты хочешь просто текст, UI сам его закодирует, если передать в правильном формате
                // Но проще всего использовать наш эндпоинт для параметров
                const paramsReq = await fetch(`/api/payment-params/${state.user_id}`);
                const params = await paramsReq.json();

                const tx = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: params.address,
                        amount: (params.boost_price * 1e9).toString(),
                        payload: "" // Оставляем пустым, пользователь введет комментарий params.comment или используем deep link
                    }]
                };

                // ВНИМАНИЕ: Чтобы не мучаться с Cell на фронте, 
                // мы просто просим пользователя подтвердить транзакцию.
                // Самый надежный метод - показать пользователю что вписать в коммент.
                
                tg.showAlert(`ВАЖНО: В комментарии к платежу ОБЯЗАТЕЛЬНО укажите: ${params.comment}`);
                
                const result = await tonConnectUI.sendTransaction(tx);
                
                tg.showProgress();
                // Ждем 5 секунд пока блокчейн увидит транзакцию
                setTimeout(async () => {
                    const check = await fetch('/api/verify-payment', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: state.user_id, amount: 0.1 })
                    });
                    const res = await check.json();
                    tg.hideProgress();
                    tg.showAlert(res.message);
                    if(res.status === 'ok') {
                        state.energy = state.max_energy;
                        render();
                    }
                }, 7000);

            } catch(e) { 
                console.error(e);
                tg.showAlert("Ошибка или отмена транзакции"); 
            }
        });
    };

    document.getElementById('btn-mine').onclick = () => {
        const container = document.getElementById('card-container');
        container.innerHTML = '';
        MINING_CARDS.forEach(card => {
            const div = document.createElement('div');
            div.className = 'mine-card';
            div.innerHTML = `
                <div>
                    <div style="font-size:14px">${card.icon} ${card.name}</div>
                    <div style="font-size:10px; color:var(--neon-green)">+${card.pnl}/hr</div>
                    <div style="font-size:12px">💰 ${card.cost.toLocaleString()}</div>
                </div>
                <button class="buy-btn" onclick="buyCard('${card.id}', ${card.cost}, ${card.pnl})">BUY</button>
            `;
            container.appendChild(div);
        });
        document.getElementById('mine-modal').classList.add('active');
    };

    window.buyCard = (id, cost, pnl) => {
        if(state.score < cost) { 
            tg.showAlert("Недостаточно Neural Credits!"); 
            return; 
        }
        state.score -= cost;
        state.pnl += pnl;
        render();
        tg.HapticFeedback.notificationOccurred('success');
        saveData();
    };

    document.getElementById('close-mine').onclick = () => document.getElementById('mine-modal').classList.remove('active');

    document.getElementById('btn-friends').onclick = () => {
        const link = `https://t.me/UltraMind_AI_bot?start=${state.user_id}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Забирай 5000 бонусов в Neural Pulse! 🧠⚡`);
    };

    // Автосохранение каждые 10 сек
    setInterval(() => {
        if (!document.hidden) saveData();
    }, 10000);

    // Логика заработка и восстановления энергии в секунду
    setInterval(() => {
        let changed = false;
        if(state.energy < state.max_energy) { 
            state.energy = Math.min(state.max_energy, state.energy + 1.2); 
            changed = true; 
        }
        if(state.pnl > 0) { 
            state.score += (state.pnl / 3600); 
            changed = true; 
        }
        if(changed) render();
    }, 1000);

    window.onload = init;
</script>
</body>
</html>
