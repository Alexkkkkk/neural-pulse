<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; --neon-purp: #b026ff; --neon-green: #00ffcc; 
            --bg: #050a1a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

        body { 
            margin: 0; background: var(--bg); font-family: 'Orbitron', sans-serif; 
            color: white; overflow: hidden; touch-action: none;
            opacity: 0; transition: opacity 0.3s ease-in;
        }

        .game-content { 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; width: 100%; max-width: 500px; margin: 0 auto; padding: 20px;
            padding-top: env(safe-area-inset-top);
        }

        /* Шапка */
        .top-info { width: 100%; display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .mini-logo { 
            width: 45px; height: 45px; border: 2px solid var(--neon-purp); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; background: rgba(176, 38, 255, 0.1);
        }
        .league-info { flex-grow: 1; }
        .league-header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 6px; letter-spacing: 1px; }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purp), var(--neon-blue)); transition: width 0.4s; }

        .jackpot-card {
            width: 100%; background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px; padding: 12px; text-align: center; margin-bottom: 15px;
        }
        .jackpot-value { font-size: 26px; font-weight: 900; text-shadow: 0 0 15px var(--neon-blue); }

        #main-balance { font-size: 48px; font-weight: 900; margin-bottom: 2px; letter-spacing: -1px; }
        #pnl-info { color: var(--neon-green); font-size: 12px; margin-bottom: 15px; font-weight: 700; }

        .tap-area { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .main-circle {
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle, #1e1e3f 0%, #050a1a 100%);
            border: 4px solid var(--neon-purp); box-shadow: 0 0 40px rgba(176, 38, 255, 0.3);
            display: flex; align-items: center; justify-content: center; 
            font-size: 110px; cursor: pointer; transition: transform 0.05s; z-index: 2;
        }
        .main-circle:active { transform: scale(0.94); }
        .main-circle::after { content: '🧠'; }

        .side-buttons { position: absolute; right: -5px; display: flex; flex-direction: column; gap: 12px; z-index: 3; }
        .side-btn {
            background: rgba(5, 10, 26, 0.95); border: 1.5px solid var(--neon-blue);
            border-radius: 12px; padding: 12px 5px; font-size: 10px; color: white;
            text-transform: uppercase; width: 85px; text-align: center; font-weight: 700;
        }

        .energy-section { width: 100%; margin-top: 15px; }
        .energy-stats { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; font-weight: 700; }
        .energy-bar { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid var(--neon-blue); }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); transition: width 0.1s linear; }

        .bottom-menu { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; padding-bottom: env(safe-area-inset-bottom); }
        .menu-item { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 15px; text-align: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); font-weight: 700; }

        .floating-text { position: absolute; pointer-events: none; font-weight: 900; font-size: 32px; color: white; animation: floatUp 0.6s ease-out forwards; z-index: 100; text-shadow: 0 0 10px var(--neon-blue); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.3); } }
    </style>
</head>
<body>

<div class="game-content">
    <div class="top-info">
        <div class="mini-logo">AI</div>
        <div class="league-info">
            <div class="league-header"><span>NEURAL AGENT</span><span id="user-lvl">LVL 1</span></div>
            <div class="progress-container"><div id="progress-fill"></div></div>
        </div>
    </div>

    <div class="jackpot-card">
        <div style="font-size: 9px; color: var(--neon-blue); letter-spacing: 2px;">GLOBAL JACKPOT</div>
        <div class="jackpot-value" id="jackpot">500,052</div>
    </div>

    <div id="main-balance">0</div>
    <div id="pnl-info">PROFIT: +0/hr</div>

    <div class="tap-area">
        <div class="main-circle" id="tap-btn"></div>
        <div class="side-buttons">
            <div class="side-btn">INVITE</div>
            <div class="side-btn">TASKS</div>
            <div class="side-btn" style="border-color: #ffaa00;">WALLET</div>
        </div>
    </div>

    <div class="energy-section">
        <div class="energy-stats"><span>⚡ ENERGY</span><span id="energy-val">1000/1000</span></div>
        <div class="energy-bar"><div id="energy-fill"></div></div>
    </div>

    <div class="bottom-menu">
        <div class="menu-item">🚀 BOOST</div>
        <div class="menu-item">⛏️ MINE</div>
        <div class="menu-item">📊 STATS</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const USER_ID = String(tg.initDataUnsafe?.user?.id || 'TEST_USER');
    const START_PARAM = tg.initDataUnsafe?.start_param || '';

    // Логирование на Bothost
    async function logToServer(msg, type = "INFO") {
        try {
            fetch('/api/log', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: USER_ID, error: `[${type}] ${msg}` })
            });
        } catch(e) {}
    }

    tg.ready();
    tg.expand();
    tg.setHeaderColor('#050a1a');
    document.body.style.opacity = '1';

    // Состояние игры
    let state = {
        score: 0,
        energy: 1000,
        max_energy: 1000,
        tap_power: 1,
        pnl: 0,
        level: 1,
        user_id: USER_ID
    };

    // Загрузка локального кеша (для мгновенного старта)
    const localData = localStorage.getItem('np_state');
    if (localData) {
        state = {...state, ...JSON.parse(localData)};
        updateUI();
    }

    // Синхронизация с сервера
    async function syncWithServer() {
        try {
            const response = await fetch(`/api/balance/${USER_ID}?ref=${START_PARAM}&t=${Date.now()}`);
            if (response.ok) {
                const result = await response.json();
                if(result.status === 'ok') {
                    state = {...state, ...result.data};
                    updateUI();
                    saveToLocal();
                }
            }
        } catch(e) { logToServer("Sync error: " + e.message, "ERROR"); }
    }

    function saveToLocal() {
        localStorage.setItem('np_state', JSON.stringify(state));
    }

    function updateUI() {
        document.getElementById('main-balance').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-val').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
        document.getElementById('pnl-info').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/hr`;
        document.getElementById('user-lvl').innerText = `LVL ${state.level}`;
        
        // Прогресс до следующего уровня (пример: каждые 100к монет)
        const progress = (state.score % 100000) / 1000;
        document.getElementById('progress-fill').style.width = Math.min(progress, 100) + '%';
        
        // Фейковый джекпот
        document.getElementById('jackpot').innerText = (500052 + Math.floor(Date.now()/1000000)).toLocaleString();
    }

    // Обработка тапов (мультитач)
    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touches = e.changedTouches;
        
        for(let i=0; i < touches.length; i++) {
            if(state.energy >= state.tap_power) {
                state.score += state.tap_power;
                state.energy -= state.tap_power;
                createFloatingText(touches[i].clientX, touches[i].clientY, `+${state.tap_power}`);
            }
        }
        
        updateUI();
        saveToLocal();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    });

    function createFloatingText(x, y, text) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = `${x - 20}px`; 
        el.style.top = `${y - 40}px`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    // Регенерация энергии и пассивный доход (каждые 100мс)
    setInterval(() => {
        let changed = false;
        if (state.energy < state.max_energy) {
            state.energy = Math.min(state.max_energy, state.energy + 0.1); // +1 в сек
            changed = true;
        }
        if (state.pnl > 0) {
            state.score += (state.pnl / 36000); // доход в 100мс
            changed = true;
        }
        if (changed) updateUI();
    }, 100);

    // Автосохранение на сервер (раз в 15 сек)
    setInterval(() => {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(state)
        }).catch(() => {});
    }, 15000);

    // Начальная синхронизация
    syncWithServer();
</script>
</body>
</html>
