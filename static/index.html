<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
        </div>
        <div class="access-text">ACCESS GRANTED</div>
        <div class="load-pct" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-fill" id="load-bar"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar-box"><img src="images/logo.png" id="u-avatar"></div>
                <div><b id="u-name">...</b><br><small style="color:#444; font-size:9px;">SYNCED WITH NODE</small></div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo-btn" id="tap-target" ontouchstart="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('top')">🏆 TOP 100</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="energy-info"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="eng-progress"><div class="eng-fill" id="eng-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="nav-item" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="nav-item" onclick="ui.openM('bonus')">🎁 BONUS</div>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-content">
            <div class="modal-drag-line"></div>
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-body"></div>
            <button class="close-btn" onclick="ui.closeM()">RETURN TO TERMINAL</button>
        </div>
    </div>

    <script>
        // Инициализация TON Connect
        const connector = new TonConnectSDK.TonConnect({ manifestUrl: window.location.origin + '/static/tonconnect-manifest.json' });

        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                tg.expand();
                const u = tg.initDataUnsafe?.user || { id: "0", username: "Unknown" };
                
                try {
                    const res = await fetch(`/api/user/${u.id}?username=${u.username}`);
                    const data = await res.json();
                    // Исправление NaN через Number()
                    this.user = {
                        user_id: u.id,
                        username: data.username || u.username,
                        balance: Number(data.balance) || 0,
                        energy: Number(data.energy) || 1000,
                        max_energy: Number(data.max_energy) || 1000,
                        click_lvl: Number(data.click_lvl) || 1,
                        profit_hr: Number(data.profit_hr) || 0
                    };
                } catch(e) { 
                    this.user = { user_id: u.id, balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, username: u.username };
                }
                ui.startLoading();
                this.startSync();
            },

            tap(e) {
                if (Number(this.user.energy) < Number(this.user.click_lvl)) return;
                this.user.balance = Number(this.user.balance) + Number(this.user.click_lvl);
                this.user.energy = Number(this.user.energy) - Number(this.user.click_lvl);
                ui.update();
                this.showAnim(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            },

            showAnim(e) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                const p = document.createElement('div');
                p.className = 'tap-pop';
                p.innerText = `+${this.user.click_lvl}`;
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            },

            async buyUpgrade(type) {
                const prices = {
                    tap: Number(this.user.click_lvl) * 3000,
                    energy: (Number(this.user.max_energy) / 500) * 5000,
                    profit: (Number(this.user.profit_hr) / 500 + 1) * 20000
                };

                if (Number(this.user.balance) >= prices[type]) {
                    this.user.balance -= prices[type];
                    if (type === 'tap') this.user.click_lvl++;
                    if (type === 'energy') { this.user.max_energy += 500; this.user.energy = this.user.max_energy; }
                    if (type === 'profit') this.user.profit_hr += 500;
                    ui.update();
                    ui.openM(type === 'profit' ? 'mine' : 'boost');
                    this.save(); // Мгновенная синхронизация при покупке
                }
            },

            startSync() {
                // Пассивный доход и энергия (каждую секунду)
                setInterval(() => {
                    this.user.energy = Math.min(this.user.max_energy, Number(this.user.energy) + 1.2);
                    if(this.user.profit_hr > 0) this.user.balance += (Number(this.user.profit_hr) / 3600);
                    ui.update();
                }, 1000);
                // Сохранение в базу (каждые 10 секунд)
                setInterval(() => this.save(), 10000);
            },

            async save() {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.user_id, 
                        balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy), 
                        max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl, 
                        profit_hr: this.user.profit_hr
                    })
                });
            }
        };

        const ui = {
            update() {
                if(!logic.user) return;
                const bal = Math.floor(logic.user.balance);
                document.getElementById('balance').innerText = bal.toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(bal/150000)+1}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = logic.user.profit_hr;
            },

            async openM(type) {
                const body = document.getElementById('modal-body');
                const title = document.getElementById('modal-title');
                title.innerText = type.toUpperCase();
                
                if(type === 'top') {
                    body.innerHTML = '<div class="loader-min">LOADING NETWORK...</div>';
                    const r = await fetch('/api/top');
                    const users = await r.json();
                    // Сортировка и Топ-100
                    body.innerHTML = users.sort((a,b) => b.balance - a.balance).slice(0, 100).map((u, i) => `
                        <div class="top-item ${u.username === logic.user.username ? 'me' : ''}">
                            <div class="top-user">
                                <span class="rank">${i+1}</span>
                                <div class="top-avatar">${u.username[0]}</div>
                                <span class="top-name">${u.username}</span>
                            </div>
                            <span class="top-val">${Math.floor(u.balance).toLocaleString()}</span>
                        </div>`).join('');
                } else if(type === 'wallet') {
                    body.innerHTML = `
                        <div class="wallet-box">
                            <img src="https://ton.org/download/ton_symbol.png" width="60">
                            <h3>TON Terminal</h3>
                            <p>Connect your wallet to synchronize your Neural Credits with the blockchain.</p>
                            <button class="action-btn" id="connect-btn" onclick="ui.connectWallet()">CONNECT WALLET</button>
                        </div>`;
                } else if(type === 'boost') {
                    body.innerHTML = `
                        <div class="top-item" onclick="logic.buyUpgrade('tap')">
                            <div class="top-user"><span>🚀</span><div><b>Multitap</b><br><small>Level ${logic.user.click_lvl}</small></div></div>
                            <b class="top-val">💰 ${(logic.user.click_lvl * 3000).toLocaleString()}</b>
                        </div>
                        <div class="top-item" onclick="logic.buyUpgrade('energy')">
                            <div class="top-user"><span>⚡</span><div><b>Energy Cap</b><br><small>+500 Energy</small></div></div>
                            <b class="top-val">💰 ${((logic.user.max_energy / 500) * 5000).toLocaleString()}</b>
                        </div>`;
                } else if(type === 'mine') {
                    body.innerHTML = `
                        <div class="top-item" onclick="logic.buyUpgrade('profit')">
                            <div class="top-user"><span>⛏️</span><div><b>Neural Core</b><br><small>+500 profit/hr</small></div></div>
                            <b class="top-val">💰 ${((logic.user.profit_hr / 500 + 1) * 20000).toLocaleString()}</b>
                        </div>`;
                }
                document.getElementById('modal-container').classList.add('active');
            },

            async connectWallet() {
                // Логика вызова кошелька через TON Connect
                alert("Opening TON Wallet...");
                // Здесь будет вызов модалки кошелька
            },

            closeM() { document.getElementById('modal-container').classList.remove('active'); },

            startLoading() {
                let p = 0;
                const itv = setInterval(() => {
                    p += 4;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if(p >= 100) { clearInterval(itv); document.getElementById('loading-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; this.update(); }
                }, 40);
            }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
