<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.8.8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-circle"><img src="images/logo.png"></div>
        <div class="access-granted">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-f" id="load-bar"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar" id="u-ava"></div>
                <div style="text-align:left;"><b id="u-name">...</b><br><small style="color:var(--cyan); font-size:9px;">v3.8.8 Quantum Full</small></div>
            </div>
            <div id="u-lvl" class="lvl-badge">LVL 1</div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-img" onpointerdown="logic.tap(event)">
            <div class="side-menu">
                <button class="btn-ui" onclick="ui.openM('wallet')">👛 WALLET</button>
                <button class="btn-ui" onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button class="btn-ui" onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </div>

        <div class="energy-box">
            <small>ENERGY <span id="eng-val">1000/1000</span></small>
            <div class="bar-bg"><div id="eng-fill" class="bar-f"></div></div>
        </div>

        <div class="footer-grid">
            <button class="btn-ui" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="btn-ui" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="btn-ui" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="btn-ui" onclick="logic.loadTop()">🏆 TOP</button>
        </div>
    </div>

    <div id="m-wallet" class="modal">
        <h1>👛 WALLET</h1>
        <div id="ton-connect-btn"></div>
        <div id="wallet-addr" class="wallet-info">Не подключено</div>
        <button class="btn-cls" onclick="ui.closeM()">BACK</button>
    </div>

    <div id="m-top" class="modal"><h2>🏆 TOP</h2><div id="t-list"></div><button class="btn-cls" onclick="ui.closeM()">BACK</button></div>
    <div id="m-mine" class="modal"><h2>⛏️ MINE</h2><button class="btn-cls" onclick="ui.closeM()">BACK</button></div>
    <div id="m-boost" class="modal"><h2>🚀 BOOST</h2><button class="btn-cls" onclick="ui.closeM()">BACK</button></div>
    <div id="m-friends" class="modal"><h2>🤝 FRIENDS</h2><button class="btn-cls" onclick="ui.closeM()">BACK</button></div>
    <div id="m-tasks" class="modal"><h2>📋 TASKS</h2><button class="btn-cls" onclick="ui.closeM()">BACK</button></div>
    <div id="m-bonus" class="modal"><h2>🎁 BONUS</h2><button class="btn-cls" onclick="ui.closeM()">BACK</button></div>

    <script src="loading.js"></script>
    <script src="ui.js"></script>
    <script src="logic.js"></script>
</body>
</html>
