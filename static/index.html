<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">INITIALIZING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let tonConnectUI = null;

        const game = {
            data: { 
                id: 0, 
                balance: 0, 
                energy: 1000, 
                max_energy: 1000, 
                tap: 1,      // Соответствует полю в вашей БД
                profit: 0,   // Соответствует полю в вашей БД
                username: "AGENT",
                last_seen: ""
            },
            // Виртуальные уровни для расчета стоимости
            lvls: { regen: 1 }, 
            serverTasks: [], 
            serverTop: [],
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, username: 'KANDERRR' };
                this.data.id = u.id.toString();
                this.data.username = (u.username || "AGENT").toUpperCase();

                try {
                    // Инициализация TON
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });

                    // 1. Загрузка данных пользователя из БД
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(this.data.username)}`);
                    if (r.ok) {
                        const sData = await r.json();
                        Object.assign(this.data, sData);
                    }

                    // 2. Загрузка задач и топа
                    const [tRes, topRes] = await Promise.all([
                        fetch('/api/tasks'),
                        fetch('/api/top')
                    ]);
                    if (tRes.ok) this.serverTasks = await tRes.json();
                    if (topRes.ok) this.serverTop = await topRes.json();

                } catch(e) { console.error("Init Error:", e); }

                this.isLoaded = true;
                this.loop();
                ui.render();
            },

            // --- МАТЕМАТИКА ---
            getCost(type) {
                const base = { tap: 400, energy: 500, regen: 800, mine: 1200 };
                const mult = 1.6;
                // Определяем текущий уровень для расчета цены
                let clvl = 1;
                if(type === 'tap') clvl = this.data.tap;
                if(type === 'energy') clvl = Math.floor((this.data.max_energy - 1000) / 500) + 1;
                if(type === 'mine') clvl = Math.floor(this.data.profit / 150) + 1;
                if(type === 'regen') clvl = this.lvls.regen;

                return Math.floor(base[type] * Math.pow(mult, clvl - 1));
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                this.data.balance += this.data.tap;
                this.data.energy -= 1;
                ui.pop(e, this.data.tap);
                ui.render();
                tg.HapticFeedback.impactOccurred('light');
            },

            upgrade(type) {
                const cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap++;
                    if(type === 'energy') this.data.max_energy += 500;
                    if(type === 'mine') this.data.profit += 150;
                    if(type === 'regen') this.lvls.regen++;

                    tg.HapticFeedback.notificationOccurred('success');
                    this.save();
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else {
                    tg.showAlert("НЕДОСТАТОЧНО СРЕДСТВ");
                }
            },

            async save() {
                if(!this.isLoaded) return;
                this.data.last_seen = new Date().toISOString();
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.data)
                });
            },

            loop() {
                setInterval(() => {
                    // Регенерация
                    if(this.data.energy < this.data.max_energy) {
                        this.data.energy = Math.min(this.data.max_energy, this.data.energy + (this.lvls.regen || 1));
                    }
                    // Пассивный доход
                    if(this.data.profit > 0) {
                        this.data.balance += (this.data.profit / 3600);
                    }
                    ui.render();
                }, 1000);
                // Сохранение каждые 20 сек
                setInterval(() => this.save(), 20000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 5;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { 
                        clearInterval(i); 
                        document.getElementById('loader').style.display='none'; 
                        document.getElementById('app').style.display='flex'; 
                    }
                }, 30);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit).toLocaleString();
                document.getElementById('my-name').innerText = d.username;
                
                let lvl = Math.floor(Math.log10(Math.max(10, d.balance/10))) + 1;
                document.getElementById('my-lvl').innerText = `LVL ${lvl}`;
            },

            pop(e, p) {
                const t = (e.touches && e.touches[0]) || e;
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = t.clientX+'px'; div.style.top = t.clientY+'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                
                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOSTERS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><span>⚡ Multitap (Lvl ${game.data.tap})</span><b>${game.getCost('tap')}</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><span>🔋 Capacity (Lvl ${Math.floor((game.data.max_energy-1000)/500)+1})</span><b>${game.getCost('energy')}</b></div>
                    <div class="top-item" onclick="game.upgrade('regen')"><span>🔄 Regen (Lvl ${game.lvls.regen})</span><b>${game.getCost('regen')}</b></div>`;
                }
                if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><span>🧠 Neural Node (Lvl ${Math.floor(game.data.profit/150)+1})</span><b>${game.getCost('mine')}</b></div>`;
                }
                if(type === 'tasks') {
                    let h = `<h2>📋 MISSIONS</h2>`;
                    if(game.serverTasks.length === 0) h += `<p>Scanning for nodes...</p>`;
                    game.serverTasks.forEach(t => {
                        h += `<div class="top-item" onclick="window.open('${t.url}')"><span>${t.title}</span><b>+${t.reward}</b></div>`;
                    });
                    b.innerHTML = h;
                }
                if(type === 'top') {
                    let h = `<h2>🏆 GLOBAL RANK</h2>`;
                    const list = Array.isArray(game.serverTop) ? game.serverTop : [];
                    list.slice(0, 10).forEach((u, i) => {
                        h += `<div class="top-item"><span>${i+1}. ${u.username}</span><b>${Math.floor(u.balance).toLocaleString()}</b></div>`;
                    });
                    b.innerHTML = h;
                }
                if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-btn"></div>`;
                    setTimeout(() => { if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-btn' }; }, 100);
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
