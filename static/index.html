<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
        }

        /* Header & League */
        .header {
            width: 90%; margin-top: 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .league-badge {
            width: 50px; height: 50px;
            border: 2px solid var(--neon-purple);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(188, 19, 254, 0.1);
        }
        .league-info { flex-grow: 1; }
        .league-name { font-size: 12px; letter-spacing: 1px; color: #aaa; }
        .progress-container {
            width: 100%; height: 6px;
            background: #222; border-radius: 3px; margin-top: 5px;
        }
        .progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            border-radius: 3px;
        }

        /* Jackpot Area */
        .jackpot-box {
            text-align: center; margin-top: 20px;
        }
        .jackpot-label { color: var(--neon-cyan); font-size: 14px; letter-spacing: 2px; }
        .jackpot-value { font-size: 38px; font-weight: bold; margin-top: 5px; }

        /* Main Score */
        .score-container {
            margin-top: 20px; text-align: center;
        }
        #balance { font-size: 54px; font-weight: 800; }
        .profit-info { color: var(--neon-cyan); font-size: 16px; margin-top: -5px; }

        /* Main Pulsing Logo (Cyborg Image) */
        .click-area {
            position: relative; margin-top: 30px;
            width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .main-logo {
            width: 100%; height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.4);
            transition: transform 0.05s;
            z-index: 2;
        }
        .main-logo:active { transform: scale(0.95); }

        /* Sidebar Buttons */
        .sidebar {
            position: absolute; right: 5%; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px;
            z-index: 3;
        }
        .side-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--neon-cyan);
            color: white; padding: 10px 15px;
            border-radius: 10px; font-size: 12px;
            width: 80px; text-align: center;
        }

        /* Energy Bar */
        .energy-section {
            width: 90%; margin-top: auto; margin-bottom: 20px;
        }
        .energy-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
        .energy-bar {
            width: 100%; height: 12px;
            background: #1a1a1a; border-radius: 6px; overflow: hidden;
            border: 1px solid #333;
        }
        #energy-fill {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            transition: width 0.3s;
        }

        /* Bottom Navigation */
        .bottom-nav {
            width: 95%; display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin-bottom: 20px;
        }
        .nav-btn {
            background: #151515; border: 1px solid #333;
            padding: 15px; border-radius: 15px;
            text-align: center; font-size: 14px; font-weight: bold;
        }

        /* Floating text animation */
        .tap-text {
            position: absolute; color: white; font-size: 32px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="league-badge">AI</div>
        <div class="league-info">
            <div style="display: flex; justify-content: space-between;">
                <span class="league-name">IRON LEAGUE</span>
                <span style="font-size: 10px; color: var(--neon-cyan);">LVL 1</span>
            </div>
            <div class="progress-container">
                <div class="progress-fill" style="width: 15%;"></div>
            </div>
        </div>
    </div>

    <div class="jackpot-box">
        <div class="jackpot-label">GLOBAL JACKPOT</div>
        <div class="jackpot-value">500,052</div>
    </div>

    <div class="score-container">
        <div id="balance">0</div>
        <div class="profit-info">PROFIT: +0/hr</div>
    </div>

    <div class="click-area" id="tap-zone">
        <img src="images/logo.png" class="main-logo" alt="Neural AI">
        
        <div class="sidebar">
            <div class="side-btn">INVITE</div>
            <div class="side-btn">TASKS</div>
            <div class="side-btn">WALLET</div>
        </div>
    </div>

    <div class="energy-section">
        <div class="energy-header">
            <span>⚡ ENERGY</span>
            <span id="energy-text">1000/1000</span>
        </div>
        <div class="energy-bar">
            <div id="energy-fill"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn">🚀 BOOST</div>
        <div class="nav-btn">⛏️ MINE</div>
        <div class="nav-btn">📊 STATS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const uid = tg.initDataUnsafe?.user?.id || "test_user";

        let state = {
            score: 0,
            energy: 1000,
            max_energy: 1000,
            tap_power: 1
        };

        // Загрузка данных
        async function loadData() {
            try {
                const r = await fetch(`/api/balance/${uid}`);
                const res = await r.json();
                if(res.status === 'ok') {
                    state = { ...state, ...res.data };
                    updateUI();
                }
            } catch(e) { console.error("Load error"); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
        }

        // Логика клика
        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.energy < state.tap_power) return;

            const touch = e.touches[0];
            createTapAnim(touch.pageX, touch.pageY);

            state.score += state.tap_power;
            state.energy -= state.tap_power;
            updateUI();
            
            // Вибрация
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        function createTapAnim(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-text';
            el.innerText = `+${state.tap_power}`;
            el.style.left = `${x - 15}px`;
            el.style.top = `${y - 30}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Регенерация энергии
        setInterval(() => {
            if (state.energy < state.max_energy) {
                state.energy = Math.min(state.max_energy, state.energy + 1);
                updateUI();
            }
        }, 1000);

        // Сохранение (Highload Ready - раз в 5 секунд)
        setInterval(async () => {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid, ...state })
            });
        }, 5000);

        loadData();
    </script>
</body>
</html>
