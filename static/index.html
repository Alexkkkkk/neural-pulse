<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96;
            --bg: #050a1a; 
        }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%);
            height: 100vh; 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }

        .game-container { 
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 212, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            transition: opacity 0.5s;
        }

        .header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 10px;
        }
        
        /* Логотип из твоего файла unnamed4.jpg */
        .logo { 
            width: 50px; 
            height: 50px; 
            background: url('/static/images/unnamed4.jpg') no-repeat center;
            background-size: cover;
            border-radius: 12px;
            box-shadow: 0 0 15px var(--neon);
        }

        #lvl { font-size: 14px; text-shadow: 0 0 10px var(--neon); color: var(--neon); }

        .balance-container {
            text-align: center;
            margin-top: 20px;
        }
        .balance-label { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
        #score { font-size: 48px; color: #fff; text-shadow: 0 0 20px var(--neon); font-weight: bold; margin-top: 5px; }

        .play-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Главная кнопка из твоего файла unnamed3.jpg */
        #btn { 
            width: 80vw; 
            max-width: 320px;
            height: 80vw;
            max-height: 320px;
            background: url('/static/images/unnamed3.jpg') no-repeat center;
            background-size: cover;
            border-radius: 50%;
            border: 4px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            cursor: pointer; 
            transition: transform 0.05s, box-shadow 0.2s; 
            outline: none; 
            z-index: 2;
            position: relative;
        }
        
        #btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            box-shadow: inset 0 0 30px rgba(0, 212, 255, 0.5);
        }

        #btn:active { transform: scale(0.95); box-shadow: 0 0 60px var(--neon); }

        .side-menu {
            position: absolute;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 3;
        }
        .side-item {
            width: 90px;
            padding: 10px 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            font-size: 9px;
            text-transform: uppercase;
            text-align: center;
        }

        .energy-container {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .energy-bar {
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 10px auto;
            overflow: hidden;
        }
        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-secondary), var(--neon));
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .nav-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
        }
        .nav-card:active { background: rgba(0, 212, 255, 0.1); }

        .plus-animation { 
            position: absolute; 
            color: var(--neon); 
            font-size: 32px; 
            font-weight: bold; 
            animation: float 0.7s ease-out forwards; 
            pointer-events: none; 
            text-shadow: 0 0 10px var(--neon); 
            z-index: 100; 
        }
        @keyframes float { 
            0% { opacity:1; transform: translateY(0) scale(1); } 
            100% { opacity:0; transform: translateY(-150px) scale(1.5); } 
        }
    </style>
</head>
<body>
    <div class="game-container" id="game" style="opacity:0">
        <div class="header">
            <div class="logo"></div>
            <span id="lvl">🏆 Level 1</span>
        </div>

        <div class="balance-container">
            <div class="balance-label">TOTAL NP POINTS</div>
            <div id="score">0</div>
        </div>

        <div class="play-area">
            <button id="btn"></button>
            <div class="side-menu">
                <div class="side-item" style="background: #2196F3; border:none; color:white;">Wallet</div>
                <div class="side-item">Friends</div>
                <div class="side-item">Tasks</div>
            </div>
        </div>

        <div class="energy-container">
            <div class="energy-bar">
                <div class="energy-fill" id="energyFill"></div>
            </div>
            <div style="font-size: 10px; opacity: 0.7;">⚡ ENERGY RECHARGING</div>
        </div>

        <div class="bottom-nav">
            <div class="nav-card">🚀 BOOST</div>
            <div class="nav-card">⛏️ MINE</div>
            <div class="nav-card">⚙️ STATS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = String(tg.initDataUnsafe?.user?.id || "999");
        let score = 0;
        let pending = 0;

        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('btn');

        async function loadData() {
            try {
                const r = await fetch(`/api/balance/${userId}?t=${Date.now()}`);
                const d = await r.json();
                score = d.balance || 0;
                scoreEl.textContent = score.toLocaleString();
                document.getElementById('game').style.opacity = '1';
            } catch (e) { 
                document.getElementById('game').style.opacity = '1';
            }
        }

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                score++;
                pending++;
                spawnPlus(t.pageX, t.pageY);
            }
            scoreEl.textContent = score.toLocaleString();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        function spawnPlus(x, y) {
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.textContent = '+1';
            p.style.left = (x - 15) + 'px';
            p.style.top = (y - 40) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        // Сохранение кликов каждые 2 секунды
        setInterval(async () => {
            if (pending > 0) {
                const toSend = pending;
                pending = 0;
                try {
                    await fetch('/api/clicks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: userId, clicks: toSend })
                    });
                } catch (e) { pending += toSend; }
            }
        }, 2000);

        loadData();
        tg.ready();
    </script>
</body>
</html>
