<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --main: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pct-text { font-size: 50px; font-weight: 900; color: var(--main); font-family: monospace; }
        
        /* Game UI */
        #app { width: 100%; display: none; flex-direction: column; align-items: center; height: 100%; padding: 20px 0; }
        .balance { font-size: 50px; font-weight: 900; margin: 20px 0; text-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .coin-wrap { position: relative; width: 260px; height: 260px; margin: 30px 0; }
        .coin-img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #111; filter: drop-shadow(0 0 20px rgba(0,242,255,0.1)); }
        .coin-img:active { transform: scale(0.96); }

        .stat-card { width: 85%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-top: auto; margin-bottom: 30px; }
        .progress-bg { width: 100%; height: 10px; background: #111; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #00f2ff, #bc13fe); transition: 0.3s; }
        
        .floating-val { position: absolute; color: white; font-size: 32px; font-weight: 900; pointer-events: none; animation: fly 0.6s forwards; }
        @keyframes fly { to { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="pct-text" id="load-val">0%</div>
        <div style="font-size: 10px; color: #444; margin-top: 15px; letter-spacing: 2px;">SYNCING WITH NEURAL GRID...</div>
    </div>

    <div id="app">
        <div style="font-size: 12px; color: var(--main); font-weight: bold;">AVAILABLE ASSETS</div>
        <div class="balance" id="balance">0</div>

        <div class="coin-wrap">
            <img src="logo.png" class="coin-img" id="coin" onerror="this.src='https://via.placeholder.com/260/000/00f2ff?text=AI'">
        </div>

        <button id="ton-btn" style="background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold;">CONNECT WALLET</button>

        <div class="stat-card">
            <div style="display: flex; justify-content: space-between; font-size: 12px;">
                <span>⚡ ENERGY</span>
                <span id="energy-text">1000/1000</span>
            </div>
            <div class="progress-bg"><div id="progress-fill"></div></div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const tonUI = new TONConnectUI.TonConnectUI({
        manifestUrl: window.location.origin + '/tonconnect-manifest.json'
    });

    let state = {
        bal: 0, nrg: 1000, lvl: 1, pnl: 0,
        uid: new URLSearchParams(window.location.search).get('u') || tg.initDataUnsafe?.user?.id,
        wallet: null, ready: false
    };

    // Загрузка
    let p = 0;
    const lTimer = setInterval(() => {
        if (p < 95) p += Math.random() * 5;
        if (state.ready) p = 100;
        document.getElementById('load-val').innerText = Math.floor(p) + '%';
        if (p >= 100) {
            clearInterval(lTimer);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }
    }, 100);

    async function init() {
        if (state.uid) {
            try {
                const res = await fetch('/api/user/' + state.uid);
                const data = await res.json();
                state.bal = Number(data.balance) || 0;
                state.nrg = Number(data.energy) || 1000;
                state.pnl = Number(data.pnl) || 0;
                state.wallet = data.wallet || null;
            } catch (e) { console.warn("Dev Mode / API Offline"); }
        }
        state.ready = true;
        render();
    }

    function render() {
        document.getElementById('balance').innerText = Math.floor(state.bal).toLocaleString();
        document.getElementById('energy-text').innerText = Math.floor(state.nrg) + '/1000';
        document.getElementById('progress-fill').style.width = (state.nrg / 10) + '%';
        if (state.wallet) document.getElementById('ton-btn').innerText = "CONNECTED";
    }

    document.getElementById('coin').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.nrg < state.lvl) return;

        state.bal += state.lvl;
        state.nrg -= state.lvl;

        const touch = e.touches[0];
        const val = document.createElement('div');
        val.className = 'floating-val';
        val.style.left = touch.clientX + 'px';
        val.style.top = touch.clientY + 'px';
        val.innerText = '+' + state.lvl;
        document.body.appendChild(val);
        setTimeout(() => val.remove(), 600);

        render();
        tg.HapticFeedback.impactOccurred('medium');
    });

    document.getElementById('ton-btn').onclick = () => {
        if (state.wallet) tg.showAlert("Wallet: " + state.wallet);
        else tonUI.openModal();
    };

    tonUI.onStatusChange(w => {
        if (w) {
            state.wallet = w.account.address;
            render();
        }
    });

    // Автосохранение каждые 5 сек
    setInterval(() => {
        if (state.ready && state.uid) {
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    userId: state.uid, balance: state.bal, energy: state.nrg,
                    click_lvl: state.lvl, pnl: state.pnl, wallet: state.wallet,
                    username: tg.initDataUnsafe?.user?.username || 'Guest'
                })
            });
        }
    }, 5000);

    // Реген энергии
    setInterval(() => {
        if (state.nrg < 1000) {
            state.nrg = Math.min(1000, state.nrg + 1.2);
            render();
        }
    }, 1000);

    window.onload = init;
</script>
</body>
</html>
