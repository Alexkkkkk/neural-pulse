<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #050505; --glass: rgba(255, 255, 255, 0.07); --ton-blue: #0088cc; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); background-image: radial-gradient(circle at 50% 50%, #150a28 0%, #050505 100%); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        #loader-screen { position: fixed; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-percent { color: var(--neon-cyan); font-size: 28px; font-weight: 900; font-family: monospace; }

        .content-layer { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        .content-layer.active { opacity: 1; visibility: visible; }

        .header-card { width: 85%; margin-top: 15px; display: flex; align-items: center; gap: 12px; background: var(--glass); padding: 12px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.15); }
        .lvl-icon { width: 44px; height: 44px; border: 1px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--neon-cyan); }

        #balance { font-size: 48px; font-weight: 900; margin-top: 25px; text-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }

        .main-wrapper { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 30px; flex-grow: 1; }
        .main-logo { width: 230px; height: 230px; border-radius: 50%; transition: 0.05s; border: 4px solid rgba(255,255,255,0.05); }
        
        .side-nav { position: absolute; right: 10px; display: flex; flex-direction: column; gap: 12px; }
        .side-btn { background: rgba(20,20,20,0.8); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 14px; width: 65px; font-size: 10px; font-weight: 800; text-align: center; }
        .wallet-connected { border-color: var(--ton-blue); color: var(--ton-blue); }

        .energy-section { width: 85%; margin-bottom: 30px; }
        .energy-bar-wrap { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, #00ff66, var(--neon-cyan)); width: 100%; transition: 0.3s; }

        .tap-text { position: absolute; color: #fff; font-size: 36px; font-weight: 900; pointer-events: none; animation: floatUp 0.7s forwards; }
        @keyframes floatUp { to { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div id="loader-screen"><div class="loader-percent" id="loader-percent">0%</div></div>

    <div class="content-layer">
        <div class="header-card">
            <div class="lvl-icon" id="lvl-display">1</div>
            <div id="pnl-display" style="color: var(--neon-cyan); font-weight: bold; font-size: 12px;">+0/h</div>
        </div>

        <div id="balance">0</div>

        <div class="main-wrapper">
            <div id="tap-zone" style="cursor:pointer">
                <img src="logo.png" class="main-logo" id="main-logo" onerror="this.src='https://via.placeholder.com/230/bc13fe/fff?text=AI'">
            </div>
            <div class="side-nav">
                <div class="side-btn" id="wallet-btn" onclick="connectWallet()">WALLET</div>
                <div class="side-btn" onclick="showInvite()">INVITE</div>
                <div class="side-btn" onclick="tg.showAlert('Soon')">TASKS</div>
            </div>
        </div>

        <div class="energy-section">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
                <span>⚡ ENERGY</span> <span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar-wrap"><div id="energy-fill"></div></div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Инициализация TON Connect
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://np.bothost.ru/tonconnect-manifest.json'
    });

    let state = { 
        balance: 0, energy: 1000, max_energy: 1000, 
        click_lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id,
        wallet: null, loaded: false, isDirty: false 
    };

    // Слушаем кошелек
    tonConnectUI.onStatusChange(wallet => {
        const btn = document.getElementById('wallet-btn');
        if (wallet) {
            state.wallet = wallet.account.address;
            state.isDirty = true;
            btn.innerText = 'OK';
            btn.classList.add('wallet-connected');
        } else {
            state.wallet = null;
            btn.innerText = 'WALLET';
            btn.classList.remove('wallet-connected');
        }
    });

    async function loadData() {
        if(!state.uid) { state.loaded = true; hideLoader(); return; }
        try {
            const r = await fetch(`/api/user/${state.uid}`);
            const res = await r.json();
            state.balance = Number(res.balance) || 0;
            state.energy = Number(res.energy) || 1000;
            state.pnl = Number(res.pnl) || 0;
            state.click_lvl = Number(res.click_lvl) || 1;
            state.wallet = res.wallet || null;
        } catch(e) {}
        state.loaded = true;
        updateUI();
        hideLoader();
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
        document.getElementById('energy-fill').style.width = `${(state.energy/state.max_energy)*100}%`;
        document.getElementById('lvl-display').innerText = state.click_lvl;
        document.getElementById('pnl-display').innerText = `+${Math.floor(state.pnl)}/h`;
    }

    document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.energy < state.click_lvl) return;
        
        state.balance += state.click_lvl;
        state.energy -= state.click_lvl;
        state.isDirty = true;

        const touch = e.touches[0];
        const num = document.createElement('div');
        num.className = 'tap-text';
        num.innerText = `+${state.click_lvl}`;
        num.style.left = touch.clientX + 'px';
        num.style.top = touch.clientY + 'px';
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 700);
        
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    });

    async function connectWallet() {
        if (state.wallet) {
            tg.showPopup({ 
                title: 'WALLET', 
                message: 'Wallet is connected. Do you want to disconnect?', 
                buttons: [{id: 'd', type: 'destructive', text: 'DISCONNECT'}, {type:'cancel'}]
            }, (id) => { if(id==='d') tonConnectUI.disconnect(); });
        } else {
            await tonConnectUI.openModal();
        }
    }

    async function syncData() {
        if(!state.uid || !state.isDirty) return;
        await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: String(state.uid),
                username: tg.initDataUnsafe?.user?.username || 'Player',
                balance: state.balance,
                energy: state.energy,
                click_lvl: state.click_lvl,
                pnl: state.pnl,
                wallet: state.wallet
            })
        });
        state.isDirty = false;
    }

    function hideLoader() {
        document.getElementById('loader-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader-screen').style.display = 'none';
            document.querySelector('.content-layer').classList.add('active');
        }, 500);
    }

    setInterval(() => {
        if (state.energy < state.max_energy) {
            state.energy = Math.min(state.max_energy, state.energy + 1.5);
            updateUI();
        }
    }, 1000);

    setInterval(syncData, 4000);
    window.onload = loadData;

    function showInvite() {
        const link = `https://t.me/neural_pulse_bot?start=${state.uid}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me!`);
    }
</script>
</body>
</html>
