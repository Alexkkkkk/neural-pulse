<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Mini App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="orbit-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loader-text">ACCESS GRANTED</div>
        <div class="loader-pct" id="pct">0%</div>
        <div class="loader-bar"><div id="bar"></div></div>
    </div>

    <div id="game-ui" style="display: none;">
        <header class="user-header">
            <div class="avatar-box"><img id="my-avatar" src="images/logo.png"></div>
            <div class="user-meta">
                <b id="my-name">...</b>
                <span>v4.0.0 Neural Mining</span>
            </div>
            <div class="lvl-tag" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-grid">
            <div class="s-card"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-card"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-display">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="click-zone">
            <div class="neon-glow"></div>
            <div class="tap-target" ontouchstart="game.handleTap(event)">
                <img src="images/logo.png">
            </div>
            
            <aside class="side-menu">
                <button onclick="ui.modal('wallet')">👛 WALLET</button>
                <button onclick="ui.modal('friends')">🤝 FRIENDS</button>
                <button onclick="ui.modal('bonus')">🎁 BONUS</button>
            </aside>
        </main>

        <footer class="energy-footer">
            <div class="e-info"><span>ENERGY</span><span id="ui-energy">1000/1000</span></div>
            <div class="e-track"><div id="e-fill"></div></div>
            
            <nav class="bottom-nav">
                <button onclick="ui.modal('boost')">🚀 BOOST</button>
                <button onclick="ui.modal('mine')">⛏️ MINE</button>
                <button onclick="ui.modal('tasks')">📋 TASKS</button>
                <button onclick="ui.modal('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="terminal" class="modal-overlay" onclick="if(event.target===this) ui.close()">
        <div class="modal-content">
            <div class="drag-line"></div>
            <div id="modal-body"></div>
            <button class="close-btn" onclick="ui.close()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const game = {
            data: { id:0, balance:0, energy:1000, max_energy:1000, tap:1, profit:0 },
            
            async init() {
                const user = tg.initDataUnsafe.user || { id: 1, username: 'LocalHost', photo_url: '' };
                document.getElementById('my-name').innerText = (user.username || user.first_name).toUpperCase();
                if(user.photo_url) document.getElementById('my-avatar').src = user.photo_url;

                try {
                    const r = await fetch(`/api/user/${user.id}?username=${user.username}&photo_url=${user.photo_url}`);
                    this.data = await r.json();
                } catch(e) { console.log("Offline mode"); }

                ui.runLoader();
                this.loop();
            },

            handleTap(e) {
                if (this.data.energy < this.data.tap) return;
                this.data.balance += this.data.tap;
                this.data.energy -= this.data.tap;
                ui.refresh();
                ui.spawnPop(e);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            },

            loop() {
                setInterval(() => {
                    // Реген энергии + пассивный доход
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1.2);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.refresh();
                }, 1000);
                
                setInterval(() => this.save(), 10000); // Синхронизация каждые 10сек
            },

            async save() {
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: this.data.id, ...this.data })
                });
            }
        };

        const ui = {
            runLoader() {
                let p = 0;
                const h = setInterval(() => {
                    p += 2;
                    document.getElementById('pct').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(h);
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('game-ui').style.display = 'flex';
                        this.refresh();
                    }
                }, 20);
            },
            refresh() {
                document.getElementById('ui-balance').innerText = Math.floor(this.data?.balance || 0).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(game.data.energy)}/${game.data.max_energy}`;
                document.getElementById('e-fill').style.width = (game.data.energy/game.data.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${game.data.tap}`;
                document.getElementById('ui-profit').innerText = game.data.profit;
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(game.data.balance / 10000) + 1}`;
            },
            spawnPop(e) {
                const t = e.touches[0];
                const p = document.createElement('div');
                p.className = 'pop-num';
                p.innerText = `+${game.data.tap}`;
                p.style.left = t.clientX + 'px';
                p.style.top = t.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            },
            async modal(type) {
                const body = document.getElementById('modal-body');
                body.innerHTML = `<div class="loader-mini">SYNCING...</div>`;
                document.getElementById('terminal').classList.add('open');

                if(type === 'top') {
                    const res = await fetch('/api/top');
                    const top = await res.json();
                    let html = `<h2>TOP 100 MINERS</h2>`;
                    top.forEach((u, i) => {
                        const isMe = u.id === game.data.id ? 'me' : '';
                        html += `
                        <div class="top-row ${isMe}">
                            <div class="top-info">
                                <b>#${i+1}</b>
                                <img src="${u.photo_url || 'images/logo.png'}">
                                <span>${u.username}</span>
                            </div>
                            <b>${Math.floor(u.balance).toLocaleString()}</b>
                        </div>`;
                    });
                    body.innerHTML = html;
                } else if(type === 'mine') {
                    body.innerHTML = `<h2>NEURAL UPGRADES</h2>
                        <div class="shop-item" onclick="game.data.profit+=500; game.data.balance-=5000; ui.close()">
                            <b>GPU Cluster</b><br><small>+500/hr | Cost: 5,000</small>
                        </div>`;
                } else {
                    body.innerHTML = `<h2>${type.toUpperCase()}</h2><p>Module encryption in progress...</p>`;
                }
            },
            close() { document.getElementById('terminal').classList.remove('open'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
