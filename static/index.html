<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse | Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js?5"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --neon-sec: #00ff96; --bg: #050a1a; --glass: rgba(10, 25, 47, 0.95); }
        body { margin: 0; background: var(--bg); height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; touch-action: manipulation; }
        .game-container { position: relative; width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #league-fill { height: 100%; width: 0%; transition: width 0.5s; background: var(--neon); }
        #score { font-size: 40px; font-weight: 900; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        .play-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        #btn { width: 250px; height: 250px; background: radial-gradient(circle, var(--neon) 0%, transparent 70%); border-radius: 50%; border: 4px solid var(--neon); box-shadow: inset 0 0 30px var(--neon); transition: transform 0.05s; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }
        #btn:active { transform: scale(0.95); }
        .energy-wrapper { width: 85%; margin-top: 20px; }
        .energy-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid var(--neon); overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: var(--neon); transition: width 0.2s; }
        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding-bottom: 20px; }
        .nav-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%; background: var(--glass); border-top: 3px solid var(--neon); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
        .plus-animation { position: absolute; pointer-events: none; font-weight: 900; animation: float 0.7s forwards; z-index: 100; text-shadow: 0 0 10px var(--neon); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="game-container" id="game" style="opacity:0; transition: 0.5s;">
        <div class="header">
            <div style="flex-grow: 1;">
                <div style="display:flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
                    <span id="league-name">BRONZE</span>
                    <span id="league-percent">0%</span>
                </div>
                <div class="league-bar"><div id="league-fill"></div></div>
            </div>
            <div id="user-id-display" style="font-size: 8px; opacity: 0.5; margin-left: 15px;">ID: 000</div>
        </div>

        <div id="score">0</div>
        <div id="pnl-display" style="font-size: 10px; color: var(--neon-sec);">PROFIT: +0/hr</div>

        <div class="play-area">
            <button id="btn"></button>
            <div class="energy-wrapper">
                <div style="display:flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                    <span>⚡ ENERGY</span>
                    <span id="energy-stat">1000/1000</span>
                </div>
                <div class="energy-bar"><div id="energy-fill"></div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="openModal('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="openModal('tasks')">⛏️ MINE</div>
            <div class="nav-item" onclick="openModal('stats')">📊 STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>

    <div id="modal-boost" class="modal">
        <h3>UPGRADES</h3>
        <p>Multi-Tap: LVL <span id="tap-lvl-val">1</span></p>
        <p>Cost: <span id="up-cost">500</span> NP</p>
        <button onclick="buyUpgrade()" style="width:100%; padding:15px; background:var(--neon); border:none; border-radius:10px; font-weight:bold;">UPGRADE</button>
    </div>

    <div id="modal-stats" class="modal">
        <h3>LEADERBOARD</h3>
        <div id="leaderboard-list"></div>
    </div>

    <div id="modal-tasks" class="modal">
        <h3>TASKS</h3>
        <button onclick="tg.openTelegramLink('https://t.me/neural_pulse_channel')" style="width:100%; padding:15px; background:var(--neon-sec); border:none; border-radius:10px; color:black; font-weight:bold;">JOIN CHANNEL (+50k)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let state = {
            score: 0, energy: 1000, max_energy: 1000,
            tap_power: 1, pnl: 0,
            user_id: String(tg.initDataUnsafe?.user?.id || '476014374'),
            is_saving: false
        };

        async function loadData() {
            try {
                const r = await fetch(`/api/balance/${state.user_id}`);
                const res = await r.json();
                if (res.status === "ok") {
                    state.score = res.data.balance;
                    state.tap_power = res.data.click_lvl;
                    state.energy = res.data.energy;
                    state.pnl = res.data.pnl;
                    updateUI();
                }
            } catch (e) { console.error("Load error"); }
        }

        async function saveData() {
            if (state.is_saving) return;
            state.is_saving = true;
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: state.user_id,
                        score: Math.floor(state.score),
                        click_lvl: state.tap_power,
                        energy: Math.floor(state.energy),
                        pnl: Math.floor(state.pnl)
                    })
                });
            } finally { state.is_saving = false; }
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-stat').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = (state.energy / state.max_energy * 100) + '%';
            document.getElementById('tap-lvl-val').innerText = state.tap_power;
            document.getElementById('up-cost').innerText = (state.tap_power * 500);
            document.getElementById('user-id-display').innerText = `ID: ${state.user_id}`;
            document.getElementById('pnl-display').innerText = `PROFIT: +${state.pnl}/hr`;
        }

        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (state.energy >= state.tap_power) {
                    state.score += state.tap_power;
                    state.energy -= state.tap_power;
                    createPlusAnim(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                }
            }
            updateUI();
        });

        function createPlusAnim(x, y) {
            const el = document.createElement('div');
            el.className = 'plus-animation';
            el.innerText = `+${state.tap_power}`;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function openModal(id) {
            document.getElementById('modal-' + id).classList.add('active');
            document.getElementById('overlay').classList.add('active');
            if (id === 'stats') loadLeaderboard();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('overlay').classList.remove('active');
        }

        async function buyUpgrade() {
            const cost = state.tap_power * 500;
            if (state.score < cost) return tg.showAlert("Low balance");
            state.score -= cost;
            state.tap_power++;
            updateUI();
            await fetch('/api/upgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: state.user_id, cost: cost, new_lvl: state.tap_power })
            });
            closeModals();
        }

        async function loadLeaderboard() {
            const r = await fetch('/api/leaderboard');
            const res = await r.json();
            document.getElementById('leaderboard-list').innerHTML = res.data.map(u => `<div>ID ${u.id}: ${Math.floor(u.balance)}</div>`).join('');
        }

        setInterval(() => {
            if (state.energy < state.max_energy) state.energy = Math.min(state.max_energy, state.energy + 1);
            if (state.pnl > 0) state.score += (state.pnl / 3600);
            updateUI();
        }, 1000);

        setInterval(saveData, 15000);

        window.onload = () => {
            document.getElementById('game').style.opacity = "1";
            loadData();
        };
    </script>
</body>
</html>
