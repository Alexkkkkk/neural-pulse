<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI v1.1.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #000; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; padding: 0; background: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-logo { width: 100px; height: 100px; margin-bottom: 20px; }
        .load-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .load-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); width: 0%; transition: 0.1s; }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s; }
        .app.ready { opacity: 1; visibility: visible; }

        /* Header из скриншота */
        .header { width: 90%; margin-top: 20px; background: #111; border: 1px solid #222; border-radius: 25px; padding: 15px; display: flex; align-items: center; gap: 15px; position: relative; }
        .lvl-circle { width: 50px; height: 50px; border: 2px solid var(--neon-cyan); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,242,255,0.3); }
        .build-tag { position: absolute; top: 10px; right: 20px; font-size: 8px; color: #444; }

        .bal { font-size: 80px; font-weight: bold; margin-top: 20px; }
        .pnl { color: var(--neon-cyan); font-size: 14px; margin-top: -10px; margin-bottom: 20px; }

        .stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }
        .main-logo { width: 200px; height: 200px; cursor: pointer; filter: drop-shadow(0 0 20px rgba(188,19,254,0.4)); }
        
        .side-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .pill-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 40px; border-radius: 20px; font-size: 12px; font-weight: bold; min-width: 150px; text-align: center; }

        .energy-box { width: 85%; margin-bottom: 20px; }
        .energy-text { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .energy-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; }
        .energy-fill { height: 100%; background: var(--neon-cyan); transition: 0.3s; width: 100%; }

        .footer { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .f-btn { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px 0; text-align: center; font-size: 11px; font-weight: bold; color: #fff; }

        .plus { position: absolute; font-size: 30px; font-weight: 900; color: var(--neon-cyan); animation: float 0.7s forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div id="loader">
        <img src="images/logo.png" class="loader-logo" onerror="this.src='https://via.placeholder.com/100/bc13fe/fff?text=AI'">
        <div class="load-bar"><div class="load-fill" id="load-f"></div></div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="build-tag">BUILD v1.1.1</div>
            <div class="lvl-circle" id="l-v">1</div>
            <div>
                <div style="font-size: 10px; color: #666; font-weight: bold;">NEURAL PULSE</div>
                <div style="font-size: 12px; font-weight: bold;">PUBLIC NODE</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">+0/H</div>

        <div class="stage">
            <img src="images/logo.png" class="main-logo" id="t-a" onerror="this.src='https://via.placeholder.com/200/bc13fe/fff?text=AI'">
            <div class="side-actions">
                <div class="pill-btn" onclick="handleWallet()" id="ton-btn">CONNECT</div>
                <div class="pill-btn" onclick="invite()">INVITE</div>
                <div class="pill-btn" onclick="buyBonus()">BUY BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="energy-text"><span>⚡ Energy Core</span><span id="e-n">1000/1000</span></div>
            <div class="energy-bar"><div class="energy-fill" id="e-f"></div></div>
        </div>

        <div class="footer">
            <div class="f-btn" onclick="upgrade()">🚀 BOOST</div>
            <div class="f-item f-btn" onclick="showTop()">⛏️ MINE</div>
            <div class="f-btn" onclick="checkPay()">📊 CHECK PAY</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const tonConnect = new TonConnectSDK.TonConnect({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0 };

        async function init() {
            let progress = 0;
            const fill = document.getElementById('load-f');
            const iv = setInterval(async () => {
                progress += 10;
                fill.style.width = progress + '%';
                if(progress >= 100) {
                    clearInterval(iv);
                    const r = await fetch(`/api/user/${s.uid}`);
                    const d = await r.json();
                    Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
                    upd();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('ui').classList.add('ready');
                }
            }, 100);
            setInterval(() => { if(s.eng < 1000) { s.eng++; upd(); } }, 1000);
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${s.eng}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('p-v').innerText = `+${s.pnl}/H`;
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = e.touches[0].clientX + 'px'; p.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            upd();
        });

        async function upgrade() {
            const cost = s.lvl * 5000;
            if(confirm(`Upgrade to Level ${s.lvl+1} for ${cost}?`)) {
                const r = await fetch('/api/upgrade/click', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid}) });
                if((await r.json()).success) { s.lvl++; s.bal -= cost; upd(); }
            }
        }

        function invite() {
            const link = `https://t.me/n_pulse_bot?start=${s.uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me!`);
        }

        async function buyBonus() {
            if (!tonConnect.connected) return tg.showAlert("Connect wallet!");
            const tx = { validUntil: Math.floor(Date.now()/1000)+300, messages: [{ address: "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI", amount: "1000000000", payload: `ID${s.uid}` }] };
            try { await tonConnect.sendTransaction(tx); } catch(e) {}
        }

        async function checkPay() {
            const r = await fetch(`/api/check-payment/${s.uid}`);
            const d = await r.json();
            if(d.success) { s.bal += d.added; upd(); tg.showAlert("Success!"); } else tg.showAlert("Wait or try again.");
        }

        setInterval(() => fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl}) }), 3000);
        
        async function handleWallet() {
            if (tonConnect.connected) await tonConnect.disconnect();
            else tg.openLink(tonConnect.connect(await tonConnect.getWallets()));
        }

        init();
    </script>
</body>
</html>
