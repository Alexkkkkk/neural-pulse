<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #050505; --glass: rgba(255, 255, 255, 0.07); }
        
        body { 
            margin: 0; padding: 0; background: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 50%, #150a28 0%, #050505 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none;
        }

        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-ring { width: 120px; height: 120px; border: 3px solid transparent; border-top: 3px solid var(--neon-cyan); border-radius: 50%; animation: rot 1s linear infinite; }
        @keyframes rot { to { transform: rotate(360deg); } }

        /* ИНТЕРФЕЙС */
        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.5s; }
        .app-container.ready { opacity: 1; }

        .header { width: 85%; margin-top: 20px; background: var(--glass); padding: 15px; border-radius: 20px; border: 1px solid rgba(0,242,255,0.15); backdrop-filter: blur(10px); }
        .balance-box { margin-top: 30px; text-align: center; }
        #balance { font-size: 56px; font-weight: 900; text-shadow: 0 0 25px rgba(0,242,255,0.4); }

        .click-zone { position: relative; margin-top: 40px; cursor: pointer; }
        .main-logo { width: 240px; height: 240px; border-radius: 50%; box-shadow: 0 0 60px rgba(188,19,254,0.3); transition: 0.05s; border: 4px solid rgba(255,255,255,0.05); }
        .main-logo:active { transform: scale(0.95); }

        .energy-box { width: 85%; margin-top: auto; margin-bottom: 30px; }
        .bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #00ff66, var(--neon-cyan)); width: 100%; transition: 0.3s; }

        .nav-footer { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 40px; }
        .nav-btn { background: var(--glass); padding: 15px; border-radius: 15px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

        /* ТАП-АНИМАЦИЯ */
        .tap { position: absolute; color: white; font-size: 32px; font-weight: 900; pointer-events: none; animation: up 0.7s ease-out forwards; }
        @keyframes up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-ring"></div></div>

    <div class="app-container" id="app">
        <div class="header">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 10px; color: #888;">NEURAL NETWORK</div>
                    <div id="pnl" style="color: var(--neon-cyan); font-size: 12px; font-weight: bold;">PASSIVE: +0/h</div>
                </div>
                <div id="lvl" style="background: var(--neon-cyan); color: black; padding: 5px 10px; border-radius: 8px; font-weight: 900;">1</div>
            </div>
        </div>

        <div class="balance-box">
            <div style="font-size: 11px; color: var(--neon-cyan); letter-spacing: 2px;">NEURAL TOKENS</div>
            <div id="balance">0</div>
        </div>

        <div class="click-zone" id="tap-target">
            <img src="logo.png" class="main-logo" onerror="this.src='https://via.placeholder.com/240/bc13fe/fff?text=AI'">
        </div>

        <div class="energy-box">
            <div style="display:flex; justify-content: space-between; font-size: 12px;">
                <span>⚡ ENERGY</span>
                <span id="energy-val">1000/1000</span>
            </div>
            <div class="bar-bg"><div id="energy-bar" class="bar-fill"></div></div>
        </div>

        <div class="nav-footer">
            <div class="nav-btn" onclick="tg.showAlert('Shop opens soon')">🚀 BOOST</div>
            <div class="nav-btn" onclick="tg.showAlert('Mining at Level 5')">⛏️ MINE</div>
            <div class="nav-btn" onclick="tg.showAlert('Loading stats...')">📊 STATS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let state = {
            balance: 0, energy: 1000, max_energy: 1000,
            click_lvl: 1, pnl: 0, dirty: false,
            uid: tg.initDataUnsafe?.user?.id || 0
        };

        async function load() {
            try {
                const res = await fetch(`/api/user/${state.uid}`);
                const data = await res.json();
                state.balance = Number(data.balance) || 0;
                state.energy = Number(data.energy) || 1000;
                state.click_lvl = Number(data.click_lvl) || 1;
                state.pnl = Number(data.pnl) || 0;
                updateUI();
            } catch(e) {}
            document.getElementById('loader').style.opacity = '0';
            document.getElementById('app').classList.add('ready');
            setTimeout(() => document.getElementById('loader').remove(), 500);
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energy-val').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-bar').style.width = (state.energy/state.max_energy*100)+'%';
            document.getElementById('pnl').innerText = `PASSIVE: +${state.pnl}/h`;
            document.getElementById('lvl').innerText = state.click_lvl;
        }

        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for(let i=0; i < e.changedTouches.length; i++) {
                if(state.energy < state.click_lvl) break;
                const touch = e.changedTouches[i];
                state.balance += state.click_lvl;
                state.energy -= state.click_lvl;
                state.dirty = true;

                const n = document.createElement('div');
                n.className = 'tap'; n.innerText = `+${state.click_lvl}`;
                n.style.left = touch.clientX + 'px'; n.style.top = touch.clientY + 'px';
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 700);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
            updateUI();
        });

        // Авто-сохранение каждые 3 сек
        setInterval(async () => {
            if(!state.dirty || !state.uid) return;
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: state.uid, balance: state.balance,
                        energy: state.energy, click_lvl: state.click_lvl, pnl: state.pnl
                    })
                });
                state.dirty = false;
            } catch(e) {}
        }, 3000);

        load();
    </script>
</body>
</html>
