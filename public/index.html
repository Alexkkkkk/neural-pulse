<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --bg: #000; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; 
        }

        /* Загрузочный экран */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader-pct { font-size: 64px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }

        /* Интерфейс */
        #game-ui { width: 100%; max-width: 500px; display: none; flex-direction: column; align-items: center; height: 100%; padding-top: 30px; }
        .header-label { font-size: 12px; letter-spacing: 3px; color: var(--cyan); margin-bottom: 5px; font-weight: bold; }
        .balance-value { font-size: 56px; font-weight: 900; margin-bottom: 20px; }

        .click-area { position: relative; margin: 20px 0; display: flex; justify-content: center; align-items: center; }
        .main-coin { 
            width: 280px; height: 280px; border-radius: 50%; border: 6px solid #111; 
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%); 
            transition: transform 0.05s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; 
        }
        .main-coin:active { transform: scale(0.95); }

        .bottom-stats { width: 90%; background: rgba(255,255,255,0.07); padding: 20px; border-radius: 24px; margin-top: auto; margin-bottom: 40px; }
        .energy-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .progress-bg { width: 100%; height: 14px; background: #111; border-radius: 7px; overflow: hidden; }
        #progress-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #0088ff, var(--cyan)); transition: width 0.3s ease; }

        .tap-anim { position: absolute; color: white; font-size: 38px; font-weight: 900; pointer-events: none; animation: moveUp 0.7s ease-out forwards; }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-pct" id="load-pct">0%</div>
    </div>

    <div id="game-ui">
        <div class="header-label">NEURAL PULSE AI</div>
        <div class="balance-value" id="balance">0</div>
        <div class="click-area">
            <img src="logo.png" id="clicker" class="main-coin" onerror="this.src='https://via.placeholder.com/300/000/00f2ff?text=AI'">
        </div>
        <div class="bottom-stats">
            <div class="energy-row">
                <span>⚡ ENERGY</span>
                <span id="energy-text">1000 / 1000</span>
            </div>
            <div class="progress-bg"><div id="progress-fill"></div></div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        userId: new URLSearchParams(window.location.search).get('u') || tg.initDataUnsafe?.user?.id || "guest",
        balance: 0,
        energy: 1000,
        clickLvl: 1,
        isReady: false
    };

    function updateDisplay() {
        // Защита от NaN: если значение пустое, ставим 0
        const b = Math.floor(state.balance) || 0;
        const e = Math.floor(state.energy) || 0;
        document.getElementById('balance').innerText = b.toLocaleString();
        document.getElementById('energy-text').innerText = e + " / 1000";
        document.getElementById('progress-fill').style.width = (e / 10) + "%";
    }

    async function fetchUserData() {
        try {
            const response = await fetch('/api/user/' + state.userId);
            const data = await response.json();
            // Превращаем всё в числа принудительно
            state.balance = Number(data.balance) || 0;
            state.energy = Number(data.energy) || 1000;
            state.clickLvl = Number(data.click_lvl) || 1;
        } catch (err) {
            console.error("Ошибка загрузки:", err);
        } finally {
            state.isReady = true;
            updateDisplay();
        }
    }

    // Обработка клика
    document.getElementById('clicker').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.energy < state.clickLvl) return;

        state.balance += state.clickLvl;
        state.energy -= state.clickLvl;

        // Всплывающее число
        const t = e.touches[0];
        const a = document.createElement('div');
        a.className = 'tap-anim';
        a.style.left = t.clientX + 'px'; a.style.top = t.clientY + 'px';
        a.innerText = "+" + state.clickLvl;
        document.body.appendChild(a);
        setTimeout(() => a.remove(), 700);

        updateDisplay();
        tg.HapticFeedback.impactOccurred('medium');
    });

    // Автосохранение
    setInterval(() => {
        if (state.isReady && state.userId !== "guest") {
            fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: state.userId, balance: state.balance,
                    energy: state.energy, click_lvl: state.clickLvl
                })
            });
        }
    }, 5000);

    // Регенерация
    setInterval(() => {
        if (state.energy < 1000) {
            state.energy = Math.min(1000, state.energy + 1.5);
            updateDisplay();
        }
    }, 1000);

    // Лоадер
    let p = 0;
    const lInt = setInterval(() => {
        p += 5;
        document.getElementById('load-pct').innerText = p + "%";
        if (p >= 100) {
            clearInterval(lInt);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
        }
    }, 40);

    window.onload = fetchUserData;
</script>
</body>
</html>
