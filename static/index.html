<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v4.0.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">ACCESS GRANTED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small>v4.0.0 Neural Mining</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>ENERGY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const ADMIN_WALLET = "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI";
        let tonConnectUI = null;

        const game = {
            data: { id: 0, balance: 0, energy: 1000, max_energy: 1000, tap: 1, profit: 0, last_bonus: 0 },
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, first_name: 'Agent' };
                const name = (u.username || u.first_name).toUpperCase();
                
                try {
                    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                        manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
                    });
                } catch(err) { console.error(err); }

                try {
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}&photo_url=${encodeURIComponent(u.photo_url || '')}`);
                    if (r.ok) {
                        const d = await r.json();
                        Object.assign(this.data, d);
                    }
                } catch(e) { this.data.id = u.id; } finally {
                    document.getElementById('my-name').innerText = name;
                    if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                    this.isLoaded = true;
                    this.loop();
                }
            },

            async buyPremium(tonAmount, upgradeName) {
                if (!tonConnectUI?.connected) return tg.showAlert("Сначала подключи кошелек!");
                const nano = (tonAmount * 1000000000).toString();
                try {
                    await tonConnectUI.sendTransaction({
                        validUntil: Math.floor(Date.now()/1000)+300,
                        messages: [{ address: ADMIN_WALLET, amount: nano }]
                    });
                    tg.showAlert("Оплата прошла! Улучшение будет активно после 1 подтверждения.");
                } catch(e) { tg.showAlert("Ошибка транзакции"); }
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < this.data.tap) return;
                this.data.balance += this.data.tap;
                this.data.energy -= this.data.tap;
                ui.render();
                ui.pop(e);
                tg.HapticFeedback.impactOccurred('medium');
            },

            upgrade(type) {
                let cost = 0;
                if(type === 'tap') cost = this.data.tap * 500;
                if(type === 'mine') cost = (this.data.profit + 100) * 10;

                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap += 1;
                    if(type === 'mine') this.data.profit += 150;
                    tg.HapticFeedback.notificationOccurred('success');
                    ui.render();
                    ui.openM(type === 'tap' ? 'boost' : 'mine');
                } else {
                    tg.showAlert("Недостаточно NP!");
                }
            },

            claimBonus() {
                const now = Date.now();
                if (now - this.data.last_bonus > 86400000) {
                    this.data.balance += 5000;
                    this.data.last_bonus = now;
                    tg.showAlert("Вы получили ежедневный бонус 5,000 NP!");
                    ui.closeM();
                    ui.render();
                } else {
                    tg.showAlert("Бонус уже получен. Возвращайтесь завтра!");
                }
            },

            loop() {
                setInterval(() => {
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 2);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 10000);
            },

            async save() {
                if(!this.isLoaded) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: this.data.id, ...this.data })
                }).catch(() => {});
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 2;
                    document.getElementById('pct').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                    if(p >= 100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; this.render(); }
                }, 20);
            },
            render() {
                if(!game.isLoaded) return;
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString('ru-RU');
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = d.profit.toLocaleString('ru-RU');
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(d.balance/10000)+1}`;
            },
            pop(e) {
                const t = e.touches[0];
                const p = document.createElement('div');
                p.className = 'pop'; p.innerText = `+${game.data.tap}`;
                p.style.left = t.clientX+'px'; p.style.top = t.clientY+'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            },
            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = ''; 

                if(type === 'wallet') {
                    b.innerHTML = `<h2>WALLET</h2><div id="ton-connect-btn" style="display:flex;justify-content:center;margin:20px 0;"></div><p style="text-align:center;font-size:12px;color:#888;">Connect your wallet for TON transactions</p>`;
                    if(tonConnectUI) tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-btn' };
                } 
                else if(type === 'boost') {
                    b.innerHTML = `<h2>BOOST</h2>
                        <div class="top-item" onclick="game.upgrade('tap')"><span>Multi-Tap (Lvl ${game.data.tap})</span><b>${game.data.tap * 500} NP</b></div>
                        <div class="top-item" onclick="game.buyPremium(0.1, 'Double Tap')" style="border:1px solid #00FFFF"><span>Double Tap Power</span><b>0.1 TON</b></div>`;
                }
                else if(type === 'mine') {
                    b.innerHTML = `<h2>MINING</h2>
                        <div class="top-item" onclick="game.upgrade('mine')"><span>Neural Node</span><b>${(game.data.profit + 100) * 10} NP</b></div>`;
                }
                else if(type === 'friends') {
                    const refLink = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>FRIENDS</h2><p style="font-size:14px;color:#888;margin-bottom:15px;">Invite friends to earn 10% of their mining!</p>
                        <button onclick="navigator.clipboard.writeText('${refLink}');tg.showAlert('Ссылка скопирована!')" style="width:100%;padding:15px;background:#111;color:#00FFFF;border:1px solid #00FFFF;border-radius:12px;font-weight:bold;">COPY INVITE LINK</button>`;
                }
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>DAILY BONUS</h2><div style="text-align:center;padding:20px;">
                        <div style="font-size:50px;margin-bottom:10px;">🎁</div>
                        <p>Claim your daily 5,000 NP to grow faster!</p><br>
                        <button onclick="game.claimBonus()" style="width:100%;padding:15px;background:#00FFFF;color:#000;border:none;border-radius:12px;font-weight:900;">CLAIM NP</button>
                    </div>`;
                }
                else if(type === 'tasks') {
                    b.innerHTML = `<h2>TASKS</h2>
                        <div class="top-item" onclick="tg.openLink('https://t.me/your_channel')"><span>Subscribe Channel</span><b>+10,000 NP</b></div>
                        <div class="top-item" onclick="tg.openLink('https://twitter.com/')"><span>Follow X (Twitter)</span><b>+5,000 NP</b></div>`;
                }
                else if(type === 'top') {
                    b.innerHTML = '<h2>RANKING</h2><div id="top-list">Loading...</div>';
                    fetch('/api/top').then(r => r.json()).then(top => {
                        let html = '';
                        top.forEach((u, i) => {
                            html += `<div class="top-item"><span>#${i+1} ${u.username}</span><b>${Math.floor(u.balance).toLocaleString()}</b></div>`;
                        });
                        document.getElementById('top-list').innerHTML = html;
                    }).catch(() => document.getElementById('top-list').innerText = 'Top miners list is empty');
                }
            },
            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
