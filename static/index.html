<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="main-logo-circle">
                <img src="images/logo.png" class="logo-img" id="load-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
                <div class="scan-line"></div>
            </div>
            <div class="loading-text-row">
                <span class="status-msg">ACCESS GRANTED</span>
                <span class="percent" id="load-pct">0%</span>
            </div>
            <div class="load-bar-wrapper"><div id="load-bar" class="load-bar-fill"></div></div>
            <div class="system-ready">SYSTEM READY...</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="u-profile">
                <div class="u-av"><img src="images/logo.png" id="u-avatar" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'"></div>
                <div class="u-info"><b id="u-name">Agent</b><br><small>v4.0.0 Neural Mining</small></div>
            </div>
            <div class="u-lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-card"><small>PROFIT PER HR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <div class="main-logo-btn" ontouchstart="logic.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
            </div>
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="en-track"><div id="eng-fill" class="en-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')"><span>🚀</span>BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')"><span>⛏️</span>MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')"><span>📋</span>TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')"><span>🏆</span>TOP</button>
        </div>
    </div>

    <div id="modal" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content">
            <h2 id="m-title" style="margin-bottom:20px; text-align:center; letter-spacing:2px;"></h2>
            <div id="m-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                tg.expand();
                const u = tg.initDataUnsafe?.user || { id: "123", username: "LocalUser" };
                
                try {
                    const res = await fetch(`/api/user/${u.id}?username=${u.username}`);
                    const data = await res.json();
                    this.user = { 
                        ...data, 
                        balance: Number(data.balance), 
                        energy: Number(data.energy), 
                        max_energy: Number(data.max_energy) || 1000,
                        click_lvl: Number(data.click_lvl) || 1,
                        profit_hr: Number(data.profit_hr) || 0
                    };
                } catch (e) {
                    this.user = { id: u.id, username: u.username, balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0 };
                }
                
                ui.startLoading();
                this.startLoops();
            },
            tap(e) {
                if (!this.user || this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                ui.pop(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            },
            startLoops() {
                setInterval(() => {
                    if (!this.user) return;
                    if (this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.5);
                    if (this.user.profit_hr > 0) this.user.balance += (this.user.profit_hr / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 10000);
            },
            async save() {
                if (!this.user) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.id,
                        balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy),
                        click_lvl: this.user.click_lvl,
                        profit_hr: this.user.profit_hr
                    })
                });
            }
        };

        const ui = {
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy / logic.user.max_energy * 100) + '%';
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr);
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(logic.user.balance / 100000) + 1}`;
            },
            startLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 2;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if (p >= 100) {
                        clearInterval(iv);
                        document.getElementById('loading-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.display = 'none';
                            document.getElementById('app').style.display = 'flex';
                            this.update();
                        }, 500);
                    }
                }, 30);
            },
            async openM(type) {
                const body = document.getElementById('m-body');
                const title = document.getElementById('m-title');
                title.innerText = type.toUpperCase();
                body.innerHTML = '<p style="text-align:center; opacity:0.5;">LOADING MODULE...</p>';
                document.getElementById('modal').classList.add('active');

                if (type === 'wallet') {
                    body.innerHTML = `
                        <div id="ton-connect-button" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
                        <div class="up-card" onclick="tonConnectUI.openModal()">
                            <b>CONNECT TON</b>
                            <span style="color:var(--accent)">TON</span>
                        </div>
                    `;
                } else if (type === 'top') {
                    const r = await fetch('/api/top');
                    const users = await r.json();
                    body.innerHTML = users.slice(0, 10).map((u, i) => `
                        <div class="up-card">
                            <span>#${i+1} ${u.username}</span>
                            <b>${Math.floor(u.balance).toLocaleString()}</b>
                        </div>
                    `).join('');
                } else {
                    body.innerHTML = `<div class="up-card"><b>Module ${type}</b><span>ENCRYPTED</span></div>`;
                }
            },
            closeM() { document.getElementById('modal').classList.remove('active'); },
            pop(e) {
                const t = e.touches ? e.touches[0] : e;
                const p = document.createElement('div');
                p.className = 'tap-pop'; p.innerText = `+${logic.user.click_lvl}`;
                p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
                document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
