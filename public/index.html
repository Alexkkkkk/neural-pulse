<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.9.9.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #050505; --card: rgba(20, 20, 20, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* БАЗОВАЯ МОДАЛКА */
        .modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 10001; 
            display: none; 
            flex-direction: column; 
            padding: 30px 25px; 
        }

        /* ОКНО КОШЕЛЬКА — ПОВЕРХ ВСЕХ ПРИ ЛЮБЫХ УСЛОВИЯХ */
        #wal-m {
            z-index: 30000 !important; 
            background: radial-gradient(circle at top, #151515 0%, #000 100%);
        }

        .m-title { font-size: 32px; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; }
        .m-close { margin-top: auto; background: rgba(255,255,255,0.05); padding: 22px; border-radius: 20px; text-align: center; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); color: #fff; text-transform: uppercase; cursor: pointer; }
        
        /* Твой дизайн из скриншотов */
        .header { width: 92%; margin-top: 20px; background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--cyan); }
        .balance { font-size: 58px; font-weight: 900; margin-top: 25px; }
        
        .stage { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-ai { width: 240px; filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.4)); transition: 0.1s; cursor: pointer; }
        .main-ai:active { transform: scale(0.95); }

        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .side-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; width: 90px; padding: 14px 0; border-radius: 18px; font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; }

        .bottom-nav { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 35px; }
        .nav-item { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 18px 0; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #999; }
        
        .wallet-action-btn { width: 100%; border: none; padding: 20px; border-radius: 20px; font-weight: 900; text-transform: uppercase; background: var(--cyan); color: black; margin-top: 15px; }
        .list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px">
        <img src="images/logo.png" class="avatar">
        <div><div style="font-weight:800;" id="u-nm">Loading...</div><div style="font-size:9px; color:var(--cyan)">v1.9.9.8</div></div>
    </div>
    <div style="background: linear-gradient(135deg, var(--cyan), var(--purple)); padding: 6px 14px; border-radius: 10px; font-weight: 900;">LVL <span id="u-lv">1</span></div>
</div>

<div class="balance" id="b-v">0</div>

<div class="stage">
    <img src="logo.png" class="main-ai" onclick="doTap()">
    <div class="side-menu">
        <div class="side-btn" onclick="openM('wal-m')">Wallet</div>
        <div class="side-btn">Friends</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="openM('bs-m')">Boost</div>
    <div class="nav-item">Mine</div>
    <div class="nav-item">Tasks</div>
    <div class="nav-item" onclick="openM('tp-m')">Stats</div>
</div>

<div id="wal-m" class="modal">
    <div class="m-title">Neural<br><span style="color:var(--cyan)">Wallet</span></div>
    <div class="list-item" style="flex-direction:column; gap:10px;">
        <div id="w-addr" style="font-size:11px; color:var(--cyan); word-break:all; text-align:center;">Wallet not connected</div>
    </div>
    <button id="connect-trigger" class="wallet-action-btn" onclick="handleWalletAction()">Connect TON</button>
    <div class="m-close" onclick="closeM('wal-m')">Return</div>
</div>

<div id="bs-m" class="modal"><div class="m-title">Boost</div><div id="boost-list"></div><div class="m-close" onclick="closeM('bs-m')">Close</div></div>
<div id="tp-m" class="modal"><div class="m-title">Stats</div><div id="top-list"></div><div class="m-close" onclick="closeM('tp-m')">Close</div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let tonConnectUI;
    let s = { uid: tg.initDataUnsafe?.user?.id || '0', name: tg.initDataUnsafe?.user?.first_name || 'Player', bal: 0, lvl: 1, wal: null };

    async function init() {
        document.getElementById('u-nm').innerText = s.name;
        
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
        
        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('connect-trigger');
            if (wallet) {
                s.wal = wallet.account.address;
                document.getElementById('w-addr').innerText = s.wal.slice(0,8)+"..."+s.wal.slice(-8);
                btn.innerText = "Disconnect";
                // При любом изменении статуса форсируем открытие нашего окна Wallet
                openM('wal-m'); 
            } else {
                s.wal = null;
                document.getElementById('w-addr').innerText = "Wallet not connected";
                btn.innerText = "Connect TON";
            }
        });
        await load();
    }

    function openM(id) {
        // Закрываем все другие окна перед открытием важного, если это Wallet
        if(id === 'wal-m') {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }
        document.getElementById(id).style.display = 'flex';
        if(id === 'bs-m') renderBoost();
    }

    function closeM(id) {
        document.getElementById(id).style.display = 'none';
    }

    async function handleWalletAction() {
        if (tonConnectUI.connected) {
            await tonConnectUI.disconnect();
        } else {
            await tonConnectUI.openModal();
        }
    }

    async function load() {
        try {
            const r = await fetch(`/api/user/${s.uid}?name=${encodeURIComponent(s.name)}`);
            const d = await r.json();
            s.bal = Number(d.balance) || 0;
            s.lvl = Number(d.click_lvl) || 1;
            upd();
        } catch(e) { console.log("Load error"); }
    }

    function upd() {
        document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('u-lv').innerText = s.lvl;
    }

    function doTap() {
        s.bal += s.lvl;
        tg.HapticFeedback.impactOccurred('light');
        upd();
    }

    init();
</script>
</body>
</html>
