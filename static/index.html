<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.8.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-ring">
            <img src="images/logo.png" alt="AI">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-f" id="load-bar" style="width:0%"></div></div>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="avatar"><img src="images/logo.png"></div>
            <div class="u-info">
                <b id="u-name">Agent</b>
                <small>v3.8.0 Neural Mining</small>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 2</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+2</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance-container">
            <div class="balance" id="balance">696</div>
        </div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target">
            <div class="side-menu">
                <button class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</button>
                <button class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</button>
                <button class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">543/1000</span></div>
            <div class="load-bar-bg"><div id="eng-fill" class="load-bar-f" style="width: 54.3%"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <script>
        // Состояние приложения 3.8.0
        const state = {
            balance: 696,
            energy: 543,
            maxEnergy: 1000,
            tapPower: 2,
            profit: 0
        };

        const ui = {
            init() {
                this.updateDisplay();
                const btn = document.getElementById('tap-target');
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleTap();
                });
            },
            updateDisplay() {
                document.getElementById('balance').innerText = Math.floor(state.balance);
                document.getElementById('eng-val').innerText = `${state.energy}/${state.maxEnergy}`;
                document.getElementById('eng-fill').style.width = (state.energy / state.maxEnergy * 100) + '%';
            },
            handleTap() {
                if (state.energy >= state.tapPower) {
                    state.balance += state.tapPower;
                    state.energy -= state.tapPower;
                    this.updateDisplay();
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                    }
                }
            },
            openM(id) {
                console.log("Opening section:", id);
                // Логика открытия модальных окон
            }
        };

        // Логика загрузки (Исправлено зависание на 99%)
        (function startLoading() {
            let p = 0;
            const bar = document.getElementById('load-bar');
            const pct = document.getElementById('load-pct');
            
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 8) + 2;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        ui.init();
                    }, 400);
                }
                bar.style.width = p + '%';
                pct.innerText = p + '%';
            }, 80);
        })();
    </script>
</body>
</html>
