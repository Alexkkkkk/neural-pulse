<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.2.6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-circle { width: 140px; height: 140px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-purple); display: flex; align-items: center; justify-content: center; animation: spin 2s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pct { font-size: 32px; font-weight: bold; color: var(--neon-cyan); }
        .acc-text { font-size: 10px; letter-spacing: 3px; color: #444; margin-top: 10px; font-weight: bold; }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin-top: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        .lvl-box { width: 45px; height: 45px; border: 2px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }

        .bal { font-size: 70px; font-weight: 900; margin-top: 15px; text-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .pnl { color: var(--neon-cyan); font-weight: bold; margin-top: -10px; font-size: 13px; }

        .stage { flex-grow: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .main-logo { width: 220px; height: 220px; z-index: 1; filter: drop-shadow(0 0 30px rgba(188,19,254,0.3)); border-radius: 50%; cursor: pointer; }
        
        .overlay-btns { position: absolute; right: 8%; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .btn-pill { background: rgba(20,20,20,0.85); border: 1px solid #444; color: white; padding: 12px 0; border-radius: 18px; width: 110px; text-align: center; font-size: 10px; font-weight: bold; backdrop-filter: blur(8px); cursor: pointer; transition: 0.3s; overflow: hidden; text-overflow: ellipsis; }
        .btn-pill.connected { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .btn-purple { border: 1px solid var(--neon-purple); box-shadow: inset 0 0 8px var(--neon-purple); }

        .energy-box { width: 85%; margin-bottom: 25px; }
        .e-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; }
        .e-fill { height: 100%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: 0.3s; width: 100%; }

        .footer { width: 92%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 35px; }
        .f-item { background: #151515; border: 1px solid #252525; border-radius: 20px; padding: 18px 0; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; }
        .f-item.withdraw-active { border: 1px solid #f2ff00; color: #f2ff00; text-shadow: 0 0 5px #f2ff00; }

        #mine-ui { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .card { background: #111; border: 1px solid #333; padding: 18px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        .plus { position: absolute; font-size: 35px; font-weight: 900; color: var(--neon-cyan); animation: float 0.7s forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 10px var(--neon-cyan); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-130px); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-circle"><img src="logo.png" style="width: 75px;" onerror="this.src='images/logo.png'"></div>
        <div class="pct" id="l-p">0%</div>
        <div class="acc-text">ACCESS GRANTED</div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl-box" id="l-v">1</div>
            <div>
                <div style="font-size: 9px; color: #555; font-weight: bold;">NODE ALPHA</div>
                <div style="font-size: 14px; font-weight: 900;">NEURAL PULSE v1.2.6</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">PNL: +0/H</div>

        <div class="stage">
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
            <div class="overlay-btns">
                <div class="btn-pill" id="w-btn" onclick="handleWallet()">WALLET</div>
                <div class="btn-pill" onclick="invite()">FRIENDS</div>
                <div class="btn-pill btn-purple" onclick="getBonus()">BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px; color:#666;"><span>⚡ ENERGY CORE</span><span id="e-n">1000/1000</span></div>
            <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="upgrade()">🚀 BOOST</div>
            <div class="f-item" onclick="toggleMine()">⛏️ MINE</div>
            <div class="f-item" id="stats-btn" onclick="handleWithdraw()">📊 STATS</div>
        </div>
    </div>

    <div id="mine-ui">
        <h2 style="color:var(--neon-purple)">MATH SHOP</h2>
        <div class="card"><div><b>Addition (+)</b><br><small style="color:var(--neon-cyan)">+350 PNL/h</small></div><button class="btn-pill" onclick="buyCard(10000, 350)">10K</button></div>
        <div class="card"><div><b>Complex Alg.</b><br><small style="color:var(--neon-cyan)">+2500 PNL/h</small></div><button class="btn-pill" onclick="buyCard(75000, 2500)">75K</button></div>
        <button class="f-item" style="width:100%; margin-top:auto" onclick="toggleMine()">BACK TO NODE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json',
            buttonRootId: null
        });

        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0 };

        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('w-btn');
            const statsBtn = document.getElementById('stats-btn');
            if (wallet) {
                const addr = wallet.account.address;
                btn.innerText = addr.slice(0, 4) + '...' + addr.slice(-4);
                btn.classList.add('connected');
                checkWithdrawStatus();
            } else {
                btn.innerText = 'WALLET';
                btn.classList.remove('connected');
                statsBtn.innerText = '📊 STATS';
                statsBtn.classList.remove('withdraw-active');
            }
        });

        function checkWithdrawStatus() {
            const statsBtn = document.getElementById('stats-btn');
            // Если баланс больше 1 млн и кошелек подключен
            if (tonConnectUI.connected && s.bal >= 1000000) {
                statsBtn.innerText = '💰 WITHDRAW';
                statsBtn.classList.add('withdraw-active');
            } else {
                statsBtn.innerText = '📊 STATS';
                statsBtn.classList.remove('withdraw-active');
            }
        }

        async function handleWallet() {
            if (tonConnectUI.connected) await tonConnectUI.disconnect();
            else await tonConnectUI.openModal();
        }

        async function handleWithdraw() {
            if (document.getElementById('stats-btn').innerText === '💰 WITHDRAW') {
                tg.showConfirm(`Вы действительно хотите запросить вывод 1,000,000 монет на кошелек?`, (ok) => {
                    if(ok) {
                        tg.showAlert("Заявка отправлена! Ожидайте верификации математических расчетов.");
                    }
                });
            } else {
                tg.showAlert(`Статистика:\nВсего монет: ${Math.floor(s.bal)}\nПрибыль/час: ${s.pnl}\nУровень клика: ${s.lvl}`);
            }
        }

        async function init() {
            let p = 0;
            const iv = setInterval(() => {
                p += 5; document.getElementById('l-p').innerText = p + '%';
                if(p >= 100) { clearInterval(iv); load(); }
            }, 30);
            setInterval(() => { if(s.eng < 1000) { s.eng++; upd(); } }, 1000);
        }

        async function load() {
            try {
                const r = await fetch(`/api/user/${s.uid}`);
                const d = await r.json();
                Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
                upd();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ui').classList.add('ready');
            } catch(e) {}
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${s.eng}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('p-v').innerText = `PNL: +${Math.floor(s.pnl)}/H`;
            checkWithdrawStatus();
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            const t = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            upd();
        });

        async function getBonus() {
            const r = await fetch('/api/bonus', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid}) });
            const d = await r.json();
            if(d.success) { s.bal += d.amount; upd(); tg.showAlert("Bonus 5,000 claimed!"); }
            else tg.showAlert(d.msg);
        }

        function invite() {
            tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/n_pulse_bot?start=${s.uid}&text=Join Neural Pulse!`);
        }

        function toggleMine() { 
            const m = document.getElementById('mine-ui');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
        }

        async function buyCard(cost, inc) {
            if(s.bal >= cost) { s.bal -= cost; s.pnl += inc; upd(); tg.showAlert("Node Upgraded!"); }
            else tg.showAlert("Need more coins!");
        }

        async function upgrade() {
            const cost = s.lvl * 5000;
            if(s.bal >= cost) { s.bal -= cost; s.lvl++; upd(); }
        }

        setInterval(() => {
            if(s.uid) fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl}) });
        }, 3000);

        init();
    </script>
</body>
</html>
