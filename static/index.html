<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ТВОЙ CSS КОД (СОКРАЩЕНО ДЛЯ КРАТКОСТИ) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg: #000000; --card: #080808; --accent: #00ffff; --text: #ffffff; --purple: #ae00ff; --border: #151515; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loader-ring { width: 100px; height: 100px; border-radius: 50%; border: 3px solid transparent; border-top: 3px solid var(--accent); animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #app { display: none; flex-direction: column; height: 100vh; padding: 15px; }
        .header { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .avatar { width: 40px; height: 40px; border-radius: 10px; overflow: hidden; background: #111; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .balance { font-size: 48px; font-weight: 800; text-align: center; margin: 30px 0; color: var(--text); }
        .play-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-logo { width: 250px; cursor: pointer; transition: transform 0.05s; }
        .main-logo:active { transform: scale(0.95); }

        .energy-box { margin-bottom: 100px; }
        .progress-bar-wrap { height: 10px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width 0.2s; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--card); padding: 10px; border-top: 1px solid var(--border); }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 10px; font-weight: bold; }
        
        .tap-pop { position: absolute; color: var(--accent); font-size: 32px; font-weight: 900; pointer-events: none; animation: float 0.7s ease-out forwards; z-index: 100; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring"></div>
        <div style="margin-top: 20px; letter-spacing: 5px;">SYNCING...</div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; gap:10px; align-items:center;">
                <div class="avatar"><img id="u-photo" src=""></div>
                <div><b id="u-name">Agent</b><br><small style="color:#555">LEVEL <span id="u-lvl">1</span></small></div>
            </div>
            <div style="color:var(--accent); font-weight:bold;">MOD: ACTIVE</div>
        </div>

        <div class="balance" id="u-balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="clicker" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
        </div>

        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                <span>ENERGY</span>
                <span id="u-energy-txt">1000 / 1000</span>
            </div>
            <div class="progress-bar-wrap">
                <div id="u-energy-fill" class="progress-bar-fill" style="width: 100%;"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn">MINE</button>
            <button class="nav-btn">BOOST</button>
            <button class="nav-btn">TASKS</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let user = {
            userId: tg.initDataUnsafe?.user?.id || "12345",
            username: tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || "Agent",
            photo_url: tg.initDataUnsafe?.user?.photo_url || "",
            balance: 0,
            energy: 1000,
            max_energy: 1000,
            click_lvl: 1,
            profit_hr: 0,
            lvl: 1
        };

        async function loadData() {
            try {
                const res = await fetch(`/api/user/${user.userId}?username=${user.username}&photo_url=${user.photo_url}`);
                const data = await res.json();
                user = { ...user, ...data };
                user.balance = parseFloat(user.balance);
                updateUI();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            } catch (e) { console.error("Load error"); }
        }

        function updateUI() {
            document.getElementById('u-balance').innerText = Math.floor(user.balance).toLocaleString();
            document.getElementById('u-energy-txt').innerText = `${Math.floor(user.energy)} / ${user.max_energy}`;
            document.getElementById('u-energy-fill').style.width = `${(user.energy / user.max_energy) * 100}%`;
            document.getElementById('u-name').innerText = user.username;
            document.getElementById('u-lvl').innerText = user.lvl;
            if(user.photo_url) document.getElementById('u-photo').src = user.photo_url;
        }

        const clicker = document.getElementById('clicker');
        clicker.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (user.energy >= user.click_lvl) {
                user.balance += user.click_lvl;
                user.energy -= user.click_lvl;
                
                // Эффект цифр
                const touch = e.touches[0];
                const pop = document.createElement('div');
                pop.className = 'tap-pop';
                pop.innerText = `+${user.click_lvl}`;
                pop.style.left = `${touch.pageX - 20}px`;
                pop.style.top = `${touch.pageY - 50}px`;
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 700);

                updateUI();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        });

        // Регенерация энергии
        setInterval(() => {
            if (user.energy < user.max_energy) {
                user.energy = Math.min(user.max_energy, user.energy + 1);
                updateUI();
            }
        }, 1000);

        // Автосохранение на сервер каждые 3 секунды
        setInterval(async () => {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });
        }, 3000);

        loadData();
    </script>
</body>
</html>
