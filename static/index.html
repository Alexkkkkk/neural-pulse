<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse Quantum</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/styles.min.css">
</head>
<body>
    <canvas id="particles-js"></canvas>
    <div class="content-layer">
        <div class="header">
            <div id="lvl-badge">1</div>
            <div style="flex-grow: 1;">
                <div class="league-info"><span>NEURAL RANK</span><span id="league-name">SILICON NOVICE</span></div>
                <div class="exp-bar-wrap"><div id="exp-bar"></div></div>
            </div>
        </div>

        <div class="score-container">
            <div id="balance">0</div>
            <div id="pnl-info">PROFIT: +0/HR</div>
        </div>

        <div class="click-area" id="tap-zone">
            <img src="/static/assets/logo.webp" class="main-logo" id="main-logo" alt="Pulse">
        </div>

        <div class="energy-section">
            <div class="energy-header"><span>ENERGY CORE</span><span id="energy-text">1000/1000</span></div>
            <div class="energy-bar-wrap"><div id="energy-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="Telegram.WebApp.showAlert('Shop loading...')">🚀 BOOST</div>
            <div class="nav-btn" onclick="Telegram.WebApp.showAlert('Mining starting soon...')">⛏️ MINE</div>
            <div class="nav-btn" id="invite-btn">🎁 FRIENDS</div>
        </div>
    </div>
    <script src="/static/js/core.js"></script>
</body>
</html>
