<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v3.3.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .l-pct { margin-top: 15px; font-size: 42px; font-weight: 900; color: var(--cyan); }

        #app { display: none; height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .header { width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .avatar { width: 44px; height: 44px; border: 1px solid var(--cyan); border-radius: 12px; overflow: hidden; background: #111; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .balance { font-size: 60px; font-weight: 900; margin: 20px 0; letter-spacing: -2px; }
        .play-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-logo { width: 230px; filter: drop-shadow(0 0 40px var(--purple)); transition: transform 0.05s; }
        
        .side-menu { position: absolute; right: 0; display: flex; flex-direction: column; gap: 10px; }
        .side-btn { background: #0d0d0d; border: 1px solid #222; color: #fff; padding: 14px 0; border-radius: 15px; font-size: 11px; font-weight: 900; width: 100px; }

        .eng-wrap { width: 100%; margin-bottom: 20px; }
        .bar-bg { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; }
        .bar-f { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.2s; }

        .footer { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .f-btn { background: #080808; border: 1px solid #1a1a1a; padding: 18px 0; border-radius: 15px; font-size: 10px; font-weight: 900; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; flex-direction: column; padding: 40px 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .b-btn { background: var(--cyan); color: #000; padding: 12px; border-radius: 12px; font-weight: 900; border: none; }
    </style>
</head>
<body>

<div id="loader">
    <div class="l-pct" id="l-pct">0%</div>
    <div style="color:var(--cyan); letter-spacing: 2px; font-size: 10px; margin-top: 10px;">SYNCING WITH CLUSTER...</div>
</div>

<div id="app">
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="avatar" id="u-avatar"></div>
            <div style="text-align:left;"><b id="u-name">...</b><br><small style="color:var(--cyan)">v3.3.5 Node</small></div>
        </div>
        <div style="background:var(--cyan); color:#000; padding:6px 14px; border-radius:10px; font-weight:900;" id="u-lvl">LVL 1</div>
    </div>
    
    <div class="balance" id="balance">0</div>

    <div class="play-area">
        <img src="./logo.png" class="main-logo" id="tap-img" onpointerdown="tap(event)" onerror="this.src='https://i.ibb.co/LzY7X6p/ai-logo.png'">
        <div class="side-menu">
            <div class="side-btn" onclick="openM('wallet')">WALLET</div>
            <div class="side-btn" onclick="openM('friends')">FRIENDS</div>
        </div>
    </div>

    <div class="eng-wrap">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;"><span id="eng-val">...</span></div>
        <div class="bar-bg"><div class="bar-f" id="eng-fill"></div></div>
    </div>

    <div class="footer">
        <div class="f-btn" onclick="openM('boost')">BOOST</div>
        <div class="f-btn" onclick="openM('mine')">MINE</div>
        <div class="f-btn" onclick="openM('tasks')">TASKS</div>
        <div class="f-btn" onclick="loadTop()">TOP</div>
    </div>
</div>

<div id="m-boost" class="modal">
    <h2>UPGRADES</h2>
    <div class="card"><div><b>Multitap</b><br><small id="mt-lvl">Lvl 1</small></div><button class="b-btn" onclick="buy('mt')" id="mt-cost">0</button></div>
    <div class="card"><div><b>Energy Pool</b><br><small>+500 Limit</small></div><button class="b-btn" onclick="buy('el')" id="el-cost">0</button></div>
    <button onclick="closeM()" style="margin-top:auto; padding:20px; border-radius:15px; font-weight:900;">BACK</button>
</div>

<div id="m-wallet" class="modal">
    <h2>TON WALLET</h2>
    <div class="card"><small id="wallet-addr" style="color:var(--cyan)">Disconnected</small></div>
    <button class="b-btn" onclick="handleWallet()" style="width:100%; padding:20px;">CONNECT / DISCONNECT</button>
    <button onclick="closeM()" style="margin-top:auto; padding:20px; border-radius:15px; font-weight:900;">BACK</button>
</div>

<div id="m-top" class="modal"><h2>LEADERBOARD</h2><div id="top-list" style="overflow-y:auto; flex:1;"></div><button onclick="closeM()" style="padding:20px; border-radius:15px; font-weight:900;">BACK</button></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });

    let s = { 
        id: tg.initDataUnsafe?.user?.id?.toString() || "0",
        name: tg.initDataUnsafe?.user?.first_name || "Agent",
        photo: tg.initDataUnsafe?.user?.photo_url || "",
        bal: 0, lvl: 1, eng: 1000, max: 1000, wallet: null, bot: false 
    };

    async function init() {
        let p = 0;
        const interval = setInterval(() => {
            p += 5;
            document.getElementById('l-pct').innerText = p + '%';
            if(p >= 100) {
                clearInterval(interval);
                document.getElementById('loader').style.display='none';
                document.getElementById('app').style.display='flex';
            }
        }, 50);

        await sync();
        tonUI.onStatusChange(w => { s.wallet = w ? w.account.address : null; upd(); save(); });
        setInterval(save, 5000);
        setInterval(() => { if(s.eng < s.max) { s.eng = Math.min(s.max, s.eng + 2); upd(); }}, 1000);
    }

    async function sync() {
        try {
            const r = await fetch(`/api/user/${s.id}?name=${encodeURIComponent(s.name)}&photo=${encodeURIComponent(s.photo)}`);
            const d = await r.json();
            // ГАРАНТИЯ ЧИСЕЛ (Защита от NaN)
            s.bal = parseFloat(d.balance) || 0;
            s.lvl = parseInt(d.click_lvl) || 1;
            s.eng = parseInt(d.energy) || 1000;
            s.max = parseInt(d.max_energy) || 1000;
            s.wallet = d.wallet_addr;
            s.bot = d.has_bot;
            upd();
        } catch(e) { console.error("Sync Error"); }
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('u-lvl').innerText = `LVL ${s.lvl}`;
        document.getElementById('u-name').innerText = s.name;
        document.getElementById('eng-val').innerText = `${s.eng} / ${s.max}`;
        document.getElementById('eng-fill').style.width = `${(s.eng/s.max)*100}%`;
        
        const mtCost = Math.floor(250 * Math.pow(1.618, s.lvl - 1));
        const elCost = Math.floor(400 * Math.pow(1.5, (s.max/500) - 1));
        document.getElementById('mt-cost').innerText = mtCost.toLocaleString();
        document.getElementById('el-cost').innerText = elCost.toLocaleString();
        document.getElementById('mt-lvl').innerText = `Lvl ${s.lvl}`;
        
        if(s.photo && s.photo !== 'undefined') document.getElementById('u-avatar').innerHTML = `<img src="${s.photo}">`;
        document.getElementById('wallet-addr').innerText = s.wallet ? s.wallet.slice(0,8)+"..."+s.wallet.slice(-8) : "Disconnected";
    }

    function tap(e) {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById('tap-img').style.transform = 'scale(0.95)';
            setTimeout(() => document.getElementById('tap-img').style.transform='scale(1)', 50);
            upd();
        }
    }

    function buy(type) {
        let cost = (type === 'mt') ? Math.floor(250 * Math.pow(1.618, s.lvl - 1)) : Math.floor(400 * Math.pow(1.5, (s.max/500) - 1));
        if(s.bal >= cost) {
            s.bal -= cost;
            if(type === 'mt') s.lvl++; else { s.max += 500; s.eng += 500; }
            upd(); save();
        }
    }

    async function loadTop() {
        openM('top');
        const r = await fetch('/api/top');
        const data = await r.json();
        document.getElementById('top-list').innerHTML = data.map((u, i) => `
            <div class="card">
                <span>#${i+1} ${u.username}</span>
                <b style="color:var(--cyan)">${Math.floor(u.balance).toLocaleString()}</b>
            </div>
        `).join('');
    }

    function save() {
        fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: s.id, balance: s.bal, energy: s.eng, max_energy: s.max, click_lvl: s.lvl, wallet: s.wallet, has_bot: s.bot })
        });
    }

    function handleWallet() { if(tonUI.connected) tonUI.disconnect(); else tonUI.openModal(); }
    function openM(id) { document.getElementById('m-'+id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    init();
</script>
</body>
</html>
