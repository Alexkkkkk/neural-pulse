<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.6.0 | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        /* Системные анимации */
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.5; transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-bg.active { display: flex; }
        
        .modal-box { background: #001a1a; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; border-top: 2px solid cyan; padding: 20px; color: white; position: relative; max-height: 85vh; overflow-y: auto; }
        .handle { width: 40px; height: 4px; background: rgba(0,255,255,0.3); border-radius: 2px; margin: 0 auto 15px; }
        
        .task-item, .top-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-btn { 
            background: cyan; color: black; border: none; padding: 8px 12px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; 
        }
        .task-btn:active { transform: scale(0.95); }
        .task-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .ref-box { 
            background: #000; border: 1px dashed cyan; padding: 10px; 
            border-radius: 8px; margin: 10px 0; word-break: break-all; 
            font-family: monospace; font-size: 11px; color: #0ff; 
        }
        
        .loading { text-align: center; padding: 20px; color: cyan; animation: pulse 1.5s infinite; font-family: monospace; }
        
        .pop {
            position: absolute; color: cyan; font-weight: bold; font-size: 26px;
            pointer-events: none; animation: moveUp 0.6s ease-out forwards;
            z-index: 9999; text-shadow: 0 0 10px rgba(0,255,255,0.5);
            user-select: none;
        }
        
        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        .ai-terminal {
            background: rgba(0, 20, 20, 0.9);
            border: 1px solid cyan;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #0ff;
            margin: 10px 0;
            line-height: 1.5;
            min-height: 120px;
            max-height: 220px;
            box-shadow: inset 0 0 15px rgba(0,255,255,0.2);
            overflow-y: auto;
            white-space: pre-wrap;
            position: relative;
        }
        .ai-terminal::after { content: '_'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .energy-error { animation: shake 0.2s ease-in-out 2; border-color: red !important; }

        /* Фикс для TON UI */
        #tc-widget-root, .tc-root, #ton-connect-ui-container {
            z-index: 10000 !important;
            position: relative;
        }
        #ton-btn-container {
            min-height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .combo-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; border: 1px solid cyan; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: cyan; box-shadow: 0 0 10px cyan; }
        .m-close { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #888; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">INITIALIZING NEURAL LINK...</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none; flex-direction: column; height: 100vh;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png" onerror="this.src='images/logo.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">SCANNING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>POWER</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>MINING / HR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" id="main-target">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('ai')">🤖 AI ADVISOR</button>
                <button id="wallet-btn-label" onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('combo')">🧩 COMBO</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>SYSTEM STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">TERMINATE SESSION</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        let tonConnectUI = null;

        const game = {
            data: { 
                id: "0", balance: 0, energy: 1000, max_energy: 1000, 
                tap: 1, profit: 0, tap_lvl: 1, mine_lvl: 1, 
                energy_lvl: 1, last_bonus: 0, wallet: null, 
                completed_tasks: [], combo_progress: []
            },
            isLoaded: false,
            isSaving: false,

            async init() {
                ui.startLoader();
                tg.expand();
                tg.enableClosingConfirmation();
                if (tg.setHeaderColor) tg.setHeaderColor('#001414'); 

                const u = tg.initDataUnsafe.user || { id: 1774360651, first_name: 'Dev_Agent', username: 'neural_dev' };
                this.data.id = String(u.id);

                this.initTonSDK();

                const target = document.getElementById('main-target');
                target.addEventListener('touchstart', (e) => this.tap(e), { passive: false });

                try {
                    const r = await fetch(`/api/user/${this.data.id}?username=${encodeURIComponent(u.username || u.first_name)}`);
                    if (r.ok) {
                        const db = await r.json();
                        this.data = { ...this.data, ...db, id: String(u.id) };
                        if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                    }
                } catch(e) { console.error("Sync Error"); }

                document.getElementById('my-name').innerText = (u.username || u.first_name).toUpperCase();
                this.isLoaded = true;
                this.startLoops();
                ui.render();
            },

            initTonSDK() {
                const checkInterval = setInterval(() => {
                    // Пытаемся найти конструктор в глобальном объекте
                    const TonSDK = window.TonConnectUI?.TonConnectUI || (typeof TonConnectUI !== 'undefined' ? TonConnectUI : null);
                    
                    if (TonSDK) {
                        clearInterval(checkInterval);
                        try {
                            tonConnectUI = new TonSDK({ 
                                manifestUrl: 'https://np.bothost.tech/tonconnect-manifest.json' 
                            });
                            
                            tonConnectUI.onStatusChange(wallet => {
                                if (wallet) {
                                    this.data.wallet = wallet.account.address;
                                    document.getElementById('wallet-btn-label').innerText = "👛 " + this.data.wallet.slice(0,4) + ".." + this.data.wallet.slice(-4);
                                } else {
                                    this.data.wallet = null;
                                    document.getElementById('wallet-btn-label').innerText = "👛 WALLET";
                                }
                                this.save();
                            });
                            console.log("TON SDK Initialized");
                        } catch(e) { console.error("TON Init Error", e); }
                    }
                }, 400);
            },

            getCost(type) {
                const lvl = this.data[type + '_lvl'] || 1;
                if(type === 'tap') return Math.floor(500 * Math.pow(1.8, lvl - 1));
                if(type === 'energy') return Math.floor(400 * Math.pow(1.5, lvl - 1));
                if(type === 'mine') return Math.floor(1200 * Math.pow(1.7, lvl - 1));
                return 0;
            },

            tap(e) {
                if(!this.isLoaded) return;
                if(e.cancelable) e.preventDefault(); 

                if(this.data.energy < 1) { 
                    tg.HapticFeedback.notificationOccurred('error');
                    document.querySelector('.e-track').classList.add('energy-error');
                    setTimeout(() => document.querySelector('.e-track').classList.remove('energy-error'), 400);
                    return; 
                }
                
                const touches = e.changedTouches || [{ clientX: e.clientX, clientY: e.clientY }];
                for(let i=0; i < touches.length; i++) {
                    if(this.data.energy >= 1) {
                        this.data.balance += this.data.tap;
                        this.data.energy -= 1;
                        ui.pop(touches[i], this.data.tap);
                    }
                }
                ui.render();
                tg.HapticFeedback.impactOccurred('light'); 
            },

            async upgrade(type) {
                const cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') { this.data.tap_lvl++; this.data.tap += 1; }
                    else if(type === 'energy') { this.data.energy_lvl++; this.data.max_energy += 500; this.data.energy = this.data.max_energy; }
                    else if(type === 'mine') { 
                        this.data.mine_lvl++; 
                        this.data.profit += 120; 
                        if(this.data.combo_progress.length < 3) this.data.combo_progress.push('mine');
                    }
                    ui.render();
                    tg.HapticFeedback.notificationOccurred('success');
                    await this.save(); 
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                } else { tg.showAlert("НЕДОСТАТОЧНО NP"); }
            },

            async completeTask(id, reward, url) {
                if (url) tg.openLink(url);
                setTimeout(async () => {
                    if (!this.data.completed_tasks.includes(id)) {
                        this.data.completed_tasks.push(id);
                        this.data.balance += reward;
                        ui.render();
                        tg.showAlert(`TASK COMPLETE: +${reward} NP`);
                        await this.save();
                        ui.openM('tasks');
                    }
                }, 2000);
            },

            async save() {
                if(!this.isLoaded || this.isSaving) return;
                this.isSaving = true;
                try {
                    await fetch('/api/save', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.data)
                    });
                } catch(e) { console.warn("Save error"); } 
                finally { this.isSaving = false; }
            },

            startLoops() {
                setInterval(() => {
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1.5);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
                setInterval(() => this.save(), 15000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += Math.floor(Math.random() * 10) + 2;
                    if(p > 100) p = 100;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { 
                        clearInterval(i); 
                        document.getElementById('loader').style.display='none'; 
                        document.getElementById('app').style.display='flex'; 
                    }
                }, 40);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit).toLocaleString();
                
                const rank = d.balance < 50000 ? "NODE AGENT" : d.balance < 500000 ? "CYBER MANTIS" : "NEURAL LORD";
                document.getElementById('ui-rank').innerText = rank;
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(d.balance / 25000) + 1}`;
            },

            pop(touch, p) {
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = (touch.clientX - 15)+'px'; div.style.top = (touch.clientY - 30)+'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                b.innerHTML = `<div class="loading">SYNCING...</div>`;
                
                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 UPGRADES</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><div><b>Multitap</b><br><small>Level ${game.data.tap_lvl}</small></div><b>${game.getCost('tap')} NP</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><div><b>Energy Cap</b><br><small>Level ${game.data.energy_lvl}</small></div><b>${game.getCost('energy')} NP</b></div>`;
                } else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><div><b>Neural Node</b><br><small>Level ${game.data.mine_lvl}</small></div><b>${game.getCost('mine')} NP</b></div>
                    <p style="font-size:10px; color:gray; text-align:center;">Nodes generate passive income.</p>`;
                } else if(type === 'ai') {
                    b.innerHTML = `<h2>🤖 AI ADVISOR</h2><div class="ai-terminal" id="ai-res">Neural link standby...</div><button class="task-btn" style="width:100%" id="ai-btn" onclick="ui.askAI()">RUN ANALYSIS</button>`;
                } else if(type === 'combo') {
                    const dots = [0,1,2].map(i => `<div class="dot ${game.data.combo_progress[i] ? 'active' : ''}"></div>`).join('');
                    b.innerHTML = `<h2>🧩 DAILY COMBO</h2>
                    <div class="combo-dots">${dots}</div>
                    <p style="text-align:center; font-size:12px;">Find 3 secret upgrades to claim 1,000,000 NP!</p>
                    <button class="task-btn" style="width:100%" ${game.data.combo_progress.length === 3 ? '' : 'disabled'} onclick="ui.claimCombo()">CLAIM REWARD</button>`;
                } else if(type === 'friends') {
                    const link = `https://t.me/neural_pulse_bot?start=${game.data.id}`;
                    b.innerHTML = `<h2>🤝 REFERRALS</h2><div class="ref-box">${link}</div><button class="task-btn" style="width:100%" onclick="ui.copyRef('${link}')">COPY INVITE LINK</button>`;
                } else if(type === 'wallet') {
                    const isConnected = !!game.data.wallet;
                    b.innerHTML = `<h2>👛 TON WALLET</h2>
                    <p id="wallet-status" style="font-size:12px; color:gray; text-align:center; margin-bottom:15px;">${isConnected ? 'Identity Linked' : 'Connect for Sync'}</p>
                    <div id="ton-btn-container"><div id="ton-connect-button"></div></div>
                    ${isConnected ? '<button class="task-btn" style="width:100%; background:#ff4444; color:white; margin-top:10px;" onclick="tonConnectUI.disconnect()">DISCONNECT</button>' : ''}`;
                    
                    const renderTon = () => {
                        const container = document.getElementById('ton-connect-button');
                        if (tonConnectUI && container) {
                            tonConnectUI.renderButton({ container, theme: 'dark', buttonConfiguration: { width: 'full' } });
                        } else { setTimeout(renderTon, 300); }
                    };
                    renderTon();
                } else if(type === 'tasks') {
                    const done = (id) => game.data.completed_tasks?.includes(id);
                    b.innerHTML = `<h2>📋 MISSIONS</h2>
                    <div class="task-item"><span>Join Channel</span><button class="task-btn" ${done('tg') ? 'disabled' : ''} onclick="game.completeTask('tg', 10000, 'https://t.me/neural_pulse')">${done('tg') ? 'DONE' : '+10k'}</button></div>
                    <div class="task-item"><span>Follow X</span><button class="task-btn" ${done('x') ? 'disabled' : ''} onclick="game.completeTask('x', 5000, 'https://twitter.com')">${done('x') ? 'DONE' : '+5k'}</button></div>`;
                } else if(type === 'top') {
                    try {
                        const r = await fetch('/api/top'); 
                        const top = await r.json();
                        let h = '<h2>🏆 TOP AGENTS</h2>';
                        top.forEach((u, i) => { h += `<div class="top-item"><div><b style="color:cyan;">#${i+1}</b> ${u.username || 'Anon'}</div><b>${Math.floor(u.balance).toLocaleString()}</b></div>`; });
                        b.innerHTML = h;
                    } catch(e) { b.innerHTML = '<h2>OFFLINE</h2>'; }
                }
            },

            async askAI() {
                const resDiv = document.getElementById('ai-res'); 
                const btn = document.getElementById('ai-btn');
                resDiv.innerHTML = `<div class="loading">ANALYZING PULSE...</div>`; 
                btn.disabled = true;
                try {
                    const r = await fetch('/api/ai-advice', { 
                        method: 'POST', headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ id: game.data.id, balance: game.data.balance, levels: { tap: game.data.tap_lvl, mine: game.data.mine_lvl } }) 
                    });
                    const res = await r.json(); 
                    const text = res.text || "Pulse stable. Focus on mining nodes.";
                    resDiv.innerText = ""; 
                    let i = 0;
                    const type = () => { if (i < text.length) { resDiv.innerText += text.charAt(i); i++; setTimeout(type, 30); } }; 
                    type();
                } catch(e) { resDiv.innerText = "Error: Link broken."; } 
                finally { btn.disabled = false; }
            },

            copyRef(url) { navigator.clipboard.writeText(url).then(() => tg.showAlert('Copied!')); },

            async claimCombo() {
                if(game.data.combo_progress.length === 3) {
                    game.data.balance += 1000000;
                    game.data.combo_progress = [];
                    ui.render(); ui.closeM();
                    tg.showAlert("COMBO COMPLETE: +1,000,000 NP");
                    await game.save();
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
