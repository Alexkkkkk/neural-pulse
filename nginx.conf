# ВАЖНО: Если Nginx ругается на "map" directive is not allowed here, 
# значит этот блок нужно перенести в /etc/nginx/nginx.conf внутрь секции http { ... }
# Но обычно в современных сборках он работает и тут, если нет дубликатов.
map $sent_http_content_type $expires {
    default                    off;
    text/html                  epoch;
    text/css                   max;
    application/javascript     max;
    ~image/                    max;
}

server {
    listen 80;
    server_name your-domain.com; # ЗАМЕНИ НА СВОЙ ДОМЕН (например, api.pulse.ru)

    # Указываем на папку static внутри твоего проекта
    # Замени /home/user/neural-pulse на реальный путь к твоему проекту на сервере
    root /home/user/neural-pulse/static;
    index index.html;

    # Логи проекта
    access_log /var/log/nginx/neural_pulse_access.log;
    error_log /var/log/nginx/neural_pulse_error.log;

    # Оптимизация передачи данных
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss image/svg+xml;

    # Безопасность и специфические заголовки для Telegram Mini App
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    # Разрешаем Telegram открывать наше приложение во фрейме
    add_header Content-Security-Policy "frame-ancestors https://t.me https://web.telegram.org https://desktop.telegram.org;";

    # 1. Обработка статических изображений (логотип и дизайн)
    location /images/ {
        expires $expires;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    # 2. Манифест для подключения кошелька TON
    location = /tonconnect-manifest.json {
        allow all;
        add_header Access-Control-Allow-Origin *;
        add_header Content-Type application/json;
        try_files $uri =404;
    }

    # 3. Прокси на твой Python бэкенд (main.py)
    location /api/ {
        # Если проект в Docker, тут может быть http://app:8000;
        proxy_pass http://127.0.0.1:8000; 
        proxy_http_version 1.1;
        
        # Передаем заголовки, чтобы Python видел реальный IP и протокол (HTTPS)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Поддержка WebSockets (если понадобится живой чат)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Увеличиваем время ожидания для долгих запросов
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # 4. Основная точка входа в Mini App
    location / {
        # try_files ищет файл в папке root. Если не находит — отдает index.html
        try_files $uri $uri/ /index.html;
    }
}
