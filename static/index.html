<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="static/images/logo.png" alt="Neural AI" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-wrapper">
            <div id="load-bar" class="load-bar-f" style="width:0%"></div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="avatar"><img src="static/images/logo.png"></div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <small>EARN PER TAP</small>
                <b id="tap-val" class="accent-val">+1</b>
            </div>
            <div class="stat-card">
                <small>PROFIT PER HOUR</small>
                <b id="profit-val" class="accent-val">0</b>
            </div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="static/images/logo.png" class="main-logo" id="tap-target">
            
            <div class="side-menu">
                <button class="side-btn" onclick="ui.openM('wallet')"><span>👛</span> WALLET</button>
                <button class="side-btn" onclick="ui.openM('squad')"><span>🤝</span> FRIENDS</button>
                <button class="side-btn" onclick="ui.openM('bonus')"><span>🎁</span> BONUS</button>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt">
                <span>ENERGY</span>
                <span id="eng-val">1000/1000</span>
            </div>
            <div class="load-bar-wrapper full-width">
                <div id="eng-fill" class="load-bar-f" style="width: 100%"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')"><span>🚀</span> BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')"><span>⛏️</span> MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')"><span>📋</span> TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')"><span>🏆</span> TOP</button>
        </div>
    </div>

    <div id="m-wallet" class="modal"><div class="modal-content"></div></div>
    <div id="m-squad" class="modal"><div class="modal-content"></div></div>
    <div id="m-bonus" class="modal"><div class="modal-content"></div></div>
    <div id="m-boost" class="modal"><div class="modal-content"></div></div>
    <div id="m-mine" class="modal"><div class="modal-content"></div></div>
    <div id="m-tasks" class="modal"><div class="modal-content"></div></div>
    <div id="m-top" class="modal"><div class="modal-content"></div></div>

    <script src="ui.js"></script>
    <script src="logic.js"></script>
    <script src="loading.js"></script>
</body>
</html>
