<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.3.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .loader-circle { width: 80px; height: 80px; border: 3px solid var(--neon-cyan); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        .app.ready { opacity: 1; visibility: visible; }
        .header { width: 90%; margin-top: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .lvl-box { width: 40px; height: 40px; border: 2px solid var(--neon-purple); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .bal { font-size: 55px; font-weight: 900; margin-top: 10px; text-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .pnl { color: var(--neon-cyan); font-weight: bold; margin-top: -8px; font-size: 12px; }
        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .main-logo { width: 240px; height: 240px; border-radius: 50%; filter: drop-shadow(0 0 40px rgba(188,19,254,0.4)); transition: transform 0.05s; }
        .footer { width: 92%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 30px; }
        .f-item { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px 0; text-align: center; font-size: 11px; font-weight: bold; color: #aaa; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .plus { position: absolute; font-size: 32px; font-weight: 900; color: var(--neon-cyan); animation: float 0.6s forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-circle"></div></div>
    <div class="app" id="ui">
        <div class="header">
            <div class="lvl-box" id="l-v">1</div>
            <div><div style="font-size: 8px; color: #666;">NEURAL CORE</div><div style="font-size: 12px; font-weight: bold;" id="r-t">Syncing...</div></div>
            <div style="margin-left:auto; color:var(--neon-cyan); font-weight:900" id="s-f">x1.0</div>
        </div>
        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">PNL: +0/H</div>
        <div class="stage">
            <img src="images/logo.png" class="main-logo" id="t-a" onerror="this.src='logo.png'">
        </div>
        <div style="width: 85%; margin-bottom: 25px;">
            <div style="display:flex; justify-content:space-between; font-size:9px; color:#555; margin-bottom:4px;"><span>ENERGY</span><span id="e-n">1000/1000</span></div>
            <div style="width:100%; height:4px; background:#111; border-radius:10px;"><div id="e-f" style="height:100%; background:var(--neon-cyan); width:100%;"></div></div>
        </div>
        <div class="footer">
            <div class="f-item" onclick="openM('boost-ui')">🚀 BOOST</div>
            <div class="f-item" onclick="openM('mine-ui')">⛏️ MINE</div>
            <div class="f-item" onclick="openStats()">🏆 TOP</div>
        </div>
    </div>

    <div id="boost-ui" class="modal">
        <h2>UPGRADES</h2>
        <div class="card"><div><b>Multitap</b><br><small id="b-l">LVL 1</small></div><button style="padding:10px; border-radius:10px" onclick="buyB()">UPGRADE</button></div>
        <button class="f-item" style="width:100%; margin-top:auto" onclick="closeM('boost-ui')">BACK</button>
    </div>
    <div id="mine-ui" class="modal"><h2>MATH SHOP</h2><div id="s-l"></div><button class="f-item" style="width:100%; margin-top:20px" onclick="closeM('mine-ui')">BACK</button></div>
    <div id="stats-ui" class="modal"><h2>LEADERBOARD</h2><div id="stat-l" style="flex-grow:1; overflow-y:auto"></div><button class="f-item" style="width:100%; margin-top:10px" onclick="closeM('stats-ui')">CLOSE</button></div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 'GUEST', cards: 0 };
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://' + location.host + '/tonconnect-manifest.json' });

        function openM(id) { document.getElementById(id).style.display = 'flex'; if(id==='mine-ui') renderShop(); }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        const items = [{n:'Linear Algebra', c:1200, p:65}, {n:'Calculus Power', c:10000, p:580}];

        function renderShop() {
            const l = document.getElementById('s-l'); l.innerHTML = '';
            items.forEach((c, i) => {
                const price = Math.floor(c.c * Math.pow(1.25, s.pnl/(c.p * 5)));
                l.innerHTML += `<div class="card"><div><b>${c.n}</b><br><small>+${c.p}/h</small></div><button onclick="buyC(${i}, ${price})">${price}</button></div>`;
            });
        }

        function buyC(i, p) { if(s.bal>=p){ s.bal-=p; s.pnl+=items[i].p; s.cards++; upd(); renderShop(); } }
        function buyB() { const p=s.lvl*5000; if(s.bal>=p){ s.bal-=p; s.lvl++; upd(); } }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault(); if(s.eng < s.lvl) return;
            let gain = Math.floor(s.lvl * (1 + s.cards*0.05));
            s.bal += gain; s.eng -= s.lvl;
            const p = document.createElement('div'); p.className='plus'; p.innerText=`+${gain}`;
            p.style.left=e.touches[0].clientX+'px'; p.style.top=e.touches[0].clientY+'px';
            document.body.appendChild(p); setTimeout(()=>p.remove(), 600);
            upd(); if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        function upd() {
            let syn = 1 + (s.cards * 0.05);
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('p-v').innerText = `PNL: +${Math.floor(s.pnl * syn).toLocaleString()}/H`;
            document.getElementById('e-n').innerText = `${Math.floor(s.eng)}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('s-f').innerText = `x${syn.toFixed(2)}`;
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('b-l').innerText = `LVL ${s.lvl}`;
            document.getElementById('r-t').innerText = s.bal > 100000 ? "Advanced Node" : "Basic Node";
        }

        async function init() {
            const r = await fetch(`/api/user/${s.uid}`); const d = await r.json();
            Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl), cards: Math.floor(d.pnl/65) });
            upd(); document.getElementById('loader').style.display='none'; document.getElementById('ui').classList.add('ready');
        }

        setInterval(() => { if(s.uid!=='GUEST') fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:s.uid, balance:s.bal, energy:s.eng, click_lvl:s.lvl, pnl:s.pnl})}); }, 4000);
        setInterval(() => { if(s.eng<1000){ s.eng+=2; upd(); } }, 1000);
        init();
    </script>
</body>
</html>
