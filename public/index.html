<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --bg-dark: #000; --glass: rgba(255, 255, 255, 0.03); }
        body { 
            margin: 0; padding: 0; background: var(--bg-dark); color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; height: 100vh;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* --- HEADER --- */
        .header-box {
            width: 90%; margin-top: 20px; background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 20px;
            padding: 12px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px);
        }
        .lvl-badge {
            width: 40px; height: 40px; border: 2px solid var(--neon-cyan);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; color: var(--neon-cyan);
        }

        .balance-text { font-size: 70px; font-weight: bold; margin-top: 20px; letter-spacing: -2px; }

        /* --- GAME ZONE --- */
        .game-zone { position: relative; width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .logo-main { width: 220px; filter: drop-shadow(0 0 25px rgba(188, 19, 254, 0.4)); z-index: 5; transition: transform 0.05s; }
        
        .wallet-pill {
            position: absolute; top: 25%; right: 8%; background: rgba(0, 242, 255, 0.05); 
            border: 1.5px solid var(--neon-cyan); padding: 8px 18px; border-radius: 50px; 
            font-size: 12px; font-weight: bold; color: var(--neon-cyan); z-index: 10;
        }
        #ton-mount { position: absolute; inset: 0; opacity: 0; }

        .side-stack { position: absolute; right: 5%; top: 45%; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .side-btn { background: #111; border: 1px solid #333; padding: 10px 15px; border-radius: 12px; font-size: 10px; font-weight: 900; color: #888; text-align: center; }

        /* --- FOOTER --- */
        .energy-wrap { width: 90%; margin-bottom: 20px; }
        .energy-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .energy-fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: 0.3s; box-shadow: 0 0 10px var(--neon-cyan); }

        .nav-grid { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .nav-btn { background: #121212; border: 1px solid #222; border-radius: 18px; padding: 15px 0; font-size: 12px; font-weight: 900; text-align: center; cursor: pointer; }

        /* ANIMATION */
        .tap-anim { position: absolute; color: white; font-size: 32px; font-weight: 900; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 100; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">LOADING 0%</div>

    <div class="header-box">
        <div class="lvl-badge" id="lvl-ui">1</div>
        <div style="flex-grow: 1;">
            <div style="font-size: 10px; color: #555; font-weight: 900;">NEURAL SYSTEM</div>
            <div style="font-size: 13px; color: var(--neon-cyan); font-weight: bold;" id="pnl-ui">PASSIVE: +0/h</div>
        </div>
    </div>

    <div class="balance-text" id="balance-ui">0</div>

    <div class="game-zone">
        <div class="wallet-pill">
            <span id="addr-text">WALLET</span>
            <div id="ton-mount"></div>
        </div>
        <img src="logo.png" class="logo-main" id="tap-target" onerror="this.src='https://via.placeholder.com/200/bc13fe/fff?text=AI'">
        <div class="side-stack">
            <div class="side-btn" onclick="invite()">INVITE</div>
            <div class="side-btn" onclick="tg.showAlert('Bonus System Coming Soon')">BONUS</div>
        </div>
    </div>

    <div class="energy-wrap">
        <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; color: #666;">
            <span>⚡ ENERGY</span>
            <span id="energy-text" style="color: white;">1000/1000</span>
        </div>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
    </div>

    <div class="nav-grid">
        <div class="nav-btn" onclick="upgrade('click')">🚀 BOOST</div>
        <div class="nav-btn" onclick="upgrade('pnl')">⛏️ MINE</div>
        <div class="nav-btn" onclick="showStats()">📊 STATS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Данные игрока
        let user = {
            id: tg.initDataUnsafe?.user?.id || 12345,
            name: tg.initDataUnsafe?.user?.username || 'Player',
            balance: 0,
            energy: 1000,
            lvl: 1,
            pnl: 0,
            unsavedClicks: 0
        };

        // Загрузка данных
        async function loadUser() {
            try {
                const res = await fetch(`/api/user/${user.id}`);
                const data = await res.json();
                user.balance = parseFloat(data.balance);
                user.energy = data.energy;
                user.lvl = data.click_lvl;
                user.pnl = data.pnl;
                updateUI();
                document.getElementById('loader').style.display = 'none';
            } catch(e) { console.error("Load error", e); }
        }

        function updateUI() {
            document.getElementById('balance-ui').innerText = Math.floor(user.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(user.energy)}/1000`;
            document.getElementById('energy-fill').style.width = (user.energy/10) + '%';
            document.getElementById('lvl-ui').innerText = user.lvl;
            document.getElementById('pnl-ui').innerText = `PASSIVE: +${user.pnl}/h`;
        }

        // Клик
        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            if (user.energy < user.lvl) return;
            
            user.balance += user.lvl;
            user.energy -= user.lvl;
            user.unsavedClicks += 1;

            const t = e.touches[0];
            const n = document.createElement('div');
            n.className = 'tap-anim';
            n.innerText = `+${user.lvl}`;
            n.style.left = t.clientX + 'px';
            n.style.top = t.clientY + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 600);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateUI();
        });

        // Сохранение (Auto-Save)
        async function saveData() {
            if (user.unsavedClicks === 0) return;
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        clicks: user.unsavedClicks,
                        energy: user.energy,
                        username: user.name
                    })
                });
                user.unsavedClicks = 0;
                console.log("Progress Saved");
            } catch(e) { console.error("Save error", e); }
        }

        // Апгрейды
        async function upgrade(type) {
            try {
                const res = await fetch('/api/upgrade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id, type: type })
                });
                const data = await res.json();
                if (data.success) {
                    tg.HapticFeedback.notificationOccurred('success');
                    loadUser();
                } else {
                    tg.showAlert(data.error || "Недостаточно NP!");
                }
            } catch(e) { console.error("Upgrade error", e); }
        }

        function showStats() {
            tg.showAlert(`ID: ${user.id}\nBalance: ${Math.floor(user.balance)} NP\nClick Lvl: ${user.lvl}\nPassive Income: ${user.pnl}/h`);
        }

        function invite() {
            const link = `https://t.me/share/url?url=https://t.me/n_pulse_bot?start=${user.id}&text=Майни Neural Pulse вместе со мной!`;
            tg.openTelegramLink(link);
        }

        // Циклы
        setInterval(saveData, 10000); // Раз в 10 сек сохраняем
        setInterval(() => { if(user.energy < 1000) { user.energy = Math.min(1000, user.energy + 1.5); updateUI(); } }, 1000);
        
        loadUser();

        // TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: 'ton-mount'
        });
    </script>
</body>
</html>
