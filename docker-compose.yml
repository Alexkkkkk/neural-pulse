version: '3.8'

services:
  # Основной шлюз (Nginx)
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./static:/usr/share/nginx/html
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - socket

  # Redis для сверхбыстрых операций
  redis:
    image: redis:7-alpine
    restart: always

  # API сервис
  api:
    build: ./services/api
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  # Socket сервис (Тапы)
  socket:
    build: ./services/socket
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  # Clicker (Логика)
  clicker:
    build: ./services/clicker
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
