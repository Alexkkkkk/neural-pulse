<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI v1.0.4-P</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { 
            --neon-cyan: #00f2ff; --bg-dark: #000; 
            --glass: rgba(255, 255, 255, 0.08); --neon-purple: #bc13fe;
        }
        body { 
            margin: 0; padding: 0; background: var(--bg-dark); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; touch-action: none; 
        }

        /* Фиксированный заголовок как в оригинале v1.0.4 */
        .header { 
            width: 92%; margin-top: 20px; background: var(--glass); 
            border-radius: 20px; padding: 15px; display: flex; 
            align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); 
            box-sizing: border-box;
        }
        .lvl-badge { 
            width: 48px; height: 48px; border: 2px solid var(--neon-cyan); 
            border-radius: 14px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; color: var(--neon-cyan); 
        }

        .bal-wrap { text-align: center; margin-top: 20px; }
        .bal { font-size: 64px; font-weight: 900; letter-spacing: -2px; }
        .pnl { color: var(--neon-cyan); font-size: 14px; margin-top: -5px; font-weight: 700; }

        .stage { 
            position: relative; width: 100%; flex-grow: 1; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: 25px; 
        }
        /* Твой дизайн логотипа защищен */
        .main-logo { width: 220px; height: 220px; border-radius: 50%; cursor: pointer; filter: drop-shadow(0 0 30px rgba(188,19,254,0.4)); }
        
        .side-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; width: 90%; }
        .action-btn { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px 18px; border-radius: 16px; min-width: 100px;
            text-align: center; font-size: 11px; font-weight: 800; color: white;
        }

        .footer { width: 92%; margin-bottom: 40px; }
        .eng-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .eng-fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: 0.2s; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 25px; }
        .nav-item { background: var(--glass); padding: 18px 0; border-radius: 18px; text-align: center; font-size: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <div class="lvl-badge" id="lvl-v">1</div>
        <div>
            <div style="font-size: 10px; opacity: 0.6;">SYSTEM CORE</div>
            <div style="font-size: 13px; font-weight: 800;">NEURAL PULSE v1.0.4</div>
        </div>
    </div>

    <div class="bal-wrap">
        <div class="bal" id="bal-v">0</div>
        <div class="pnl" id="pnl-v">PASSIVE: +0/h</div>
    </div>

    <div class="stage">
        <img src="logo.png" class="main-logo" id="clicker" onerror="this.src='https://via.placeholder.com/220'">
        
        <div class="side-nav">
            <div class="action-btn" onclick="handleWallet()">CONNECT</div>
            <div class="action-btn" onclick="tg.showAlert('Invite friends!')">INVITE</div>
            <div class="action-btn" style="border-color: var(--neon-purple);">BUY BONUS</div>
        </div>
    </div>

    <div class="footer">
        <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 800;">
            <span>⚡ ENERGY</span>
            <span id="eng-v">1000/1000</span>
        </div>
        <div class="eng-bar"><div class="eng-fill" id="eng-f"></div></div>

        <div class="nav-grid">
            <div class="nav-item">🚀 BOOST</div>
            <div class="nav-item" onclick="startMine()">⛏️ MINE</div>
            <div class="nav-item" id="stats-btn">📊 CHECK PAY</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let state = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0, sync: false };

        function updateUI() {
            document.getElementById('bal-v').innerText = Math.floor(state.bal).toLocaleString();
            document.getElementById('eng-v').innerText = `${Math.floor(state.eng)}/1000`;
            document.getElementById('eng-f').style.width = (state.eng / 10) + '%';
        }

        document.getElementById('clicker').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.eng < state.lvl) return;
            state.bal += state.lvl; state.eng -= state.lvl; state.sync = true;
            updateUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        async function init() {
            try {
                const r = await fetch(`/api/user/${state.uid}`);
                const d = await r.json();
                state.bal = Number(d.balance) || 0;
                state.eng = Number(d.energy) || 1000;
                updateUI();
            } catch(e) {}
        }

        setInterval(async () => {
            if (!state.sync) return;
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: state.uid, balance: state.bal, energy: state.eng })
            });
            state.sync = false;
        }, 5000);

        init();
    </script>
</body>
</html>
