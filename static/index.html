<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="access-text">ACCESS GRANTED</div>
        <div class="load-pct" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-fill" id="load-bar"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar-box"><img src="images/logo.png" id="u-avatar"></div>
                <div><b id="u-name">Agent</b><br><small style="color:#444; font-size:9px;">v4.0.0 Neural Mining</small></div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo-btn" ontouchstart="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="energy-info"><span>ENERGY</span><span id="eng-val">1000/1000</span></div>
            <div class="eng-progress"><div class="eng-fill" id="eng-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="nav-item" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="nav-item" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-content">
            <h2 id="modal-title" class="modal-title">TOP</h2>
            <div id="modal-body"></div>
            <button class="close-btn" onclick="ui.closeM()">Close Terminal</button>
        </div>
    </div>

    <script>
        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                tg.expand();
                const u = tg.initDataUnsafe?.user || { id: "0", username: "Agent" };
                
                try {
                    const res = await fetch(`/api/user/${u.id}?username=${u.username}&photo_url=${u.photo_url || ''}`);
                    this.user = await res.json();
                } catch(e) { 
                    this.user = { balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, username: u.username };
                }
                ui.startLoading();
                this.loop();
            },
            tap(e) {
                if (this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            },
            loop() {
                setInterval(() => {
                    if(this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.5);
                    if(this.user.profit_hr > 0) this.user.balance += (this.user.profit_hr / 3600);
                    ui.update();
                }, 1000);
            }
        };

        const ui = {
            update() {
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = logic.user.profit_hr;
                if(logic.user.photo_url) document.getElementById('u-avatar').src = logic.user.photo_url;
            },
            startLoading() {
                let p = 0;
                const itv = setInterval(() => {
                    p += 2;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(itv);
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        this.update();
                    }
                }, 30);
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                document.getElementById('modal-title').innerText = type.toUpperCase();
                if(type === 'top') {
                    body.innerHTML = '<div style="text-align:center; opacity:0.5;">LINKING TO NEURAL NETWORK...</div>';
                    fetch('/api/top').then(r=>r.json()).then(data => {
                        body.innerHTML = data.map((u, i) => `
                            <div class="top-item ${u.username === logic.user.username ? 'me' : ''}">
                                <div class="top-user">
                                    <span style="font-weight:900; width:25px; color:${i<3?'#00ffff':'#333'}">#${i+1}</span>
                                    <div class="top-avatar">AI</div>
                                    <span class="top-name">${u.username} ${u.username === logic.user.username ? '(YOU)' : ''}</span>
                                </div>
                                <span class="top-val">${Math.floor(u.balance).toLocaleString()}</span>
                            </div>
                        `).join('');
                    });
                }
                document.getElementById('modal-container').classList.add('active');
            },
            closeM() { document.getElementById('modal-container').classList.remove('active'); }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
