<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #000; --glass: rgba(255, 255, 255, 0.08); --ton: #0088cc; }
        body { margin: 0; padding: 0; background: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }

        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .loader-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-purple); animation: spin 2s linear infinite; }
        .loader-logo { width: 100px; height: 100px; z-index: 1; filter: drop-shadow(0 0 15px var(--neon-purple)); }
        .access-text { margin-top: 40px; letter-spacing: 4px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .percent { font-size: 32px; font-weight: 900; color: var(--neon-cyan); margin: 10px 0; }
        .load-bar { width: 220px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .load-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); width: 0%; transition: 0.1s linear; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.8s; visibility: hidden; }
        .app.ready { opacity: 1; visibility: visible; }

        .header { width: 90%; margin-top: 20px; background: var(--glass); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .lvl { width: 45px; height: 45px; border: 2px solid var(--neon-cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--neon-cyan); }

        .bal { font-size: 60px; font-weight: 900; margin-top: 30px; text-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .stage { position: relative; width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .logo { width: 230px; height: 230px; border-radius: 50%; transition: transform 0.05s; z-index: 1; cursor: pointer; }
        
        .side { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 15px; width: 85px; text-align: center; font-size: 10px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-ton { border-color: var(--ton); color: #5dc2ff; }

        .energy { width: 90%; margin-bottom: 25px; }
        .bar { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: 0.3s; }

        .footer { width: 92%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 35px; }
        .f-item { background: #111; padding: 18px 0; border-radius: 15px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #1a1a1a; cursor: pointer; }

        .plus { position: absolute; font-size: 35px; font-weight: 900; animation: p 0.7s forwards; pointer-events: none; z-index: 100; color: var(--neon-cyan); }
        @keyframes p { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-container">
            <div class="loader-circle"></div>
            <img src="images/logo.png" class="loader-logo" onerror="this.src='https://via.placeholder.com/100/bc13fe/fff?text=AI'">
        </div>
        <div class="access-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar"><div class="load-fill" id="load-f"></div></div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl" id="l-v">1</div>
            <div>
                <div style="font-size: 10px; color: #555;">NEURAL NETWORK</div>
                <div id="p-v" style="color: var(--neon-cyan); font-size: 12px;">PASSIVE: +0/h</div>
            </div>
        </div>

        <div class="bal" id="b-v">0</div>

        <div class="stage">
            <img src="images/logo.png" class="logo" id="t-a" onerror="this.src='https://via.placeholder.com/230/bc13fe/fff?text=AI'">
            <div class="side">
                <div class="btn btn-ton" id="ton-btn" onclick="handleWallet()">CONNECT</div>
                <div class="btn" onclick="inviteFriend()">INVITE</div>
                <div class="btn" onclick="buyBonus()">BUY BONUS</div>
            </div>
        </div>

        <div class="energy">
            <div style="display:flex; justify-content: space-between; font-size: 12px;"><span>⚡ ENERGY</span><span id="e-n">1000/1000</span></div>
            <div class="bar"><div class="fill" id="e-f"></div></div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="tg.showAlert('Boosts available at Level 2')">🚀 BOOST</div>
            <div class="f-item" onclick="tg.showAlert('Mining system offline')">⛏️ MINE</div>
            <div class="f-item" onclick="checkPaymentStatus()">📊 CHECK PAY</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const tonConnect = new TonConnectSDK.TonConnect({
            manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json'
        });

        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 0, up: false };

        async function handleWallet() {
            if (tonConnect.connected) {
                if (confirm("Disconnect wallet?")) await tonConnect.disconnect();
            } else {
                const walletsList = await tonConnect.getWallets();
                const universalLink = tonConnect.connect(walletsList);
                tg.openLink(universalLink);
            }
        }

        tonConnect.onStatusChange(wallet => {
            const btn = document.getElementById('ton-btn');
            if (wallet) {
                const addr = wallet.account.address;
                btn.innerText = addr.slice(0, 4) + '...' + addr.slice(-4);
                btn.style.borderColor = "#00ff00";
            } else {
                btn.innerText = "CONNECT";
                btn.style.borderColor = "var(--ton)";
            }
        });

        function inviteFriend() {
            const link = `https://t.me/NeuralPulseAI_bot?start=${s.uid}`;
            const text = `Join Neural Pulse AI and start mining!`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
        }

        async function buyBonus() {
            if (!tonConnect.connected) return tg.showAlert("Connect wallet first!");
            const payload = `ID${s.uid}_${Date.now()}`;
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI",
                    amount: "1000000000",
                    payload: payload 
                }]
            };
            try {
                await tonConnect.sendTransaction(transaction);
                tg.showConfirm(`Transaction sent! Check payment status in a moment?`, (ok) => { if(ok) checkPaymentStatus(); });
            } catch (e) { tg.showAlert("Cancelled"); }
        }

        async function checkPaymentStatus() {
            const r = await fetch(`/api/check-payment/${s.uid}`);
            const d = await r.json();
            if (d.success) {
                tg.showAlert(`Verified! Added ${d.added.toLocaleString()} coins!`);
                s.bal += d.added; upd();
            } else { tg.showAlert("No new transactions found for your ID."); }
        }

        function startLoading() {
            let progress = 0;
            const fill = document.getElementById('load-f');
            const pct = document.getElementById('load-pct');
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                            document.getElementById('ui').classList.add('ready');
                        }, 500);
                    }, 500);
                }
                fill.style.width = progress + '%';
                pct.innerText = progress + '%';
            }, 60);
        }

        async function init() {
            // Получаем реферала из URL если есть
            const urlParams = new URLSearchParams(window.location.search);
            const refBy = urlParams.get('tgWebAppStartParam');

            try {
                const r = await fetch(`/api/user/${s.uid}${refBy ? '?refBy=' + refBy : ''}`);
                const d = await r.json();
                s.bal = Number(d.balance) || 0; 
                s.eng = Number(d.energy) || 1000;
                s.lvl = Number(d.click_lvl) || 1; 
                s.pnl = Number(d.pnl) || 0;
                upd();
            } catch(e) {}
            startLoading();
            await tonConnect.restoreConnection();
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('e-n').innerText = `${Math.floor(s.eng)}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('p-v').innerText = `PASSIVE: +${s.pnl}/h`;
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            const t = e.touches[0];
            s.bal += s.lvl; s.eng -= s.lvl; s.up = true;
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            upd();
        });

        setInterval(async () => {
            if(!s.up || !s.uid) return;
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl })
            });
            s.up = false;
        }, 3000);

        init();
    </script>
</body>
</html>
