<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.3.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg: #000; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; touch-action: none; }
        
        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .loader-circle { width: 120px; height: 120px; border-radius: 50%; border: 3px solid transparent; border-top: 3px solid var(--neon-cyan); border-right: 3px solid var(--neon-purple); animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        .app.ready { opacity: 1; visibility: visible; }

        /* UI Elements */
        .header { width: 90%; margin-top: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .lvl-box { width: 40px; height: 40px; border: 2px solid var(--neon-cyan); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        
        .bal { font-size: 55px; font-weight: 900; margin-top: 10px; letter-spacing: -2px; text-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .pnl { color: var(--neon-cyan); font-weight: bold; margin-top: -8px; font-size: 12px; opacity: 0.8; }

        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .main-logo { width: 230px; height: 230px; border-radius: 50%; filter: drop-shadow(0 0 40px rgba(188,19,254,0.4)); transition: transform 0.05s; }
        .main-logo:active { transform: scale(0.92); }

        .overlay-btns { position: absolute; right: 5%; display: flex; flex-direction: column; gap: 10px; }
        .btn-pill { background: rgba(15,15,15,0.9); border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 15px; font-size: 10px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); min-width: 90px; text-align: center; }
        .btn-pill.connected { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .btn-purple { border-color: var(--neon-purple); box-shadow: inset 0 0 5px var(--neon-purple); }

        /* Footer */
        .footer { width: 92%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 30px; }
        .f-item { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px 0; text-align: center; font-size: 11px; font-weight: bold; color: #aaa; }

        /* Modals & Leaderboard */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 20px; flex-direction: column; }
        .modal-content { overflow-y: auto; flex-grow: 1; margin-bottom: 20px; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .leader-item { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border: 1px solid transparent; }
        .rank { width: 30px; font-weight: 900; font-size: 16px; font-style: italic; }
        .u-info { flex-grow: 1; margin-left: 10px; }
        .u-id { font-size: 13px; color: #eee; font-family: monospace; }
        .u-pnl { font-size: 10px; color: var(--neon-cyan); }
        .u-bal { font-weight: 900; color: #fff; }

        /* Красивые места */
        .rank-1 { border-color: var(--gold); background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent); }
        .rank-1 .rank { color: var(--gold); }
        .rank-2 { border-color: var(--silver); }
        .rank-2 .rank { color: var(--silver); }
        .rank-3 { border-color: var(--bronze); }
        .rank-3 .rank { color: var(--bronze); }
        .me-row { border-color: var(--neon-purple) !important; box-shadow: 0 0 10px rgba(188,19,254,0.2); }

        .plus { position: absolute; font-size: 32px; font-weight: 900; color: var(--neon-cyan); animation: float 0.6s forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 10px var(--neon-cyan); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-circle"></div>
        <div style="margin-top:20px; font-weight:bold; color:var(--neon-cyan)" id="l-p">INITIALIZING...</div>
    </div>

    <div class="app" id="ui">
        <div class="header">
            <div class="lvl-box" id="l-v">1</div>
            <div><div style="font-size: 8px; color: #666; letter-spacing: 1px;">NEURAL CORE</div><div style="font-size: 12px; font-weight: bold;">v1.3.0 ALPHA</div></div>
        </div>
        
        <div class="bal" id="b-v">0</div>
        <div class="pnl" id="p-v">PNL: +0/H</div>

        <div class="stage">
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
            <div class="overlay-btns">
                <div class="btn-pill" id="w-btn" onclick="handleWallet()">WALLET</div>
                <div class="btn-pill" onclick="invite()">FRIENDS</div>
                <div class="btn-pill btn-purple" onclick="getBonus()">BONUS</div>
            </div>
        </div>

        <div style="width: 85%; margin-bottom: 20px;">
            <div style="display:flex; justify-content:space-between; font-size:9px; margin-bottom:5px; color:#555;"><span>⚡ ENERGY CORE</span><span id="e-n">1000/1000</span></div>
            <div style="width:100%; height:4px; background:#111; border-radius:10px; overflow:hidden;">
                <div id="e-f" style="height:100%; background:var(--neon-cyan); width:100%; box-shadow:0 0 8px var(--neon-cyan); transition:0.3s;"></div>
            </div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="openM('boost-ui')">🚀 BOOST</div>
            <div class="f-item" onclick="openM('mine-ui')">⛏️ MINE</div>
            <div class="f-item" onclick="openStats()">🏆 TOP</div>
        </div>
    </div>

    <div id="boost-ui" class="modal">
        <h2 style="color:var(--neon-cyan)">UPGRADES</h2>
        <div class="card">
            <div><b>Neural Tap</b><br><small>+1 per click</small></div>
            <button class="btn-pill" id="mt-btn" onclick="buyB('tap')">0</button>
        </div>
        <div class="card">
            <div><b>Core Recharge</b><br><small>Instant 1000 energy</small></div>
            <button class="btn-pill" onclick="buyB('energy')">500</button>
        </div>
        <button class="f-item" style="width:100%; margin-top:auto" onclick="closeM('boost-ui')">BACK</button>
    </div>

    <div id="mine-ui" class="modal">
        <h2 style="color:var(--neon-purple)">MATH SHOP</h2>
        <div class="card"><div><b>Addition (+)</b><br><small>+350 PNL/h</small></div><button class="btn-pill" onclick="buyC(10000, 350)">10K</button></div>
        <div class="card"><div><b>Multiplication (×)</b><br><small>+2500 PNL/h</small></div><button class="btn-pill" onclick="buyC(80000, 2500)">80K</button></div>
        <button class="f-item" style="width:100%; margin-top:auto" onclick="closeM('mine-ui')">BACK</button>
    </div>

    <div id="stats-ui" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="margin:0">HALL OF FAME</h2>
            <div id="st-u" style="font-size:10px; color:var(--neon-cyan)">0 NODES</div>
        </div>
        
        <div class="modal-content" id="leader-list">
            </div>

        <button class="f-item" id="wd-btn" style="width:100%; margin-top:10px; display:none; border-color:var(--neon-cyan); color:var(--neon-cyan)" onclick="reqW()">WITHDRAW 1M</button>
        <button class="f-item" style="width:100%; margin-top:10px" onclick="closeM('stats-ui')">CLOSE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });

        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 'GUEST' };

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        async function openStats() {
            openM('stats-ui');
            const [sRes, lRes] = await Promise.all([fetch('/api/stats'), fetch('/api/leaderboard')]);
            const stats = await sRes.json();
            const leaders = await lRes.json();
            
            document.getElementById('st-u').innerText = `${stats.users} ACTIVE NODES`;
            const list = document.getElementById('leader-list');
            list.innerHTML = '';

            leaders.forEach((p, i) => {
                const rank = i + 1;
                const isMe = String(p.user_id) === String(s.uid);
                const row = document.createElement('div');
                row.className = `leader-item rank-${rank <= 3 ? rank : 'common'} ${isMe ? 'me-row' : ''}`;
                row.innerHTML = `
                    <div class="rank">${rank}</div>
                    <div class="u-info">
                        <div class="u-id">ID:${p.user_id}${isMe ? ' (YOU)' : ''}</div>
                        <div class="u-pnl">+${Math.floor(p.pnl)} PNL/H</div>
                    </div>
                    <div class="u-bal">${Math.floor(p.balance).toLocaleString()}</div>
                `;
                list.appendChild(row);
            });

            if (tonConnectUI.connected && s.bal >= 1000000) document.getElementById('wd-btn').style.display = 'block';
        }

        async function buyB(type) {
            if(type === 'tap') {
                const cost = s.lvl * 5000;
                if(s.bal >= cost) { s.bal -= cost; s.lvl++; upd(); }
                else tg.showAlert("Low Balance!");
            } else {
                if(s.bal >= 500) { s.bal -= 500; s.eng = 1000; upd(); closeM('boost-ui'); }
            }
        }

        async function buyC(cost, inc) {
            if(s.bal >= cost) { s.bal -= cost; s.pnl += inc; upd(); }
            else tg.showAlert("Need more coins!");
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('p-v').innerText = `PNL: +${Math.floor(s.pnl)}/H`;
            document.getElementById('e-n').innerText = `${s.eng}/1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('l-v').innerText = s.lvl;
            document.getElementById('mt-btn').innerText = (s.lvl * 5000).toLocaleString();
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;
            s.bal += s.lvl; s.eng -= s.lvl;
            const t = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus'; p.innerText = `+${s.lvl}`;
            p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            upd();
        });

        async function load() {
            try {
                const r = await fetch(`/api/user/${s.uid}`);
                const d = await r.json();
                Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
                upd();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ui').classList.add('ready');
            } catch(e) {}
        }

        async function handleWallet() {
            if (tonConnectUI.connected) await tonConnectUI.disconnect();
            else await tonConnectUI.openModal();
        }

        tonConnectUI.onStatusChange(w => {
            const b = document.getElementById('w-btn');
            if (w) { b.innerText = w.account.address.slice(0,4)+'...'; b.classList.add('connected'); }
            else { b.innerText = 'WALLET'; b.classList.remove('connected'); }
        });

        function invite() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/n_pulse_bot?start=${s.uid}&text=Join my node!`); }
        async function getBonus() {
            const r = await fetch('/api/bonus', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid}) });
            const d = await r.json();
            if(d.success) { s.bal += 5000; upd(); tg.showAlert("Received 5,000!"); } else tg.showAlert(d.msg);
        }

        setInterval(() => {
            if(s.uid !== 'GUEST') fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl}) });
        }, 3000);

        // Init Sequence
        setTimeout(() => load(), 1200);
        setInterval(() => { if(s.eng < 1000) { s.eng++; upd(); } }, 1000);
    </script>
</body>
</html>
