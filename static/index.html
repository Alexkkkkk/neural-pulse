<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96;
            --bg: #050a1a; 
        }
        
        body { 
            margin: 0; 
            background: var(--bg); /* Чистый темный фон вместо картинки */
            background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%);
            height: 100vh; 
            font-family: 'Orbitron', sans-serif; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }

        /* Главный контейнер без внешних картинок-рамок */
        .game-container { 
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            box-sizing: border-box;
            /* Добавляем внутреннее свечение вместо рамки unnamed1.png */
            border: 1px solid rgba(0, 212, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            transition: opacity 0.5s;
        }

        .header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 10px;
        }
        
        /* Заменили логотип на CSS фигуру */
        .logo { 
            width: 45px; height: 45px; 
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px;
        }

        #lvl { font-size: 14px; text-shadow: 0 0 10px var(--neon); color: var(--neon); }

        .balance-container {
            text-align: center;
            margin-top: 20px;
        }
        .balance-label { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
        #score { font-size: 48px; color: #fff; text-shadow: 0 0 20px var(--neon); font-weight: bold; margin-top: 5px; }

        .play-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Заменили картинку кнопки unnamed3.png на неоновую сферу */
        #btn { 
            width: 70vw; 
            max-width: 280px;
            height: 70vw;
            max-height: 280px;
            background: radial-gradient(circle, var(--neon) 0%, #005f73 100%);
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.3);
            cursor: pointer; 
            transition: transform 0.05s, box-shadow 0.2s; 
            outline: none; 
            z-index: 2;
        }
        #btn:active { transform: scale(0.92); box-shadow: 0 0 80px var(--neon); }

        .side-menu {
            position: absolute;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 3;
        }
        .side-item {
            width: 100px;
            padding: 10px 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            font-size: 8px;
            text-transform: uppercase;
            text-align: center;
        }

        .energy-container {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .energy-bar {
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 10px auto;
            overflow: hidden;
        }
        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-secondary), var(--neon));
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .nav-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
        }

        .plus-animation { 
            position: absolute; 
            color: var(--neon); 
            font-size: 28px; 
            font-weight: bold; 
            animation: float 0.6s ease-out forwards; 
            pointer-events: none; 
            text-shadow: 0 0 10px var(--neon); 
            z-index: 100; 
        }
