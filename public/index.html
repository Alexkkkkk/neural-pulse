<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Лоадер */
        #loader { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pct { font-size: 40px; font-weight: 900; color: var(--neon); font-family: monospace; }
        
        /* Интерфейс */
        .app { width: 100%; display: none; flex-direction: column; align-items: center; padding-top: 20px; }
        .balance { font-size: 48px; font-weight: 900; margin: 20px 0; }
        .logo-btn { width: 250px; height: 250px; border-radius: 50%; border: 5px solid #111; transition: transform 0.1s; }
        .logo-btn:active { transform: scale(0.95); }
        .stats { width: 80%; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 20px; }
        .bar { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #fill { width: 100%; height: 100%; background: var(--neon); transition: 0.3s; }
        .tap-anim { position: absolute; color: white; font-size: 30px; font-weight: 900; pointer-events: none; animation: up 0.6s forwards; }
        @keyframes up { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="pct" id="loading-text">0%</div>
    <div style="color: #444; font-size: 10px; margin-top: 10px;">CONNECTING TO NEURAL NETWORK...</div>
</div>

<div class="app" id="main-app">
    <div style="font-size: 12px; color: var(--neon);">NEURAL TOKENS</div>
    <div class="balance" id="bal">0</div>
    
    <img src="logo.png" class="logo-btn" id="coin" onerror="this.src='https://via.placeholder.com/250/00f2ff/000?text=AI'">
    
    <div class="stats">
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span>ENERGY</span>
            <span id="nrg-txt">1000/1000</span>
        </div>
        <div class="bar"><div id="fill"></div></div>
    </div>
    
    <button id="w-btn" style="margin-top: 20px; background: none; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 10px;">WALLET</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: window.location.origin + '/tonconnect-manifest.json'
    });

    let state = {
        bal: 0, nrg: 1000, lvl: 1, pnl: 0,
        uid: new URLSearchParams(window.location.search).get('u') || tg.initDataUnsafe?.user?.id,
        wallet: null, ready: false
    };

    // Анимация лоадера
    let loadProgress = 0;
    const loadInt = setInterval(() => {
        if (loadProgress < 90) loadProgress += Math.random() * 5;
        if (state.ready) loadProgress = 100;
        
        document.getElementById('loading-text').innerText = Math.floor(loadProgress) + '%';
        
        if (loadProgress >= 100) {
            clearInterval(loadInt);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }
    }, 100);

    async function init() {
        if (state.uid) {
            try {
                const r = await fetch('/api/user/' + state.uid);
                const d = await r.json();
                state.bal = Number(d.balance) || 0;
                state.nrg = Number(d.energy) || 1000;
                state.lvl = Number(d.click_lvl) || 1;
                state.pnl = Number(d.pnl) || 0;
            } catch (e) { console.error("API error, using defaults"); }
        }
        state.ready = true;
        render();
    }

    function render() {
        document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString();
        document.getElementById('nrg-txt').innerText = Math.floor(state.nrg) + '/1000';
        document.getElementById('fill').style.width = (state.nrg / 10) + '%';
    }

    document.getElementById('coin').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.nrg < state.lvl) return;
        
        state.bal += state.lvl;
        state.nrg -= state.lvl;
        
        const t = e.touches[0];
        const n = document.createElement('div');
        n.className = 'tap-anim';
        n.style.left = t.clientX + 'px';
        n.style.top = t.clientY + 'px';
        n.innerText = '+' + state.lvl;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 600);
        
        render();
        tg.HapticFeedback.impactOccurred('light');
    });

    document.getElementById('w-btn').onclick = async () => {
        if (state.wallet) {
            tg.showAlert("Connected: " + state.wallet.slice(0,8) + "...");
        } else {
            await tonConnectUI.openModal();
        }
    };

    tonConnectUI.onStatusChange(w => {
        if (w) {
            state.wallet = w.account.address;
            document.getElementById('w-btn').style.borderColor = '#00f2ff';
        }
    });

    setInterval(async () => {
        if (state.ready && state.uid) {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    userId: state.uid, balance: state.bal, energy: state.nrg,
                    click_lvl: state.lvl, pnl: state.pnl, wallet: state.wallet,
                    username: tg.initDataUnsafe?.user?.username || 'Player'
                })
            });
        }
    }, 5000);

    setInterval(() => {
        if (state.nrg < 1000) {
            state.nrg = Math.min(1000, state.nrg + 1.5);
            render();
        }
    }, 1000);

    window.onload = init;
</script>
</body>
</html>
