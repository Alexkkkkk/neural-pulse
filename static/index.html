<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #0a1128 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #particles-js {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .content-layer {
            position: relative; z-index: 2; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding-top: env(safe-area-inset-top);
        }

        .click-area {
            position: relative; margin-top: 30px;
            width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        
        .main-logo {
            width: 250px; height: 250px; border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5; object-fit: cover;
            border: 2px solid rgba(0, 242, 255, 0.1);
        }

        .score-container { margin-top: 25px; text-align: center; }
        #balance { 
            font-size: 56px; font-weight: 900; 
            text-shadow: 0 0 25px var(--neon-cyan); 
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bottom-nav { 
            width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; margin-bottom: 30px; 
        }

        .nav-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px 5px; border-radius: 16px; backdrop-filter: blur(15px);
            text-align: center; font-size: 10px; font-weight: 800; color: #fff;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 50px;
        }
        .nav-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .nav-btn span.cost { font-size: 8px; color: var(--neon-cyan); margin-top: 4px; }

        .tap-text {
            position: absolute; color: #fff; font-size: 34px; font-weight: 900;
            pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 100;
            text-shadow: 0 0 15px var(--neon-cyan);
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.2); } }

        .energy-section { width: 85%; margin-top: auto; margin-bottom: 20px; }
        .energy-bar-wrap { 
            width: 100%; height: 14px; background: rgba(255,255,255,0.05); 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; 
        }
        #energy-fill { 
            height: 100%; background: linear-gradient(90deg, #00f2ff, #bc13fe); 
            width: 100%; transition: width 0.2s; 
        }
    </style>
</head>
<body>

    <canvas id="particles-js"></canvas>

    <div class="content-layer">
        <div class="header" style="width: 85%; margin-top: 15px; display: flex; align-items: center; gap: 10px; background: var(--glass); padding: 12px; border-radius: 20px; backdrop-filter: blur(10px);">
            <div id="lvl-badge" style="width: 40px; height: 40px; background: var(--neon-purple); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 15px var(--neon-purple);">1</div>
            <div style="flex-grow: 1;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; color: #aaa; margin-bottom: 4px;">
                    <span>NEURAL RANK</span>
                    <span id="league-name">SILICON NOVICE</span>
                </div>
                <div class="energy-bar-wrap" style="height: 6px;">
                    <div id="exp-bar" style="width: 0%; background: #fff; height: 100%; box-shadow: 0 0 10px #fff; transition: width 0.3s;"></div>
                </div>
            </div>
        </div>

        <div class="score-container">
            <div id="balance">0</div>
            <div id="pnl-info" style="color: var(--neon-cyan); font-size: 12px; font-weight: bold; letter-spacing: 1px;">PROFIT: +0/HR</div>
        </div>

        <div class="click-area" id="tap-zone">
            <img src="/static/logo.png" class="main-logo" id="main-logo" onerror="this.src='https://via.placeholder.com/250/00f2ff/000000?text=NP'" alt="Pulse">
        </div>

        <div class="energy-section">
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #888;">
                <span>ENERGY CORE</span>
                <span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar-wrap">
                <div id="energy-fill"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="buyUpgrade()">
                🚀 BOOST
                <span id="boost-cost" class="cost">500</span>
            </div>
            <div class="nav-btn" onclick="buyMine()">
                ⛏️ MINE
                <span id="mine-cost" class="cost">1000</span>
            </div>
            <div class="nav-btn" onclick="showInvite()">
                🎁 FRIENDS
                <span class="cost">GET XP</span>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.setHeaderColor) tg.setHeaderColor('#050505');

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('u') || (tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "guest");

        // Глобальное состояние
        let state = { score: 0, energy: 1000, max_energy: 1000, tap_power: 1, pnl: 0, level: 1 };
        let lastSavedScore = 0;

        const RANKS = [
            { name: "SILICON NOVICE", min: 0 },
            { name: "DATA MINER", min: 50000 },
            { name: "CODE ARCHITECT", min: 250000 },
            { name: "NEURAL OVERLORD", min: 1000000 },
            { name: "AI GOD", min: 10000000 }
        ];

        // --- ЧАСТИЦЫ ---
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 20}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, size: Math.random() * 1.5
            }));
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.1)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        // --- ЛОГИКА ДАННЫХ ---
        async function loadData() {
            try {
                const response = await fetch(`/api/balance/${uid}`);
                const res = await response.json();
                if(res.status === 'ok') {
                    state = { ...state, ...res.data };
                    lastSavedScore = state.score;
                    updateUI();
                }
            } catch(e) { 
                console.error('Load error', e);
                setTimeout(loadData, 3000); 
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
            document.getElementById('pnl-info').innerText = `PROFIT: +${Math.floor(state.pnl).toLocaleString()}/HR`;
            
            // Ранги
            let currentRank = RANKS[0];
            let nextRank = RANKS[1];
            for(let i=0; i<RANKS.length; i++) {
                if(state.score >= RANKS[i].min) {
                    currentRank = RANKS[i];
                    nextRank = RANKS[i+1] || RANKS[i];
                    state.level = i + 1;
                }
            }
            document.getElementById('league-name').innerText = currentRank.name;
            document.getElementById('lvl-badge').innerText = state.level;
            
            let progress = nextRank.min === currentRank.min ? 100 : ((state.score - currentRank.min) / (nextRank.min - currentRank.min)) * 100;
            document.getElementById('exp-bar').style.width = `${Math.min(100, progress)}%`;

            // Исправленные формулы цен (теперь совпадают с сервером)
            document.getElementById('boost-cost').innerText = Math.floor(500 * Math.pow(1.5, state.tap_power - 1)).toLocaleString();
            document.getElementById('mine-cost').innerText = Math.floor(1000 * Math.pow(1.6, Math.floor(state.pnl/150))).toLocaleString();
        }

        // КЛИК
        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.energy < state.tap_power) { 
                tg.HapticFeedback.notificationOccurred('error'); 
                return; 
            }

            for(let i=0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                state.score += state.tap_power;
                state.energy -= state.tap_power;
                
                const num = document.createElement('div');
                num.className = 'tap-text';
                num.innerText = `+${state.tap_power}`;
                num.style.left = `${touch.pageX - 20}px`; num.style.top = `${touch.pageY - 50}px`;
                document.body.appendChild(num);
                setTimeout(() => num.remove(), 700);
            }
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
            
            const logo = document.getElementById('main-logo');
            logo.style.transform = 'scale(0.95)';
            setTimeout(() => logo.style.transform = 'scale(1)', 50);
        });

        // АПГРЕЙДЫ
        async function buyUpgrade() {
            tg.HapticFeedback.impactOccurred('medium');
            try {
                const res = await fetch('/api/upgrade/click', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ user_id: uid }) 
                });
                const data = await res.json();
                if(data.status==='ok') { 
                    state.score=data.newBalance; 
                    state.tap_power=data.newLvl; 
                    updateUI();
                } else { tg.showAlert(data.message); }
            } catch(e) { console.error(e); }
        }

        async function buyMine() {
            tg.HapticFeedback.impactOccurred('heavy');
            try {
                const res = await fetch('/api/upgrade/mine', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ user_id: uid }) 
                });
                const data = await res.json();
                if(data.status==='ok') { 
                    state.score=data.newBalance; 
                    state.pnl=data.newPnl; 
                    updateUI();
                } else { tg.showAlert(data.message); }
            } catch(e) { console.error(e); }
        }

        function showInvite() {
            const link = `https://t.me/neural_pulse_bot?start=${uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Присоединяйся к Neural Pulse и начни майнить!`);
        }

        // Посекундный доход и регенерация
        setInterval(() => {
            if (state.pnl > 0) state.score += (state.pnl / 3600);
            state.energy = Math.min(state.max_energy, state.energy + 1.5);
            updateUI();
        }, 1000);

        // Автосохранение раз в 10 секунд
        setInterval(() => {
            if (uid === "guest" || Math.abs(state.score - lastSavedScore) < 1) return;
            lastSavedScore = state.score;
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    user_id: uid, score: state.score, tap_power: state.tap_power,
                    pnl: state.pnl, energy: state.energy, level: state.level
                })
            }).catch(e => console.error('Sync error', e));
        }, 10000);

        window.addEventListener('resize', initParticles);
        initParticles(); drawParticles(); loadData();
    </script>
</body>
</html>
