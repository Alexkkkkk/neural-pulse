<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.3.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --n-cyan: #00f2ff; --n-purp: #bc13fe; --bg: #000; --gold: #ffd700; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Квантовый прогресс-бар в хедере */
        .header { width: 92%; margin-top: 15px; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); border-radius: 24px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
        .syn-box { margin-left: auto; text-align: right; }
        .syn-val { color: var(--n-cyan); font-weight: 900; font-size: 14px; }

        .bal-wrap { text-align: center; margin-top: 25px; }
        .bal { font-size: 60px; font-weight: 900; letter-spacing: -3px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .main-logo { width: 260px; height: 260px; border-radius: 50%; box-shadow: 0 0 80px rgba(0,242,255,0.15); transition: transform 0.05s; z-index: 5; }
        
        /* Джекпот эффект */
        .jackpot-anim { position: absolute; font-size: 40px; font-weight: 900; color: var(--gold); animation: jackpot 1s ease-out forwards; z-index: 20; text-shadow: 0 0 20px var(--gold); }
        @keyframes jackpot { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3) translateY(-100px); opacity: 0; } }

        .footer { width: 94%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 35px; }
        .f-item { background: rgba(20,20,20,0.8); border: 1px solid #333; border-radius: 20px; padding: 18px 0; text-align: center; font-size: 11px; font-weight: bold; position: relative; overflow: hidden; }
        .f-item::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shine 3s infinite; }
        @keyframes shine { 100% { left: 200%; } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2000; display: none; padding: 25px; flex-direction: column; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card:active { transform: scale(0.98); }
        .btn-buy { background: var(--n-cyan); color: #000; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 900; }
    </style>
</head>
<body>
    <div id="ui" class="app" style="opacity: 1; visibility: visible;">
        <div class="header">
            <div style="width:50px; height:50px; background:var(--n-purp); border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px" id="l-v">1</div>
            <div>
                <div style="font-size:10px; opacity:0.5; letter-spacing:1px">QUANTUM SYNERGY</div>
                <div style="font-size:16px; font-weight:bold" id="r-t">Initializing...</div>
            </div>
            <div class="syn-box">
                <div class="syn-val" id="s-f">x1.0</div>
                <div style="font-size:8px; opacity:0.5">BOOST</div>
            </div>
        </div>

        <div class="bal-wrap">
            <div id="p-v" style="color:var(--n-cyan); font-weight:bold; font-size:14px; margin-bottom:5px">+0 / H</div>
            <div class="bal" id="b-v">0</div>
        </div>

        <div class="stage">
            <img src="logo.png" class="main-logo" id="t-a" onerror="this.src='images/logo.png'">
        </div>

        <div style="width: 88%; margin-bottom: 30px;">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px; font-weight:bold"><span style="opacity:0.6">STAMINA</span><span id="e-n">1000 / 1000</span></div>
            <div style="width:100%; height:8px; background:#111; border-radius:10px; overflow:hidden; border:1px solid #222">
                <div id="e-f" style="height:100%; background:linear-gradient(90deg, var(--n-cyan), var(--n-purp)); width:100%; transition:0.3s"></div>
            </div>
        </div>

        <div class="footer">
            <div class="f-item" onclick="openM('boost-ui')">BOOST</div>
            <div class="f-item" onclick="openM('mine-ui')">MATH</div>
            <div class="f-item" onclick="openM('stats-ui')">TOP</div>
        </div>
    </div>

    <div id="mine-ui" class="modal">
        <h2 style="font-size:32px; margin-bottom:5px">MATH SHOP</h2>
        <p style="opacity:0.5; margin-bottom:25px; font-size:12px">Higher synergy = faster growth</p>
        <div id="shop-list" style="overflow-y:auto; flex-grow:1"></div>
        <button class="f-item" style="width:100%; margin-top:20px; color:white" onclick="closeM('mine-ui')">RETURN TO CORE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { bal: 0, eng: 1000, lvl: 1, pnl: 0, uid: tg.initDataUnsafe?.user?.id || 'GUEST', cardsOwned: 0 };
        
        const cards = [
            { id: 'c1', name: 'Linear Algebra', cost: 1200, pnl: 60 },
            { id: 'c2', name: 'Calculus Force', cost: 9500, pnl: 550 },
            { id: 'c3', name: 'Probability Cloud', cost: 55000, pnl: 3200 },
            { id: 'c4', name: 'Fractal Engine', cost: 300000, pnl: 21000 }
        ];

        function openM(id) { document.getElementById(id).style.display = 'flex'; if(id==='mine-ui') renderShop(); }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            cards.forEach((c, idx) => {
                // Математика: Цена растет от количества купленных карточек ВООБЩЕ
                const currentCost = Math.floor(c.cost * Math.pow(1.25, (s.pnl / (c.pnl * 5))));
                list.innerHTML += `
                    <div class="card">
                        <div>
                            <div style="font-size:18px; font-weight:bold">${c.name}</div>
                            <div style="color:var(--n-cyan); font-size:12px">+${c.pnl} PNL/H</div>
                        </div>
                        <button class="btn-buy" onclick="buyCard(${idx}, ${currentCost})">${(currentCost/1000).toFixed(1)}k</button>
                    </div>`;
            });
        }

        function buyCard(idx, cost) {
            if(s.bal >= cost) {
                s.bal -= cost;
                s.pnl += cards[idx].pnl;
                s.cardsOwned++;
                upd();
                renderShop();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else tg.showAlert("Insufficient balance!");
        }

        document.getElementById('t-a').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(s.eng < s.lvl) return;

            // Квантовый Шанс (0.1% на джекпот)
            let isJackpot = Math.random() < 0.001;
            let synergy = 1 + (s.cardsOwned * 0.05); // +5% за каждую карточку
            let gain = Math.floor(s.lvl * synergy);

            if(isJackpot) {
                gain += Math.floor(s.pnl); // Даем доход за целый час!
                showJackpot(e.touches[0].clientX, e.touches[0].clientY);
            }

            s.bal += gain;
            s.eng -= s.lvl;

            // Визуал клика
            const t = e.touches[0];
            const f = document.createElement('div');
            f.style.position = 'absolute';
            f.style.left = t.clientX + 'px'; f.style.top = t.clientY + 'px';
            f.style.fontWeight = '900'; f.style.color = isJackpot ? 'var(--gold)' : 'var(--n-cyan)';
            f.style.pointerEvents = 'none'; f.innerText = `+${gain}`;
            f.style.animation = 'floatUp 0.6s forwards';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 600);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(isJackpot ? 'heavy' : 'light');
            upd();
        });

        function showJackpot(x, y) {
            const j = document.createElement('div');
            j.className = 'jackpot-anim';
            j.style.left = x + 'px'; j.style.top = y + 'px';
            j.innerText = 'JACKPOT!';
            document.body.appendChild(j);
            setTimeout(() => j.remove(), 1000);
        }

        function upd() {
            let synergy = 1 + (s.cardsOwned * 0.05);
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('p-v').innerText = `+${Math.floor(s.pnl * synergy).toLocaleString()} / H`;
            document.getElementById('e-n').innerText = `${Math.floor(s.eng)} / 1000`;
            document.getElementById('e-f').style.width = (s.eng/10)+'%';
            document.getElementById('s-f').innerText = `x${synergy.toFixed(2)}`;
            
            const rNames = ["Novice", "Advanced", "Quantum", "Elite", "Neural God"];
            const rIdx = Math.min(4, Math.floor(s.bal / 1000000));
            document.getElementById('r-t').innerText = rNames[rIdx] + " Node";
            document.getElementById('l-v').innerText = rIdx + 1;
        }

        async function init() {
            const r = await fetch(`/api/user/${s.uid}`);
            const d = await r.json();
            Object.assign(s, { bal: Number(d.balance), eng: d.energy, lvl: d.click_lvl, pnl: Number(d.pnl) });
            // Считаем карточки примерно (для синергии)
            s.cardsOwned = Math.floor(s.pnl / 1000); 
            upd();
        }

        setInterval(() => {
            if(s.uid !== 'GUEST') fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: s.pnl}) });
        }, 3000);

        setInterval(() => { if(s.eng < 1000) { s.eng += (s.bal > 1000000 ? 5 : 2); upd(); } }, 1000);
        init();
    </script>
</body>
</html>
