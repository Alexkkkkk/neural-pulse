<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0b; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .header { padding: 20px; }
        #balance { font-size: 42px; font-weight: bold; color: #00f2ff; }
        .jackpot { color: #ff9d00; font-size: 14px; }
        
        .main-btn { width: 200px; height: 200px; background: #111; border: 5px solid #222; border-radius: 50%; margin: 50px auto; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.1s; cursor: pointer; }
        .main-btn:active { transform: scale(0.95); }

        .menu { display: flex; justify-content: space-around; position: fixed; bottom: 20px; width: 100%; }
        .menu button { background: #161618; border: 1px solid #333; color: white; padding: 15px; border-radius: 15px; width: 30%; font-size: 12px; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="header">
        <div class="jackpot">JACKPOT: <span id="jack-val">500,000</span> NP</div>
        <div id="balance">0</div>
    </div>

    <div class="main-btn" onclick="tap(event)">⚡</div>

    <div class="menu">
        <button onclick="openModal('friends')">FRIENDS</button>
        <button onclick="openModal('tasks')">TASKS</button>
        <button onclick="claimBonus()">BONUS</button>
    </div>

    <div id="modal-friends" class="modal" onclick="this.classList.remove('active')">
        <h2>FRIENDS</h2>
        <p>Твоя ссылка:</p>
        <small id="ref-link"></small>
        <button onclick="share()" style="margin-top:20px; padding:10px;">ПРИГЛАСИТЬ</button>
    </div>

    <div id="modal-tasks" class="modal" onclick="this.classList.remove('active')">
        <h2>TASKS</h2>
        <p>1. Подпишись на канал (+5000 NP)</p>
        <p>2. Пригласи 3 друзей (+10000 NP)</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let state = { score: 0, user_id: tg.initDataUnsafe.user?.id || 123, click: 1 };

        async function load() {
            const r = await fetch(`/api/balance/${state.user_id}`);
            const res = await r.json();
            state.score = res.data.balance;
            state.click = res.data.click_lvl;
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('ref-link').innerText = `t.me/NeuralPulseBot?start=ref_${state.user_id}`;
        }

        function tap(e) {
            state.score += state.click;
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
            save();
        }

        async function save() {
            const r = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: state.user_id, score: state.score, click_lvl: state.click})
            });
            const res = await r.json();
            document.getElementById('jack-val').innerText = res.jackpot.toLocaleString();
        }

        async function claimBonus() {
            const r = await fetch('/api/daily-bonus', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: state.user_id})
            });
            const res = await r.json();
            if (res.status === "ok") {
                tg.showAlert(`Бонус получен: +${res.reward} NP!`);
                load();
            } else {
                tg.showAlert(res.message);
            }
        }

        function openModal(id) { document.getElementById('modal-' + id).classList.add('active'); }
        function share() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/NeuralPulseBot?start=ref_${state.user_id}`); }

        load();
    </script>
</body>
</html>
