<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.5.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --gray-btn: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        /* Header */
        .header { width: 92%; margin-top: 15px; display: flex; align-items: center; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; border: 1px solid #222; }
        .u-av { width: 45px; height: 45px; border-radius: 10px; border: 1px solid var(--cyan); margin-right: 12px; }
        .lvl-badge { background: var(--cyan); color: #000; padding: 5px 12px; border-radius: 10px; font-weight: 900; font-size: 14px; }

        .bal { font-size: 72px; font-weight: 800; margin: 40px 0; }
        
        /* Center Area */
        .stage { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-ai { width: 210px; filter: drop-shadow(0 0 35px var(--purple)); cursor: pointer; transition: 0.1s; }
        .main-ai:active { transform: scale(0.92); }

        .side-bar { position: absolute; right: 15px; display: flex; flex-direction: column; gap: 10px; }
        .s-btn { background: var(--gray-btn); border: 1px solid #333; color: white; padding: 15px; border-radius: 15px; font-size: 11px; font-weight: bold; width: 85px; text-align: center; }

        /* Energy */
        .eng-cont { width: 92%; margin-bottom: 15px; }
        .eng-header { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .eng-bar { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        #eng-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); width: 100%; transition: 0.3s; }

        /* Footer */
        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .f-item { background: var(--gray-btn); border-radius: 18px; padding: 18px 0; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #222; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 30px 20px; }
        .m-h { color: var(--cyan); font-size: 36px; font-weight: 800; margin-bottom: 25px; }
        .m-close { background: #151515; padding: 20px; border-radius: 20px; text-align: center; margin-top: auto; color: #444; font-weight: bold; }

        /* Wallet Specific */
        .wal-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .wal-btn { background: var(--cyan); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 14px; cursor: pointer; }
        .wal-btn.on { background: #1a1a1a; color: #555; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="u-av" onerror="this.src='images/logo.png'">
        <div style="flex-grow:1">
            <div id="u-nm" style="font-weight:bold;">User</div>
            <div style="color:var(--cyan); font-size:10px">v1.5.8 Active Node</div>
        </div>
        <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
    </div>

    <div class="bal" id="b-v">0</div>

    <div class="stage">
        <img src="logo.png" class="main-ai" onclick="doTap()">
        <div class="side-bar">
            <div class="s-btn" onclick="openM('wal-ui')">WALLET</div>
            <div class="s-btn" onclick="openM('fr-ui')">FRIENDS</div>
            <div class="s-btn" onclick="openM('bn-ui')">BONUS</div>
        </div>
    </div>

    <div class="eng-cont">
        <div class="eng-header"><span>Energy</span><span id="e-count">1000/1000</span></div>
        <div class="eng-bar"><div id="eng-fill"></div></div>
    </div>

    <div class="footer">
        <div class="f-item" onclick="openM('up-ui')">BOOST</div>
        <div class="f-item" onclick="openM('mi-ui')">MINE</div>
        <div class="f-item" onclick="openM('ta-ui')">TASKS</div>
        <div class="f-item" onclick="openM('st-ui')">STATS</div>
    </div>

    <div id="wal-ui" class="modal">
        <div class="m-h">WALLET</div>
        <div class="wal-card">
            <span style="color:#888">Status</span>
            <span id="w-status" style="font-weight:bold">Disconnected</span>
        </div>
        <button id="w-btn" class="wal-btn" onclick="toggleWallet()">CONNECT TON</button>
        <div class="m-close" onclick="closeM('wal-ui')">BACK</div>
    </div>

    <div id="st-ui" class="modal"><div class="m-h">STATS</div><div id="st-list"></div><div class="m-close" onclick="closeM('st-ui')">BACK</div></div>
    <div id="up-ui" class="modal"><div class="m-h">BOOST</div><div class="m-close" onclick="closeM('up-ui')">BACK</div></div>
    <div id="mi-ui" class="modal"><div class="m-h">MINE</div><div class="m-close" onclick="closeM('mi-ui')">BACK</div></div>
    <div id="ta-ui" class="modal"><div class="m-h">TASKS</div><div class="m-close" onclick="closeM('ta-ui')">BACK</div></div>
    <div id="fr-ui" class="modal"><div class="m-h">FRIENDS</div><div class="m-close" onclick="closeM('fr-ui')">BACK</div></div>
    <div id="bn-ui" class="modal"><div class="m-h">BONUS</div><div class="m-close" onclick="closeM('bn-ui')">BACK</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { uid: tg.initDataUnsafe?.user?.id || '0', bal: 0, lvl: 1, eng: 1000, maxE: 1000, wallet: null };

        async function load() {
            const r = await fetch(`/api/user/${s.uid}`);
            const d = await r.json();
            s.bal = Number(d.balance); s.lvl = d.click_lvl; s.eng = d.energy; s.wallet = d.wallet_address;
            document.getElementById('u-nm').innerText = tg.initDataUnsafe?.user?.first_name || d.username;
            updateWalletUI();
            upd();
            setInterval(tick, 1000);
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('u-lv').innerText = s.lvl;
            document.getElementById('e-count').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
            document.getElementById('eng-fill').style.width = (s.eng / s.maxE * 100) + '%';
        }

        function doTap() {
            if(s.eng >= s.lvl) {
                s.bal += s.lvl; s.eng -= s.lvl;
                tg.HapticFeedback.impactOccurred('light');
                upd();
            }
        }

        function tick() {
            if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 3);
            upd();
            save();
        }

        function toggleWallet() {
            if (!s.wallet) {
                s.wallet = "CONNECTED";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                s.wallet = null;
            }
            updateWalletUI();
            save();
        }

        function updateWalletUI() {
            const btn = document.getElementById('w-btn');
            const st = document.getElementById('w-status');
            if (s.wallet) {
                st.innerText = "Connected"; st.style.color = "var(--cyan)";
                btn.innerText = "DISCONNECT"; btn.classList.add('on');
            } else {
                st.innerText = "Disconnected"; st.style.color = "#fff";
                btn.innerText = "CONNECT TON"; btn.classList.remove('on');
            }
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function save() {
            fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: s.uid, balance: s.bal, energy: s.eng, click_lvl: s.lvl, pnl: 0, wallet: s.wallet }) 
            });
        }

        load();
    </script>
</body>
</html>
