<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.8.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --panel: #111; --gray-btn: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .load-circle { width: 220px; height: 220px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--cyan); border-right: 2px solid var(--purple); display: flex; align-items: center; justify-content: center; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .load-logo { width: 110px; animation: unrotate 2s linear infinite; }
        @keyframes unrotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        
        .header { width: 92%; margin-top: 20px; display: flex; align-items: center; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; border: 1px solid #222; }
        .u-av-box { width: 50px; height: 50px; border-radius: 10px; border: 1px solid var(--cyan); overflow: hidden; margin-right: 12px; }
        .lvl-tag { background: var(--cyan); color: #000; padding: 6px 15px; border-radius: 10px; font-weight: 900; margin-left: auto; }
        
        .bal { font-size: 64px; font-weight: 800; margin: 30px 0; letter-spacing: -2px; }
        
        .stage { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-ai { width: 220px; filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.5)); cursor: pointer; transition: 0.1s; }
        
        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .f-item { background: var(--gray-btn); border-radius: 15px; padding: 18px 0; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #222; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 30px 20px; }
        .m-h { color: var(--cyan); font-size: 32px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        .m-close { background: #151515; padding: 20px; border-radius: 20px; text-align: center; margin-top: auto; font-weight: bold; }

        #debug-console { position: fixed; bottom: 0; width: 100%; height: 100px; background: rgba(0,0,0,0.9); font-size: 9px; font-family: monospace; color: #0f0; overflow-y: auto; z-index: 10001; pointer-events: none; padding: 5px; border-top: 1px solid #333; display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="load-circle"><img src="logo.png" class="load-logo"></div>
        <div style="margin-top:20px; font-weight:bold; letter-spacing:2px">CORE LOADING...</div>
        <div id="p-txt" style="font-size:24px; color:var(--cyan); margin-top:10px">0%</div>
    </div>

    <div id="debug-console"></div>

    <div class="header">
        <div class="u-av-box"><img src="images/logo.png" style="width:100%"></div>
        <div>
            <div id="u-nm" style="font-weight:bold;">User</div>
            <div id="v-tag" style="color:var(--cyan); font-size:10px">v1.8.5 Online</div>
        </div>
        <div class="lvl-tag">LVL <span id="u-lv">1</span></div>
    </div>

    <div class="bal" id="b-v">0</div>

    <div class="stage">
        <img src="logo.png" class="main-ai" onclick="doTap()">
    </div>

    <div class="footer">
        <div class="f-item" onclick="openM('wal-ui')">WALLET</div>
        <div class="f-item" onclick="openM('mi-ui')">MINE</div>
        <div class="f-item" onclick="openM('ta-ui')">TASKS</div>
        <div class="f-item" onclick="toggleDebug()">DEBUG</div>
    </div>

    <div id="wal-ui" class="modal">
        <div class="m-h">WALLET</div>
        <div id="ton-button" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
        <div id="w-addr" style="font-size:10px; color:#888; text-align:center; word-break:all">Not Connected</div>
        <div class="m-close" onclick="closeM('wal-ui')">CLOSE</div>
    </div>

    <div id="mi-ui" class="modal"><div class="m-h">MINE</div><div class="m-close" onclick="closeM('mi-ui')">BACK</div></div>
    <div id="ta-ui" class="modal"><div class="m-h">TASKS</div><div class="m-close" onclick="closeM('ta-ui')">BACK</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        const VERSION = "1.8.5";
        let tonConnectUI;
        let s = { uid: tg.initDataUnsafe?.user?.id || '0', bal: 0, lvl: 1, pnl: 0, wal: null };

        function log(msg) {
            const dbg = document.getElementById('debug-console');
            dbg.innerHTML += `[${VERSION}] ${msg}<br>`;
            dbg.scrollTop = dbg.scrollHeight;
        }

        function toggleDebug() {
            const dbg = document.getElementById('debug-console');
            dbg.style.display = (dbg.style.display === 'none') ? 'block' : 'none';
        }

        let p = 0;
        const lIv = setInterval(() => {
            p += 4; document.getElementById('p-txt').innerText = p + '%';
            if(p >= 100) { clearInterval(lIv); document.getElementById('loader').style.display='none'; initApp(); }
        }, 30);

        async function initApp() {
            log("Init v" + VERSION);
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json',
                buttonRootId: 'ton-button'
            });

            tonConnectUI.onStatusChange(wallet => {
                s.wal = wallet ? wallet.account.address : null;
                log(s.wal ? "Wallet Link OK" : "Wallet Unlinked");
                upd(); save();
            });

            await loadData();
        }

        async function loadData() {
            try {
                const r = await fetch(`/api/user/${s.uid}`);
                const d = await r.json();
                s.bal = Number(d.balance); s.lvl = Number(d.click_lvl); s.wal = d.wallet_address;
                log("Data Synced (Server v" + d.server_v + ")");
                upd();
            } catch(e) { log("Sync Error"); }
        }

        function doTap() { s.bal += s.lvl; tg.HapticFeedback.impactOccurred('light'); upd(); save(); }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('u-lv').innerText = s.lvl;
            document.getElementById('w-addr').innerText = s.wal || "Not Connected";
        }

        function save() {
            fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: s.uid, balance: s.bal, click_lvl: s.lvl, wallet: s.wal }) 
            });
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
