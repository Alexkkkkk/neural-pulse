<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div id="load-pct">0%</div>
        <div class="load-bar-wrapper"><div id="load-bar" class="load-bar-f"></div></div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="avatar">
                    <img src="images/logo.png" id="u-avatar" onerror="this.src='images/logo.png'">
                </div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>TAP</small><b id="tap-val" class="accent-val">+1</b></div>
            <div class="stat-card"><small>PROFIT</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" 
                 ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="progress-bar-wrap"><div id="eng-fill" class="progress-bar-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-drag-line"></div>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        // --- LOGIC Прямо здесь, чтобы не было ошибок загрузки ---
        const logic = {
            user: null,
            async init(userIdFromTg, userNameFromTg, photoUrlFromTg) {
                const userId = userIdFromTg || "12345";
                const firstName = userNameFromTg || "Agent";
                const photoUrl = photoUrlFromTg || "";

                try {
                    const res = await fetch(`/api/user/${userId}?username=${encodeURIComponent(firstName)}&photo_url=${encodeURIComponent(photoUrl)}`);
                    if (!res.ok) throw new Error("API Error");
                    this.user = await res.json();
                } catch (e) {
                    console.error("Using Fallback User Data");
                    this.user = { user_id: userId, username: firstName, photo_url: photoUrl, balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, lvl: 1, wallet: null };
                }
                ui.init();
                this.startLoops();
            },
            tap(e) {
                if (e.type === 'touchstart') e.preventDefault();
                if (!this.user || this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                this.checkLvl();
                ui.update();
                this.anim(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            },
            async buyUpgrade(type) {
                let cost = 0;
                if (type === 'tap') cost = 5000;
                if (type === 'energy') cost = 10000;
                if (type === 'profit') cost = 25000;

                if (this.user.balance >= cost) {
                    this.user.balance -= cost;
                    if (type === 'tap') this.user.click_lvl += 1;
                    if (type === 'energy') { this.user.max_energy += 500; this.user.energy += 500; }
                    if (type === 'profit') this.user.profit_hr += 500;
                    ui.update();
                    ui.openM(type === 'profit' ? 'mine' : 'boost');
                    this.save();
                }
            },
            checkLvl() {
                const newLvl = Math.floor(this.user.balance / 100000) + 1;
                if (newLvl > this.user.lvl) {
                    this.user.lvl = newLvl;
                    if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            },
            anim(e) {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                const p = document.createElement('div');
                p.className = 'tap-pop';
                p.innerText = `+${this.user.click_lvl}`;
                p.style.left = `${x}px`; p.style.top = `${y}px`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            },
            async saveWallet(address) {
                if (!this.user) return;
                this.user.wallet = address;
                fetch('/api/wallet', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({userId: this.user.user_id, address: address})
                });
                ui.openM('wallet');
            },
            async disconnectWallet() {
                await tonConnectUI.disconnect();
                this.user.wallet = null;
                ui.openM('wallet');
            },
            async save() {
                if (!this.user) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.user_id, balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy), max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl, profit_hr: this.user.profit_hr, lvl: this.user.lvl
                    })
                });
            },
            startLoops() {
                setInterval(() => {
                    if (!this.user) return;
                    if (this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.5);
                    if (this.user.profit_hr > 0) this.user.balance += (this.user.profit_hr / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 15000);
            }
        };

        // --- UI ОБЪЕКТ ---
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet && logic.user) logic.saveWallet(wallet.account.address);
        });

        const ui = {
            init() { this.update(); this.finishLoading(); },
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                document.getElementById('u-lvl').innerText = `LVL ${logic.user.lvl}`;
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr).toLocaleString();
                if (logic.user.photo_url) document.getElementById('u-avatar').src = logic.user.photo_url;
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const header = document.getElementById('modal-header');
                header.innerText = type.toUpperCase();
                let h = '';
                
                if (type === 'wallet') {
                    const addr = logic.user.wallet;
                    h = `<div style="text-align:center;"><div id="ton-connect-button" style="display:flex; justify-content:center;"></div><p style="color:#00ffff; margin-top:10px; font-size:12px;">${addr ? addr.slice(0,8)+'...'+addr.slice(-8) : "NOT CONNECTED"}</p>${addr ? `<button onclick="logic.disconnectWallet()" class="back-btn" style="color:red; border:1px solid red; background:transparent; margin-top:10px;">DISCONNECT</button>` : ''}</div>`;
                    body.innerHTML = h;
                    setTimeout(() => { tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-button' }; }, 100);
                } else if (type === 'boost') {
                    h = `<div class="up-card" onclick="logic.buyUpgrade('tap')"><div><b>Multi-Tap</b><br><small>Level Up</small></div><div class="price">💰 5,000</div></div>
                         <div class="up-card" onclick="logic.buyUpgrade('energy')"><div><b>Energy Cap</b><br><small>+500 Limit</small></div><div class="price">💰 10,000</div></div>`;
                    body.innerHTML = h;
                } else if (type === 'mine') {
                    h = `<div class="up-card" onclick="logic.buyUpgrade('profit')"><div><b>Neural Core</b><br><small>+500/hr Profit</small></div><div class="price">💰 25,000</div></div>`;
                    body.innerHTML = h;
                } else if (type === 'top') {
                    body.innerHTML = '<p style="text-align:center;">SCANNING NETWORK...</p>';
                    fetch('/api/top').then(r => r.json()).then(data => {
                        let list = '';
                        data.forEach((u, i) => list += `<div class="up-card">#${i+1} ${u.username} <b>${Math.floor(u.balance)}</b></div>`);
                        body.innerHTML = list;
                    });
                } else {
                    body.innerHTML = `<p style="text-align:center; padding:20px;">Encrypted data. Coming soon.</p>`;
                }
                document.getElementById('modal-container').classList.add('active');
            },
            closeM() { document.getElementById('modal-container').classList.remove('active'); },
            finishLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 10;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if (p >= 100) {
                        clearInterval(iv);
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.display = 'none';
                            document.getElementById('app').style.display = 'flex';
                        }, 300);
                    }
                }, 50);
            }
        };

        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.expand();
            const u = tg.initDataUnsafe?.user || {};
            logic.init(u.id, u.username || u.first_name, u.photo_url);
        };
    </script>
</body>
</html>
