<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI | Ultimate Gold</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?5"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96; 
            --gold: #ffd700;
            --crit: #ff4e50;
            --bg: #050a1a; 
            --glass: rgba(10, 25, 47, 0.95);
        }

        body { 
            margin: 0; background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%); 
            height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; 
            user-select: none; touch-action: none;
        }

        .game-container { 
            position: relative; width: 100%; max-width: 500px; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; box-sizing: border-box; 
        }
        
        /* HEADER & LEAGUES */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .league-box { flex-grow: 1; margin: 0 12px; }
        .league-info { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; font-weight: bold; }
        .bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #league-fill { height: 100%; width: 0%; background: var(--neon); transition: width 0.5s; }

        /* JACKPOT */
        .jackpot-card {
            width: 100%; border: 2px solid var(--gold); border-radius: 15px; padding: 10px; 
            background: rgba(255,215,0,0.05); text-align: center; margin-bottom: 10px; transition: 0.3s;
        }
        #jackpot-val { font-size: 26px; font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        #jp-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.4s; }

        .ready-blink { animation: blink-gold 0.8s infinite; border-color: #fff !important; }
        @keyframes blink-gold { 0%, 100% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 25px #fff; } }

        #score { font-size: 52px; font-weight: 900; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }

        /* PLAY AREA */
        .play-area { position: relative; width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #btn { 
            width: 70vw; height: 70vw; max-width: 280px; max-height: 280px;
            background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
            border-radius: 50%; border: 2px solid rgba(0, 212, 255, 0.2); outline: none;
            filter: drop-shadow(0 0 30px var(--neon)); transition: transform 0.05s; z-index: 2;
        }
        #btn:active { transform: scale(0.92); }

        .side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .side-btn { width: 75px; padding: 10px 5px; background: var(--glass); border: 1px solid var(--neon); border-radius: 12px; font-size: 10px; color: white; text-align: center; }

        #rocket-timer { display: none; color: var(--crit); font-weight: 900; margin-bottom: 10px; font-size: 18px; animation: pulse 1s infinite; }

        /* BOTTOM NAV */
        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding-bottom: 15px; }
        .nav-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }

        /* MODALS */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: var(--glass); border-top: 3px solid var(--neon); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
        
        .buy-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--neon); color: #000; font-weight: 900; margin-top: 5px; cursor: pointer; }

        .plus-animation { position: absolute; pointer-events: none; font-weight: 900; animation: float 0.7s ease-out forwards; z-index: 100; color: var(--neon); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="league-box">
                <div class="league-info">
                    <span id="league-name">BRONZE</span>
                    <span id="league-percent">0%</span>
                </div>
                <div class="bar-bg"><div id="league-fill"></div></div>
            </div>
            <div style="font-size: 8px; opacity: 0.5;" id="user-id">ID: 0000</div>
        </div>

        <div class="jackpot-card" id="jp-card">
            <div style="font-size: 9px; color: var(--gold); letter-spacing: 2px;">GLOBAL JACKPOT</div>
            <div id="jackpot-val">0</div>
            <div class="bar-bg" style="border-color: var(--gold);"><div id="jp-fill"></div></div>
            <div id="jp-status" style="font-size: 8px; margin-top: 5px; opacity: 0.7;">COLLECTING...</div>
        </div>

        <div id="score">0</div>

        <div class="play-area">
            <div id="rocket-timer">🚀 <span id="rocket-time">30</span>s</div>
            <div class="side-menu">
                <div class="side-btn" onclick="openModal('friends')">FRIENDS</div>
                <div class="side-btn" onclick="openModal('tasks')">TASKS</div>
                <div class="side-btn" style="border-color: var(--gold);" onclick="openModal('daily')">BONUS</div>
            </div>
            <button id="btn"></button>

            <div style="width: 80%; margin-top: 20px;">
                <div style="display:flex; justify-content: space-between; font-size: 12px; color: var(--neon); margin-bottom: 5px;">
                    <span>⚡ ENERGY</span>
                    <span id="energy-stat">1000/1000</span>
                </div>
                <div class="bar-bg" style="border-color: var(--neon); height: 12px;">
                    <div id="energy-fill" style="background: var(--neon); height: 100%; width: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="openModal('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="openModal('tasks')">⛏️ MINE</div>
            <div class="nav-item" onclick="tg.showAlert('Coming Soon!')">📊 STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>

    <div id="modal-boost" class="modal">...</div>
    <div id="modal-friends" class="modal">...</div>
    <div id="modal-daily" class="modal">...</div>
    <div id="modal-tasks" class="modal">...</div>

    <div class="win-overlay" id="win-screen" style="position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="color: var(--gold); font-size: 40px;">🏆 JACKPOT!</h1>
        <div id="win-amount" style="font-size: 50px; font-weight: 900;">0</div>
        <button onclick="location.reload()" style="padding: 15px 30px; background: var(--gold); border: none; font-weight: 900; margin-top: 20px;">COLLECT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id || 12345678;
        document.getElementById('user-id').textContent = "ID: " + userId;

        const BASE_TARGETS = [600000, 900000, 1400000, 2100000, 3000000, 4100000, 5400000, 6900000, 8600000, 10500000, 12600000, 14900000, 17400000, 20100000, 23000000, 26100000, 29400000, 32900000, 36600000, 40500000];
        const LEAGUES = ["BRONZE", "SILVER", "GOLD", "PLATINUM", "DIAMOND", "ELITE", "MASTER", "GRANDMASTER", "CHALLENGER", "TITAN", "ETERNAL", "MYTHIC", "ASCENDED", "DIVINE", "IMMORTAL", "CELESTIAL", "OVERLORD", "ZENITH", "NEURAL", "ULTIMATE"];

        let score = 0, currentJp = 0, energy = 1000, maxEnergy = 1000;
        let tapPower = 1, autoLvl = 0, rocketActive = false, hasBipped = false;

        // Инициализация при загрузке
        async function loadData() {
            try {
                const res = await fetch(`/api/balance/${userId}`);
                const data = await res.json();
                score = data.balance;
                tapPower = data.click_lvl;
                autoLvl = data.bot_lvl;
                if(data.offline_profit > 0) tg.showAlert(`Auto-Bot earned: ${data.offline_profit} NP!`);
                updateUI();
            } catch(e) { console.error("Load error", e); }
        }

        function getLvlData() {
            let l = 1;
            for (let i = 20; i >= 1; i--) {
                let threshold = i === 1 ? 0 : Math.floor(50000 * Math.pow(1.8, i - 2));
                if (score >= threshold) { l = i; break; }
            }
            const next = l === 20 ? null : Math.floor(50000 * Math.pow(1.8, l - 1));
            const prev = l === 1 ? 0 : Math.floor(50000 * Math.pow(1.8, l - 2));
            return { id: l, name: LEAGUES[l-1], targetJp: BASE_TARGETS[l-1], min: prev, max: next };
        }

        function updateUI() {
            const L = getLvlData();
            document.getElementById('score').textContent = Math.floor(score).toLocaleString();
            document.getElementById('jackpot-val').textContent = Math.floor(currentJp).toLocaleString();
            document.getElementById('league-name').textContent = L.name + " LEAGUE";
            document.getElementById('tap-lvl').textContent = tapPower;
            document.getElementById('auto-lvl').textContent = autoLvl;

            let jpProg = (currentJp / L.targetJp) * 100;
            document.getElementById('jp-fill').style.width = Math.min(100, jpProg) + "%";
            
            if (jpProg >= 100) {
                document.getElementById('jp-card').classList.add('ready-blink');
                document.getElementById('jp-status').textContent = "READY TO DROP! 🔥";
            } else {
                document.getElementById('jp-card').classList.remove('ready-blink');
                document.getElementById('jp-status').textContent = "COLLECTING...";
            }

            if (L.max) {
                let lp = ((score - L.min) / (L.max - L.min)) * 100;
                document.getElementById('league-fill').style.width = lp + "%";
                document.getElementById('league-percent').textContent = Math.floor(lp) + "%";
            } else {
                document.getElementById('league-fill').style.width = "100%";
                document.getElementById('league-percent').textContent = "MAX";
            }

            document.getElementById('energy-stat').textContent = `${Math.floor(energy)}/${maxEnergy}`;
            document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
        }

        async function sendSave(won = false) {
            const L = getLvlData();
            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        user_id: userId, 
                        score: Math.floor(score), 
                        league_id: L.id,
                        click_lvl: tapPower,
                        bot_lvl: autoLvl,
                        won_jackpot: won 
                    })
                });
                const data = await res.json();
                currentJp = data.global_jackpot;
                updateUI();
            } catch(e) { console.error("Save error:", e); }
        }

        // Обработка клика
        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const L = getLvlData();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let pwr = rocketActive ? tapPower * 5 : tapPower;
                if (rocketActive || energy >= tapPower) {
                    if (!rocketActive) energy -= tapPower;
                    score += pwr;
                    
                    // Джекпот шанс
                    if (Math.random() < 0.00001) {
                        document.getElementById('win-amount').textContent = Math.floor(currentJp).toLocaleString();
                        document.getElementById('win-screen').style.display = 'flex';
                        score += currentJp;
                        sendSave(true);
                    }
                    spawnPlus(e.changedTouches[i].pageX, e.changedTouches[i].pageY, pwr);
                    tg.HapticFeedback?.impactOccurred('light');
                }
            }
            updateUI();
        });

        function spawnPlus(x, y, val) {
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.textContent = `+${val}`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        // Интервалы
        setInterval(() => sendSave(), 5000);
        setInterval(() => {
            if (energy < maxEnergy) energy = Math.min(maxEnergy, energy + 2);
            if (autoLvl > 0) score += (autoLvl * 0.5);
            updateUI();
        }, 1000);

        loadData(); // Загрузка данных при старте
    </script>
</body>
</html>
