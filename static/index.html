<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">NEURAL NET LOADING...</div>
        <div id="load-pct" class="percent">0%</div>
        <div class="load-bar-wrapper"><div id="load-bar" style="width: 0%; height: 100%; background: var(--accent);"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-left">
                <div class="avatar">
                    <img src="images/logo.png" id="u-avatar" onerror="this.src='images/logo.png'">
                </div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>TAP</small><b id="tap-val" style="color:var(--accent)">+1</b></div>
            <div class="stat-card"><small>PROFIT</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" 
                 ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.toggleWalletMenu(true)">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:5px;">
                <span>ENERGY</span><span id="eng-val">1000/1000</span>
            </div>
            <div style="height:8px; background:#111; border-radius:10px; border:1px solid #222; overflow:hidden;">
                <div id="eng-fill" style="height:100%; background:var(--accent); width:100%;"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')"><span>🚀</span>BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')"><span>⛏️</span>MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')"><span>📋</span>TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')"><span>🏆</span>TOP</button>
        </div>
    </div>

    <div id="wallet-overlay" class="modal" onclick="if(event.target === this) ui.toggleWalletMenu(false)">
        <div class="modal-content" style="max-width: 400px; border: 1px solid var(--accent);">
            <div style="text-align:center; margin-bottom:20px; font-weight:800;">CONNECT WALLET</div>
            <div id="ton-connect-button" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <p id="wallet-addr" style="color:var(--accent); font-size:10px; text-align:center; word-break:break-all;"></p>
            <button class="back-btn" onclick="ui.toggleWalletMenu(false)">BACK</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content">
            <div id="modal-header" style="font-weight:800; text-align:center; margin-bottom:20px;"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        const logic = {
            user: { balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, lvl: 1, username: "Agent" },
            async init() {
                const tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                const u = tg.initDataUnsafe?.user || {};
                this.user.username = u.username || u.first_name || "Agent";
                
                ui.startLoading();
                this.startLoops();
            },
            tap(e) {
                if (this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                ui.pop(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            },
            startLoops() {
                setInterval(() => {
                    if (this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1);
                    ui.update();
                }, 1000);
            }
        };

        const ui = {
            startLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 5;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if (p >= 100) {
                        clearInterval(iv);
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                    }
                }, 50);
            },
            update() {
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy / logic.user.max_energy * 100) + '%';
                document.getElementById('u-name').innerText = logic.user.username;
            },
            toggleWalletMenu(s) { document.getElementById('wallet-overlay').style.display = s ? 'flex' : 'none'; },
            openM(t) {
                document.getElementById('modal-header').innerText = t.toUpperCase();
                document.getElementById('modal-body').innerHTML = `<div class="up-card"><b>${t} Module</b><span>Active</span></div>`;
                document.getElementById('modal-container').style.display = 'flex';
            },
            closeM() { document.getElementById('modal-container').style.display = 'none'; },
            pop(e) {
                const t = e.touches ? e.touches[0] : e;
                const p = document.createElement('div');
                p.className = 'tap-pop'; p.innerText = `+${logic.user.click_lvl}`;
                p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
                document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            }
        };
        window.onload = () => logic.init();
    </script>
</body>
</html>
