<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-circle-wrapper">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" class="l-track"></circle>
                <circle cx="50" cy="50" r="45" class="l-fill" id="l-svg-bar"></circle>
            </svg>
            <div class="l-center">AI</div>
        </div>
        <div class="access-txt">ACCESS GRANTED</div>
        <div class="load-num" id="load-num">0%</div>
        <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div class="u-profile">
                <div class="u-av"><img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'"></div>
                <div class="u-info">
                    <b id="u-name">Loading...</b><br>
                    <small>Neural Mining v4.0</small>
                </div>
            </div>
            <div class="u-lvl" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats">
            <div class="s-card"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="s-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance-main" id="balance">0</div>

        <div class="click-zone">
            <div class="ai-button" ontouchstart="logic.tap(event)">
                <div class="ai-inner">AI</div>
                <div class="ai-glow"></div>
            </div>
            
            <div class="side-nav">
                <div class="side-item" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-item" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-item" onclick="ui.openM('top')">🏆 TOP 100</div>
            </div>
        </div>

        <div class="energy-area">
            <div class="e-labels"><span>ENERGY</span><span id="e-num">0/0</span></div>
            <div class="e-bar"><div class="e-fill" id="e-fill"></div></div>
        </div>

        <div class="nav-bar">
            <button onclick="ui.openM('boost')">🚀 BOOST</button>
            <button onclick="ui.openM('mine')">⛏️ MINE</button>
            <button onclick="ui.openM('tasks')">📋 TASKS</button>
            <button onclick="ui.openM('bonus')">🎁 BONUS</button>
        </div>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <h2 id="m-title">TOP</h2>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: null // Кнопку вставим сами в модалку
        });

        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                const u = tg.initDataUnsafe?.user || { id: 0, username: "Player" };
                
                try {
                    const r = await fetch(`/api/user/${u.id}?username=${u.username}`);
                    const d = await r.json();
                    this.user = {
                        id: u.id,
                        username: d.username || u.username,
                        balance: Number(d.balance) || 0,
                        energy: Number(d.energy) || 1000,
                        max_energy: Number(d.max_energy) || 1000,
                        click_lvl: Number(d.click_lvl) || 1,
                        profit_hr: Number(d.profit_hr) || 0
                    };
                } catch(e) { 
                    this.user = { id: u.id, balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, username: u.username };
                }
                ui.startLoad();
                this.loop();
            },

            tap(e) {
                if (this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                ui.pop(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            },

            loop() {
                setInterval(() => {
                    this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.5);
                    if(this.user.profit_hr > 0) this.user.balance += (this.user.profit_hr / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 8000);
            },

            async save() {
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.id,
                        balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy),
                        max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl,
                        profit_hr: this.user.profit_hr
                    })
                });
            }
        };

        const ui = {
            update() {
                if(!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('e-num').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('e-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(logic.user.balance/150000)+1}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = logic.user.profit_hr;
            },

            async openM(type) {
                const body = document.getElementById('m-body');
                const title = document.getElementById('m-title');
                title.innerText = type.toUpperCase();
                body.innerHTML = '';

                if(type === 'top') {
                    body.innerHTML = '<div class="loader-m">SYNCING...</div>';
                    const res = await fetch('/api/top');
                    const users = await res.json();
                    // Сортировка ТОП-100 по балансу
                    body.innerHTML = users.sort((a,b)=>b.balance-a.balance).slice(0, 100).map((u, i) => `
                        <div class="row ${u.username === logic.user.username ? 'me' : ''}">
                            <div class="row-l">
                                <span class="rank">${i+1}</span>
                                <div class="av-mini">AI</div>
                                <span class="name">${u.username}</span>
                            </div>
                            <b class="val">${Math.floor(u.balance).toLocaleString()}</b>
                        </div>`).join('');
                } else if(type === 'wallet') {
                    body.innerHTML = `
                        <div class="wallet-ui">
                            <img src="https://ton.org/download/ton_symbol.png" width="80">
                            <h3>TON Terminal</h3>
                            <p>Connect your wallet to receive Airdrop and withdrawals.</p>
                            <div id="ton-connect-btn"></div>
                        </div>`;
                    setTimeout(() => {
                        // Рендерим кнопку TON Connect внутри модалки
                        const btnContainer = document.getElementById('ton-connect-btn');
                        if (btnContainer) {
                             const btn = document.createElement('button');
                             btn.className = 'w-btn';
                             btn.innerText = tonConnectUI.connected ? 'DISCONNECT' : 'CONNECT TON';
                             btn.onclick = () => tonConnectUI.connected ? tonConnectUI.disconnect() : tonConnectUI.openModal();
                             btnContainer.appendChild(btn);
                        }
                    }, 100);
                }
                document.getElementById('modal').classList.add('show');
            },

            closeM() { document.getElementById('modal').classList.remove('show'); },

            pop(e) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                const d = document.createElement('div');
                d.className = 'pop'; d.innerText = `+${logic.user.click_lvl}`;
                d.style.left = x+'px'; d.style.top = y+'px';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 700);
            },

            startLoad() {
                let p = 0;
                const i = setInterval(() => {
                    p += 2;
                    document.getElementById('load-num').innerText = p+'%';
                    document.getElementById('bar-fill').style.width = p+'%';
                    document.getElementById('l-svg-bar').style.strokeDashoffset = 283 - (283 * p / 100);
                    if(p>=100) { clearInterval(i); document.getElementById('loading-screen').style.display='none'; document.getElementById('app').style.display='flex'; this.update(); }
                }, 30);
            }
        };
        window.onload = () => logic.init();
    </script>
</body>
</html>
