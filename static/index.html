<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Точное соответствие дизайну со скриншота */
        :root {
            --accent: #00ffff;
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.8);
            --border: rgba(0, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Карточки в модальных окнах (Boost/Mine/Top) */
        .up-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .up-card b {
            font-size: 15px;
            color: #ffffff;
            display: block;
            margin-bottom: 2px;
        }

        .up-card small {
            color: #777;
            font-size: 12px;
        }

        .price {
            color: var(--accent);
            font-weight: 800;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        /* Стили для аватарок в списке TOP */
        .top-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mini-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            object-fit: cover;
            background: #111;
        }

        .rank-num {
            color: var(--accent);
            font-weight: bold;
            min-width: 20px;
        }

        /* Заголовок модального окна */
        .modal-header {
            text-align: center;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .back-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">SYSTEM BOOTING...</div>
        <div id="load-pct">0%</div>
        <div class="load-bar-wrapper"><div id="load-bar" class="load-bar-f"></div></div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="avatar">
                    <img src="images/logo.png" id="u-avatar" onerror="this.src='images/logo.png'">
                </div>
                <div class="u-info">
                    <b id="u-name">...</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>TAP</small><b id="tap-val" class="accent-val">+1</b></div>
            <div class="stat-card"><small>PROFIT</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" 
                 ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="progress-bar-wrap"><div id="eng-fill" class="progress-bar-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-drag-line"></div>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const logic = {
            user: null,
            async init(id, name, photo) {
                try {
                    const res = await fetch(`/api/user/${id}?username=${encodeURIComponent(name)}&photo_url=${encodeURIComponent(photo)}`);
                    const data = await res.json();
                    this.user = {
                        ...data,
                        photo_url: (data.photo_url && data.photo_url.length > 5) ? data.photo_url : photo,
                        balance: Number(data.balance),
                        energy: Number(data.energy),
                        max_energy: Number(data.max_energy),
                        click_lvl: Number(data.click_lvl),
                        profit_hr: Number(data.profit_hr),
                        lvl: Number(data.lvl)
                    };
                } catch (e) {
                    this.user = { user_id: id, username: name, photo_url: photo, balance: 0, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, lvl: 1 };
                }
                ui.init();
                this.startLoops();
            },
            tap(e) {
                if (e.type === 'touchstart') e.preventDefault();
                if (!this.user || this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                this.anim(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            },
            anim(e) {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                const p = document.createElement('div');
                p.className = 'tap-pop';
                p.innerText = `+${this.user.click_lvl}`;
                p.style.left = `${x}px`; p.style.top = `${y}px`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            },
            async save() {
                if (!this.user) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.user_id, balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy), max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl, profit_hr: this.user.profit_hr, lvl: this.user.lvl
                    })
                });
            },
            startLoops() {
                setInterval(() => {
                    if (!this.user) return;
                    if (this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 2);
                    if (this.user.profit_hr > 0) this.user.balance += (this.user.profit_hr / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 15000);
            }
        };

        const ui = {
            init() { this.update(); this.finishLoading(); },
            update() {
                if (!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString('ru-RU');
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                document.getElementById('u-lvl').innerText = `LVL ${logic.user.lvl}`;
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr).toLocaleString('ru-RU');
                
                const avatar = document.getElementById('u-avatar');
                if (logic.user.photo_url && logic.user.photo_url.length > 5) avatar.src = logic.user.photo_url;
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const header = document.getElementById('modal-header');
                header.innerText = type.toUpperCase();
                
                if (type === 'top') {
                    body.innerHTML = '<p style="text-align:center; color:#555;">SCANNING...</p>';
                    fetch('/api/top').then(r => r.json()).then(data => {
                        let html = '';
                        data.forEach((u, i) => {
                            const img = (u.photo_url && u.photo_url.length > 5) ? u.photo_url : 'images/logo.png';
                            html += `
                            <div class="up-card">
                                <div class="top-item-left">
                                    <span class="rank-num">#${i+1}</span>
                                    <img src="${img}" class="mini-avatar" onerror="this.src='images/logo.png'">
                                    <span>${u.username}</span>
                                </div>
                                <span class="price">${Math.floor(u.balance).toLocaleString()}</span>
                            </div>`;
                        });
                        body.innerHTML = html;
                    });
                } else if (type === 'boost') {
                    body.innerHTML = `
                    <div class="up-card"><div><b>Multi-Tap</b><small>Level ${logic.user.click_lvl}</small></div><span class="price">💰 5,000</span></div>
                    <div class="up-card"><div><b>Energy Cap</b><small>+500 Limit</small></div><span class="price">💰 10,000</span></div>`;
                } else {
                    body.innerHTML = `<p style="text-align:center; padding:20px; color:#444;">MODULE_OFFLINE</p>`;
                }
                document.getElementById('modal-container').classList.add('active');
            },
            closeM() { document.getElementById('modal-container').classList.remove('active'); },
            finishLoading() {
                let p = 0;
                const iv = setInterval(() => {
                    p += 5;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if (p >= 100) {
                        clearInterval(iv);
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.opacity = '0';
                            setTimeout(() => {
                                document.getElementById('loading-screen').style.display = 'none';
                                document.getElementById('app').style.display = 'flex';
                            }, 500);
                        }, 200);
                    }
                }, 30);
            }
        };

        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            const u = tg.initDataUnsafe?.user || {};
            logic.init(u.id, u.username || u.first_name || "Agent", u.photo_url || "");
        };
    </script>
</body>
</html>
