<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --neon-secondary: #00ff96; --bg: #050a1a; --glass: rgba(10, 25, 47, 0.95); }
        body { margin: 0; background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%); height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; user-select: none; display: flex; justify-content: center; }
        .game-container { position: relative; width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; transition: opacity 0.5s; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .logo { width: 50px; height: 50px; background: url('/static/images/unnamed4.png') no-repeat center; background-size: cover; border-radius: 12px; box-shadow: 0 0 15px var(--neon); }
        #lvl { font-size: 14px; text-shadow: 0 0 10px var(--neon); color: var(--neon); }
        .balance-container { text-align: center; margin-top: 20px; }
        #score { font-size: 48px; color: #fff; text-shadow: 0 0 20px var(--neon); font-weight: bold; }
        .play-area { position: relative; flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
        #btn { width: 70vw; max-width: 280px; height: 70vw; max-height: 280px; background: url('/static/images/unnamed3.png') no-repeat center; background-size: contain; border-radius: 50%; border: none; cursor: pointer; transition: transform 0.05s; outline: none; z-index: 2; }
        #btn:active { transform: scale(0.95); }
        .side-menu { position: absolute; right: 0; display: flex; flex-direction: column; gap: 12px; z-index: 3; }
        .side-item { width: 85px; padding: 10px 5px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; backdrop-filter: blur(5px); font-size: 9px; text-align: center; cursor: pointer; }
        .bottom-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .nav-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px 5px; text-align: center; font-size: 10px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%; background: var(--glass); border-top: 2px solid var(--neon); border-radius: 30px 30px 0 0; z-index: 1000; transition: bottom 0.4s ease; padding: 30px; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 28px; color: var(--neon); cursor: pointer; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        .stat-val { color: var(--neon-secondary); font-size: 20px; font-weight: bold; }
        .plus-animation { position: absolute; color: var(--neon); font-size: 32px; font-weight: bold; animation: float 0.7s ease-out forwards; pointer-events: none; z-index: 100; }
        @keyframes float { 0% { opacity:1; transform: translateY(0); } 100% { opacity:0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div class="game-container" id="game" style="opacity:0">
        <div class="header"><div class="logo"></div><span id="lvl">🏆 Level 1</span></div>
        <div class="balance-container"><div style="font-size:10px; opacity:0.7">TOTAL NP POINTS</div><div id="score">0</div></div>
        <div class="play-area">
            <button id="btn"></button>
            <div class="side-menu">
                <div class="side-item" onclick="openModal('friends')">Friends</div>
                <div class="side-item" onclick="openModal('tasks')">Tasks</div>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-card" onclick="openModal('boost')">🚀 BOOST</div>
            <div class="nav-card" onclick="openModal('mine')">⛏️ MINE</div>
            <div class="nav-card" onclick="openModal('stats')">⚙️ STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div id="modal-boost" class="modal">
        <div class="modal-header"><h2>Boosters</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div>
        <div class="modal-content">
            <p style="text-align:center">Увеличьте силу клика. Текущий бонус: +<span id="boost-pwr">1</span></p>
            <button onclick="buyBoost()" style="width:100%; padding:15px; background:var(--neon); border:none; border-radius:10px; color:#000; font-weight:bold; cursor:pointer; font-family:'Orbitron'">
                КУПИТЬ UPGRADE (Цена: <span id="boost-cost">500</span>)
            </button>
        </div>
    </div>

    <div id="modal-stats" class="modal">
        <div class="modal-header"><h2>Stats</h2><span class="close-btn" onclick="closeAllModals()">&times;</span></div>
        <div class="modal-content">
            <div class="stat-box">Игроков: <div id="s-p" class="stat-val">...</div></div>
            <div class="stat-box">Всего NP: <div id="s-t" class="stat-val">...</div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = String(tg.initDataUnsafe?.user?.id || "999");
        let score = 0, pending = 0, clickPower = 1;

        async function openModal(id) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('modal-'+id).classList.add('active');
            if(id === 'stats') {
                const r = await fetch('/api/all_stats'); const d = await r.json();
                document.getElementById('s-p').textContent = d.total_players;
                document.getElementById('s-t').textContent = d.total_balance.toLocaleString();
            }
            if(id === 'boost') {
                document.getElementById('boost-pwr').textContent = clickPower;
                document.getElementById('boost-cost').textContent = clickPower * 500;
            }
        }

        function closeAllModals() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        async function buyBoost() {
            const r = await fetch('/api/buy_boost', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: userId})});
            const d = await r.json();
            if(d.status === 'ok') {
                score = d.new_balance; clickPower = d.new_lvl;
                document.getElementById('score').textContent = score.toLocaleString();
                document.getElementById('lvl').textContent = '🏆 Level ' + clickPower;
                closeAllModals();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else { alert(d.error); }
        }

        async function loadData() {
            const r = await fetch(`/api/balance/${userId}?t=${Date.now()}`);
            const d = await r.json();
            score = d.balance; clickPower = d.click_lvl;
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('lvl').textContent = '🏆 Level ' + clickPower;
            document.getElementById('game').style.opacity = '1';
        }

        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(document.getElementById('overlay').classList.contains('active')) return;
            for(let t of e.changedTouches) {
                score += clickPower; pending += clickPower;
                const p = document.createElement('div');
                p.className = 'plus-animation'; p.textContent = '+'+clickPower;
                p.style.left = t.pageX+'px'; p.style.top = t.pageY+'px';
                document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            }
            document.getElementById('score').textContent = score.toLocaleString();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        setInterval(async () => {
            if(pending > 0) {
                const s = pending; pending = 0;
                await fetch('/api/clicks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: userId, clicks: s})});
            }
        }, 2000);

        loadData();
    </script>
</body>
</html>
