<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.9.9.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #050505; --card: rgba(20, 20, 20, 0.8); --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.05) 0%, transparent 70%); z-index: -1; }

        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .load-circle { width: 220px; height: 220px; border-radius: 50%; border: 2px solid transparent; border-top: 2px solid var(--cyan); border-right: 2px solid var(--purple); animation: rotate 1.5s linear infinite; display: flex; align-items: center; justify-content: center; }
        @keyframes rotate { to { transform: rotate(360deg); } }

        .header { width: 92%; margin-top: 20px; background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--cyan); }
        .u-name { font-weight: 800; font-size: 15px; }
        .u-ver { font-size: 9px; color: var(--cyan); text-transform: uppercase; }
        .lvl-badge { background: linear-gradient(135deg, var(--cyan), var(--purple)); padding: 6px 14px; border-radius: 10px; font-weight: 900; font-size: 13px; }

        .balance { font-size: 58px; font-weight: 900; margin-top: 25px; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .pnl-badge { font-size: 13px; color: #aaa; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 20px; margin-top: 8px; }
        .pnl-badge span { color: var(--purple); font-weight: bold; }

        .stage { flex-grow: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        .main-ai { width: 240px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.4)); z-index: 5; }
        .main-ai:active { transform: scale(0.92); }

        .side-menu { position: absolute; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .side-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; width: 90px; padding: 14px 0; border-radius: 18px; font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; }

        .energy-box { width: 90%; margin-bottom: 25px; }
        .e-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: #777; font-weight: 700; }
        .e-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.03); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .e-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .bottom-nav { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 35px; }
        .nav-item { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 18px 0; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #999; }

        .modal { position: fixed; inset: 0; background: radial-gradient(circle at top, #111 0%, #000 100%); z-index: 5000; display: none; flex-direction: column; padding: 30px 25px; }
        .m-title { font-size: 32px; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; }
        .m-close { margin-top: auto; background: var(--card); padding: 22px; border-radius: 20px; text-align: center; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); color: #666; text-transform: uppercase; }
        .list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--cyan); color: black; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; }
        .wallet-action-btn { width: 100%; border: none; padding: 20px; border-radius: 20px; font-weight: 900; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="load-circle"><img src="logo.png" style="width:110px"></div>
    <div id="p-txt" style="font-size:28px; font-weight:900; color:var(--cyan); margin-top:10px">0%</div>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px">
        <img src="images/logo.png" class="avatar">
        <div><div class="u-name" id="u-nm">Player</div><div class="u-ver">Neural Node 1.9.9.5</div></div>
    </div>
    <div class="lvl-badge">LVL <span id="u-lv">1</span></div>
</div>

<div class="balance" id="b-v">0</div>
<div class="pnl-badge">Profit: <span id="p-v">0</span>/s</div>

<div class="stage">
    <img src="logo.png" class="main-ai" onclick="doTap()">
    <div class="side-menu">
        <div class="side-btn" onclick="openM('wal-m')">Wallet</div>
        <div class="side-btn" onclick="openM('fr-m')">Friends</div>
        <div class="side-btn" onclick="openM('bn-m')">Bonus</div>
    </div>
</div>

<div class="energy-box">
    <div class="e-info"><span>ENERGY CORE</span><span id="e-val">1000/1000</span></div>
    <div class="e-bar"><div class="e-fill" id="e-f"></div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="openM('bs-m')">Boost</div>
    <div class="nav-item" onclick="openM('mi-m')">Mine</div>
    <div class="nav-item" onclick="openM('ta-m')">Tasks</div>
    <div class="nav-item" onclick="openM('tp-m')">Stats</div>
</div>

<div id="wal-m" class="modal">
    <div class="m-title">Neural<br><span style="color:var(--cyan)">Wallet</span></div>
    <div class="list-item" style="flex-direction:column; gap:10px;">
        <div id="w-addr" style="font-size:12px; color:var(--cyan); word-break:all; text-align:center;">Not connected</div>
    </div>
    <button id="connect-trigger" class="wallet-action-btn" onclick="handleWalletAction()">Connect TON</button>
    <div class="m-close" onclick="closeM('wal-m')">Return</div>
</div>

<div id="bs-m" class="modal"><div class="m-title">Boost</div><div id="boost-list"></div><div class="m-close" onclick="closeM('bs-m')">Close</div></div>
<div id="mi-m" class="modal"><div class="m-title">Mining</div><div id="mine-list"></div><div class="m-close" onclick="closeM('mi-m')">Close</div></div>
<div id="tp-m" class="modal"><div class="m-title">Top 10</div><div id="top-list"></div><div class="m-close" onclick="closeM('tp-m')">Close</div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let tonConnectUI;
    let s = { uid: tg.initDataUnsafe?.user?.id || '0', name: tg.initDataUnsafe?.user?.first_name || 'Player', bal: 0, lvl: 1, eng: 1000, maxE: 1000, pnl: 0, wal: null };

    // Loader
    let p = 0;
    const lIv = setInterval(() => {
        p += 10; document.getElementById('p-txt').innerText = p + '%';
        if(p >= 100) { clearInterval(lIv); document.getElementById('loader').style.opacity='0'; setTimeout(()=>document.getElementById('loader').remove(), 500); init(); }
    }, 50);

    async function init() {
        document.getElementById('u-nm').innerText = s.name;
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });
        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('connect-trigger');
            if (wallet) {
                s.wal = wallet.account.address;
                document.getElementById('w-addr').innerText = s.wal.slice(0,8)+"..."+s.wal.slice(-8);
                btn.innerText = "Disconnect";
            } else {
                s.wal = null;
                document.getElementById('w-addr').innerText = "Disconnected";
                btn.innerText = "Connect TON";
            }
            save();
        });
        await load();
        setInterval(() => {
            if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 3);
            if(s.pnl > 0) s.bal += s.pnl;
            upd();
        }, 1000);
        setInterval(save, 5000);
    }

    async function load() {
        const r = await fetch(`/api/user/${s.uid}?name=${encodeURIComponent(s.name)}`);
        const d = await r.json();
        s.bal = Number(d.balance) || 0; s.lvl = Number(d.click_lvl) || 1;
        s.eng = Number(d.energy) || 1000; s.maxE = Number(d.max_energy) || 1000;
        s.pnl = Number(d.pnl) || 0; s.wal = d.wallet_address;
        upd();
    }

    function doTap() {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('medium');
            upd();
        }
    }

    function upd() {
        document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('p-v').innerText = s.pnl;
        document.getElementById('u-lv').innerText = s.lvl;
        document.getElementById('e-val').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
        document.getElementById('e-f').style.width = (s.eng / s.maxE * 100) + '%';
    }

    async function save() {
        await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: s.uid, username: s.name, balance: s.bal, energy: s.eng, max_energy: s.maxE, click_lvl: s.lvl, pnl: s.pnl, wallet: s.wal }) });
    }

    function openM(id) { 
        if(id === 'bs-m') renderBoost();
        if(id === 'mi-m') renderMine();
        if(id === 'tp-m') renderTop();
        document.getElementById(id).style.display = 'flex'; 
    }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    function renderBoost() {
        const cost = s.lvl * 1500;
        document.getElementById('boost-list').innerHTML = `<div class="list-item"><div><b>Multi-Tap</b><br><small>Level ${s.lvl}</small></div><button class="buy-btn" onclick="buyB(${cost})">${cost}</button></div>`;
    }
    function buyB(c) { if(s.bal >= c) { s.bal -= c; s.lvl++; upd(); renderBoost(); save(); } }

    function renderMine() {
        const cost = (s.pnl + 1) * 1000;
        document.getElementById('mine-list').innerHTML = `<div class="list-item"><div><b>CPU Mine</b><br><small>+1/sec</small></div><button class="buy-btn" onclick="buyM(${cost})">${cost}</button></div>`;
    }
    function buyM(c) { if(s.bal >= c) { s.bal -= c; s.pnl += 1; upd(); renderMine(); save(); } }

    async function renderTop() {
        const r = await fetch('/api/top');
        const d = await r.json();
        document.getElementById('top-list').innerHTML = d.map((u,i) => `<div class="list-item"><span>#${i+1} ${u.username}</span><b>${Math.floor(u.balance)}</b></div>`).join('');
    }

    async function handleWalletAction() {
        if (tonConnectUI.connected) await tonConnectUI.disconnect();
        else await tonConnectUI.openModal();
    }
</script>
</body>
</html>
