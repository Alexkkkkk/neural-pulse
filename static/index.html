<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v2.2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --panel: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Loader: Access Granted */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .l-pct { font-size: 48px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }
        .l-txt { font-weight: 900; letter-spacing: 4px; font-size: 14px; margin-top: 10px; color: #fff; }

        #app { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }

        /* Top Panel (Screenshot 2026-03-14) */
        .header-ui { width: 100%; background: var(--panel); border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .user-box { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 44px; height: 44px; border: 2px solid var(--cyan); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #111; font-weight: 900; color: var(--cyan); }
        .u-info { text-align: left; }
        .u-name { font-weight: 900; font-size: 16px; display: block; }
        .u-status { font-size: 10px; color: var(--cyan); }
        .lvl-pill { background: var(--cyan); color: #000; padding: 6px 14px; border-radius: 10px; font-weight: 900; font-size: 14px; }

        .balance { font-size: 64px; font-weight: 900; margin: 15px 0; }

        /* Game Zone + Side Buttons */
        .play-zone { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-main { width: 220px; filter: drop-shadow(0 0 35px var(--purple)); transition: transform 0.05s; z-index: 5; }
        .logo-main:active { transform: scale(0.95); }

        .side-bar { position: absolute; right: 0; display: flex; flex-direction: column; gap: 10px; }
        .s-btn { background: #0d0d0d; border: 1px solid #222; color: #fff; padding: 14px 0; border-radius: 15px; font-size: 11px; font-weight: 900; width: 100px; text-align: center; }

        /* Energy Bar */
        .eng-container { width: 100%; margin-bottom: 30px; }
        .eng-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; color: #555; margin-bottom: 6px; }
        .bar-bg { width: 100%; height: 8px; background: #111; border-radius: 10px; border: 1px solid #1a1a1a; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); width: 100%; transition: width 0.3s; }

        /* Navigation Grid */
        .nav-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .nav-card { background: #080808; border: 1px solid #1a1a1a; padding: 18px 0; border-radius: 15px; font-size: 10px; font-weight: 900; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: #000; z-index: 20000; display: none; flex-direction: column; padding: 40px 20px; text-align: left; }
        .m-header { font-size: 34px; font-weight: 900; margin-bottom: 30px; }
        .m-list { flex: 1; overflow-y: auto; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-buy { background: var(--cyan); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; }
        .btn-close { background: #fff; color: #000; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="l-pct" id="l-pct">0%</div>
    <div class="l-txt">ACCESS GRANTED</div>
</div>

<div id="app">
    <div class="header-ui">
        <div class="user-box">
            <div class="avatar">AI</div>
            <div class="u-info"><span class="u-name" id="u-name">Loading...</span><span class="u-status">v2.2.0 Active Node</span></div>
        </div>
        <div class="lvl-pill" id="u-lvl">LVL 1</div>
    </div>

    <div class="balance" id="balance">0</div>
    
    <div class="play-zone">
        <img src="logo.png" class="logo-main" onclick="tap(event)">
        <div class="side-bar">
            <div class="s-btn" onclick="openM('wallet')">WALLET</div>
            <div class="s-btn" onclick="openM('friends')">FRIENDS</div>
            <div class="s-btn" onclick="openM('bonus')">BONUS</div>
        </div>
    </div>

    <div class="eng-container">
        <div class="eng-labels"><span>ENERGY</span><span id="eng-val">1000/1000</span></div>
        <div class="bar-bg"><div class="bar-fill" id="eng-fill"></div></div>
    </div>
    
    <div class="nav-grid">
        <div class="nav-card" onclick="openM('boost')">BOOST</div>
        <div class="nav-card">MINE</div>
        <div class="nav-card">TASKS</div>
        <div class="nav-card" onclick="openM('stats')">STATS</div>
    </div>
</div>

<div id="m-wallet" class="modal"><div class="m-header">Wallet</div><button class="btn-close" onclick="closeM()">CLOSE</button></div>
<div id="m-stats" class="modal"><div class="m-header">Top Agents</div><div id="stats-list" class="m-list"></div><button class="btn-close" onclick="closeM()">CLOSE</button></div>
<div id="m-boost" class="modal"><div class="m-header">Boosters</div><div class="m-list"><div class="card"><div><b>Multitap</b><br><small id="b-cost">Cost: 2500</small></div><button class="btn-buy" onclick="buyB()">UPGRADE</button></div></div><button class="btn-close" onclick="closeM()">CLOSE</button></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const ton = new TonConnectSDK.TonConnect({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json' });

    let s = { id: tg.initDataUnsafe?.user?.id || "0", bal: 0, lvl: 1, eng: 1000, max: 1000, name: tg.initDataUnsafe?.user?.first_name || "Agent" };

    async function start() {
        let p = 0;
        const i = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 3;
            if(p >= 100) { p = 100; clearInterval(i); document.getElementById('loader').style.display = 'none'; document.getElementById('app').style.display = 'flex'; }
            document.getElementById('l-pct').innerText = p + '%';
        }, 50);
        await load();
    }

    async function load() {
        const r = await fetch(`/api/user/${s.id}?name=${encodeURIComponent(s.name)}`);
        const d = await r.json();
        s.bal = Number(d.balance); s.lvl = d.click_lvl; s.eng = d.energy;
        upd();
    }

    function tap(e) {
        if(s.eng >= s.lvl) {
            s.bal += s.lvl; s.eng -= s.lvl;
            tg.HapticFeedback.impactOccurred('medium');
            upd(); save();
        }
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(s.bal).toLocaleString();
        document.getElementById('u-name').innerText = s.name;
        document.getElementById('u-lvl').innerText = `LVL ${s.lvl}`;
        document.getElementById('eng-val').innerText = `${s.eng}/${s.max}`;
        document.getElementById('eng-fill').style.width = `${(s.eng / s.max) * 100}%`;
        document.getElementById('b-cost').innerText = `Cost: ${s.lvl * 2500}`;
    }

    function save() {
        fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: s.id, balance: s.bal, click_lvl: s.lvl, energy: s.eng }) });
    }

    function openM(id) {
        if(id === 'stats') loadStats();
        document.getElementById('m-' + id).style.display = 'flex';
    }

    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function loadStats() {
        const r = await fetch('/api/stats');
        const d = await r.json();
        document.getElementById('stats-list').innerHTML = d.map((x, i) => `<div class="card"><span>#${i+1} ${x.username}</span><b>${Math.floor(x.balance)}</b></div>`).join('');
    }

    function buyB() {
        const c = s.lvl * 2500;
        if(s.bal >= c) { s.bal -= c; s.lvl++; upd(); save(); }
    }

    setInterval(() => { if(s.eng < s.max) { s.eng = Math.min(s.max, s.eng + 1); upd(); } }, 1000);
    start();
</script>
</body>
</html>
