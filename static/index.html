<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Анимированный фон с частицами */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Под всеми элементами */
            pointer-events: none;
        }

        /* Элементы интерфейса поверх фона */
        .content-layer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Эффект Нейро-Шторма */
        .storm-mode .main-logo {
            box-shadow: 0 0 60px var(--neon-purple) !important;
            border: 4px solid var(--neon-purple);
        }
        
        .storm-badge {
            display: none; background: var(--neon-purple);
            padding: 4px 12px; border-radius: 20px; font-size: 11px;
            font-weight: bold; margin-bottom: 10px; animation: blink 1s infinite;
            box-shadow: 0 0 15px var(--neon-purple);
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .header { 
            width: 90%; margin-top: 15px; 
            display: flex; align-items: center; gap: 12px; 
            background: var(--glass); padding: 10px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        
        .league-badge {
            width: 45px; height: 45px; border: 2px solid var(--neon-purple);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            background: rgba(188, 19, 254, 0.2); font-weight: bold; 
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        .score-container { margin-top: 30px; text-align: center; }
        #balance { 
            font-size: 50px; font-weight: 800; 
            text-shadow: 0 0 30px var(--neon-cyan); 
            letter-spacing: -1px;
        }

        .click-area {
            position: relative; margin-top: 40px;
            width: 260px; height: 260px;
        }
        
        .main-logo {
            width: 100%; height: 100%; border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
            transition: transform 0.05s; z-index: 5;
            position: relative;
        }

        .energy-section { width: 90%; margin-top: auto; margin-bottom: 25px; }
        .energy-bar { 
            width: 100%; height: 12px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; 
        }
        #energy-fill { 
            height: 100%; background: linear-gradient(90deg, var(--neon-cyan), #0072ff); 
            width: 100%; transition: width 0.3s ease; 
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .bottom-nav { 
            width: 92%; display: grid; grid-template-columns: 1fr 1fr 1fr; 
            gap: 12px; margin-bottom: 25px; 
        }
        .nav-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; border-radius: 18px; backdrop-filter: blur(10px);
            text-align: center; font-size: 11px; font-weight: bold; color: #fff;
        }

        .tap-text {
            position: absolute; color: white; font-size: 32px; font-weight: 900;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100;
            text-shadow: 0 0 15px var(--neon-cyan);
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <canvas id="particles-js"></canvas>

    <div class="content-layer">
        <div class="header">
            <div class="league-badge" id="lvl-badge">1</div>
            <div style="flex-grow: 1;">
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: #888;">
                    <span id="league-name">SILICON NOVICE</span>
                    <span id="next-lvl">XP</span>
                </div>
                <div class="energy-bar" style="height: 6px; margin-top: 5px;">
                    <div id="exp-bar" style="width: 20%; background: var(--neon-purple); height: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="score-container">
            <div class="storm-badge" id="storm-badge">STORM X2 ACTIVE</div>
            <div id="balance">0</div>
            <div style="color: var(--neon-cyan); font-size: 14px; font-weight: bold; opacity: 0.8;" id="pnl-info">PROFIT: +0/HR</div>
        </div>

        <div class="click-area" id="tap-zone">
            <img src="images/logo.png" class="main-logo" id="main-logo" alt="Neural Pulse">
        </div>

        <div class="energy-section">
            <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px;">
                <span>⚡ STAMINA</span>
                <span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar">
                <div id="energy-fill"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="tg.showAlert('Upgrade System Offline')">🚀 BOOST</div>
            <div class="nav-btn" onclick="tg.showAlert('Mining starting soon...')">⛏️ MINE</div>
            <div class="nav-btn" onclick="showInvite()">🎁 FRIENDS</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#050505";

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('u') || tg.initDataUnsafe?.user?.id || "guest";

        let state = { score: 0, energy: 1000, max_energy: 1000, tap_power: 1, pnl: 0, level: 1, multiplier: 1 };

        // --- ДВИЖОК ЧАСТИЦ (Background) ---
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
            ctx.strokeStyle = 'rgba(188, 19, 254, 0.1)';
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();

                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawParticles);
        }

        // --- ЛОГИКА ИГРЫ ---
        async function init() {
            initParticles();
            drawParticles();
            try {
                const r = await fetch(`/api/balance/${uid}`);
                const res = await r.json();
                if(res.status === 'ok') {
                    state = { ...state, ...res.data };
                    updateUI();
                }
            } catch(e) { console.error("API Error"); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
            document.getElementById('pnl-info').innerText = `PROFIT: +${state.pnl.toLocaleString()}/HR`;
            document.getElementById('lvl-badge').innerText = state.level;
            
            const badge = document.getElementById('storm-badge');
            if (state.multiplier > 1) {
                document.body.classList.add('storm-mode');
                badge.style.display = 'inline-block';
            } else {
                document.body.classList.remove('storm-mode');
                badge.style.display = 'none';
            }
        }

        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const power = state.tap_power * state.multiplier;
            if (state.energy < power) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            for(let i=0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                state.score += power;
                state.energy -= power;
                
                const num = document.createElement('div');
                num.className = 'tap-text';
                num.innerText = `+${power}`;
                num.style.left = `${touch.pageX - 20}px`;
                num.style.top = `${touch.pageY - 50}px`;
                document.body.appendChild(num);
                setTimeout(() => num.remove(), 800);
            }
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById('main-logo').style.transform = 'scale(0.95)';
            setTimeout(() => document.getElementById('main-logo').style.transform = 'scale(1)', 50);
        });

        function showInvite() {
            const link = `https://t.me/neural_pulse_bot?start=${uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Become an AI Operator!`);
        }

        // Пассивный доход и реген энергии
        setInterval(() => {
            state.score += (state.pnl / 3600);
            if (state.energy < state.max_energy) state.energy = Math.min(state.max_energy, state.energy + 1.5);
            updateUI();
        }, 1000);

        // Сохранение
        setInterval(() => {
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid, ...state })
            });
        }, 3000);

        window.addEventListener('resize', initParticles);
        init();
    </script>
</body>
</html>
