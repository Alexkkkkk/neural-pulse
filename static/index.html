<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI | Wallet Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?5"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #00d4ff; 
            --neon-secondary: #00ff96; 
            --crit: #ff4e50;
            --bg: #050a1a; 
            --glass: rgba(10, 25, 47, 0.95);
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        body { 
            margin: 0; background: radial-gradient(circle at center, #0a192f 0%, #050a1a 100%); 
            height: 100vh; font-family: 'Orbitron', sans-serif; color: white; overflow: hidden; 
            user-select: none; display: flex; justify-content: center; 
        }

        .game-container { 
            position: relative; width: 100%; max-width: 500px; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; box-sizing: border-box; 
        }
        
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { width: 45px; height: 45px; background: #111; border: 1px solid var(--neon); border-radius: 10px; box-shadow: 0 0 15px var(--neon); }
        .league-box { flex-grow: 1; margin: 0 12px; }
        .league-info { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; font-weight: bold; }
        .league-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #league-fill { height: 100%; width: 0%; transition: width 0.5s; background: var(--neon); }

        .jackpot-container {
            width: 100%; background: rgba(255, 0, 212, 0.05); 
            border: 1px solid rgba(255, 0, 212, 0.3); border-radius: 12px; 
            padding: 8px; margin-bottom: 15px; text-align: center;
        }
        #jackpot-amount { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #ff00d4; }

        .balance-container { text-align: center; margin: 10px 0; }
        #score { font-size: 58px; font-weight: 900; text-shadow: 0 0 20px var(--neon); letter-spacing: -2px; }

        .play-area { 
            position: relative; width: 100%; flex-grow: 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        #btn { 
            width: 70vw; height: 70vw; max-width: 280px; max-height: 280px;
            background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
            border-radius: 50%; border: 2px solid var(--neon); outline: none;
            box-shadow: inset 0 0 50px var(--neon), 0 0 30px var(--neon);
            transition: transform 0.05s; z-index: 2; cursor: pointer;
        }
        #btn:active { transform: scale(0.92); }

        .energy-wrapper { width: 85%; margin-top: 25px; }
        .energy-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--neon); margin-bottom: 6px; }
        .energy-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid var(--neon); overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--neon), var(--neon-secondary)); transition: width 0.2s; }

        .bottom-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; padding-bottom: 20px; }
        .nav-item { background: rgba(255,255,255,0.05); padding: 12px 5px; border-radius: 15px; text-align: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; cursor: pointer; }

        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%; background: var(--glass); border-top: 3px solid var(--neon); border-radius: 35px 35px 0 0; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(8px); }
        .overlay.active { display: block; }

        .plus-animation { position: absolute; pointer-events: none; font-weight: 900; animation: float 0.7s ease-out forwards; z-index: 100; text-shadow: 0 0 10px currentColor; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.6); } }
        
        /* Стили транзакций */
        .trans-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="game-container" id="game" style="opacity:0">
        <div class="header">
            <div class="logo"></div>
            <div class="league-box">
                <div class="league-info">
                    <span id="league-name">BRONZE LEAGUE</span>
                    <span id="league-percent">0%</span>
                </div>
                <div class="league-bar"><div id="league-fill"></div></div>
            </div>
            <div style="font-size: 8px; opacity: 0.4;" id="user-id-display">ID: 0000</div>
        </div>

        <div class="jackpot-container">
            <div id="jackpot-amount">500,000</div>
        </div>

        <div class="balance-container">
            <div id="score">0</div>
        </div>

        <div class="play-area">
            <button id="btn"></button>
            <div class="energy-wrapper">
                <div class="energy-info">
                    <span>⚡ ENERGY</span>
                    <span id="energy-stat">1000/1000</span>
                </div>
                <div class="energy-bar"><div id="energy-fill"></div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="openModal('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="openModal('daily')">🎁 BONUS</div>
            <div class="nav-item" onclick="openModal('wallet')" style="border-color: var(--neon-secondary);">💎 WALLET</div>
            <div class="nav-item" onclick="openModal('stats')">📊 STATS</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>

    <div id="modal-wallet" class="modal">
        <h2 style="color: var(--neon-secondary); text-align: center;">NEURAL WALLET</h2>
        <div style="background: rgba(0,255,150,0.05); border: 1px solid var(--neon-secondary); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px;">
            <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">ASSETS BALANCE</div>
            <div style="font-size: 36px; font-weight: 900; margin: 10px 0;" id="wallet-val">0</div>
            <div id="wallet-addr" style="font-size: 8px; opacity: 0.3; font-family: monospace;"></div>
        </div>
        <button onclick="connectTon()" style="width: 100%; padding: 18px; background: #007aff; border: none; border-radius: 15px; color: white; font-weight: bold;">CONNECT TON</button>
        
        <h4 style="margin: 25px 0 15px; font-size: 12px; color: var(--neon);">HISTORY</h4>
        <div id="trans-history"></div>
    </div>

    <div id="modal-boost" class="modal">
        <h2 style="color: var(--neon);">UPGRADES</h2>
        <div style="background: rgba(255,255,255,0.05); padding:20px; border-radius:20px; border: 1px solid var(--neon);">
            <div style="font-weight: bold;">MULTI-TAP (LVL <span id="tap-lvl-val">1</span>)</div>
            <div style="font-size: 12px; margin: 10px 0; opacity: 0.7;">Дает +1 к каждому тапу</div>
            <button onclick="buyUpgrade()" style="width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 12px; color: black; font-weight: 900;">
                UPGRADE (<span id="upgrade-cost-text">500</span> NP)
            </button>
        </div>
    </div>

    <div id="modal-daily" class="modal">
        <h2 style="text-align: center; color: #ff9d00;">DAILY BONUS</h2>
        <button onclick="claimDailyBonus()" style="width: 100%; padding: 20px; background: #ff9d00; border: none; border-radius: 15px; color: black; font-weight: 900;">ЗАБРАТЬ 5,000 NP</button>
    </div>

    <div id="modal-stats" class="modal">
        <h2 style="text-align: center; color: var(--neon);">HALL OF FAME</h2>
        <div id="winners-list">Загрузка...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const LEAGUES = [
            { name: "BRONZE", min: 0, max: 10000, color: "#cd7f32" },
            { name: "SILVER", min: 10000, max: 50000, color: "#c0c0c0" },
            { name: "GOLD", min: 50000, max: 250000, color: "#ffd700" },
            { name: "PLATINUM", min: 250000, max: 1000000, color: "#e5e4e2" },
            { name: "DIAMOND", min: 1000000, max: Infinity, color: "#00d4ff" }
        ];

        let state = {
            score: 0, energy: 1000, max_energy: 1000, tap_power: 1,
            user_id: tg.initDataUnsafe?.user?.id || 12345,
            transactions: []
        };

        // Логика транзакций
        function addTrans(label, amount, type) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            state.transactions.unshift({label, amount, type, time});
            if(state.transactions.length > 10) state.transactions.pop();
        }

        function renderTrans() {
            const container = document.getElementById('trans-history');
            if(state.transactions.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.3; font-size:11px;">Нет операций</div>';
                return;
            }
            container.innerHTML = state.transactions.map(t => `
                <div class="trans-item">
                    <div style="font-size:11px;">${t.label}<br><small style="opacity:0.3">${t.time}</small></div>
                    <div style="color:${t.type==='plus'?'var(--neon-secondary)':'var(--crit)'}; font-weight:900;">
                        ${t.type==='plus'?'+':'-'}${t.amount.toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        async function loadData() {
            const r = await fetch(`/api/balance/${state.user_id}`);
            const res = await r.json();
            if (res.status === "ok") {
                state.score = res.data.balance;
                state.tap_power = res.data.click_lvl;
                document.getElementById('tap-lvl-val').innerText = state.tap_power;
                document.getElementById('upgrade-cost-text').innerText = state.tap_power * 500;
                updateUI();
            }
        }

        async function buyUpgrade() {
            const cost = state.tap_power * 500;
            const r = await fetch('/api/upgrade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: state.user_id})
            });
            const res = await r.json();
            if (res.status === "ok") {
                addTrans("Multi-Tap Upgrade", cost, "minus");
                state.score = res.new_balance;
                state.tap_power = res.new_lvl;
                document.getElementById('tap-lvl-val').innerText = res.new_lvl;
                document.getElementById('upgrade-cost-text').innerText = res.next_cost;
                updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("Недостаточно NP!");
            }
        }

        async function claimDailyBonus() {
            const r = await fetch('/api/daily-bonus', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: state.user_id})
            });
            const res = await r.json();
            if (res.status === "ok") {
                addTrans("Daily Reward", 5000, "plus");
                tg.showAlert(`Получено: 5000 NP!`);
                loadData();
            } else { tg.showAlert(res.message); }
        }

        function updateUI() {
            const score = Math.floor(state.score);
            document.getElementById('score').innerText = score.toLocaleString();
            document.getElementById('wallet-val').innerText = score.toLocaleString();
            
            const league = LEAGUES.find(l => score >= l.min && score < l.max) || LEAGUES[0];
            const prog = league.max === Infinity ? 100 : ((score - league.min) / (league.max - league.min)) * 100;
            
            const ln = document.getElementById('league-name');
            ln.innerText = league.name + " LEAGUE";
            ln.style.color = league.color;
            document.getElementById('league-fill').style.width = prog + "%";
            document.getElementById('league-fill').style.background = league.color;
            document.getElementById('league-percent').innerText = Math.floor(prog) + "%";
            
            document.getElementById('energy-stat').innerText = `${Math.floor(state.energy)}/1000`;
            document.getElementById('energy-fill').style.width = (state.energy/10) + "%";
            document.getElementById('user-id-display').innerText = "ID: " + state.user_id;
        }

        // Обработка клика
        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.energy >= state.tap_power) {
                state.score += state.tap_power;
                state.energy -= state.tap_power;
                updateUI();

                const t = e.changedTouches[0];
                const p = document.createElement('div');
                p.className = 'plus-animation'; 
                p.innerText = '+'+state.tap_power;
                p.style.left = t.clientX+'px'; p.style.top = t.clientY+'px';
                p.style.color = 'var(--neon)';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
                
                tg.HapticFeedback.impactOccurred('medium');
            }
        });

        function openModal(id) {
            if(id === 'wallet') {
                document.getElementById('wallet-addr').innerText = "NP_WALLET_" + btoa(state.user_id).slice(0,12);
                renderTrans();
            }
            document.getElementById('modal-'+id).classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('overlay').classList.remove('active');
        }

        function connectTon() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showAlert("Подключение кошельков TON будет доступно в фазе Mainnet!");
        }

        // Сохранение и энергия
        setInterval(() => { if(state.energy < 1000) { state.energy += 1.5; updateUI(); } }, 1000);
        setInterval(async () => {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: state.user_id, score: Math.floor(state.score), click_lvl: state.tap_power })
            }).then(r => r.json()).then(res => {
                document.getElementById('jackpot-amount').innerText = res.jackpot.toLocaleString();
            });
        }, 3000);
        
        window.onload = () => {
            document.getElementById('game').style.opacity = "1";
            loadData();
        };
    </script>
</body>
</html>
