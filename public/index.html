<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v1.7.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --bg: #000; --panel: #111; --gray-btn: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .header { width: 92%; margin-top: 20px; display: flex; align-items: center; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; border: 1px solid #222; }
        .u-av-box { width: 50px; height: 50px; border-radius: 10px; border: 1px solid var(--cyan); margin-right: 12px; overflow: hidden; }
        .bal { font-size: 72px; font-weight: 800; margin: 40px 0; letter-spacing: -2px; }
        .stage { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-ai { width: 200px; filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.5)); cursor: pointer; transition: 0.1s; }
        .eng-bar { width: 92%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; margin-bottom: 20px; }
        #eng-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); width: 100%; transition: 0.3s; }
        .footer { width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .f-item { background: var(--gray-btn); border-radius: 15px; padding: 18px 0; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #222; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div class="u-av-box"><img src="images/logo.png" style="width:100%"></div>
        <div>
            <div style="font-weight:bold;">Node</div>
            <div style="color:var(--cyan); font-size:10px">v1.7.5 Active</div>
        </div>
        <div style="margin-left:auto; background:var(--cyan); color:#000; padding:5px 10px; border-radius:8px; font-weight:bold;">LVL <span id="u-lv">1</span></div>
    </div>

    <div class="bal" id="b-v">0</div>

    <div class="stage">
        <img src="logo.png" class="main-ai" onclick="doTap()">
    </div>

    <div style="width:92%; display:flex; justify-content:space-between; font-size:11px; color:#888; margin-bottom:5px;">
        <span>ENERGY</span><span id="e-txt">1000/1000</span>
    </div>
    <div class="eng-bar"><div id="eng-fill"></div></div>

    <div class="footer">
        <div class="f-item">BOOST</div>
        <div class="f-item">MINE</div>
        <div class="f-item">TASKS</div>
        <div class="f-item">STATS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { uid: tg.initDataUnsafe?.user?.id || '0', bal: 0, lvl: 1, eng: 1000, maxE: 1000 };

        async function load() {
            try {
                const r = await fetch(`/api/user/${s.uid}`);
                const d = await r.json();
                s.bal = Number(d.balance) || 0;
                s.lvl = Number(d.click_lvl) || 1;
                s.eng = Number(d.energy) || 1000;
                s.maxE = Number(d.max_energy) || 1000;
                upd();
                setInterval(tick, 1000);
            } catch(e) { console.error("Sync Error"); }
        }

        function upd() {
            document.getElementById('b-v').innerText = Math.floor(s.bal).toLocaleString();
            document.getElementById('u-lv').innerText = s.lvl;
            document.getElementById('e-txt').innerText = `${Math.floor(s.eng)}/${s.maxE}`;
            document.getElementById('eng-fill').style.width = (s.eng / s.maxE * 100) + '%';
        }

        function doTap() {
            if(s.eng >= s.lvl) { 
                s.bal += s.lvl; s.eng -= s.lvl; 
                tg.HapticFeedback.impactOccurred('medium'); 
                upd(); 
            }
        }

        function tick() {
            if(s.eng < s.maxE) s.eng = Math.min(s.maxE, s.eng + 3);
            upd();
            save();
        }

        function save() {
            fetch('/api/save', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: s.uid, balance: s.bal, energy: s.eng, max_energy: s.maxE, click_lvl: s.lvl, pnl: 0 }) 
            });
        }
        load();
    </script>
</body>
</html>
