<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse Quantum</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-ring"><img src="logo.png" alt="AI"></div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-bg" style="width: 200px;"><div class="load-bar-f" id="load-bar" style="width:0%"></div></div>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="avatar"><img src="logo.png" id="main-avatar"></div>
            <div class="u-info">
                <b id="u-name">Agent</b>
                <small id="app-ver">v3.8.8 Quantum Full</small>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 2</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+2</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">696</div>

        <div class="play-area">
            <img src="logo.png" class="main-logo" id="tap-target">
            <div class="side-menu">
                <button class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</button>
                <button class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</button>
                <button class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">543/1000</span></div>
            <div class="load-bar-bg"><div id="eng-fill" class="load-bar-f" style="width: 54.3%"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="m-wallet" class="modal"><div class="modal-content"><h1>👛 WALLET</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-squad" class="modal"><div class="modal-content"><h1>🤝 FRIENDS</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-bonus" class="modal"><div class="modal-content"><h1>🎁 BONUS</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-boost" class="modal"><div class="modal-content"><h1>🚀 BOOST</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-mine" class="modal"><div class="modal-content"><h1>⛏️ MINE</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-tasks" class="modal"><div class="modal-content"><h1>📋 TASKS</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-top" class="modal"><div class="modal-content"><h1>🏆 TOP</h1><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="loading.js"></script>
</body>
</html>
