<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00d4ff; }
        body {
            margin: 0; padding: 0; background: #000 url('/images/images.jpeg') no-repeat center center;
            background-size: cover; height: 100vh; width: 100vw; display: flex; flex-direction: column;
            align-items: center; font-family: 'Arial', sans-serif; color: white; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/images/unnamed1.jpg') no-repeat center center;
            background-size: contain; pointer-events: none; z-index: 1;
        }
        #score { font-size: 50px; font-weight: bold; text-shadow: 0 0 20px var(--neon); z-index: 10; margin-top: 50px; }
        #btn {
            width: 230px; height: 230px; background: url('/images/unnamed3.jpg') no-repeat center center;
            background-size: contain; border-radius: 50%; cursor: pointer;
            transition: transform 0.05s; z-index: 10; margin-top: auto; margin-bottom: 150px;
            border: none; outline: none;
        }
        #btn:active { transform: scale(0.95); }
        .plus-animation {
            position: absolute; color: var(--neon); font-size: 32px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>
    <div class="ui-overlay"></div>
    <div id="score">0</div>
    <button id="btn"></button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id || 999;
        let score = 0;
        let pendingClicks = 0;

        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('btn');

        async function loadData() {
            try {
                const r = await fetch(`/api/get_balance/${userId}`);
                const d = await r.json();
                score = d.balance || 0;
                scoreEl.textContent = score;
            } catch (e) { console.error("Load error", e); }
        }

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            pendingClicks++;
            scoreEl.textContent = score;

            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus-animation';
            p.textContent = '+1';
            p.style.left = `${touch.pageX}px`;
            p.style.top = `${touch.pageY}px`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        setInterval(async () => {
            if (pendingClicks > 0) {
                const s = pendingClicks;
                pendingClicks = 0;
                try {
                    await fetch('/api/save_clicks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ user_id: userId, clicks: s })
                    });
                } catch (e) { pendingClicks += s; }
            }
        }, 1000);

        loadData();
        tg.ready();
    </script>
</body>
</html>
