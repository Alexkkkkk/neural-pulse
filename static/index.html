<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Эффект Нейро-Шторма (x2) */
        .storm-mode .main-logo {
            box-shadow: 0 0 60px var(--neon-purple) !important;
            border: 4px solid var(--neon-purple);
        }
        
        .storm-badge {
            display: none; background: var(--neon-purple);
            padding: 2px 8px; border-radius: 5px; font-size: 10px;
            font-weight: bold; margin-bottom: 5px; animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .header { width: 90%; margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .league-badge {
            width: 50px; height: 50px; border: 2px solid var(--neon-purple);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            background: rgba(188, 19, 254, 0.1); font-weight: bold; box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }
        .league-info { flex-grow: 1; }
        .league-name { font-size: 12px; letter-spacing: 1px; color: #aaa; }
        .progress-container { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); border-radius: 3px; transition: width 0.5s; }

        .score-container { margin-top: 20px; text-align: center; }
        #balance { font-size: 44px; font-weight: 800; text-shadow: 0 0 20px var(--neon-cyan); transition: transform 0.1s; }
        .profit-info { color: var(--neon-cyan); font-size: 14px; margin-top: -5px; opacity: 0.8; }

        .click-area {
            position: relative; margin-top: 30px;
            width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
        }
        .main-logo {
            width: 100%; height: 100%; border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            transition: transform 0.05s; z-index: 2;
        }

        .sidebar { position: absolute; right: -70px; display: flex; flex-direction: column; gap: 12px; }
        .side-btn {
            background: rgba(15, 15, 15, 0.9); border: 1px solid #333;
            color: white; padding: 10px; border-radius: 12px; font-size: 10px; width: 60px; text-align: center;
            backdrop-filter: blur(5px);
        }

        .energy-section { width: 90%; margin-top: auto; margin-bottom: 20px; }
        .energy-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .energy-bar { width: 100%; height: 12px; background: #111; border-radius: 6px; border: 1px solid #222; overflow: hidden; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), #0072ff); width: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .bottom-nav { width: 95%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .nav-btn {
            background: linear-gradient(145deg, #151515, #0a0a0a); border: 1px solid #222; padding: 15px; border-radius: 16px;
            text-align: center; font-size: 12px; font-weight: bold; color: #fff;
        }
        .nav-btn:active { transform: scale(0.95); border-color: var(--neon-cyan); }

        /* Модалки */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; display: none;
            flex-direction: column; align-items: center; padding-top: 50px;
        }
        .modal-content {
            width: 85%; max-height: 70vh; overflow-y: auto; background: #111; 
            border: 1px solid #333; padding: 20px; border-radius: 25px;
        }

        .tap-text {
            position: absolute; color: var(--neon-cyan); font-size: 28px; font-weight: 900;
            pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 100;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(-150px) rotate(10deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="league-badge" id="lvl-badge">1</div>
        <div class="league-info">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <span class="league-name" id="league-name">SILICON NOVICE</span>
                <span style="font-size: 10px; color: var(--neon-cyan);" id="next-lvl">LEVEL UP IN 80%</span>
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="exp-bar" style="width: 20%;"></div>
            </div>
        </div>
    </div>

    <div class="score-container">
        <div class="storm-badge" id="storm-badge">STORM X2 ACTIVE</div>
        <div id="balance">0</div>
        <div class="profit-info" id="pnl-info">PROFIT: +0/hr</div>
    </div>

    <div class="click-area" id="tap-zone">
        <img src="images/logo.png" class="main-logo" id="main-logo" alt="Neural AI">
        <div class="sidebar">
            <div class="side-btn" onclick="showInvite()">INVITE</div>
            <div class="side-btn" onclick="openModal('leaderboard')">TOP 100</div>
            <div class="side-btn" onclick="tg.showAlert('Coming Soon')">GUILDS</div>
        </div>
    </div>

    <div class="energy-section">
        <div class="energy-header">
            <span style="display:flex; align-items:center; gap:5px;">⚡ ENERGY</span>
            <span id="energy-text">1000/1000</span>
        </div>
        <div class="energy-bar">
            <div id="energy-fill"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="openModal('boost')">🚀 UPGRADE</div>
        <div class="nav-btn" onclick="openModal('mine')">⛏️ NEURAL MINE</div>
        <div class="nav-btn" onclick="showInvite()">🎁 FRIENDS</div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="color:var(--neon-cyan)">STORE</h2>
            <div id="modal-list"></div>
            <button onclick="closeModal()" style="width:100%; margin-top:20px; background:#222; border:none; color:white; padding:12px; border-radius:12px;">Back to Neural Link</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('u') || tg.initDataUnsafe?.user?.id || "test_user";

        let state = { score: 0, energy: 1000, max_energy: 1000, tap_power: 1, pnl: 0, level: 1, multiplier: 1 };

        async function init() {
            try {
                const r = await fetch(`/api/balance/${uid}`);
                const res = await r.json();
                if(res.status === 'ok') {
                    state = { ...state, ...res.data };
                    updateUI();
                }
            } catch(e) { console.error("API Error"); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.score).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/${state.max_energy}`;
            document.getElementById('energy-fill').style.width = `${(state.energy / state.max_energy) * 100}%`;
            document.getElementById('pnl-info').innerText = `PROFIT: +${state.pnl.toLocaleString()}/hr`;
            document.getElementById('lvl-badge').innerText = state.level;
            
            // Проверка шторма
            const body = document.body;
            const badge = document.getElementById('storm-badge');
            if (state.multiplier > 1) {
                body.classList.add('storm-mode');
                badge.style.display = 'inline-block';
            } else {
                body.classList.remove('storm-mode');
                badge.style.display = 'none';
            }
        }

        // Логика клика
        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const power = state.tap_power * state.multiplier;
            if (state.energy < power) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            for(let i=0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                state.score += power;
                state.energy -= power;
                createTapAnim(touch.pageX, touch.pageY, power);
            }
            
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        });

        function createTapAnim(x, y, val) {
            const el = document.createElement('div');
            el.className = 'tap-text';
            el.innerText = `+${val}`;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 40}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        // Пассивные процессы
        setInterval(() => {
            state.score += (state.pnl / 3600);
            if (state.energy < state.max_energy) state.energy = Math.min(state.max_energy, state.energy + 2);
            updateUI();
        }, 1000);

        // Работа с модалками
        async function openModal(type) {
            const m = document.getElementById('modal');
            const list = document.getElementById('modal-list');
            const title = document.getElementById('modal-title');
            list.innerHTML = '<p style="color:grey">Loading Neural Data...</p>';
            m.style.display = 'flex';

            if(type === 'leaderboard') {
                title.innerText = "GLOBAL LEADERS";
                const r = await fetch('/api/leaderboard');
                const res = await r.json();
                list.innerHTML = res.top.map((u, i) => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222; font-size:14px;">
                        <span>${i+1}. ID: ${u.id}</span>
                        <span style="color:var(--neon-cyan)">${Math.floor(u.score).toLocaleString()} NP</span>
                    </div>
                `).join('');
            } else if (type === 'boost') {
                title.innerText = "UPGRADES";
                list.innerHTML = `<div class="upgrade-card" style="background:#222; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                    <span>Multitap (Lvl ${state.tap_power})</span>
                    <button onclick="buy('tap')" style="background:var(--neon-cyan); border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">BUY</button>
                </div>`;
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function showInvite() {
            const link = `https://t.me/neural_pulse_bot?start=${uid}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join my Neural Network!`);
        }

        // Авто-сохранение
        setInterval(() => {
            fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid, ...state })
            });
        }, 3000);

        init();
    </script>
</body>
</html>
