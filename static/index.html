<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div id="load-pct">0%</div>
        <div class="load-bar-wrapper"><div id="load-bar" class="load-bar-f"></div></div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="avatar"><img src="images/logo.png" id="u-avatar" onerror="this.src='images/logo.png'"></div>
                <div class="u-info">
                    <b id="u-name">Agent</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>TAP</small><b id="tap-val" class="accent-val">+1</b></div>
            <div class="stat-card"><small>PROFIT</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo" id="tap-target" ontouchstart="logic.tap(event)" onmousedown="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="en-txt"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="progress-bar-wrap"><div id="eng-fill" class="progress-bar-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="ui.openM('boost')">🚀 BOOST</button>
            <button class="nav-btn" onclick="ui.openM('mine')">⛏️ MINE</button>
            <button class="nav-btn" onclick="ui.openM('tasks')">📋 TASKS</button>
            <button class="nav-btn" onclick="ui.openM('top')">🏆 TOP</button>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target === this) ui.closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-drag-line"></div>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body"></div>
            <button class="back-btn" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script src="logic.js"></script>

    <script>
        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet && typeof logic !== 'undefined' && logic.user) {
                logic.saveWallet(wallet.account.address);
            }
        });

        const ui = {
            init() { 
                this.update(); 
                this.finishLoading(); 
            },
            update() {
                if (!logic || !logic.user) return;
                try {
                    document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                    document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                    document.getElementById('eng-fill').style.width = `${(logic.user.energy / logic.user.max_energy) * 100}%`;
                    document.getElementById('u-lvl').innerText = `LVL ${logic.user.lvl}`;
                    document.getElementById('u-name').innerText = logic.user.username;
                    document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                    document.getElementById('profit-val').innerText = Math.floor(logic.user.profit_hr).toLocaleString();
                    
                    // Обновляем аватарку только если она есть
                    const avatar = document.getElementById('u-avatar');
                    if (logic.user.photo_url && logic.user.photo_url !== "") {
                        avatar.src = logic.user.photo_url;
                    }
                } catch (err) {
                    console.error("UI Update error:", err);
                }
            },
            openM(type) {
                const body = document.getElementById('modal-body');
                const header = document.getElementById('modal-header');
                header.innerText = type.toUpperCase();
                let html = '';
                
                if (type === 'wallet') {
                    const addr = logic.user?.wallet;
                    html = `
                        <div style="text-align:center;">
                            <div id="ton-connect-button" style="display:flex; justify-content:center; margin-bottom:15px;"></div>
                            <p style="color:#00ffff; font-family:monospace; font-size:12px; word-break:break-all;">
                                ${addr ? addr : "Not Connected"}
                            </p>
                            ${addr ? `<button onclick="logic.disconnectWallet()" class="back-btn" style="background:rgba(255,0,0,0.2); color:red; margin-top:15px; border:1px solid red;">DISCONNECT</button>` : ''}
                        </div>`;
                    body.innerHTML = html;
                    setTimeout(() => {
                        tonConnectUI.uiOptions = { buttonRootId: 'ton-connect-button' };
                    }, 100);
                } else if (type === 'top') {
                    body.innerHTML = '<p style="text-align:center;">ACCESSING RANKINGS...</p>';
                    fetch('/api/top').then(r => r.json()).then(data => {
                        let list = '';
                        data.forEach((u, i) => {
                            list += `<div class="up-card">#${i+1} ${u.username} <b>${Math.floor(u.balance)}</b></div>`;
                        });
                        body.innerHTML = list;
                    }).catch(() => { body.innerHTML = '<p>Error loading top.</p>'; });
                } else {
                    body.innerHTML = `<p style="text-align:center; padding:20px; color:#888;">Module ${type} is encrypted or coming soon.</p>`;
                }
                document.getElementById('modal-container').classList.add('active');
            },
            closeM() { 
                document.getElementById('modal-container').classList.remove('active'); 
            },
            finishLoading() {
                let p = 0;
                const bar = document.getElementById('load-bar');
                const pct = document.getElementById('load-pct');
                const iv = setInterval(() => {
                    p += 5;
                    if (pct) pct.innerText = p + '%';
                    if (bar) bar.style.width = p + '%';
                    if (p >= 100) {
                        clearInterval(iv);
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.opacity = '0';
                            setTimeout(() => {
                                document.getElementById('loading-screen').style.display = 'none';
                                document.getElementById('app').style.display = 'flex';
                            }, 500);
                        }, 200);
                    }
                }, 30);
            }
        };

        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            const user = tg.initDataUnsafe?.user || {};
            // Запуск логики
            if (typeof logic !== 'undefined') {
                logic.init(user.id, user.username || user.first_name, user.photo_url);
            } else {
                // Если logic.js не загрузился, всё равно показываем приложение
                ui.finishLoading();
            }
        };
    </script>
</body>
</html>
