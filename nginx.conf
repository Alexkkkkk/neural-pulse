# 1. Настройка кэширования (должна быть одна на весь Nginx или в начале файла)
map $sent_http_content_type $expires {
    default                    off;
    text/html                  epoch;
    text/css                   max;
    application/javascript     max;
    ~image/                    max;
}

server {
    listen 80;
    server_name your-domain.com; # <--- ЗАМЕНИ НА СВОЙ ДОМЕН

    # Корень проекта (Укажи актуальный путь к папке проекта)
    root /home/user/my_project/static;
    index index.html;

    # Логи
    access_log /var/log/nginx/neural_pulse_access.log;
    error_log /var/log/nginx/neural_pulse_error.log;

    # Сжатие gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;

    # Безопасность для Telegram Mini App
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    # Разрешаем встраивание в Telegram (обязательно для Mini Apps)
    add_header Content-Security-Policy "frame-ancestors https://t.me https://web.telegram.org;";

    # 1. Раздача статических изображений
    location /images/ {
        # Используем root, Nginx сам добавит /images/ к пути
        root /home/user/my_project/static;
        expires $expires;
        add_header Cache-Control "public, no-transform";
        access_log off; # Не забиваем логи картинками
    }

    # 2. Манифест для TON (если будет крипта)
    location = /tonconnect-manifest.json {
        allow all;
        add_header Access-Control-Allow-Origin *;
        add_header Content-Type application/json;
    }

    # 3. API запросы к Python (FastAPI/Flask)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Передаем реальные данные о пользователе серверу
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Настройки для WebSocket (если вдруг добавишь чат)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Тайм-ауты
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # 4. Главная страница и клиентский роутинг
    location / {
        try_files $uri $uri/ /index.html;
    }
}
