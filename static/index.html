<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" class="loader-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
        </div>
        <div class="access-text">ACCESS GRANTED</div>
        <div class="load-pct" id="load-pct">0%</div>
        <div class="load-bar-bg"><div class="load-bar-fill" id="load-bar"></div></div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar-box"><img src="images/logo.png" id="u-avatar"></div>
                <div><b id="u-name">Agent</b><br><small style="color:#444; font-size:9px;">v4.0.0 Neural Mining</small></div>
            </div>
            <div class="lvl-badge" id="u-lvl">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><small>EARN PER TAP</small><b id="tap-val">+1</b></div>
            <div class="stat-card"><small>PROFIT PER HOUR</small><b id="profit-val">0</b></div>
        </div>

        <div class="balance" id="balance">0</div>

        <div class="play-area">
            <img src="images/logo.png" class="main-logo-btn" id="tap-target" ontouchstart="logic.tap(event)">
            <div class="side-menu">
                <div class="side-btn" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn" onclick="ui.openM('friends')">🤝 FRIENDS</div>
                <div class="side-btn" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="energy-info"><span>ENERGY</span><span id="eng-val">0/0</span></div>
            <div class="eng-progress"><div class="eng-fill" id="eng-fill"></div></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="nav-item" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="nav-item" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="nav-item" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="modal-container" class="modal" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-content">
            <div class="modal-drag-line"></div>
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-body"></div>
            <button class="close-btn" onclick="ui.closeM()">Close Terminal</button>
        </div>
    </div>

    <script>
        const logic = {
            user: null,
            async init() {
                const tg = window.Telegram.WebApp;
                tg.expand();
                const u = tg.initDataUnsafe?.user || { id: "12345", username: "Agent" };
                
                try {
                    const res = await fetch(`/api/user/${u.id}?username=${u.username}&photo_url=${u.photo_url || ''}`);
                    this.user = await res.json();
                } catch(e) { 
                    this.user = { balance: 1000, energy: 1000, max_energy: 1000, click_lvl: 1, profit_hr: 0, username: u.username };
                }
                ui.startLoading();
                this.loop();
            },

            tap(e) {
                if (this.user.energy < this.user.click_lvl) return;
                this.user.balance += this.user.click_lvl;
                this.user.energy -= this.user.click_lvl;
                ui.update();
                this.createPop(e);
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            },

            createPop(e) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                const p = document.createElement('div');
                p.className = 'tap-pop';
                p.innerText = `+${this.user.click_lvl}`;
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            },

            async buyUpgrade(type) {
                const prices = { 
                    tap: Math.floor(this.user.click_lvl * 2500 * 1.5), 
                    energy: Math.floor((this.user.max_energy / 500) * 4000), 
                    profit: Math.floor((this.user.profit_hr / 500 + 1) * 12000) 
                };

                if (this.user.balance >= prices[type]) {
                    this.user.balance -= prices[type];
                    if (type === 'tap') this.user.click_lvl++;
                    if (type === 'energy') { this.user.max_energy += 500; this.user.energy = this.user.max_energy; }
                    if (type === 'profit') this.user.profit_hr += 500;
                    
                    ui.update();
                    this.save();
                    ui.openM(type === 'profit' ? 'mine' : 'boost'); // Перерисовать окно с новой ценой
                } else {
                    if (window.Telegram?.WebApp) window.Telegram.WebApp.showAlert("Недостаточно кредитов!");
                }
            },

            loop() {
                setInterval(() => {
                    if(this.user.energy < this.user.max_energy) this.user.energy = Math.min(this.user.max_energy, this.user.energy + 1.5);
                    if(this.user.profit_hr > 0) this.user.balance += (this.user.profit_hr / 3600);
                    ui.update();
                }, 1000);
                setInterval(() => this.save(), 15000);
            },

            async save() {
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: this.user.user_id || this.user.id, 
                        balance: Math.floor(this.user.balance),
                        energy: Math.floor(this.user.energy), 
                        max_energy: this.user.max_energy,
                        click_lvl: this.user.click_lvl, 
                        profit_hr: this.user.profit_hr
                    })
                });
            }
        };

        const ui = {
            update() {
                if(!logic.user) return;
                document.getElementById('balance').innerText = Math.floor(logic.user.balance).toLocaleString();
                document.getElementById('eng-val').innerText = `${Math.floor(logic.user.energy)}/${logic.user.max_energy}`;
                document.getElementById('eng-fill').style.width = (logic.user.energy/logic.user.max_energy*100)+'%';
                document.getElementById('u-name').innerText = logic.user.username;
                document.getElementById('u-lvl').innerText = `LVL ${Math.floor(logic.user.balance/200000)+1}`;
                document.getElementById('tap-val').innerText = `+${logic.user.click_lvl}`;
                document.getElementById('profit-val').innerText = logic.user.profit_hr;
                if(logic.user.photo_url) document.getElementById('u-avatar').src = logic.user.photo_url;
            },

            startLoading() {
                let p = 0;
                const itv = setInterval(() => {
                    p += 2;
                    document.getElementById('load-pct').innerText = p + '%';
                    document.getElementById('load-bar').style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(itv);
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        this.update();
                    }
                }, 30);
            },

            openM(type) {
                const body = document.getElementById('modal-body');
                const title = document.getElementById('modal-title');
                title.innerText = type.toUpperCase();
                let h = '';

                if(type === 'boost') {
                    h = `
                        <div class="top-item" onclick="logic.buyUpgrade('tap')">
                            <div class="top-user"><span>🚀</span><div><b>Multi-Tap</b><br><small>Next Lvl: ${logic.user.click_lvl + 1}</small></div></div>
                            <b class="top-val">💰 ${Math.floor(logic.user.click_lvl * 2500 * 1.5).toLocaleString()}</b>
                        </div>
                        <div class="top-item" onclick="logic.buyUpgrade('energy')">
                            <div class="top-user"><span>⚡</span><div><b>Energy Cap</b><br><small>+500 Limit</small></div></div>
                            <b class="top-val">💰 ${Math.floor((logic.user.max_energy / 500) * 4000).toLocaleString()}</b>
                        </div>`;
                } else if(type === 'mine') {
                    h = `<div class="top-item" onclick="logic.buyUpgrade('profit')">
                            <div class="top-user"><span>⛏️</span><div><b>Neural Core</b><br><small>+500/hr Profit</small></div></div>
                            <b class="top-val">💰 ${Math.floor((logic.user.profit_hr / 500 + 1) * 12000).toLocaleString()}</b>
                        </div>`;
                } else if(type === 'top') {
                    body.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.3;">CONNECTING TO NETWORK...</div>';
                    fetch('/api/top').then(r=>r.json()).then(data => {
                        body.innerHTML = data.map((u, i) => `
                            <div class="top-item ${u.username === logic.user.username ? 'me' : ''}">
                                <div class="top-user">
                                    <span style="font-weight:900; width:25px; color:${i<3?'#00ffff':'#333'}">#${i+1}</span>
                                    <div class="top-avatar" style="background:${i<3?'var(--grad)':'#1a1a1a'}">${u.username[0].toUpperCase()}</div>
                                    <span class="top-name">${u.username}</span>
                                </div>
                                <span class="top-val">${Math.floor(u.balance).toLocaleString()}</span>
                            </div>`).join('');
                    });
                    return;
                } else if(type === 'tasks') {
                    h = `<div class="top-item" onclick="window.open('https://t.me/your_channel')">
                            <div class="top-user"><span>📢</span><div><b>Join Channel</b><br><small>+10,000 Credits</small></div></div>
                            <div class="lvl-badge">START</div>
                        </div>`;
                } else if(type === 'friends') {
                    h = `<div style="text-align:center; padding:10px;">
                            <p style="font-size:13px; color:#666; margin-bottom:15px;">Invite your squad and get 10% of their taps!</p>
                            <div class="top-item" onclick="window.open('https://t.me/share/url?url=t.me/bot_name?start=${logic.user.user_id}')">
                                <div class="top-user"><span>🤝</span><b>Invite a Friend</b></div>
                                <div class="lvl-badge">SEND</div>
                            </div>
                        </div>`;
                } else if(type === 'wallet') {
                    h = `<div style="text-align:center; padding:20px;">
                            <div style="font-size:40px; margin-bottom:10px;">👛</div>
                            <p style="margin-bottom:20px;">Connect your TON wallet for future airdrops.</p>
                            <button class="close-btn" style="background:var(--grad); color:#000; border:none;">Connect TON Wallet</button>
                        </div>`;
                } else if(type === 'bonus') {
                    h = `<div class="top-item">
                            <div class="top-user"><span>🎁</span><b>Daily Reward</b><br><small>Come back tomorrow</small></div>
                            <div class="lvl-badge" style="opacity:0.5;">CLAIMED</div>
                        </div>`;
                }
                body.innerHTML = h;
                document.getElementById('modal-container').classList.add('active');
            },

            closeM() { document.getElementById('modal-container').classList.remove('active'); }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
