<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="app">
        <div class="header">
            <div class="u-profile">
                <div class="u-av"><img src="images/logo.png" id="avatar-img"></div>
                <div class="u-info"><b id="u-name">...</b><br><small>Neural Agent</small></div>
            </div>
            <div class="u-lvl" id="lvl-txt">LVL 1</div>
        </div>

        <div class="stats-row">
            <div class="s-card"><small>Per Tap</small><b id="tap-power">+1</b></div>
            <div class="s-card"><small>Profit/Hr</small><b id="p-hr">0</b></div>
        </div>

        <div class="balance-container">
            <h1 id="balance-num">0</h1>
        </div>

        <div class="click-zone">
            <div class="main-btn-wrapper">
                <div class="ring-glow"></div>
                <img src="images/logo.png" class="ai-logo-btn" ontouchstart="logic.tap(event)">
            </div>
            
            <div class="side-menu">
                <div class="side-item" onclick="ui.modal('wallet')">👛 WALLET</div>
                <div class="side-item" onclick="ui.modal('friends')">🤝 FRIENDS</div>
            </div>
        </div>

        <div class="energy-box">
            <div class="e-info"><span>ENERGY</span><span id="e-count">1000/1000</span></div>
            <div class="e-bar"><div class="e-fill" id="e-bar-fill" style="width: 100%"></div></div>
        </div>

        <div class="bottom-nav">
            <button onclick="ui.modal('boost')">🚀 BOOST</button>
            <button onclick="ui.modal('mine')">⛏️ MINE</button>
            <button onclick="ui.modal('tasks')">📋 TASKS</button>
            <button onclick="ui.modal('top')">🏆 TOP</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const logic = {
            balance: 0,
            energy: 1000,
            max_energy: 1000,
            tap_val: 1,
            init() {
                document.getElementById('u-name').innerText = tg.initDataUnsafe?.user?.username || "Agent";
                this.loop();
            },
            tap(e) {
                if (this.energy <= 0) return;
                this.balance += this.tap_val;
                this.energy -= this.tap_val;
                this.updateUI();
                this.createPop(e);
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            },
            updateUI() {
                document.getElementById('balance-num').innerText = Math.floor(this.balance).toLocaleString();
                document.getElementById('e-count').innerText = `${Math.floor(this.energy)}/${this.max_energy}`;
                document.getElementById('e-bar-fill').style.width = (this.energy / this.max_energy * 100) + '%';
            },
            createPop(e) {
                const t = e.touches[0];
                const p = document.createElement('div');
                p.className = 'pop'; p.innerText = `+${this.tap_val}`;
                p.style.left = t.clientX + 'px'; p.style.top = t.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            },
            loop() {
                setInterval(() => {
                    if (this.energy < this.max_energy) {
                        this.energy = Math.min(this.max_energy, this.energy + 1);
                        this.updateUI();
                    }
                }, 1000);
            }
        };

        const ui = {
            modal(type) { alert("Модуль " + type + " в разработке"); }
        };

        window.onload = () => logic.init();
    </script>
</body>
</html>
