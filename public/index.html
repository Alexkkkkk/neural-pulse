<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { 
            --neon-cyan: #00f2ff; 
            --neon-purple: #bc13fe; 
            --bg-dark: #050505; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(0, 242, 255, 0.2);
        }

        body { 
            margin: 0; padding: 0; background: var(--bg-dark); 
            color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh;
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none;
        }

        /* --- ЛОАДЕР --- */
        #loader-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loader-ring { width: 120px; height: 120px; border: 3px solid transparent; border-top: 3px solid var(--neon-cyan); border-radius: 50%; animation: rot 1s linear infinite; }
        @keyframes rot { to { transform: rotate(360deg); } }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .header-box {
            width: 88%; margin-top: 15px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 12px 15px; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(10px);
        }
        .lvl-badge {
            width: 42px; height: 42px; border: 1.5px solid var(--neon-cyan);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: var(--neon-cyan);
        }

        .balance-text { font-size: 64px; font-weight: bold; margin-top: 25px; letter-spacing: -2px; text-shadow: 0 0 20px rgba(0,242,255,0.2); }

        /* --- ЦЕНТРАЛЬНАЯ ЗОНА --- */
        .main-container { position: relative; margin-top: 30px; display: flex; justify-content: center; align-items: center; }
        .logo-circle {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .main-logo { width: 180px; pointer-events: none; transition: transform 0.1s; }
        .logo-circle:active .main-logo { transform: scale(0.92); }

        /* WALLET BUTTON (Как на скрине) */
        .wallet-wrapper {
            position: absolute; top: 15%; right: -25px; z-index: 100;
        }
        .wallet-overlay {
            background: rgba(0, 136, 204, 0.15); border: 1px solid #0088cc;
            padding: 7px 14px; border-radius: 14px; font-size: 13px; font-weight: bold;
            color: #5dc2ff; backdrop-filter: blur(10px); cursor: pointer;
            min-width: 80px; text-align: center;
        }
        #ton-mount { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* БОКОВОЕ МЕНЮ */
        .side-nav { position: absolute; right: -70px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; }
        .side-btn { background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; width: 60px; text-align: center; font-size: 10px; font-weight: bold; }

        /* --- НИЖНЯЯ ЧАСТЬ --- */
        .energy-wrap { width: 88%; margin-top: auto; margin-bottom: 20px; }
        .energy-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .energy-fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: 0.2s; box-shadow: 0 0 10px var(--neon-cyan); }

        .nav-grid { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 35px; }
        .nav-btn {
            background: #121212; border: 1px solid #222; border-radius: 18px;
            padding: 16px 0; color: white; font-size: 12px; font-weight: 900;
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
        }
        .nav-btn:active { transform: scale(0.95); background: #1a1a1a; }

        /* АНИМАЦИЯ ТАПА */
        .tap-anim { position: absolute; color: white; font-size: 32px; font-weight: 900; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #111; width: 80%; padding: 30px; border-radius: 25px; border: 1px solid var(--neon-cyan); text-align: center; }
        .close-btn { margin-top: 20px; padding: 10px 20px; background: var(--neon-cyan); color: black; border-radius: 10px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-ring"></div>
        <div id="load-pct" style="position: absolute; font-weight: 900; font-size: 18px;">0%</div>
    </div>

    <div class="header-box">
        <div class="lvl-badge" id="lvl-badge">1</div>
        <div style="flex-grow: 1;">
            <div style="font-size: 10px; color: #666; font-weight: 900; text-transform: uppercase;">Neural Network</div>
            <div style="font-size: 13px; color: var(--neon-cyan); font-weight: bold;" id="pnl-display">PASSIVE: +0/h</div>
        </div>
    </div>

    <div class="balance-text" id="balance">0</div>

    <div class="main-container">
        <div class="logo-circle" id="tap-target">
            <img src="logo.png" class="main-logo" onerror="this.src='https://via.placeholder.com/180/bc13fe/fff?text=AI'">
        </div>
        
        <div class="wallet-wrapper">
            <div class="wallet-overlay" id="addr-text">WALLET</div>
            <div id="ton-mount"></div>
        </div>

        <div class="side-nav">
            <div class="side-btn" onclick="showInvite()">INVITE</div>
            <div class="side-btn" onclick="tg.showAlert('Bonus: +1,000 NP')">BONUS</div>
        </div>
    </div>

    <div class="energy-wrap">
        <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; color: #888;">
            <span>⚡ ENERGY</span>
            <span id="energy-text" style="color: white;">1000/1000</span>
        </div>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
    </div>

    <div class="nav-grid">
        <div class="nav-btn" onclick="openModal('shop')">🚀 BOOST</div>
        <div class="nav-btn" onclick="openModal('shop')">⛏️ MINE</div>
        <div class="nav-btn" onclick="openModal('stats')">📊 STATS</div>
    </div>

    <div id="shop" class="modal"><div class="modal-content"><h3>Shop & Upgrades</h3><p>Coming Soon...</p><div class="close-btn" onclick="closeModals()">Close</div></div></div>
    <div id="stats" class="modal"><div class="modal-content"><h3>Your Stats</h3><p id="stats-info"></p><div class="close-btn" onclick="closeModals()">Close</div></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json',
            buttonRootId: 'ton-mount'
        });

        tonConnectUI.onStatusChange(wallet => {
            const txt = document.getElementById('addr-text');
            if (wallet) {
                const a = wallet.account.address;
                txt.innerText = a.slice(0,4) + '..' + a.slice(-4);
                txt.style.borderColor = '#00f2ff';
            } else {
                txt.innerText = 'WALLET';
            }
        });

        let state = {
            balance: 246,
            energy: 1000,
            lvl: 1,
            pnl: 0,
            unsaved: 0
        };

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)}/1000`;
            document.getElementById('energy-fill').style.width = (state.energy/10) + '%';
            document.getElementById('lvl-badge').innerText = state.lvl;
            document.getElementById('pnl-display').innerText = `PASSIVE: +${state.pnl}/h`;
        }

        // Клик (Тап)
        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.energy <= 0) return;

            const t = e.touches[0];
            state.balance += 1;
            state.energy -= 1;
            state.unsaved += 1;

            // Анимация цифры
            const n = document.createElement('div');
            n.className = 'tap-anim';
            n.innerText = '+1';
            n.style.left = t.clientX + 'px';
            n.style.top = t.clientY + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 600);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateUI();
        });

        function openModal(id) { 
            if(id === 'stats') document.getElementById('stats-info').innerText = `Balance: ${state.balance} NP\nLevel: ${state.lvl}`;
            document.getElementById(id).style.display = 'flex'; 
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function showInvite() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/n_pulse_bot?start=${tg.initDataUnsafe?.user?.id}&text=Connect to Neural Pulse!`); }

        // Лоадер
        let loadP = 0;
        const loadIv = setInterval(() => {
            loadP += 5;
            document.getElementById('load-pct').innerText = loadP + '%';
            if(loadP >= 100) {
                clearInterval(loadIv);
                document.getElementById('loader-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-screen').remove(), 500);
            }
        }, 30);

        // Регенерация энергии
        setInterval(() => {
            if(state.energy < 1000) {
                state.energy = Math.min(1000, state.energy + 1.2);
                updateUI();
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
