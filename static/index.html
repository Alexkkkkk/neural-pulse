<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="images/logo.png" alt="Neural AI" class="loader-logo">
        </div>
        <div class="loading-text">ACCESS GRANTED</div>
        <div class="percent" id="load-pct">0%</div>
        <div class="load-bar-wrapper" style="width: 200px;">
            <div id="load-bar" class="load-bar-f"></div>
        </div>
    </div>

    <div id="app">
        <div class="header-container">
            <div class="header-user">
                <div class="avatar-neomorph">
                    <img src="images/logo.png" alt="AI">
                </div>
                <div class="u-info">
                    <b id="u-name">Kander</b>
                    <small>v4.0.0 Neural Mining</small>
                </div>
            </div>
            <div class="lvl-badge-neon" id="u-lvl">LVL 659</div>
        </div>

        <div class="stats-row-neon">
            <div class="stat-card-neon">
                <small>EARN PER TAP</small>
                <div class="val-group">
                    <b id="tap-val">+7</b>
                </div>
            </div>
            <div class="stat-card-neon">
                <small>PROFIT PER HOUR</small>
                <div class="val-group">
                    <b id="profit-val">0</b>
                </div>
            </div>
        </div>

        <div class="balance-nebula" id="balance">6 541 233</div>

        <div class="play-area">
            <div class="logo-glow"></div>
            <img src="images/logo.png" class="main-logo-pulse" id="tap-target" alt="Tap Me">
            
            <div class="side-menu-cyber">
                <div class="side-btn-cyber" onclick="ui.openM('wallet')">👛 WALLET</div>
                <div class="side-btn-cyber" onclick="ui.openM('squad')">🤝 FRIENDS</div>
                <div class="side-btn-cyber" onclick="ui.openM('bonus')">🎁 BONUS</div>
            </div>
        </div>

        <div class="energy-container-cyber">
            <div class="en-txt-cyber">
                <span>ENERGY</span>
                <span id="eng-val">2000/2000</span>
            </div>
            <div class="progress-bar-wrap">
                <div id="eng-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="bottom-nav-cyber">
            <div class="nav-btn-capsule" onclick="ui.openM('boost')">🚀 BOOST</div>
            <div class="nav-btn-capsule" onclick="ui.openM('mine')">⛏️ MINE</div>
            <div class="nav-btn-capsule" onclick="ui.openM('tasks')">📋 TASKS</div>
            <div class="nav-btn-capsule" onclick="ui.openM('top')">🏆 TOP</div>
        </div>
    </div>

    <div id="m-wallet" class="modal"><div class="modal-content"><div class="modal-header">TON WALLET</div><div id="ton-connect-btn"></div><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-boost" class="modal"><div class="modal-content"><div class="modal-header">🚀 BOOSTERS</div><div id="boost-list" class="upgrade-list"></div><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <div id="m-top" class="modal"><div class="modal-content"><div class="modal-header">🏆 TOP AGENTS</div><div id="top-list"></div><button class="back-btn" onclick="ui.closeM()">BACK</button></div></div>
    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="loading.js"></script>
</body>
</html>
