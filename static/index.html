<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse v5.5.1</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        </div>
        <div class="l-status">QUANTUM LINK ESTABLISHED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'"></div>
            <div class="u-info">
                <b id="my-name">AGENT</b><br>
                <small id="ui-rank">CONNECTING...</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area">
            <h1 id="ui-balance">0</h1>
        </div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels">
                <span>CORE STABILITY</span>
                <span id="ui-energy">1000/1000</span>
            </div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const game = {
            // Структура данных строго под твою БД (SQL логи)
            data: { 
                id: 0, balance: 0, energy: 1000, max_energy: 1000, 
                tap: 1, profit: 0, username: "AGENT", photo_url: ""
            },
            isLoaded: false,

            async init() {
                ui.startLoader();
                const u = tg.initDataUnsafe.user || { id: 476014374, first_name: 'Agent' };
                this.data.id = u.id.toString();
                const name = (u.username || u.first_name).toUpperCase();

                try {
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}`);
                    if (r.ok) {
                        const dbData = await r.json();
                        // Синхронизируем поля из логов SQL
                        this.data.balance = Number(dbData.balance) || 0;
                        this.data.energy = Number(dbData.energy) || 1000;
                        this.data.max_energy = Number(dbData.max_energy) || 1000;
                        this.data.tap = Number(dbData.tap) || 1;
                        this.data.profit = Number(dbData.profit) || 0;
                        this.data.username = name;
                    }
                } catch(e) { console.error("Sync error"); }

                document.getElementById('my-name').innerText = this.data.username;
                this.isLoaded = true;
                this.loop();
                ui.render();
            },

            // Расчет стоимости (базируется на текущем значении tap/profit из БД)
            getCost(type) {
                if(type === 'tap') return Math.floor(450 * Math.pow(1.6, this.data.tap - 1));
                if(type === 'energy') return Math.floor(600 * Math.pow(1.5, (this.data.max_energy - 1000) / 500));
                if(type === 'mine') return Math.floor(1200 * Math.pow(1.7, this.data.profit / 150));
                return 0;
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < 1) return;
                this.data.balance += this.data.tap;
                this.data.energy -= 1;
                ui.pop(e, this.data.tap);
                ui.render();
                tg.HapticFeedback.impactOccurred('light');
            },

            upgrade(type) {
                const cost = this.getCost(type);
                if(this.data.balance >= cost) {
                    this.data.balance -= cost;
                    if(type === 'tap') this.data.tap++;
                    if(type === 'energy') this.data.max_energy += 500;
                    if(type === 'mine') this.data.profit += 150;
                    
                    this.save();
                    ui.render();
                    ui.openM(type === 'mine' ? 'mine' : 'boost');
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert("LACK OF NP");
                }
            },

            async save() {
                if(!this.isLoaded) return;
                fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.data)
                });
            },

            loop() {
                setInterval(() => {
                    // Регенерация + пассивный доход
                    if(this.data.energy < this.data.max_energy) this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1);
                    if(this.data.profit > 0) this.data.balance += (this.data.profit / 3600);
                    ui.render();
                }, 1000);
                // Автосейв каждые 20 сек
                setInterval(() => this.save(), 20000);
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 10;
                    document.getElementById('pct').innerText = p+'%';
                    document.getElementById('bar').style.width = p+'%';
                    if(p>=100) { clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('app').style.display='flex'; }
                }, 50);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                document.getElementById('e-fill').style.width = (d.energy/d.max_energy*100)+'%';
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = Math.floor(d.profit);
                
                const ranks = ["NODE AGENT", "CYBER MANTIS", "NEURAL LORD", "QUANTUM GOD"];
                let rIdx = Math.min(3, Math.floor(d.balance / 25000));
                document.getElementById('ui-rank').innerText = ranks[rIdx];
                document.getElementById('my-lvl').innerText = `LVL ${rIdx + 1}`;
            },

            pop(e, p) {
                const t = (e.touches && e.touches[0]) || e;
                const div = document.createElement('div');
                div.className = 'pop'; div.innerText = `+${p}`;
                div.style.left = t.clientX+'px'; div.style.top = t.clientY+'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 600);
            },

            openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                
                if(type === 'boost') {
                    b.innerHTML = `<h2>🚀 BOOSTERS</h2>
                    <div class="top-item" onclick="game.upgrade('tap')"><span>Multitap (Lvl ${game.data.tap})</span><b>${game.getCost('tap')}</b></div>
                    <div class="top-item" onclick="game.upgrade('energy')"><span>Energy Cap</span><b>${game.getCost('energy')}</b></div>`;
                }
                else if(type === 'mine') {
                    b.innerHTML = `<h2>⛏️ MINING</h2>
                    <div class="top-item" onclick="game.upgrade('mine')"><span>Neural Core (+150/h)</span><b>${game.getCost('mine')}</b></div>`;
                }
                else if(type === 'bonus') {
                    b.innerHTML = `<h2>🎁 DAILY BONUS</h2><p style="text-align:center">Supply connection available once a day.</p>
                    <button class="m-close" style="background:cyan;color:black;width:100%" onclick="tg.showAlert('Coming in next patch!')">CONNECT</button>`;
                }
                else if(type === 'wallet') {
                    b.innerHTML = `<h2>👛 WALLET</h2><div id="ton-btn" style="display:flex; justify-content:center; padding:20px;"></div>`;
                    // TON Connect UI init
                    const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://neural-pulse.bothost.ru/tonconnect-manifest.json', buttonRootId: 'ton-btn' });
                }
                else { b.innerHTML = `<h2>TERMINAL</h2><p style="text-align:center">Section ${type} is encrypted.</p>`; }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
