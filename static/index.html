<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neural Pulse V4</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loader">
        <div class="l-content">
            <div class="ring"></div>
            <img src="images/logo.png" class="l-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2082/2082855.png'">
        </div>
        <div class="l-status">ACCESS GRANTED</div>
        <div class="l-pct" id="pct">0%</div>
        <div class="l-bar"><div id="bar"></div></div>
    </div>

    <div id="app" style="display: none;">
        <header class="u-card">
            <div class="u-avatar"><img id="my-avatar" src="images/logo.png"></div>
            <div class="u-info">
                <b id="my-name">LOADING...</b>
                <small>Neural Mining v4.0</small>
            </div>
            <div class="u-lvl" id="my-lvl">LVL 1</div>
        </header>

        <div class="stats-row">
            <div class="s-box"><small>EARN PER TAP</small><b id="ui-tap">+1</b></div>
            <div class="s-box"><small>PROFIT PER HOUR</small><b id="ui-profit">0</b></div>
        </div>

        <div class="balance-area"><h1 id="ui-balance">0</h1></div>

        <main class="game-core">
            <div class="glow"></div>
            <div class="brain-target" ontouchstart="game.tap(event)">
                <img src="images/logo.png">
            </div>
            <div class="side-menu">
                <button onclick="ui.openM('wallet')">👛 WALLET</button>
                <button onclick="ui.openM('friends')">🤝 FRIENDS</button>
                <button onclick="ui.openM('bonus')">🎁 BONUS</button>
            </div>
        </main>

        <footer class="energy-section">
            <div class="e-labels"><span>ENERGY</span><span id="ui-energy">1000/1000</span></div>
            <div class="e-track"><div id="e-fill"></div></div>
            <nav class="bottom-tabs">
                <button onclick="ui.openM('boost')">🚀 BOOST</button>
                <button onclick="ui.openM('mine')">⛏️ MINE</button>
                <button onclick="ui.openM('tasks')">📋 TASKS</button>
                <button onclick="ui.openM('top')">🏆 TOP</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal-bg" onclick="if(event.target===this) ui.closeM()">
        <div class="modal-box">
            <div class="handle"></div>
            <div id="m-body"></div>
            <button class="m-close" onclick="ui.closeM()">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const game = {
            data: { id: 0, balance: 0, energy: 1000, max_energy: 1000, tap: 1, profit: 0 },
            isLoaded: false,

            async init() {
                const u = tg.initDataUnsafe.user || { id: 1, username: 'AGENT', photo_url: '' };
                const name = (u.username || u.first_name || 'AGENT').toUpperCase();
                document.getElementById('my-name').innerText = name;
                
                try {
                    // Используем encodeURIComponent для безопасности URL
                    const r = await fetch(`/api/user/${u.id}?username=${encodeURIComponent(name)}&photo_url=${encodeURIComponent(u.photo_url || '')}`);
                    const d = await r.json();
                    
                    // Объединяем данные, защищаясь от undefined
                    this.data.id = d.id || u.id;
                    this.data.balance = parseFloat(d.balance) || 0;
                    this.data.energy = parseFloat(d.energy) || 1000;
                    this.data.max_energy = parseInt(d.max_energy) || 1000;
                    this.data.tap = parseInt(d.tap) || 1;
                    this.data.profit = parseInt(d.profit) || 0;

                    if(u.photo_url) document.getElementById('my-avatar').src = u.photo_url;
                    this.isLoaded = true;
                } catch(e) { 
                    console.error("Server Error, playing offline"); 
                    this.isLoaded = true; // Позволяем играть даже при ошибке сервера
                }

                ui.startLoader();
                this.mainLoop();
            },

            tap(e) {
                if(!this.isLoaded || this.data.energy < this.data.tap) return;
                
                this.data.balance += this.data.tap;
                this.data.energy -= this.data.tap;
                
                ui.render();
                ui.pop(e);
                tg.HapticFeedback.impactOccurred('medium');
            },

            mainLoop() {
                setInterval(() => {
                    if(!this.isLoaded) return;
                    
                    // Регенерация энергии (1.5 в сек)
                    if(this.data.energy < this.data.max_energy) {
                        this.data.energy = Math.min(this.data.max_energy, this.data.energy + 1.5);
                    }
                    
                    // Пассивный доход (делим на 3600 т.к. профит указан в час)
                    if(this.data.profit > 0) {
                        this.data.balance += (this.data.profit / 3600);
                    }
                    
                    ui.render();
                }, 1000);

                // Сохранение каждые 10 сек
                setInterval(() => this.save(), 10000);
            },

            async save() {
                if(!this.isLoaded) return;
                try {
                    await fetch('/api/save', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: this.data.id, ...this.data })
                    });
                } catch(e) { console.warn("Save failed"); }
            }
        };

        const ui = {
            startLoader() {
                let p = 0;
                const i = setInterval(() => {
                    p += 2;
                    document.getElementById('pct').innerText = p + '%';
                    document.getElementById('bar').style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(i);
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        this.render();
                    }
                }, 20);
            },

            render() {
                const d = game.data;
                document.getElementById('ui-balance').innerText = Math.floor(d.balance).toLocaleString();
                document.getElementById('ui-energy').innerText = `${Math.floor(d.energy)}/${d.max_energy}`;
                
                const energyPct = (d.energy / d.max_energy) * 100;
                document.getElementById('e-fill').style.width = energyPct + '%';
                
                document.getElementById('ui-tap').innerText = `+${d.tap}`;
                document.getElementById('ui-profit').innerText = d.profit.toLocaleString();
                document.getElementById('my-lvl').innerText = `LVL ${Math.floor(d.balance / 5000) + 1}`;
            },

            pop(e) {
                const t = e.touches[0];
                const p = document.createElement('div');
                p.className = 'pop'; 
                p.innerText = `+${game.data.tap}`;
                p.style.left = t.clientX + 'px'; 
                p.style.top = t.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            },

            async openM(type) {
                const b = document.getElementById('m-body');
                document.getElementById('modal').classList.add('active');
                
                if(type === 'top') {
                    b.innerHTML = '<h2>RANKING</h2><div class="loader-small"></div>';
                    const r = await fetch('/api/top');
                    const top = await r.json();
                    let h = '';
                    top.forEach((u, i) => {
                        const isMe = String(u.id) === String(game.data.id) ? 'me' : '';
                        h += `
                        <div class="top-item ${isMe}">
                            <div class="t-user">
                                <b>#${i+1}</b>
                                <img src="${u.photo_url || 'images/logo.png'}" onerror="this.src='images/logo.png'">
                                <span>${u.username}</span>
                            </div>
                            <b>${Math.floor(u.balance).toLocaleString()}</b>
                        </div>`;
                    });
                    b.innerHTML = `<h2>GLOBAL TOP 50</h2>` + h;
                } 
                else if(type === 'mine') {
                    b.innerHTML = `
                        <h2>NEURAL MINING</h2>
                        <div class="shop-item" onclick="ui.buy('mine', 5000, 500)">
                            <div class="s-text">
                                <b>AI CORE V1</b><br>
                                <small>+500/hr | Cost: 5,000</small>
                            </div>
                            <button class="buy-btn">UPGRADE</button>
                        </div>
                    `;
                }
                else if(type === 'boost') {
                    b.innerHTML = `
                        <h2>BOOSTERS</h2>
                        <div class="shop-item" onclick="ui.buy('tap', 1000, 1)">
                            <div class="s-text">
                                <b>MULTITAP</b><br>
                                <small>+1 per tap | Cost: 1,000</small>
                            </div>
                            <button class="buy-btn">UPGRADE</button>
                        </div>
                    `;
                }
                else {
                    b.innerHTML = `<h2>${type.toUpperCase()}</h2><p style="text-align:center; padding:20px; opacity:0.5;">Coming Soon...</p>`;
                }
            },

            buy(type, cost, value) {
                if(game.data.balance >= cost) {
                    game.data.balance -= cost;
                    if(type === 'tap') game.data.tap += value;
                    if(type === 'mine') game.data.profit += value;
                    this.render();
                    this.closeM();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert("Not enough balance!");
                }
            },

            closeM() { document.getElementById('modal').classList.remove('active'); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
